function matchReflectCombo(reflectStr) {
  if (!reflectStr) return null;
  const r = reflectStr.replace(/\s/g,'');
  for (const combo of COMBO_ORDER) {
    if (r === combo) return combo;
  }
  const partial = {
    '전교과': '전교과',
    '국수영사과': '국수영사과', '국수영사': '국수영사', '국수영과': '국수영과',
    '국수영': '국수영', '국영사': '국영사', '수영과': '수영과', '수과': '수과'
  };
  for (const [k, v] of Object.entries(partial)) {
    if (r.includes(k)) return v;
  }
  return null;
}

function calcRecordDensity(student) {
  const domains = {};
  let total = 0;
  student.records.forEach(r => {
    if (r.t !== '세부능력및특기사항' || !r.b) return;
    const len = r.b.length;
    total += len;
    const key = r.c || '기타';
    if (!domains[key]) domains[key] = { chars: 0, count: 0 };
    domains[key].chars += len;
    domains[key].count++;
  });
  const sorted = Object.entries(domains)
    .map(([k, v]) => ({ subject: k, chars: v.chars, count: v.count }))
    .sort((a, b) => b.chars - a.chars);
  return { total, bySubject: sorted, avgPerRecord: total / Math.max(1, sorted.reduce((s,d)=>s+d.count,0)) };
}

function calcFitScore(student, analysis, concept) {
  let score = 0;
  let factors = [];

  if (analysis && analysis.career_flow && analysis.career_flow.length > 0) {
    const careers = analysis.career_flow.map(([y,c]) => c);
    const allSame = careers.every(c => c === careers[0]);
    if (allSame) { score += 25; factors.push({label:'진로 일관성', val:25, note:'3년 동일'}); }
    else if (careers.length >= 2 && careers[careers.length-1] === careers[careers.length-2]) {
      score += 15; factors.push({label:'진로 일관성', val:15, note:'최근 2년 동일'});
    } else { score += 5; factors.push({label:'진로 일관성', val:5, note:'진로 변화 있음'}); }
  }

  const density = calcRecordDensity(student);
  if (density.avgPerRecord >= 300) { score += 20; factors.push({label:'기록 충실도', val:20, note:'풍부 (평균 '+Math.round(density.avgPerRecord)+'자)'}); }
  else if (density.avgPerRecord >= 150) { score += 12; factors.push({label:'기록 충실도', val:12, note:'보통 (평균 '+Math.round(density.avgPerRecord)+'자)'}); }
  else { score += 5; factors.push({label:'기록 충실도', val:5, note:'부족 (평균 '+Math.round(density.avgPerRecord)+'자)'}); }

  if (analysis && analysis.str && analysis.str.length > 0) {
    const strScore = Math.min(20, analysis.str.length * 7);
    score += strScore;
    factors.push({label:'강점 교과', val:strScore, note:analysis.str.length+'개'});
  }

  let activityScore = 0;
  const actTypes = new Set();
  student.records.forEach(r => {
    if (!r.b) return;
    if (r.b.includes('탐구') || r.b.includes('연구') || r.b.includes('실험')) actTypes.add('탐구');
    if (r.b.includes('발표') || r.b.includes('프레젠테이션')) actTypes.add('발표');
    if (r.b.includes('토론') || r.b.includes('토의')) actTypes.add('토론');
    if (r.b.match(/['「《][^'」》]{2,}/)) actTypes.add('독서');
    if (r.b.includes('봉사') || r.b.includes('멘토링')) actTypes.add('봉사');
    if (r.b.includes('프로젝트') || r.b.includes('과제연구')) actTypes.add('프로젝트');
  });
  activityScore = Math.min(20, actTypes.size * 4);
  score += activityScore;
  factors.push({label:'활동 다양성', val:activityScore, note:actTypes.size+'종류 ('+[...actTypes].join(', ')+')'});

  if (student.opinions.length > 0) {
    let opScore = 0;
    student.opinions.forEach(o => {
      if (o.b.length >= 400) opScore += 5;
      else if (o.b.length >= 200) opScore += 3;
      else opScore += 1;
    });
    opScore = Math.min(15, opScore);
    score += opScore;
    factors.push({label:'행특 기록', val:opScore, note:student.opinions.length+'개 학년'});
  }

  return { score: Math.min(100, score), factors };
}

function interpolateAnchors(val, anchors, fallback) {
  for (let i = 0; i < anchors.length - 1; i++) {
    if (val >= anchors[i][0] && val < anchors[i+1][0]) {
      const t = (val - anchors[i][0]) / (anchors[i+1][0] - anchors[i][0]);
      return Math.round(anchors[i][1] + t * (anchors[i+1][1] - anchors[i][1]));
    }
  }
  return fallback;
}

function parseMinRequirement(minText) {
  if (!minText) return { penalty: 0, detail: '' };
  const text = String(minText);
  const m = text.match(/(\d)개\s*합?\s*(\d+)/);
  if (m) {
    const count = parseInt(m[1]), total = parseInt(m[2]);
    const avgRequired = total / count;
    if (avgRequired <= 2.5) return { penalty: -7, detail: `${count}개합${total} (평균 ${avgRequired.toFixed(1)}등급)` };
    if (avgRequired <= 3.5) return { penalty: -5, detail: `${count}개합${total} (평균 ${avgRequired.toFixed(1)}등급)` };
    if (avgRequired <= 4.5) return { penalty: -3, detail: `${count}개합${total} (평균 ${avgRequired.toFixed(1)}등급)` };
    return { penalty: -2, detail: `${count}개합${total} (평균 ${avgRequired.toFixed(1)}등급)` };
  }
  const m2 = text.match(/(\d)등급/);
  if (m2) {
    const grade = parseInt(m2[1]);
    if (grade <= 2) return { penalty: -6, detail: `${grade}등급 이내` };
    if (grade <= 3) return { penalty: -4, detail: `${grade}등급 이내` };
    return { penalty: -2, detail: `${grade}등급 이내` };
  }
  return { penalty: -4, detail: text };
}

function calcOptimalPortfolio(allComps, count) {
  // Greedy portfolio optimization: maximize expected acceptances while maintaining tier diversity
  // Strategy: pick from each band (safe/fit/reach) to ensure balanced portfolio
  const sorted = [...allComps].sort((a,b) => b.prob - a.prob);
  const picks = [];
  const used = new Set();

  const safe = sorted.filter(r => r.prob >= 65);
  const fit = sorted.filter(r => r.prob >= 40 && r.prob < 65);
  const reach = sorted.filter(r => r.prob >= 15 && r.prob < 40);

  // Balanced allocation: 안정 2-3, 적정 2, 소신 1-2
  const addPick = (pool, n) => {
    let added = 0;
    for (const r of pool) {
      if (picks.length >= count || added >= n) break;
      if (used.has(r.univ)) continue;
      // Prefer different university tiers for diversity
      const sameTier = picks.filter(p => p.comp.tier === r.comp.tier).length;
      if (sameTier >= 3) continue;
      picks.push(r);
      used.add(r.univ);
      added++;
    }
  };

  if (safe.length >= 3 && fit.length >= 2) {
    addPick(safe, 3);
    addPick(fit, 2);
    addPick(reach, 1);
  } else if (safe.length >= 2) {
    addPick(safe, 2);
    addPick(fit, 2);
    addPick(reach, 2);
  } else {
    addPick(safe, safe.length);
    addPick(fit, 3);
    addPick(reach, 3 - safe.length);
  }

  // Fill remaining slots with best available
  while (picks.length < count) {
    const next = sorted.find(r => !used.has(r.univ));
    if (!next) break;
    picks.push(next);
    used.add(next.univ);
  }

  // Sort picks by probability descending
  picks.sort((a,b) => b.prob - a.prob);

  // Calculate portfolio statistics
  const probs = picks.map(p => p.prob / 100);
  const nonePassing = probs.reduce((acc, p) => acc * (1 - p), 1);
  const atLeastOne = Math.round((1 - nonePassing) * 100);
  const expectedCount = probs.reduce((s, p) => s + p, 0);

  return { picks, atLeastOne, expectedCount };
}

function calcAdmissionStrategy(student, analysis) {
  const avg = calcWeightedAvg(student);
  const trend = calcYearlyTrend(student);
  const records = student.records || [];
  const opinions = student.opinions || [];
  const a = analysis || {};

  // 1. 교과전형 적합도 — grades are nearly deterministic; stability & level matter most
  let 교과 = 0;
  // Grade level (aggressive scaling for realistic avg 3.5-8.5 range)
  if (avg <= 2.0) 교과 += 50;
  else if (avg <= 3.0) 교과 += 45;
  else if (avg <= 3.5) 교과 += 42;
  else if (avg <= 4.0) 교과 += 38;
  else if (avg <= 4.5) 교과 += 33;
  else if (avg <= 5.0) 교과 += 27;
  else if (avg <= 5.5) 교과 += 22;
  else if (avg <= 6.0) 교과 += 17;
  else if (avg <= 7.0) 교과 += 10;
  else 교과 += 5;

  // Grade stability — 교과전형 values consistency highly
  if (trend.length >= 3) {
    const avgs = trend.map(t => t.avg);
    const range = Math.max(...avgs) - Math.min(...avgs);
    if (range < 0.3) 교과 += 25;
    else if (range < 0.5) 교과 += 22;
    else if (range < 0.8) 교과 += 17;
    else if (range < 1.2) 교과 += 12;
    else if (range < 2.0) 교과 += 7;
    else 교과 += 3;
  }

  // Subject balance
  const wkCount = (a.wk || []).length;
  if (wkCount === 0) 교과 += 15;
  else if (wkCount <= 1) 교과 += 12;
  else if (wkCount <= 2) 교과 += 8;
  else 교과 += 4;

  // Improving trend
  if (trend.length >= 2) {
    const last = trend[trend.length - 1].avg;
    const first = trend[0].avg;
    if (last < first - 0.5) 교과 += 10;
    else if (last < first - 0.2) 교과 += 7;
    else if (last > first + 0.5) 교과 -= 5;
  }

  // 2. 종합전형 적합도 — record quality, narrative, activities (scaled tighter to differentiate)
  let 종합 = 0;

  // Record richness — compare against class median (~4000 chars), not absolute
  const totalChars = records.reduce((sum, r) => sum + (r.b || '').length, 0);
  if (totalChars > 6000) 종합 += 15;
  else if (totalChars > 5000) 종합 += 12;
  else if (totalChars > 4000) 종합 += 9;
  else if (totalChars > 3000) 종합 += 6;
  else 종합 += 3;

  // Academic keyword density — higher threshold for meaningful differentiation
  const allText = records.map(r => r.b || '').join(' ') + ' ' + opinions.map(o => o.b || '').join(' ');
  const keywords = ['탐구', '연구', '실험', '논문', '발표', '토론', '봉사', '리더', '프로젝트', '분석', '자기주도', '심화', '멘토', '협력', '주도'];
  let keywordCount = 0;
  keywords.forEach(k => { keywordCount += (allText.match(new RegExp(k, 'g')) || []).length; });
  if (keywordCount >= 20) 종합 += 15;
  else if (keywordCount >= 14) 종합 += 12;
  else if (keywordCount >= 9) 종합 += 9;
  else if (keywordCount >= 5) 종합 += 6;
  else 종합 += 2;

  // Career narrative consistency — strong differentiator
  const flow = a.career_flow || [];
  let careerConsistent = false;
  if (flow.length >= 2) {
    const careers = flow.map(f => f[1]);
    careerConsistent = careers.every(c => {
      const base = careers[0];
      return c === base || c.includes(base.substring(0, 2)) || base.includes(c.substring(0, 2));
    });
    if (careerConsistent) 종합 += 12;
    else 종합 += 5;
  }

  // Opinion quality
  const opinionChars = opinions.reduce((sum, o) => sum + (o.b || '').length, 0);
  if (opinionChars > 1200) 종합 += 7;
  else if (opinionChars > 800) 종합 += 5;
  else 종합 += 2;

  // Record growth across years
  const yearChars = {};
  records.forEach(r => { const y = r.y || 0; yearChars[y] = (yearChars[y] || 0) + (r.b || '').length; });
  if (yearChars[2] > yearChars[1] * 1.1) 종합 += 8;
  else if (yearChars[2] > yearChars[1]) 종합 += 5;
  else 종합 += 2;

  // Fit score
  const concept = analyzeRecord(student, a).concept;
  const fitData = calcFitScore(student, a, concept);
  if (fitData.score >= 70) 종합 += 12;
  else if (fitData.score >= 50) 종합 += 8;
  else if (fitData.score >= 30) 종합 += 4;
  else 종합 += 1;

  // 종합 advantage when grades are weak but records are strong
  if (avg > 5.0 && totalChars > 4000 && keywordCount >= 8) 종합 += 10;
  else if (avg > 5.0 && (a.str || []).length >= 1) 종합 += 5;

  // Grade baseline for 종합 (still matters, just less)
  if (avg <= 3.0) 종합 += 12;
  else if (avg <= 4.0) 종합 += 10;
  else if (avg <= 5.0) 종합 += 7;
  else if (avg <= 6.0) 종합 += 4;
  else 종합 += 2;

  // Alerts as negative signal for 종합 (진로-교과 mismatch)
  const alerts = a.alerts || [];
  if (alerts.length >= 2) 종합 -= 5;

  // 3. 논술전형 적합도
  let 논술 = 0;
  const subjAvgs = a.subj_avgs || {};
  const parsed = typeof subjAvgs === 'string' ? JSON.parse(subjAvgs) : subjAvgs;

  const mathAvg = parsed['수학'] || avg;
  const sciAvg = parsed['과학'] || avg;
  const korAvg = parsed['국어'] || avg;
  const engAvg = parsed['영어'] || avg;

  // Math strength (most critical for 논술)
  if (mathAvg <= 2.5) 논술 += 30;
  else if (mathAvg <= 3.5) 논술 += 24;
  else if (mathAvg <= 4.5) 논술 += 17;
  else if (mathAvg <= 5.5) 논술 += 11;
  else if (mathAvg <= 6.5) 논술 += 6;
  else 논술 += 3;

  // Best academic subject
  const bestAcademic = Math.min(mathAvg, sciAvg, korAvg, engAvg);
  if (bestAcademic <= 2.5) 논술 += 20;
  else if (bestAcademic <= 3.5) 논술 += 16;
  else if (bestAcademic <= 4.5) 논술 += 11;
  else if (bestAcademic <= 5.5) 논술 += 7;
  else 논술 += 3;

  // Subject gap — 논술 benefits from peak ability even with poor avg
  const gapToAvg = avg - bestAcademic;
  if (gapToAvg >= 2.0) 논술 += 12;
  else if (gapToAvg >= 1.0) 논술 += 8;
  else if (gapToAvg >= 0.5) 논술 += 4;

  // Base grade
  if (avg <= 4.0) 논술 += 15;
  else if (avg <= 5.0) 논술 += 12;
  else if (avg <= 6.0) 논술 += 9;
  else if (avg <= 7.0) 논술 += 6;
  else 논술 += 3;

  // Trend
  if (trend.length >= 2) {
    const last = trend[trend.length - 1].avg;
    const first = trend[0].avg;
    if (last < first - 0.3) 논술 += 8;
    else 논술 += 3;
  }

  // Keyword frequency analysis for display
  const foundKeywords = [];
  keywords.forEach(k => {
    const cnt = (allText.match(new RegExp(k, 'g')) || []).length;
    if (cnt >= 2) foundKeywords.push(k + '(' + cnt + ')');
  });

  // Determine recommendation with nuanced logic
  const scores = { 교과: Math.min(100, Math.max(0, 교과)), 종합: Math.min(100, Math.max(0, 종합)), 논술: Math.min(100, Math.max(0, 논술)) };
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const best = sorted[0][0];
  const bestScore = sorted[0][1];
  const gap12 = sorted[0][1] - sorted[1][1];

  let strategy = '';
  let detail = '';

  if (gap12 <= 8) {
    // Top two are close — recommend hybrid
    const t1 = sorted[0][0], t2 = sorted[1][0];
    strategy = `${t1}+${t2} 병행`;
    detail = `${t1}전형과 ${t2}전형 적합도가 비슷합니다. 대학별로 유리한 전형을 선택적으로 지원하는 것이 최적입니다.`;
  } else if (best === '교과') {
    strategy = '교과전형 중심';
    detail = '내신 성적이 안정적이고 교과 간 편차가 작아 교과전형에서 유리합니다. 안정/적정 지원에서 교과전형을 중심으로 배치하세요.';
  } else if (best === '종합') {
    strategy = '종합전형 중심';
    if (avg > 5.0) {
      detail = '내신 대비 생기부 활동이 풍부하여 종합전형에서 역전 가능성이 높습니다. 면접 준비를 통해 추가 경쟁력을 확보하세요.';
    } else {
      detail = '생기부 활동이 풍부하고 진로 일관성이 있어 종합전형에서 유리합니다. 서류와 면접 준비에 집중하세요.';
    }
  } else {
    strategy = '논술전형 병행';
    detail = '수학/과학 교과 역량이 강해 논술전형에서 좋은 결과를 기대할 수 있습니다. 교과 또는 종합전형과 병행하세요.';
  }

  // Contextual advice
  if (avg > 5.5 && scores.종합 > scores.교과) {
    detail += ' 내신 대비 생기부가 강점이므로 종합전형에서 내신 불리를 생기부로 보완하는 전략이 효과적입니다.';
  }
  if (trend.length >= 3 && trend[trend.length - 1].avg < trend[0].avg - 0.5) {
    detail += ' 성적 상승세가 뚜렷하여 종합전형 면접에서 성장 스토리로 활용 가능합니다.';
  }
  if (gapToAvg >= 1.5 && best !== '논술') {
    detail += ` ${bestAcademic === mathAvg ? '수학' : bestAcademic === sciAvg ? '과학' : bestAcademic === korAvg ? '국어' : '영어'} 교과가 평균 대비 우수하여 논술전형 1~2교 병행도 고려하세요.`;
  }

  return {
    scores,
    sorted,
    strategy,
    detail,
    keywordCount,
    foundKeywords: foundKeywords.slice(0, 6),
    recordChars: totalChars,
    fitScore: fitData.score
  };
}

function calcCompositeScore(univResult, student, analysis) {
  if (!univResult) return null;
  const combo = matchReflectCombo(univResult.cutline?.reflect || '');
  const combos = calcComboScores(student);

  // Use university-converted score (computeScore result) as primary
  // Combo average is secondary reference only — cutlines are in university-converted scale
  let comboScore = univResult.score;
  let comboUsed = null;
  let comboAvgRef = null;
  if (combo && combos[combo]) {
    comboAvgRef = combos[combo].avg;
    comboUsed = combo;
  }

  const tier = getUnivTier(univResult.univ);
  const jeonType = univResult.jeonType || '';
  const is종합 = jeonType.includes('종합') || jeonType.includes('서류') || jeonType.includes('면접');
  const is논술 = jeonType.includes('논술');

  let base = 0;
  if (univResult.cutline) {
    const diff = comboScore - univResult.cutline.cut;
    if (is종합) {
      // 종합전형: wider spread — 생기부/면접이 역전 가능하므로 확률 분산이 큼
      if (diff <= -2.0) base = 92;
      else if (diff >= 3.0) base = 8;
      else {
        base = interpolateAnchors(diff, [
          [-2.0, 92], [-1.5, 85], [-1.0, 75], [-0.5, 64],
          [-0.2, 56], [0, 48], [0.3, 40], [0.5, 34],
          [1.0, 24], [1.5, 17], [2.0, 12], [3.0, 8]
        ], 8);
      }
    } else {
      // 교과전형: tighter spread — 내신이 거의 결정적
      if (diff <= -2.0) base = 98;
      else if (diff >= 3.0) base = 3;
      else {
        base = interpolateAnchors(diff, [
          [-2.0, 98], [-1.5, 95], [-1.0, 88], [-0.5, 75],
          [-0.2, 63], [0, 50], [0.3, 36], [0.5, 27],
          [1.0, 16], [1.5, 10], [2.0, 6], [3.0, 3]
        ], 3);
      }
    }
  } else {
    // Non-cutline universities: tier-based estimation, differentiated by 전형 type
    const tierAnchors교과 = {
      1: [[1.0,52],[1.3,42],[1.5,32],[2.0,20],[2.5,13],[3.0,8],[4.0,5],[9.0,2]],
      2: [[1.0,68],[1.5,55],[2.0,45],[2.5,37],[3.0,30],[3.5,24],[4.0,20],[5.0,14],[6.0,9],[9.0,4]],
      3: [[1.0,78],[1.5,68],[2.0,58],[2.5,50],[3.0,42],[3.5,35],[4.0,29],[5.0,22],[6.0,15],[7.0,10],[9.0,4]],
      4: [[1.0,86],[1.5,76],[2.0,66],[2.5,58],[3.0,50],[3.5,43],[4.0,36],[5.0,28],[6.0,20],[7.0,14],[9.0,7]]
    };
    const tierAnchors종합 = {
      1: [[1.0,58],[1.3,48],[1.5,38],[2.0,26],[2.5,18],[3.0,13],[4.0,8],[9.0,4]],
      2: [[1.0,72],[1.5,62],[2.0,52],[2.5,44],[3.0,36],[3.5,30],[4.0,25],[5.0,18],[6.0,13],[9.0,6]],
      3: [[1.0,82],[1.5,72],[2.0,62],[2.5,54],[3.0,46],[3.5,39],[4.0,33],[5.0,26],[6.0,19],[7.0,13],[9.0,6]],
      4: [[1.0,90],[1.5,80],[2.0,70],[2.5,62],[3.0,54],[3.5,47],[4.0,40],[5.0,32],[6.0,24],[7.0,17],[9.0,9]]
    };
    const tierSet = is종합 ? tierAnchors종합 : tierAnchors교과;
    const anchors = tierSet[tier] || tierSet[4];
    base = interpolateAnchors(comboScore, anchors, comboScore < anchors[0][0] ? anchors[0][1] + 5 : 3);
  }

  // Trend analysis: per-subject trend when combo is known, overall otherwise
  const trend = calcYearlyTrend(student);
  let trendBonus = 0;
  if (trend.length >= 3) {
    const first = trend[0].avg, last = trend[trend.length-1].avg;
    const overallDiff = last - first;
    const recent = trend.slice(-2);
    const recentDiff = recent.length === 2 ? recent[1].avg - recent[0].avg : 0;
    const recentWeight = 0.65, overallWeight = 0.35;
    const combinedDiff = recentDiff * recentWeight + overallDiff * overallWeight;
    // 종합전형: trend matters more (면접에서 성적 추세 설명 가능)
    const trendMult = is종합 ? 1.3 : 1.0;
    if (combinedDiff < -0.6) trendBonus = Math.round(9 * trendMult);
    else if (combinedDiff < -0.3) trendBonus = Math.round(6 * trendMult);
    else if (combinedDiff < -0.1) trendBonus = Math.round(3 * trendMult);
    else if (combinedDiff > 0.6) trendBonus = Math.round(-7 * trendMult);
    else if (combinedDiff > 0.3) trendBonus = Math.round(-4 * trendMult);
    else if (combinedDiff > 0.1) trendBonus = Math.round(-2 * trendMult);
  } else if (trend.length === 2) {
    const diff = trend[1].avg - trend[0].avg;
    if (diff < -0.5) trendBonus = 6;
    else if (diff < -0.2) trendBonus = 3;
    else if (diff > 0.5) trendBonus = -5;
    else if (diff > 0.2) trendBonus = -2;
  }

  // Competition ratio: more granular
  let ratioAdj = 0;
  if (univResult.cutline && univResult.cutline.ratio) {
    const r = parseFloat(univResult.cutline.ratio);
    if (!isNaN(r)) {
      if (r > 20) ratioAdj = -6;
      else if (r > 15) ratioAdj = -4;
      else if (r > 10) ratioAdj = -3;
      else if (r > 7) ratioAdj = -1;
      else if (r < 2.5) ratioAdj = 4;
      else if (r < 4) ratioAdj = 2;
      else if (r < 5.5) ratioAdj = 1;
    }
  }

  // 수능최저: parse actual requirements
  const minReq = parseMinRequirement(univResult.cutline?.min);
  const minAdj = minReq.penalty;

  // Reliability discount
  let reliabilityAdj = 0;
  if (univResult.reliability === 'none') reliabilityAdj = -3;
  else if (univResult.reliability === 'low') reliabilityAdj = -2;

  // Subject count
  let countAdj = 0;
  if (univResult.count && univResult.count < 10) countAdj = -2;

  // Fit score — 종합전형에서 전공적합성이 합격에 미치는 영향 크게 강화
  const concept = analyzeRecord(student, analysis || {}).concept;
  const fitData = calcFitScore(student, analysis || {}, concept);
  let fitBonus;
  if (is종합) {
    // 종합전형: 전공적합성 최대 15%p 영향 (핵심 평가요소)
    fitBonus = Math.round(fitData.score * 0.15);
  } else if (is논술) {
    // 논술전형: 전공적합성 거의 무관
    fitBonus = Math.round(fitData.score * 0.02);
  } else {
    // 교과전형: 전공적합성 약간 영향
    fitBonus = Math.round(fitData.score * 0.04);
  }

  // Combo average cross-check: if combo avg is significantly better than converted score,
  // give slight bonus (student's reflected subjects are stronger than overall)
  let comboBonus = 0;
  if (comboAvgRef != null && comboAvgRef < comboScore - 0.3) {
    comboBonus = Math.round((comboScore - comboAvgRef) * 2);
    comboBonus = Math.min(comboBonus, 5);
  } else if (comboAvgRef != null && comboAvgRef > comboScore + 0.3) {
    comboBonus = -Math.round((comboAvgRef - comboScore) * 2);
    comboBonus = Math.max(comboBonus, -5);
  }

  const raw = Math.max(3, Math.min(99, base + trendBonus + ratioAdj + minAdj + reliabilityAdj + countAdj + fitBonus + comboBonus));
  return {
    probability: raw,
    comboScore, comboUsed, comboAvgRef,
    trendBonus, ratioAdj, minAdj, fitBonus, comboBonus,
    reliabilityAdj, countAdj,
    fitData,
    is종합, is논술, tier
  };
}

function renderRoster() {
  const roster = document.getElementById('roster');
  let html = '';
  STUDENTS.forEach((s, i) => {
    const avg = calcWeightedAvg(s);
    const cls = selectedIdx === i ? ' active' : '';
    html += `<button class="student-btn${cls}" data-idx="${i}">
      <div class="student-avatar">${s.seat}</div>
      <div class="student-meta">
        <div class="name">${esc(s.name)}</div>
        <div class="grade-chip" style="color:${gradeColor(avg)}">${avg.toFixed(2)}등급</div>
      </div>
    </button>`;
  });
  roster.innerHTML = html;
}

function filterRoster(query) {
  const q = query.toLowerCase();
  document.querySelectorAll('.student-btn').forEach(btn => {
    const name = btn.querySelector('.name').textContent.toLowerCase();
    const seat = btn.querySelector('.student-avatar').textContent;
    btn.style.display = (name.includes(q) || seat.includes(q) || !q) ? '' : 'none';
  });
  const visible = document.querySelectorAll('.student-btn:not([style*="display: none"])').length;
  document.getElementById('rosterCount').textContent = visible;
}

function renderDashboard() {
  selectedIdx = null;
  document.getElementById('studentView').style.display = 'none';
  const el = document.getElementById('dashboard');
  el.style.display = '';

  const avgs = STUDENTS.map(s => calcWeightedAvg(s));
  const classAvg = avgs.reduce((a,b) => a+b, 0) / avgs.length;

  // Grade distribution
  const dist = [0,0,0,0,0,0,0,0,0];
  avgs.forEach(a => { const g = Math.min(9, Math.max(1, Math.round(a))); dist[g-1]++; });

  let html = '<div class="glass"><h3>학급 현황 대시보드</h3>';
  html += '<div class="stat-grid">';
  html += `<div class="stat-box"><div class="num">${classAvg.toFixed(2)}</div><div class="label">학급 평균등급</div></div>`;
  html += `<div class="stat-box"><div class="num">${STUDENTS.length}</div><div class="label">총 학생 수</div></div>`;
  html += `<div class="stat-box"><div class="num">${Object.keys(NAESIN_RULES).length}</div><div class="label">대학 데이터</div></div>`;
  html += `<div class="stat-box"><div class="num">${Object.values(INTERVIEW_BANK).reduce((s,a)=>s+a.length,0)}</div><div class="label">면접 문항</div></div>`;
  html += '</div>';

  // Distribution chart
  html += '<h3 style="margin-top:16px">등급 분포</h3>';
  html += '<div style="display:flex;align-items:flex-end;height:100px;gap:4px;margin-bottom:8px">';
  const maxDist = Math.max(...dist, 1);
  for (let i = 0; i < 9; i++) {
    const h = (dist[i] / maxDist) * 80;
    const c = gradeColor(i + 1);
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:10px;font-weight:700;margin-bottom:2px">${dist[i]}</div>
      <div style="width:100%;height:${h}px;background:${c};border-radius:4px 4px 0 0;opacity:0.7"></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${i+1}등급</div>
    </div>`;
  }
  html += '</div>';

  // Combo rankings
  html += '<h3 style="margin-top:20px">교과 조합별 학급 평균</h3>';
  COMBO_ORDER.forEach(combo => {
    let total = 0, cnt = 0;
    STUDENTS.forEach(s => {
      const cs = calcComboScores(s);
      if (cs[combo]) { total += cs[combo].avg; cnt++; }
    });
    if (cnt === 0) return;
    const avg = total / cnt;
    const pct = Math.max(5, (10 - avg) / 9 * 100);
    html += `<div class="combo-bar">
      <span class="clbl">${esc(combo)}</span>
      <div class="cbar"><div class="cfill" style="width:${pct}%;background:${gradeColor(avg)}"></div></div>
      <span class="cval" style="color:${gradeColor(avg)}">${avg.toFixed(2)}</span>
    </div>`;
  });

  // Class-wide concept distribution
  html += '<h3 style="margin-top:20px">학생별 진로 분야 분포</h3>';
  const conceptDist = {};
  STUDENTS.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    const ra = analyzeRecord(s, a);
    if (ra.concept) conceptDist[ra.concept] = (conceptDist[ra.concept] || 0) + 1;
  });
  const conceptEntries = Object.entries(conceptDist).sort((a,b) => b[1] - a[1]);
  if (conceptEntries.length > 0) {
    const maxC = conceptEntries[0][1];
    const conceptColors = {'과학':'var(--green)','수학':'var(--blue)','인문':'var(--purple)','교육':'var(--teal)','공학':'var(--teal-mid)','경영':'var(--copper)','의료':'var(--red)','예술':'var(--purple)','체육':'var(--orange)','법률':'var(--sub)'};
    html += '<div style="display:flex;align-items:flex-end;gap:4px;height:80px;margin-bottom:8px">';
    conceptEntries.forEach(([concept, count]) => {
      const h = (count / maxC) * 60;
      const cc = conceptColors[concept] || 'var(--muted)';
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
        <div style="font-size:10px;font-weight:700;margin-bottom:2px">${count}</div>
        <div style="width:100%;height:${h}px;background:${cc};border-radius:4px 4px 0 0;opacity:0.7"></div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(concept)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // 전공적합성 분포
  html += '<h3 style="margin-top:20px">전공적합성 분포</h3>';
  const fitBuckets = [0,0,0,0]; // 0-25, 26-50, 51-75, 76-100
  const fitLabels = ['25이하','26-50','51-75','76+'];
  const fitColors = ['var(--red)','var(--orange)','var(--blue)','var(--green)'];
  STUDENTS.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    const fit = calcFitScore(s, a, null);
    if (fit.score <= 25) fitBuckets[0]++;
    else if (fit.score <= 50) fitBuckets[1]++;
    else if (fit.score <= 75) fitBuckets[2]++;
    else fitBuckets[3]++;
  });
  const maxFit = Math.max(...fitBuckets, 1);
  html += '<div style="display:flex;align-items:flex-end;gap:8px;height:70px;margin-bottom:8px">';
  fitBuckets.forEach((count, i) => {
    const h = (count / maxFit) * 50;
    html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center">
      <div style="font-size:10px;font-weight:700;margin-bottom:2px">${count}명</div>
      <div style="width:100%;height:${h}px;background:${fitColors[i]};border-radius:4px 4px 0 0;opacity:0.7"></div>
      <div style="font-size:10px;color:var(--muted);margin-top:2px">${fitLabels[i]}</div>
    </div>`;
  });
  html += '</div>';

  // Class-wide university target heat map (cached)
  html += '<h3 style="margin-top:20px">학급 전체 대학 지원 현황</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">각 대학에 안정/적정/소신권인 학생 수를 보여줍니다. 상위 15개 대학만 표시됩니다.</p>';

  if (!_cache.heatmap) {
    const univStudentMap = {};
    STUDENTS.forEach((s, idx) => {
      const a = ANALYSIS[s.seat] || {};
      const results = runAllUniversities(s);
      results.forEach(r => {
        const comp = calcCompositeScore(r, s, a);
        if (!univStudentMap[r.univ]) univStudentMap[r.univ] = { safe: 0, fit: 0, reach: 0, total: 0, tier: comp.tier };
        if (comp.probability >= 65) univStudentMap[r.univ].safe++;
        else if (comp.probability >= 40) univStudentMap[r.univ].fit++;
        else if (comp.probability >= 15) univStudentMap[r.univ].reach++;
        univStudentMap[r.univ].total++;
      });
    });
    _cache.heatmap = Object.entries(univStudentMap)
      .map(([univ, d]) => ({ univ, ...d, weighted: d.safe * 3 + d.fit * 2 + d.reach }))
      .sort((a, b) => b.weighted - a.weighted)
      .slice(0, 15);
  }
  const topUnivs = _cache.heatmap;

  if (topUnivs.length > 0) {
    html += '<div class="scroll-table"><table class="g-table"><thead><tr>';
    html += '<th>대학명</th><th>티어</th><th style="color:var(--green)">안정</th><th style="color:var(--blue)">적정</th><th style="color:var(--orange)">소신</th><th>합계</th>';
    html += '</tr></thead><tbody>';
    const tierLabel = {1:'최상위',2:'상위',3:'중상위',4:'중위'};
    topUnivs.forEach(u => {
      const maxBar = Math.max(u.safe, u.fit, u.reach, 1);
      html += `<tr>
        <td style="font-weight:600">${esc(u.univ)}</td>
        <td style="font-size:11px;color:var(--muted)">${tierLabel[u.tier]||'중위'}</td>
        <td><span style="display:inline-block;width:${Math.max(4, u.safe/34*60)}px;height:14px;background:var(--green);border-radius:3px;vertical-align:middle;opacity:0.7"></span> ${u.safe}</td>
        <td><span style="display:inline-block;width:${Math.max(4, u.fit/34*60)}px;height:14px;background:var(--blue);border-radius:3px;vertical-align:middle;opacity:0.7"></span> ${u.fit}</td>
        <td><span style="display:inline-block;width:${Math.max(4, u.reach/34*60)}px;height:14px;background:var(--orange);border-radius:3px;vertical-align:middle;opacity:0.7"></span> ${u.reach}</td>
        <td style="font-weight:600">${u.total}</td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  }

  // Class-wide admission potential summary (cached)
  if (!_cache.classPortfolio) {
    const stats = { atLeastOneSum: 0, expectedSum: 0, count: 0 };
    const bands = { high: 0, mid: 0, low: 0, warn: 0 };
    STUDENTS.forEach(s => {
      const a = ANALYSIS[s.seat] || {};
      const results = runAllUniversities(s);
      const allC = results.map(r => {
        const comp = calcCompositeScore(r, s, a);
        return { ...r, prob: comp.probability, comp };
      }).sort((a, b) => b.prob - a.prob);
      if (allC.length >= 6) {
        const port = calcOptimalPortfolio(allC, 6);
        stats.atLeastOneSum += port.atLeastOne;
        stats.expectedSum += port.expectedCount;
        stats.count++;
        if (port.atLeastOne >= 95) bands.high++;
        else if (port.atLeastOne >= 80) bands.mid++;
        else if (port.atLeastOne >= 60) bands.low++;
        else bands.warn++;
      }
    });
    _cache.classPortfolio = { stats, bands };
  }
  const { stats: classPortfolioStats, bands: portBands } = _cache.classPortfolio;

  html += '<h3 style="margin-top:20px">학급 합격 예측 요약</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">전체 학생의 AI 최적 포트폴리오 기반 합격 예측 통계입니다.</p>';
  if (classPortfolioStats.count > 0) {
    const avgALO = Math.round(classPortfolioStats.atLeastOneSum / classPortfolioStats.count);
    const avgExp = (classPortfolioStats.expectedSum / classPortfolioStats.count).toFixed(1);
    html += '<div class="stat-grid" style="margin-bottom:12px">';
    html += `<div class="stat-box"><div class="num" style="color:var(--green)">${avgALO}%</div><div class="label">평균 합격 확률 (최소 1교)</div></div>`;
    html += `<div class="stat-box"><div class="num" style="color:var(--blue)">${avgExp}교</div><div class="label">평균 기대 합격 수</div></div>`;
    html += `<div class="stat-box"><div class="num">${portBands.high}</div><div class="label">안정 (95%+)</div></div>`;
    html += `<div class="stat-box"><div class="num" style="color:var(--orange)">${portBands.warn}</div><div class="label">주의 (<60%)</div></div>`;
    html += '</div>';
  }

  // Counseling priority students
  html += '<h3 style="margin-top:20px">상담 우선 학생</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">성적 변화, 진로 적합도, 또는 특이사항으로 우선 상담이 필요한 학생입니다.</p>';
  const priorityStudents = [];
  STUDENTS.forEach((s, i) => {
    const avg = calcWeightedAvg(s);
    const a = ANALYSIS[s.seat] || {};
    const ra = analyzeRecord(s, a);
    const fit = calcFitScore(s, a, ra.concept);
    const trend = calcYearlyTrend(s);
    const reasons = [];
    if (trend.length >= 2) {
      const diff = trend[trend.length-1].avg - trend[0].avg;
      if (diff > 1.0) reasons.push({text:'성적 급락 (' + Math.abs(diff).toFixed(1) + '등급↓)', severity:3});
      else if (diff < -1.0) reasons.push({text:'성적 급상승 (' + Math.abs(diff).toFixed(1) + '등급↑)', severity:1});
    }
    if (fit.score < 30) reasons.push({text:'전공적합성 낮음 (' + fit.score + '점)', severity:2});
    if (!ra.concept) reasons.push({text:'진로 방향 미설정', severity:2});
    if (ra.storyArc.length >= 2) {
      const first = ra.storyArc[0], last = ra.storyArc[ra.storyArc.length-1];
      if (first.career !== last.career) reasons.push({text:'진로 변경 (' + first.career + '→' + last.career + ')', severity:1});
    }
    if (avg > 6.0) reasons.push({text:'전체 평균 ' + avg.toFixed(1) + '등급', severity:1});
    if (reasons.length > 0) {
      const maxSev = Math.max(...reasons.map(r => r.severity));
      priorityStudents.push({idx: i, name: s.name, seat: s.seat, reasons, severity: maxSev, avg});
    }
  });
  priorityStudents.sort((a, b) => b.severity - a.severity || a.avg - b.avg);
  if (priorityStudents.length > 0) {
    priorityStudents.slice(0, 12).forEach(ps => {
      const sevColor = ps.severity >= 3 ? 'var(--red)' : ps.severity >= 2 ? 'var(--orange)' : 'var(--blue)';
      html += `<div class="dash-priority" data-pidx="${ps.idx}" style="border-left:3px solid ${sevColor};padding:10px 14px;margin-bottom:6px;background:var(--card);border-radius:var(--radius-sm);cursor:pointer" onclick="selectStudent(${ps.idx})">
        <div class="ds-name">${ps.seat}번 ${esc(ps.name)}</div>
        <div style="font-size:10px;color:var(--muted)">${ps.reasons.map(r => r.text).join(' · ')}</div>
      </div>`;
    });
  } else {
    html += '<div style="font-size:12px;color:var(--muted)">특별히 우선 상담이 필요한 학생이 없습니다.</div>';
  }

  // Student grid with fit scores + compare feature
  html += '<h3 style="margin-top:20px">전체 학생 <button id="compareBtn" style="float:right;font-size:11px;padding:4px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;color:var(--teal)" onclick="toggleCompareMode()">비교 모드</button></h3>';
  html += '<div id="compareSel" style="display:none;margin-bottom:8px;padding:8px 12px;background:var(--blue-light);border-radius:8px;font-size:12px">학생을 2~3명 선택하세요. <button style="margin-left:8px;padding:3px 10px;border-radius:6px;border:1px solid var(--teal);background:var(--teal);color:#fff;cursor:pointer;font-size:11px" onclick="runCompare()">비교하기</button> <span id="compareCount">0</span>명 선택됨</div>';
  html += '<div class="dash-grid">';
  STUDENTS.forEach((s, i) => {
    const avg = calcWeightedAvg(s);
    const a = ANALYSIS[s.seat] || {};
    const fit = calcFitScore(s, a, null);
    const fitC = fit.score >= 60 ? 'var(--green)' : fit.score >= 35 ? 'var(--blue)' : 'var(--orange)';
    html += `<div class="dash-student" data-idx="${i}">
      <div class="ds-name">${s.seat}번 ${esc(s.name)}</div>
      <div class="ds-grade" style="color:${gradeColor(avg)}">${avg.toFixed(2)} <span style="font-size:10px;color:${fitC}">적합${fit.score}</span></div>
    </div>`;
  });
  html += '</div></div>';

  el.innerHTML = html;

  // Click handlers for dashboard students
  el.querySelectorAll('.dash-student').forEach(btn => {
    btn.addEventListener('click', () => selectStudent(parseInt(btn.dataset.idx)));
  });
}

// ═══════════════════════════════════════════════
// RENDER: STUDENT PROFILE
// ═══════════════════════════════════════════════
function selectStudent(idx) {
  selectedIdx = idx;
  const student = STUDENTS[idx];
  const analysis = ANALYSIS[student.seat] || {};

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('studentView').style.display = '';

  // Update sidebar
  document.querySelectorAll('.student-btn').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector(`.student-btn[data-idx="${idx}"]`);
  if (btn) btn.classList.add('active');

  // Cache university results
  univResults = runAllUniversities(student);

  renderProfileHeader(student, analysis);
  renderScoreTab(student, analysis);
  renderSusiTab(student, analysis);
  renderRecordTab(student, analysis);
  renderMemoTab(student);

  // Save last selection
  localStorage.setItem('susi27_last', idx);

  // Mobile: close sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

function renderProfileHeader(student, analysis) {
  const el = document.getElementById('profileHeader');
  const avg = calcWeightedAvg(student);
  const career = analysis.career_flow;
  const latestCareer = career && career.length > 0 ? career[career.length-1][1] : '';

  let chips = `<span class="chip chip-teal">평균 ${avg.toFixed(2)}등급</span>`;
  if (analysis.str && analysis.str.length) chips += `<span class="chip chip-green">강점: ${esc(analysis.str.join(', '))}</span>`;
  if (latestCareer) chips += `<span class="chip chip-copper">${esc(latestCareer)}</span>`;
  const fitData = calcFitScore(student, analysis, null);
  chips += `<span class="chip" style="background:${fitData.score >= 60 ? 'var(--green-light)' : fitData.score >= 35 ? 'var(--blue-light)' : 'var(--orange-light)'};color:${fitData.score >= 60 ? 'var(--green)' : fitData.score >= 35 ? 'var(--blue)' : 'var(--orange)'}">전공적합성 ${fitData.score}점</span>`;

  el.innerHTML = `<div class="profile-header">
    <div class="profile-avatar">${student.seat}</div>
    <div class="profile-info">
      <div class="pname">${esc(student.name)} <button onclick="exportReport()" style="font-size:11px;padding:2px 10px;border:1px solid var(--copper);border-radius:6px;background:none;color:var(--copper);cursor:pointer;font-family:inherit;vertical-align:middle;margin-left:6px">보고서</button></div>
      <div class="pmeta">3학년 4반 ${student.seat}번 · 병점고등학교</div>
    </div>
    <div class="profile-chips">${chips}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
// TAB 1: SCORE ANALYSIS
// ═══════════════════════════════════════════════
function renderScoreTab(student, analysis) {
  const el = document.getElementById('panel-score');
  const avg = calcWeightedAvg(student);
  const subjAvgs = calcSubjectAvgs(student);
  const combos = calcComboScores(student);
  const trend = calcYearlyTrend(student);

  let html = '';

  // Summary stats
  html += '<div class="glass"><h3>성적 요약</h3><div class="stat-grid">';
  html += `<div class="stat-box"><div class="num" style="color:${gradeColor(avg)}">${avg.toFixed(2)}</div><div class="label">전체 평균등급 (가중)</div></div>`;
  if (subjAvgs.length > 0) {
    html += `<div class="stat-box"><div class="num" style="font-size:20px;color:var(--green)">${esc(subjAvgs[0].name)} ${subjAvgs[0].avg.toFixed(1)}</div><div class="label">최강 교과</div></div>`;
    const worst = subjAvgs[subjAvgs.length-1];
    html += `<div class="stat-box"><div class="num" style="font-size:20px;color:var(--red)">${esc(worst.name)} ${worst.avg.toFixed(1)}</div><div class="label">보완 교과</div></div>`;
  }
  const graded = student.subjects.filter(s => s.g != null && s.g >= 1 && s.g <= 9);
  html += `<div class="stat-box"><div class="num">${graded.length}</div><div class="label">반영 과목 수</div></div>`;
  html += '</div>';

  // Class position indicator
  const allAvgs = STUDENTS.map((s, i) => ({ idx: i, name: s.name, seat: s.seat, avg: calcWeightedAvg(s) })).sort((a, b) => a.avg - b.avg);
  const rank = allAvgs.findIndex(a => a.idx === selectedIdx) + 1;
  const percentile = Math.round((1 - (rank - 1) / (STUDENTS.length - 1)) * 100);

  html += `<div style="margin-top:12px;padding:12px;background:var(--cream);border-radius:10px">`;
  html += `<div style="font-size:12px;font-weight:700;margin-bottom:8px">학급 내 위치 (${STUDENTS.length}명 중 ${rank}위 · 상위 ${percentile <= 50 ? percentile + '%' : (100 - percentile) + '% (하위)'})</div>`;
  // Distribution bar with position marker
  html += '<div style="position:relative;height:24px;background:linear-gradient(to right, var(--green), var(--blue), var(--orange), var(--red));border-radius:12px;opacity:0.3"></div>';
  const markerPos = ((rank - 1) / (STUDENTS.length - 1)) * 100;
  html += `<div style="position:relative;margin-top:-24px;height:24px">
    <div style="position:absolute;left:${markerPos}%;transform:translateX(-50%);top:-2px">
      <div style="width:4px;height:28px;background:var(--ink);border-radius:2px"></div>
    </div>
  </div>`;
  html += `<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:4px">
    <span>${allAvgs[0].name} (${allAvgs[0].avg.toFixed(1)})</span>
    <span>${allAvgs[Math.floor(allAvgs.length/2)].name} (${allAvgs[Math.floor(allAvgs.length/2)].avg.toFixed(1)})</span>
    <span>${allAvgs[allAvgs.length-1].name} (${allAvgs[allAvgs.length-1].avg.toFixed(1)})</span>
  </div>`;

  // Similar students
  const similar = allAvgs.filter(a => a.idx !== selectedIdx && Math.abs(a.avg - avg) <= 0.5).slice(0, 4);
  if (similar.length > 0) {
    html += '<div style="margin-top:8px;font-size:11px;color:var(--sub)"><strong>유사 성적 학생:</strong> ';
    html += similar.map(s => `<span style="cursor:pointer;text-decoration:underline" onclick="selectStudent(${s.idx})">${esc(s.name)}(${s.avg.toFixed(1)})</span>`).join(', ');
    html += '</div>';
  }

  html += '</div></div>';

  // Subject bars
  html += '<div class="glass"><h3>교과별 평균등급</h3>';
  subjAvgs.forEach(s => {
    const pct = Math.max(5, (10 - s.avg) / 9 * 100);
    const c = gradeColor(s.avg);
    html += `<div class="subj-bar">
      <span class="lbl">${esc(s.name)}</span>
      <div class="bar-bg"><div class="bar-fg" style="width:${pct}%;background:${c}"></div></div>
      <span class="val" style="color:${c}">${s.avg.toFixed(2)}</span>
    </div>`;
  });

  // SVG Radar chart
  const radarSubjects = subjAvgs.filter(s => !['한국사','기가/제2외','예술','체육'].includes(s.name)).slice(0, 6);
  if (radarSubjects.length >= 3) {
    const n = radarSubjects.length;
    const cx = 120, cy = 120, r = 90;
    let svg = `<div style="text-align:center;margin-top:16px"><svg viewBox="0 0 240 240" style="max-width:260px;width:100%">`;
    // Grid rings
    for (let ring = 1; ring <= 4; ring++) {
      const rr = r * ring / 4;
      let points = [];
      for (let i = 0; i < n; i++) {
        const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
        points.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
      }
      svg += `<polygon points="${points.join(' ')}" fill="none" stroke="var(--border)" stroke-width="0.5"/>`;
    }
    // Axes + labels
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const x2 = cx + r * Math.cos(angle), y2 = cy + r * Math.sin(angle);
      svg += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="var(--border)" stroke-width="0.5"/>`;
      const lx = cx + (r + 18) * Math.cos(angle), ly = cy + (r + 18) * Math.sin(angle);
      svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central" font-size="10" fill="var(--sub)" font-family="'Noto Sans KR',sans-serif">${radarSubjects[i].name}</text>`;
    }
    // Data polygon
    let dataPoints = [];
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const val = Math.max(0, (10 - radarSubjects[i].avg) / 9);
      const dr = r * val;
      dataPoints.push(`${cx + dr * Math.cos(angle)},${cy + dr * Math.sin(angle)}`);
    }
    svg += `<polygon points="${dataPoints.join(' ')}" fill="rgba(28,90,96,0.15)" stroke="var(--teal-mid)" stroke-width="2"/>`;
    // Data dots
    for (let i = 0; i < n; i++) {
      const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
      const val = Math.max(0, (10 - radarSubjects[i].avg) / 9);
      const dr = r * val;
      const dx = cx + dr * Math.cos(angle), dy = cy + dr * Math.sin(angle);
      svg += `<circle cx="${dx}" cy="${dy}" r="3" fill="var(--teal-mid)"/>`;
    }
    svg += `</svg></div>`;
    html += svg;
  }
  html += '</div>';

  // Combo scores
  html += '<div class="glass"><h3>교과 조합별 등급</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">대학별 반영 교과 조합에 따른 환산등급입니다.</p>';
  let bestCombo = null, bestScore = 99;
  COMBO_ORDER.forEach(combo => {
    if (!combos[combo]) return;
    const s = combos[combo];
    if (s.avg < bestScore) { bestScore = s.avg; bestCombo = combo; }
    const pct = Math.max(5, (10 - s.avg) / 9 * 100);
    const c = gradeColor(s.avg);
    html += `<div class="combo-bar">
      <span class="clbl">${esc(combo)}</span>
      <div class="cbar"><div class="cfill" style="width:${pct}%;background:${c}"></div></div>
      <span class="cval" style="color:${c}">${s.avg.toFixed(2)}</span>
    </div>`;
  });
  if (bestCombo) {
    html += `<div style="margin-top:8px;padding:8px 12px;background:var(--green-light);border-radius:8px;font-size:12px">
      <strong>최적 조합:</strong> ${esc(bestCombo)} (${bestScore.toFixed(2)}등급) — 이 조합을 반영하는 대학에서 가장 유리합니다.
    </div>`;
  }
  html += '</div>';

  // Trend chart
  if (trend.length > 1) {
    html += '<div class="glass"><h3>학기별 성적 추이</h3>';
    html += '<div class="trend-chart">';
    const minAvg = Math.min(...trend.map(t => t.avg));
    const maxAvg = Math.max(...trend.map(t => t.avg));
    const range = Math.max(maxAvg - minAvg, 1);
    trend.forEach(t => {
      const h = Math.max(10, ((maxAvg - t.avg) / range) * 60 + 10);
      const c = gradeColor(t.avg);
      const [y, s] = t.key.split('-');
      html += `<div class="trend-col">
        <div class="trend-val" style="color:${c}">${t.avg.toFixed(1)}</div>
        <div class="trend-bar" style="height:${h}px;background:${c}"></div>
        <div class="trend-lbl">${y}-${s}</div>
      </div>`;
    });
    html += '</div>';

    // Trend analysis
    const first = trend[0].avg;
    const last = trend[trend.length-1].avg;
    const diff = last - first;
    if (Math.abs(diff) > 0.3) {
      const direction = diff < 0 ? '상승' : '하락';
      const color = diff < 0 ? 'var(--green)' : 'var(--red)';
      html += `<div style="margin-top:8px;padding:8px 12px;background:${diff < 0 ? 'var(--green-light)' : 'var(--red-light)'};border-radius:8px;font-size:12px">
        <strong>성적 추이:</strong> 전체적으로 <span style="color:${color};font-weight:700">${Math.abs(diff).toFixed(2)}등급 ${direction}</span> 추세입니다.
      </div>`;
    }
    html += '</div>';
  }

  // Per-subject semester trend sparklines
  const mainSubjects = subjAvgs.filter(s => !['한국사','기가/제2외','예술','체육'].includes(s.name)).slice(0, 8);
  if (mainSubjects.length > 0 && trend.length > 1) {
    html += '<div class="glass"><h3>교과별 학기 추이</h3>';
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">주요 교과의 학기별 등급 변화입니다.</p>';
    mainSubjects.forEach(subj => {
      const semData = [];
      student.subjects.filter(s => s.c === subj.name && s.g != null && s.g >= 1 && s.g <= 9).forEach(s => {
        const key = `${s.y}-${s.s}`;
        const existing = semData.find(d => d.key === key);
        if (existing) {
          existing.total += s.g * s.u;
          existing.units += s.u;
        } else {
          semData.push({ key, total: s.g * s.u, units: s.u, y: s.y, s: s.s });
        }
      });
      semData.sort((a, b) => a.key.localeCompare(b.key));
      semData.forEach(d => d.avg = d.total / d.units);
      if (semData.length < 2) return;
      const first = semData[0].avg, last = semData[semData.length - 1].avg;
      const diff = last - first;
      const arrow = diff < -0.3 ? '↑' : diff > 0.3 ? '↓' : '→';
      const arrowColor = diff < -0.3 ? 'var(--green)' : diff > 0.3 ? 'var(--red)' : 'var(--muted)';
      // Mini sparkline SVG
      const svgW = 120, svgH = 28, pad = 4;
      const minV = Math.min(...semData.map(d => d.avg));
      const maxV = Math.max(...semData.map(d => d.avg));
      const range = Math.max(maxV - minV, 0.5);
      let pts = semData.map((d, i) => {
        const x = pad + (svgW - 2 * pad) * i / (semData.length - 1);
        const y = pad + (svgH - 2 * pad) * (d.avg - minV) / range;
        return `${x},${y}`;
      }).join(' ');
      html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span style="width:60px;font-size:11px;font-weight:600;color:var(--text)">${esc(subj.name)}</span>
        <svg viewBox="0 0 ${svgW} ${svgH}" style="width:${svgW}px;height:${svgH}px;flex-shrink:0">
          <polyline points="${pts}" fill="none" stroke="${arrowColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${semData.map((d, i) => {
            const x = pad + (svgW - 2 * pad) * i / (semData.length - 1);
            const y = pad + (svgH - 2 * pad) * (d.avg - minV) / range;
            return `<circle cx="${x}" cy="${y}" r="2" fill="${arrowColor}"/>`;
          }).join('')}
        </svg>
        <span style="font-size:11px;color:var(--muted)">${semData.map(d => d.avg.toFixed(1)).join(' → ')}</span>
        <span style="font-size:14px;color:${arrowColor};font-weight:700">${arrow}</span>
      </div>`;
    });
    html += '</div>';
  }

  // University advantage summary
  if (univResults && univResults.length > 0) {
    const ranked = univResults
      .map(r => {
        const comp = calcCompositeScore(r, student, analysis);
        return { name: r.univ, prob: comp.probability, combo: comp.comboUsed, jeon: r.jeonType };
      })
      .filter(r => r.prob != null)
      .sort((a, b) => b.prob - a.prob);
    if (ranked.length > 0) {
      html += '<div class="glass"><h3>대학별 유불리 요약</h3>';
      html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">이 학생의 성적으로 계산한 대학별 합격 확률 순위 (상위 15개)입니다.</p>';
      const top = ranked.slice(0, 15);
      top.forEach((r, i) => {
        const barW = Math.max(5, r.prob);
        const c = r.prob >= 50 ? 'var(--green)' : r.prob >= 30 ? 'var(--orange)' : 'var(--red)';
        html += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
          <span style="width:14px;font-size:10px;color:var(--muted);text-align:right">${i+1}</span>
          <span style="width:100px;font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(r.name)}">${esc(r.name)}</span>
          <span style="width:24px;font-size:8px;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis;flex-shrink:0">${esc((r.jeon || '').substring(0, 2))}</span>
          <div style="flex:1;height:14px;background:var(--bg2);border-radius:4px;overflow:hidden">
            <div style="height:100%;width:${barW}%;background:${c};border-radius:4px;transition:width 0.3s"></div>
          </div>
          <span style="width:36px;font-size:11px;font-weight:700;color:${c};text-align:right">${r.prob}%</span>
        </div>`;
      });
      if (ranked.length > 15) {
        html += `<div style="font-size:10px;color:var(--muted);margin-top:4px">외 ${ranked.length - 15}개 대학</div>`;
      }
      html += '</div>';
    }
  }

  // Subject-University cross analysis
  if (univResults && univResults.length > 0) {
    const mainSubjects = {};
    student.subjects.filter(s => s.g != null && s.g >= 1 && s.g <= 9).forEach(s => {
      const key = s.c || s.n;
      if (!mainSubjects[key]) mainSubjects[key] = { grades: [], units: 0 };
      mainSubjects[key].grades.push(s.g);
      mainSubjects[key].units += (s.u || 1);
    });
    const subjEntries = Object.entries(mainSubjects).filter(([,v]) => v.grades.length >= 2).map(([name, v]) => ({
      name,
      avg: v.grades.reduce((s,g) => s+g, 0) / v.grades.length,
      units: v.units
    })).sort((a,b) => a.avg - b.avg);

    if (subjEntries.length >= 3) {
      const strongSubjs = subjEntries.slice(0, 3);
      const weakSubjs = subjEntries.slice(-3).reverse();
      html += '<div class="glass"><h3>교과 강약점 × 대학 반영 분석</h3>';
      html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">강점/약점 교과가 어떤 대학에서 유리/불리한지 교차 분석합니다.</p>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">';

      html += '<div style="padding:10px;background:var(--green-light);border-radius:8px">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:6px">강점 교과</div>';
      strongSubjs.forEach(s => {
        html += `<div style="font-size:11px;margin-bottom:2px">${esc(s.name)}: <span class="mono" style="font-weight:700;color:${gradeColor(s.avg)}">${s.avg.toFixed(1)}</span>등급</div>`;
      });
      const strongNames = strongSubjs.map(s => s.name);
      const favorUnivs = univResults.filter(r => {
        const rule = NAESIN_RULES[r.univ];
        if (!rule) return false;
        const reflect = (r.cutline?.reflect || rule.rfl || '').toLowerCase();
        return strongNames.some(n => reflect.includes(n.substring(0, 2).toLowerCase()));
      }).slice(0, 3);
      if (favorUnivs.length > 0) {
        html += '<div style="font-size:10px;color:var(--green);margin-top:4px;font-weight:600">유리한 대학:</div>';
        favorUnivs.forEach(u => {
          html += `<div style="font-size:10px;cursor:pointer" onclick="showUnivDetail('${esc(u.univ)}')">${esc(u.univ)} (${u.score.toFixed(1)})</div>`;
        });
      }
      html += '</div>';

      html += '<div style="padding:10px;background:var(--red-light);border-radius:8px">';
      html += '<div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">약점 교과</div>';
      weakSubjs.forEach(s => {
        html += `<div style="font-size:11px;margin-bottom:2px">${esc(s.name)}: <span class="mono" style="font-weight:700;color:${gradeColor(s.avg)}">${s.avg.toFixed(1)}</span>등급</div>`;
      });
      html += '<div style="font-size:10px;color:var(--red);margin-top:4px;font-weight:600">대응 전략:</div>';
      html += '<div style="font-size:10px">이 교과 비중이 낮은 대학을 선택하거나, 종합전형으로 서류 경쟁력을 활용하세요.</div>';
      html += '</div>';

      html += '</div></div>';
    }
  }

  // Detailed grade table
  html += '<div class="glass"><h3>전체 과목 성적표</h3>';
  html += '<div class="scroll-table"><table class="g-table"><tr><th>학년</th><th>학기</th><th>교과</th><th>과목명</th><th>등급</th><th>단위</th></tr>';
  const sorted = [...student.subjects].sort((a,b) => {
    if (a.y !== b.y) return a.y - b.y;
    if (a.s !== b.s) return a.s - b.s;
    return (a.g || 99) - (b.g || 99);
  });
  sorted.forEach(s => {
    const grade = s.g != null ? gradeDot(s.g) : (s.a ? `<span style="font-weight:700;color:${s.a==='A'?'var(--green)':s.a==='B'?'var(--blue)':'var(--orange)'}">${s.a}</span>` : '-');
    html += `<tr><td>${s.y}</td><td>${s.s}</td><td>${esc(s.c)}</td>
      <td>${esc(s.n)}${s.ic ? ' <span style="color:var(--purple);font-size:10px">[진로]</span>' : ''}</td>
      <td>${grade}</td><td>${s.u}</td></tr>`;
  });
  html += '</table></div></div>';

  // Alerts
  if (analysis.alerts && analysis.alerts.length > 0) {
    html += '<div class="glass"><h3>주의 사항</h3>';
    analysis.alerts.forEach(a => {
      html += `<div class="alert-item">${esc(a)}</div>`;
    });
    html += '</div>';
  }

  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// TAB 2: UNIVERSITY MATCHING (ALL 100 universities)
// ═══════════════════════════════════════════════
function renderSusiTab(student, analysis) {
  const el = document.getElementById('panel-susi');
  const results = univResults;

  let html = '';

  // Stats
  const highRel = results.filter(r => r.reliability === 'high').length;
  const withCut = results.filter(r => r.cutline).length;
  html += '<div class="glass"><h3>대학별 내신 환산 결과</h3>';
  html += '<div class="stat-grid">';
  html += `<div class="stat-box"><div class="num">${results.length}</div><div class="label">환산 가능 대학</div></div>`;
  html += `<div class="stat-box"><div class="num">${highRel}</div><div class="label">고신뢰 결과</div></div>`;
  html += `<div class="stat-box"><div class="num">${withCut}</div><div class="label">컷라인 비교</div></div>`;
  html += '</div>';

  // Search & filter
  html += `<div class="search-bar">
    <input class="search-input" id="univSearch" placeholder="대학명 검색..." oninput="filterUnivResults()">
  </div>`;
  html += `<div class="sort-controls">
    <button class="sort-btn active" data-sort="prob" onclick="sortUnivResults(this,'prob')">합격확률순</button>
    <button class="sort-btn" data-sort="score" onclick="sortUnivResults(this,'score')">환산등급순</button>
    <button class="sort-btn" data-sort="name" onclick="sortUnivResults(this,'name')">이름순</button>
    <button class="sort-btn" data-sort="reliability" onclick="sortUnivResults(this,'reliability')">신뢰도순</button>
  </div>`;
  html += `<div class="sort-controls" style="margin-bottom:14px">
    <button class="filter-btn active" data-filter="all" onclick="filterUnivBand(this,'all')">전체</button>
    <button class="filter-btn" data-filter="cutline" onclick="filterUnivBand(this,'cutline')">컷라인 비교</button>
    <button class="filter-btn" data-filter="high" onclick="filterUnivBand(this,'high')">고신뢰만</button>
    <button class="filter-btn" data-filter="interview" onclick="filterUnivBand(this,'interview')">면접문항 있음</button>
  </div>`;
  html += '</div>';

  // Cutline matches (top section) with composite probability
  const cutlineResults = results.filter(r => r.cutline);
  if (cutlineResults.length > 0) {
    html += '<div class="glass"><h3>합격 가능성 분석 (컷라인 비교)</h3>';
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">내신 환산, 경쟁률, 성적 추세, 전공적합성을 종합한 합격 확률 예측입니다.</p>';
    cutlineResults.forEach(r => {
      const b = r.band;
      const comp = calcCompositeScore(r, student, analysis);
      const pColor = comp.probability >= 70 ? 'var(--green)' : comp.probability >= 45 ? 'var(--blue)' : comp.probability >= 30 ? 'var(--orange)' : 'var(--red)';
      const comboLabel = comp.comboUsed ? ` · 반영: ${comp.comboUsed}` : '';
      html += `<div class="match-row" onclick="showUnivDetail('${esc(r.univ)}')">
        <span class="match-badge ${b.cls}">${b.label}</span>
        <div class="match-body">
          <div class="univ">${esc(r.univ)}${ADMISSIONS_INFO[r.univ] ? ' <span style="font-size:10px;color:var(--blue);font-weight:600">' + esc(Object.keys(ADMISSIONS_INFO[r.univ])[0]) + '</span>' : ''}</div>
          <div class="jeon">${esc(r.cutline.type)} · 경쟁률 ${esc(r.cutline.ratio)}${r.cutline.min ? ' · 수능최저 ' + esc(r.cutline.min) : ''}${comboLabel}</div>
        </div>
        <div class="match-num">
          <div class="big" style="color:${pColor}">${comp.probability}%</div>
          <div class="unit">${r.score.toFixed(2)}등급 (컷 ${r.cutline.cut})</div>
        </div>
      </div>`;
    });
    html += '</div>';
  }

  // All results table
  // Strategic portfolio recommendation (auto-analysis for all students)
  const allComps = results.map(r => {
    const comp = calcCompositeScore(r, student, analysis);
    return { ...r, prob: comp.probability, comp };
  }).sort((a, b) => b.prob - a.prob);

  const safeUnis = allComps.filter(r => r.prob >= 65);
  const fitUnis = allComps.filter(r => r.prob >= 40 && r.prob < 65);
  const reachUnis = allComps.filter(r => r.prob >= 15 && r.prob < 40);
  const hardUnis = allComps.filter(r => r.prob < 15);

  html += '<div class="glass"><h3>전략적 지원 추천</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:12px">합격 확률, 전공적합성, 전형 유형을 종합하여 안정-적정-상향 포트폴리오를 자동 분석합니다.</p>';

  html += '<div class="tier-grid">';
  html += `<div style="padding:10px;background:var(--green-light);border-radius:8px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:var(--green)">${safeUnis.length}</div>
    <div style="font-size:11px;color:var(--muted)">안정권 (65%+)</div></div>`;
  html += `<div style="padding:10px;background:var(--blue-light);border-radius:8px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:var(--blue)">${fitUnis.length}</div>
    <div style="font-size:11px;color:var(--muted)">적정 (40~64%)</div></div>`;
  html += `<div style="padding:10px;background:var(--orange-light);border-radius:8px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:var(--orange)">${reachUnis.length}</div>
    <div style="font-size:11px;color:var(--muted)">소신 (15~39%)</div></div>`;
  html += `<div style="padding:10px;background:var(--red-light);border-radius:8px;text-align:center">
    <div style="font-size:22px;font-weight:800;color:var(--red)">${hardUnis.length}</div>
    <div style="font-size:11px;color:var(--muted)">도전 (15%↓)</div></div>`;
  html += '</div>';

  // Top recommendations per tier
  const recommend = [];
  const topSafe = safeUnis.slice(0, 3);
  const topFit = fitUnis.slice(0, 3);
  const topReach = reachUnis.slice(0, 2);

  const buildRec = (items, tier, tierColor) => {
    items.forEach(r => {
      const fitLabel = (r.comp.fitData && r.comp.fitData.score != null) ? `적합${r.comp.fitData.score}점` : '';
      const jeonShort = (r.jeonType || '').substring(0, 6);
      html += `<div class="match-row" onclick="showUnivDetail('${esc(r.univ)}')" style="border-left:3px solid ${tierColor}">
        <span class="match-badge" style="background:${tierColor};color:#fff;min-width:32px">${tier}</span>
        <div class="match-body">
          <div class="univ">${esc(r.univ)}</div>
          <div class="jeon">${esc(jeonShort)} · ${r.score.toFixed(2)}등급${fitLabel ? ' · ' + fitLabel : ''}</div>
        </div>
        <div class="match-num">
          <div class="big" style="color:${tierColor}">${r.prob}%</div>
          <div class="unit">합격 확률</div>
        </div>
      </div>`;
    });
  };

  if (topSafe.length + topFit.length + topReach.length > 0) {
    html += '<div style="font-size:13px;font-weight:700;margin-bottom:8px">추천 포트폴리오 (6지망 기준)</div>';
    buildRec(topSafe, '안정', 'var(--green)');
    buildRec(topFit, '적정', 'var(--blue)');
    buildRec(topReach, '소신', 'var(--orange)');
  }

  // Strategy advice (always shown)
  const avgWeighted = calcWeightedAvg(student);
  let advice = '';
  if (safeUnis.length >= 5) {
    advice = '상위권 성적으로 주요 대학 지원이 가능합니다. 소신 지원으로 상위 대학 도전을 추천합니다.';
  } else if (fitUnis.length >= 3) {
    advice = '적정 범위 대학이 충분합니다. 안정 2~3교 + 적정 2교 + 소신 1교로 균형 잡힌 포트폴리오를 구성하세요.';
  } else if (reachUnis.length >= 3) {
    advice = '소신 지원 범위가 넓습니다. 안정권 확보를 최우선으로 하고 전공적합성이 높은 대학에 소신 지원하세요.';
  } else {
    advice = '안정권 확보가 중요합니다. 교과전형 위주로 안정 3~4교를 확보하고 종합전형 1~2교를 병행하세요.';
  }

  if (avgWeighted > 5.5) {
    advice += ' 내신 평균이 높으므로 학생부종합전형에서 생기부 강점을 적극 활용하는 전략이 유효합니다.';
  }

  html += `<div style="margin-top:10px;padding:10px 14px;background:var(--cream);border-radius:10px;font-size:12px;line-height:1.6">
    <strong>상담 포인트:</strong> ${advice}
  </div>`;

  // 전형 전략 분석
  const strat = calcAdmissionStrategy(student, analysis);
  html += '<div style="margin-top:14px;padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--border)">';
  html += '<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:10px">전형 전략 분석</div>';

  // Three-bar chart
  html += '<div style="display:flex;gap:8px;margin-bottom:10px">';
  strat.sorted.forEach(([type, score]) => {
    const color = type === '교과' ? 'var(--teal)' : type === '종합' ? 'var(--blue)' : 'var(--orange)';
    const isBest = type === strat.sorted[0][0];
    html += `<div style="flex:1;text-align:center">
      <div style="font-size:11px;font-weight:${isBest ? '700' : '500'};color:${isBest ? color : 'var(--sub)'};margin-bottom:4px">${type}전형</div>
      <div style="height:60px;background:var(--cream);border-radius:6px;position:relative;overflow:hidden">
        <div style="position:absolute;bottom:0;left:0;right:0;height:${score}%;background:${color};opacity:${isBest ? 0.7 : 0.3};border-radius:0 0 6px 6px;transition:height 0.3s"></div>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
          <span class="mono" style="font-size:${isBest ? 18 : 14}px;font-weight:700;color:${isBest ? color : 'var(--muted)'}">${score}</span>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';

  // Strategy recommendation
  html += `<div style="padding:8px 12px;background:var(--cream);border-radius:8px;border-left:3px solid var(--teal)">
    <div style="font-size:12px;font-weight:700;color:var(--teal);margin-bottom:2px">${esc(strat.strategy)}</div>
    <div style="font-size:11px;color:var(--sub);line-height:1.5">${esc(strat.detail)}</div>
  </div>`;

  // Key indicators
  if (strat.foundKeywords.length > 0 || strat.fitScore > 0) {
    html += '<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">';
    if (strat.foundKeywords.length > 0) {
      html += `<span style="font-size:10px;padding:2px 8px;background:rgba(0,122,255,0.08);border-radius:10px;color:var(--blue)">생기부 키워드: ${strat.foundKeywords.join(', ')}</span>`;
    }
    html += `<span style="font-size:10px;padding:2px 8px;background:rgba(20,58,64,0.06);border-radius:10px;color:var(--sub)">생기부 ${Math.round(strat.recordChars/100)/10}천자 · 적합성 ${strat.fitScore}점</span>`;
    html += '</div>';
  }
  html += '</div>';

  // 6지원 최적 포트폴리오 시뮬레이터 (greedy optimization)
  if (allComps.length >= 6) {
    const optPortfolio = calcOptimalPortfolio(allComps, 6);
    html += '<div style="margin-top:14px;padding:14px;background:var(--teal-light);border-radius:12px;border:1px solid rgba(20,58,64,0.15)">';
    html += '<div style="font-size:13px;font-weight:700;color:var(--teal);margin-bottom:8px">🎯 AI 최적 6지원 시뮬레이션</div>';
    html += '<p style="font-size:11px;color:var(--sub);margin-bottom:10px">합격 확률, 대학 티어, 전형 다양성을 종합 최적화한 6개 대학 조합입니다.</p>';
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';
    optPortfolio.picks.forEach((p, i) => {
      const tierLabel = p.prob >= 65 ? '안정' : p.prob >= 40 ? '적정' : p.prob >= 15 ? '소신' : '도전';
      const tColor = p.prob >= 65 ? 'var(--green)' : p.prob >= 40 ? 'var(--blue)' : p.prob >= 15 ? 'var(--orange)' : 'var(--red)';
      html += `<div style="padding:8px;background:var(--card);border-radius:8px;border:1px solid var(--border);cursor:pointer;text-align:center" onclick="showUnivDetail('${esc(p.univ)}')">
        <div style="font-size:10px;color:${tColor};font-weight:700">${tierLabel} ${i+1}</div>
        <div style="font-size:12px;font-weight:600;margin:2px 0">${esc(p.univ)}</div>
        <div class="mono" style="font-size:16px;font-weight:700;color:${tColor}">${p.prob}%</div>
        <div style="font-size:10px;color:var(--muted)">${esc((p.jeonType||'').substring(0,6))}</div>
      </div>`;
    });
    html += '</div>';
    html += `<div style="margin-top:8px;text-align:center;font-size:12px;color:var(--sub)">
      최소 1개 합격 확률: <strong class="mono" style="color:var(--teal);font-size:16px">${optPortfolio.atLeastOne}%</strong>
      · 기대 합격 수: <strong class="mono" style="color:var(--teal)">${optPortfolio.expectedCount.toFixed(1)}교</strong>
    </div>`;
    html += '</div>';
  }

  html += '</div>';

  // What-if grade simulation
  html += '<div class="glass"><h3>성적 변화 시뮬레이션</h3>';
  html += '<p style="font-size:11px;color:var(--sub);margin-bottom:10px">남은 학기에 성적이 변화하면 합격 확률이 어떻게 달라지는지 시뮬레이션합니다.</p>';
  html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
    <label style="font-size:12px;font-weight:600;white-space:nowrap">등급 변화:</label>
    <input type="range" id="whatifSlider" min="-15" max="15" value="0" step="1"
      style="flex:1;accent-color:var(--teal)" oninput="runWhatIf(this.value)">
    <span id="whatifLabel" class="mono" style="font-size:14px;font-weight:700;color:var(--teal);min-width:60px;text-align:center">현재</span>
  </div>`;
  html += '<div id="whatifResult" style="display:none;padding:10px;background:var(--cream);border-radius:10px;font-size:12px;line-height:1.6"></div>';
  html += '</div>';

  // All results table with probability column
  html += '<div class="glass" id="allUnivSection"><h3>전체 대학 환산 결과 (<span id="univCount">' + results.length + '</span>개)</h3>';
  html += '<div class="scroll-table"><table class="g-table" id="univTable"><thead><tr>';
  html += '<th>대학명</th><th>전형</th><th>환산등급</th><th>합격확률</th><th>신뢰도</th><th>규칙</th><th>상세</th>';
  html += '</tr></thead><tbody id="univTableBody">';

  allComps.forEach((r, i) => {
    const c = gradeColor(r.score);
    const relCls = r.reliability === 'high' ? 'rel-high' : r.reliability === 'medium' ? 'rel-medium' : r.reliability === 'low' ? 'rel-low' : 'rel-none';
    const relLabel = r.reliability === 'high' ? '높음' : r.reliability === 'medium' ? '보통' : r.reliability === 'low' ? '낮음' : '불가';
    const pColor = r.prob >= 65 ? 'var(--green)' : r.prob >= 40 ? 'var(--blue)' : r.prob >= 15 ? 'var(--orange)' : 'var(--red)';
    html += `<tr class="univ-row" data-univ="${esc(r.univ)}" data-score="${r.score}" data-rel="${r.reliability}" data-hasint="${r.hasInterviews}" data-prob="${r.prob}">
      <td style="font-weight:600;cursor:pointer" onclick="showUnivDetail('${esc(r.univ)}')">${esc(r.univ)}</td>
      <td style="font-size:12px">${esc(r.jeonType)}</td>
      <td><span class="mono" style="font-weight:700;color:${c}">${r.score.toFixed(2)}</span></td>
      <td><span class="mono" style="font-weight:700;color:${pColor}">${r.prob}%</span></td>
      <td><span class="rel-badge ${relCls}">${relLabel}</span></td>
      <td style="font-size:11px;color:var(--muted)">${esc(r.ruleType)}</td>
      <td><button style="background:none;border:none;color:var(--teal-mid);cursor:pointer;font-family:inherit;font-size:12px" onclick="showUnivDetail('${esc(r.univ)}')">상세보기</button></td>
    </tr>`;
  });

  html += '</tbody></table></div></div>';

  // Portfolio section (favorites)
  const favKey = `fav_${student.seat}`;
  const studentFavs = favorites[favKey] || [];
  if (studentFavs.length > 0) {
    html += '<div class="glass"><h3>지원 전략 포트폴리오</h3>';
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:12px">즐겨찾기한 대학들의 지원 전략을 종합적으로 분석합니다.</p>';
    const favResults = results.filter(r => studentFavs.includes(r.univ));
    const safe = favResults.filter(r => r.band && r.band.label === '안정').length;
    const fit = favResults.filter(r => r.band && r.band.label === '적정').length;
    const bold = favResults.filter(r => r.band && r.band.label === '소신').length;

    if (favResults.length > 0) {
      html += `<div style="padding:12px;background:var(--cream);border-radius:10px;font-size:13px;margin-bottom:10px">
        포트폴리오 구성: 안정 ${safe}교 / 적정 ${fit}교 / 소신·상향 ${bold}교 —
        ${safe >= 1 && fit >= 1 ? '균형 잡힌 구성입니다.' : '안정권 대학 추가를 권장합니다.'}
      </div>`;

      favResults.forEach(r => {
        const comp = calcCompositeScore(r, student, analysis);
        const pColor = comp.probability >= 70 ? 'var(--green)' : comp.probability >= 45 ? 'var(--blue)' : comp.probability >= 30 ? 'var(--orange)' : 'var(--red)';
        const b = r.band || { label: '-', color: 'var(--muted)' };
        html += `<div class="match-row" onclick="showUnivDetail('${esc(r.univ)}')">
          <span class="match-badge ${b.cls || ''}">${b.label}</span>
          <div class="match-body">
            <div class="univ">${esc(r.univ)}</div>
            <div class="jeon">${esc(r.jeonType)} · ${r.score.toFixed(2)}등급${comp.comboUsed ? ' · 반영: ' + comp.comboUsed : ''}</div>
          </div>
          <div class="match-num">
            <div class="big" style="color:${pColor}">${comp.probability}%</div>
            <div class="unit">합격 확률</div>
          </div>
        </div>`;
      });

      const avgProb = Math.round(favResults.reduce((s, r) => s + calcCompositeScore(r, student, analysis).probability, 0) / favResults.length);
      html += `<div style="margin-top:10px;padding:10px 14px;background:var(--teal-light);border-radius:10px;font-size:13px;text-align:center">
        포트폴리오 평균 합격 확률: <strong style="color:var(--teal);font-size:18px">${avgProb}%</strong>
        ${avgProb >= 55 ? ' — 긍정적 전망' : avgProb >= 35 ? ' — 보통 전망 (안정권 추가 권장)' : ' — 도전적 구성 (안정권 추가 필수)'}
      </div>`;
    }
    html += '</div>';
  }

  el.innerHTML = html;
}

function filterUnivResults() {
  const q = document.getElementById('univSearch').value.toLowerCase();
  document.querySelectorAll('.univ-row').forEach(row => {
    const univ = row.dataset.univ.toLowerCase();
    row.style.display = (!q || univ.includes(q)) ? '' : 'none';
  });
  updateUnivCount();
}

function sortUnivResults(btn, sortBy) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const tbody = document.getElementById('univTableBody');
  const rows = [...tbody.querySelectorAll('.univ-row')];
  rows.sort((a, b) => {
    if (sortBy === 'prob') return parseFloat(b.dataset.prob||0) - parseFloat(a.dataset.prob||0);
    if (sortBy === 'score') return parseFloat(a.dataset.score) - parseFloat(b.dataset.score);
    if (sortBy === 'name') return a.dataset.univ.localeCompare(b.dataset.univ);
    if (sortBy === 'reliability') {
      const order = {high:0, medium:1, low:2, none:3};
      return (order[a.dataset.rel]||3) - (order[b.dataset.rel]||3);
    }
    return 0;
  });
  rows.forEach(r => tbody.appendChild(r));
}

function filterUnivBand(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.univ-row').forEach(row => {
    if (filter === 'all') { row.style.display = ''; return; }
    if (filter === 'cutline') { row.style.display = CUTLINES.some(c => c.univ === row.dataset.univ) ? '' : 'none'; return; }
    if (filter === 'high') { row.style.display = row.dataset.rel === 'high' ? '' : 'none'; return; }
    if (filter === 'interview') { row.style.display = row.dataset.hasint === 'true' ? '' : 'none'; return; }
  });
  updateUnivCount();
}

function updateUnivCount() {
  const visible = document.querySelectorAll('.univ-row:not([style*="display: none"])').length;
  const el = document.getElementById('univCount');
  if (el) el.textContent = visible;
}

// ═══════════════════════════════════════════════
// WHAT-IF GRADE SIMULATION
// ═══════════════════════════════════════════════
function runWhatIf(sliderVal) {
  const delta = parseInt(sliderVal) / 10;
  const label = document.getElementById('whatifLabel');
  const resultDiv = document.getElementById('whatifResult');
  if (!label || !resultDiv) return;

  if (delta === 0) {
    label.textContent = '현재';
    label.style.color = 'var(--teal)';
    resultDiv.style.display = 'none';
    return;
  }

  const sign = delta > 0 ? '+' : '';
  label.textContent = sign + delta.toFixed(1) + '등급';
  label.style.color = delta < 0 ? 'var(--green)' : 'var(--red)';

  const student = STUDENTS[selectedIdx];
  const analysis = ANALYSIS[student.seat] || {};
  const results = runAllUniversities(student);

  const currentComps = results.map(r => {
    const comp = calcCompositeScore(r, student, analysis);
    return { univ: r.univ, jeonType: r.jeonType, prob: comp.probability, score: r.score, cutline: r.cutline, comp, r };
  }).sort((a, b) => b.prob - a.prob);

  const simComps = results.map(r => {
    const simScore = r.score + delta;
    const simResult = { ...r, score: simScore };
    if (r.cutline) {
      simResult.diff = simScore - r.cutline.cut;
    }
    const comp = calcCompositeScore(simResult, student, analysis);
    return { univ: r.univ, jeonType: r.jeonType, prob: comp.probability, score: simScore, comp };
  }).sort((a, b) => b.prob - a.prob);

  const currentSafe = currentComps.filter(r => r.prob >= 65).length;
  const simSafe = simComps.filter(r => r.prob >= 65).length;
  const currentFit = currentComps.filter(r => r.prob >= 40 && r.prob < 65).length;
  const simFit = simComps.filter(r => r.prob >= 40 && r.prob < 65).length;

  let currentPort = null, simPort = null;
  if (currentComps.length >= 6) {
    currentPort = calcOptimalPortfolio(currentComps, 6);
    simPort = calcOptimalPortfolio(simComps, 6);
  }

  let html = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:8px">';
  html += `<div style="padding:8px;background:var(--card);border-radius:8px;text-align:center">
    <div style="font-size:10px;color:var(--muted)">안정권 (65%+)</div>
    <div class="mono" style="font-size:14px">${currentSafe} → <strong style="color:${simSafe > currentSafe ? 'var(--green)' : simSafe < currentSafe ? 'var(--red)' : 'var(--sub)'}">${simSafe}교</strong></div>
  </div>`;
  html += `<div style="padding:8px;background:var(--card);border-radius:8px;text-align:center">
    <div style="font-size:10px;color:var(--muted)">적정 (40~64%)</div>
    <div class="mono" style="font-size:14px">${currentFit} → <strong style="color:${simFit > currentFit ? 'var(--green)' : simFit < currentFit ? 'var(--red)' : 'var(--sub)'}">${simFit}교</strong></div>
  </div>`;
  html += '</div>';

  if (currentPort && simPort) {
    const diffAtLeast = simPort.atLeastOne - currentPort.atLeastOne;
    const diffLabel = diffAtLeast > 0 ? '+' + diffAtLeast : '' + diffAtLeast;
    html += `<div style="text-align:center;margin-bottom:8px">
      포트폴리오 합격 확률: <span class="mono">${currentPort.atLeastOne}%</span> → <strong class="mono" style="color:${diffAtLeast > 0 ? 'var(--green)' : diffAtLeast < 0 ? 'var(--red)' : 'var(--sub)'}">${simPort.atLeastOne}% (${diffLabel}%p)</strong>
    </div>`;
  }

  // Top changed universities
  const changes = currentComps.map(c => {
    const sim = simComps.find(s => s.univ === c.univ);
    return { univ: c.univ, jeon: c.jeonType, current: c.prob, sim: sim ? sim.prob : c.prob, diff: sim ? sim.prob - c.prob : 0 };
  }).filter(c => Math.abs(c.diff) >= 3).sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff)).slice(0, 5);

  if (changes.length > 0) {
    html += '<div style="font-size:11px;font-weight:600;margin-bottom:4px">주요 변화 대학</div>';
    changes.forEach(c => {
      const color = c.diff > 0 ? 'var(--green)' : 'var(--red)';
      const sign = c.diff > 0 ? '+' : '';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:11px">${esc(c.univ)} <span style="color:var(--muted);font-size:10px">${esc((c.jeon||'').substring(0,4))}</span></span>
        <span class="mono" style="font-size:11px">${c.current}% → <strong style="color:${color}">${c.sim}% (${sign}${c.diff}%p)</strong></span>
      </div>`;
    });
  }

  resultDiv.innerHTML = html;
  resultDiv.style.display = 'block';
}

// ═══════════════════════════════════════════════
// UNIVERSITY DETAIL MODAL
// ═══════════════════════════════════════════════
function showUnivDetail(univName) {
  const modal = document.getElementById('univModal');
  const content = document.getElementById('univModalContent');
  const student = STUDENTS[selectedIdx];
  const analysis = ANALYSIS[student.seat] || {};
  const result = univResults.find(r => r.univ === univName);

  if (!result) return;

  let html = `<button class="modal-close" onclick="closeUnivModal()">&times;</button>`;
  html += `<h2>${esc(univName)}</h2>`;

  // Rule info
  const rule = NAESIN_RULES[univName];
  html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
  html += `<h3>전형 정보</h3>`;
  html += `<div style="font-size:13px;margin-bottom:8px"><strong>전형 유형:</strong> ${esc(result.jeonType)}</div>`;
  html += `<div style="font-size:13px;margin-bottom:8px"><strong>규칙 종류:</strong> ${esc(result.ruleType)}</div>`;
  html += `<div style="font-size:13px;margin-bottom:8px"><strong>대학 성격:</strong> ${esc(getUnivCharacter(univName, result.ruleType))}</div>`;
  if (result.reliability !== 'none') {
    const relCls = result.reliability === 'high' ? 'rel-high' : result.reliability === 'medium' ? 'rel-medium' : 'rel-low';
    html += `<div style="font-size:13px"><strong>계산 신뢰도:</strong> <span class="rel-badge ${relCls}">${result.reliability}</span></div>`;
  }

  // Additional admission info (5 detailed universities)
  const admInfo = ADMISSIONS_INFO[univName];
  if (admInfo) {
