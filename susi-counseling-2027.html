2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 평소 관심사를 바탕으로 '과학 콘서트'를 읽고 작문 일지를 성실하게 작성함. 이를 토대로 진행한 즉문즉답 인터뷰에서 책의 내용에 대한 높은 이해도를 보여주었으며, 특히 '머피의 법칙'을 과학적 해석으로 풀어 자신의 말로 표현한 부분에서 지식정보 처리 역량이 드러남. 자신의 관심사에 따라 능동적인 독서를 하는 태도가 돋보임. 고전시가 감상 발표 수업에서 시조 '매암이 맵다 울고'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 화자가 말하는 절제하는 삶의 태도를 본받아야겠다고 언급한 부분에서 문학적 감상 능력이 엿보이며, 다른 친구들의 발표를 경청하고 상호 평가지를 성실히 작성하는 모습에서 문학적 소통 역량이 돋보임. 자신이 발표한 시조에서 '지조와 절개'라는 가치를 발견하고 이러한 가치를 더 깊이 탐구하고자 '죽음의 수용소에서'를 선정하여 읽고 감상문을 씀. 아우슈비츠 수용소 생존자인 작가가 삶의 의미와 자유 선택 의지를 강조한 것에 깊은 감명을 받았음을 밝히고, 힘든 상황이 오더라도 자신의 소신과 뜻을 지키며 이겨낼 것을 다짐하는 부분에서 독서를 통해 습득한 가치를 내면화하는 바람직한 독자로서의 태도가 드러남.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"답지를 보지 않고 끝까지 도전하며 문제해결 능력을 키우고, 실수를 계수로 하는 모든 이차방정식을 풀 수 있는 근의공식이 인상적이었다는 소감을 작성함. 삼각형의 외심을 점과 점 사이의 거리를 활용하여 구할 수 있음. 수학 독서 탐구 활동에서 갈루아를 보고 문제를 다양한 방법으로 시도해 보겠다고 다짐하고, 윌리스를 통해 사고의 전환으로 문제를 해결하는 방법을 배우고 싶다는 소감을 밝힘. 집합을 주제로 한 카드 뉴스 작성 활동에서 많은 수의 원소를 집합으로 표현하기 위해서는 원소가 가지고 있는 공통적인 특성을 기준으로 집합을 나타내는 조건제시법이 유용하다는 것을 제시함. 또한, 두 집합의 연산에 필요한 합집합과 교집합의 의미를 논리적으로 설명하는 글을 작성함. 여집합과 차집합의 의미를 친구들이 이해하기 쉬운 언어를 사용하여 표현한 점이 인상적임. 작은 변화가 시스템에 큰 영향을 미칠 수 있다는 혼돈이론을 탐구하여 기후 변화나 주식 시장과 같은 무작위처럼 보이는 시스템에도 일정한 패턴과 규칙이 존재함을 알게 되었음을 발표함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"'블랙홀'에 대한 과학적 지식을 심화 학습하여 일반 상대성 이론과 호킹 복사를 비롯한 개념을 포스터를 통해 시각적으로 정리하고 영어로 발표하며 지식 나눔의 가치를 실천함. 안정적이며 자신감이 돋보였다는 동료평가를 받았으며, 청중을 향한 자연스러운 시선 처리로 발표 내용에 대한 집중도를 높임. 한 학기 한 권 읽기 활동에서 'Night(Elie Wiesel)', 'The Hundred Dresses(Eleanor Estes)'를 선택하여 읽고 총 4회의 영어 활동지를 작성함. 엘리 시점을 통해 유대인이라는 이유로 아우슈비츠 수용소에 강제로 이송된 이야기를 바탕으로, 다르다는 이유로 시작된 차별이 얼마나 비인간적인 결과를 초래할 수 있는지 성찰함. 완다가 친구들로부터 놀림과 차별을 당하게 되고 결국 이사 가게 되는 이야기를 통해 어린 시절부터 시작되는 차별의 모습을 조명함. 차별이 사회에서 지속되고 있음을 깨닫고, 조지 플로이드 사건 등 현대 사회에서의 차별과 연결 지으며 다름을 존중하고","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"체육 수업 시간에 연습에 적극적으로 참여하는 모습을 보여줌. 탁구 논술 활동에서 배운 경기 규칙과 방법을 토대로 글을 작성하는 모습을 보여줌. 리그전 경기 활동 시 페어플레이를 지키며 경기에 참여함. 랠리 활동 시 짝 학생과 협동하여 연습하고 노력함. 탁구 연습 중 힘든 상황에서도 밝은 모습과 자세를 갖고 연습에 임함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 타격을 어려워했지만 포기하지 않고 끊임없이 도전하는 모습을 보이며, 모든 활동에서 자신의 부족한 기능을 노력하여 수준을 끌어올리는 모습을 보임. 수업시간에 긍정적으로 참여하여 친구들에게 좋은 인상으로 인식됨. 스포츠 인성 수업 중 도전정신에 대해 장애물은 본인이 목표로 하는 것을 이루기 위한 길의 일부분일뿐 포기하지 않는 태도와 긍정적인 마음가짐을 가지면 극복할 수 있다는 생각을 활동지에 작성함. 활동에 적극적으로 참여하며 자신의 성장을 위해 노력하는 모습","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 특히 '한정어'와 '정밀어'의 가치에 대한 답변이 훌륭함. 한정어는 긴급한 상황, 친밀한 관계에서 효과적이고, 정밀어는 공식적인 자리나 처음 대화하는 상대에게 오해를 불러일으키지 않아 좋다고 상황에 따른 적절한 사용 방안을 구분함. 두 언어의 장점만 활용하는 방법으로 핵심은 한정어로, 설명은 정밀어로 하는 구체적 방법을 제시함. 이 과정을 통해 책의 내용을","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"수업 중 주어지는 과제가 어렵더라도 꾸준히 노력하는 성실함이 돋보이는 학생임. 우쿨렐레 연주 활동에서 코드를 정확하게 숙지하기 위해 노력하고, 자연스러운 코드 변환을 통해 유연한 연주를 선보이고자 꾸준히 연습함. 그 결과 올바른 자세와 주법으로 악곡의 코드와 리듬을 표현하며 전반적인 흐름을 안정적으로 나타냄. 곡의 분위기에 따라 연주 세기를 조절하며 표현력을 향상할 수 있었고, 리듬은 단순히 박자를 맞추는 기술을 넘어 곡의 정서와 감정을 담아내는 매개체임을 깨달았다는 성찰을 남기며 음악적 감수성을 드러냄. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 체계적으로 익히며 적극적으로 참여함. 킥의 음색을 명확히 하고 필인을 정확하게 소화하기 위해 매진하였으며, 음악의 특징을 파악하는 것이 박자 유지에 핵심임을 인지하고 곡의 흐름을 분석하는 등 자기주도적인 역량을 발휘함. 연습의 결과, 올바른 자세와 주법으로 악곡의 리듬과 필인을 안정적으로 소화함. 작은 실수 하나가 곡 전체의 흐름을 바꿀 수 있음을 인지하고, 연주에 세심한 집중력이 필수적임을 느꼈다는 소감을 남기며 음악에 대한 신중하고 진지한 태도를 보여줌.","c":"바탕으로 자신음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 마라톤화의 3D 스캐너를 활용한 발 모양 분석과 3D 프린팅 기반의 미드솔 제작 기술이 선수의 피로도 감소 및 부상 방지에 기여하는 사례를 제시함. 무조건적인 규제보다는 기술적 혜택과 선수 간 형평성 사이의 최적의 균형점을 모색해야 한다는 정책적 대안을 제시하는 등 기술적 혁신으로 인정해야 한다는 의견을 밝힘. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 배려를 통해 서로 응원하는 분위기와 안정성이 높은 패스 연결 플레이를 하는 강점이 있지만, 공격 기회가 생겼을 때 다소 급하게 플레이한다는 점을 인지하여 팀원 간의 의사소통에 더욱 신경을 씀으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 수비를 보완하며 공격권을 빼앗기지 않고 공격 대형을 유지하는 자신만의 필승 전략을 세움. 동료에게 정확하게 패스하는 것에 집중하고, 수비에 가담함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에서 서비스 자세가 다소 불안정하여 정확성이 떨어졌으나 타이밍에 대한 연습을 통해 많이 향상되었음. 경기 예절을 지키며 상대 팀에 대한 배려와 존중의 모습을 실천함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"항상 밝은 표정으로 명랑하게 학교에서 생활하고 있어 교우관계가 원만한 학생임. 친구들과 함께 하는 모둠활동에서 다양한 아이디어를 제시하여 활동의 완성도를 높이고, 꾸밈없이 자신의 생각을 솔직하게 표현하고 타인의 의견도 신중히 받아들이려는 자세를 보이는 등 뛰어난 의사소통 능력을 보여주었으며, 서로 도움이 되기 위하여 존중하고 배려해야 한다는 생각을 가지고 있음. 청소 시간에 자신이 맡은 구역을 책임감 있게 청소하는 모습을 보여주었으며, 학급 대청소 시 필요한 곳에서 도움을 청하면 언제든 웃으면서 들어주는 모습을 보임. 학업성취도 면에서 자신이 부족한 부분을 잘 인지하고 이를 보충하기 위해 자기주도학습 능력 신장을 위해 학교에서 실시하는 야간 자기주도 학습에 성실하게 참여하고, 예습과 복습을 철저히 하는 등 끈기 있게 노력을 기울이고 있으며, 학업에 대한 열의를 바탕으로 긍정적인 성장이 기대되는 학생임. 자연과학 분야로의 진로를 뚜렷하게 세우고 대학의 관련 전공에 대하여 탐색하고, 관련 정보를 꾸준히 찾아보며 관련 분야의 필요 역량을 함양하기 위해 과학 잡지를 꾸준히 읽고, 다양한 과학 주제에 대해 친구들과 토론하는 등 꿈을 향해 정진해 가는 모습이 인상적임."},{"y":2,"b":"처음에는 수줍음이 많고 차분해 보이나, 알면 알수록 유쾌한 유머 감각과 밝은 에너지가 돋보이는 반전 매력의 소유자임. 교우 관계가 원만하여 학급을 넘어 타 학급 학생들과도 폭넓게 소통하는 뛰어난 사교성을 지녔으며, 교사에게 늘 공손하고 예의 바른 태도를 갖춤. 자신의 담당 구역을 매주 성실히 청소하는 것은 물론, 학급 대청소 날 일손이 부족한 곳을 찾아 자발적으로 돕는 투철한 봉사정신과 배려심을 발휘함. 교과 수업에 늘 바른 자세로 적극 참여하며, 각종 평가도 꼼꼼히 챙기는 등 높은 학업 동기와 성실성이 드러남. 일 년 내내 오후, 야간 자율학습에 빠짐없이 참여하여 흐트러짐 없는 자기주도적 학습 습관을 확립함. 국어와 영어 등 언어 교과에서 우수한 감각을 보이며, 다소 어려움을 느끼는 수학 교과에서도 쉽게 포기하기보다 다시 개념부터 차근차근 다져나가는 끈기와 투지를 발휘하는 모습이 대견함. 현재 명확한 진로를 정하지는 않았으나 치열한 학습과 성찰을 통해 자신의 적성을 진지하게 탐색 중임. 주변 사람들을 세심하게 챙기는 따뜻한 마음씨와 자신의 한계를 넘어서려는 강인한 의지를 겸비하고 있어, 향후 어떤 분야로 진출하든 반드시 성취를 이뤄낼 훌륭한 학생임."}]},{"name":"김나경","seat":2,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":5,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":6,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":6,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":6,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":2,"g":5,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":5,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":3,"n":"세계지리","c":"사회"},{"y":2,"s":2,"g":4,"u":3,"n":"세계지리","c":"사회"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":4,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"수업 시간에 집중도가 높으며 시 해석에 어려움을 느끼자 다양한 시를 접하며 시의 구조를 익히고 시인이 강조하는 바를 파악하는 데 집중하여 작품을 감상하려 노력하는 모습에서 능동적인 학업 태도가 느껴지는 학생임. '무뇌 변호사'라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 누군가의 따뜻한 한 마디로 하루하루를 살아갈 수 있다는 점을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '다른 사람이나 인공지능에게 기억을 이식한다면 여전히 동일한 사람인 것일까?'를 질문해 친구들의 깊은 사고를 유도하는 등 독서의 가치를 체득한 모습을 보임. 현대시 '눈'을 배우며 독재 정권에 저항하고 자유를 이야기하는 것에 깊은 인상을 받아 '소년이 온다'를 통해 문제의식에 대해 깊이 탐구하게 되었음을 밝힘. 이를 바탕으로 현재 자신이 누리고 있는 민주주의가 정의롭고 순수한 삶을 지향하며 꿋꿋이 살아간 사람들 덕분에 만들어졌음을 인식하며, 자신도 앞으로 부조리한 상황에 처하면 목소리를 내고 싶다는 포부를 담아 보고서를 작성함. 이처럼 배움에 대한 진지한 태도가 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"복소수에 대한 수업에서 이미 증명된 사실에서 새로운 사실을 발견하고 이를 정당화한 수학자들의 끈기를 본받고 싶다는 소감을 발표하며, 수학적 탐구와 학습 의지를 보여줌. 이러한 태도는 삼각형의 무게중심 좌표를 일반화하는 문제 해결 과정에서 기존의 무게중심 성질을 논리적으로 활용하여 성공적으로 증명을 전개하는 모습으로 이어졌으며, 이를 통해 수학적 문제해결 역량과 추론 역량이 크게 향상됨을 확인함.\n수학적 개념에 대한 깊이 있는 이해를 위해 끈기 있게 학습하며 자기주도적 태도를 보여줌. 명제의 참과 거짓을 판별하는 과정에서 '모든'과 '어떤'의 차이를 명확히 이해하고 이를 바탕으로 진리집합을 도출하는 능력을 키워가는 모습이 돋보임. 수업 중 부족한 부분은 친구들과의 토론과 설명을 통해 보완하며, 추가로 비슷한 유형의 어려운 문제를 스스로 찾아 해결하려는 노력이 인상적임. 풀이를 단순히 이해하는 데 그치지 않고, 혼자 다시 문제를 풀어보며 개념을 완전히 체득하려는 모습에서 꼼꼼하고 진지한 학습 태도가 드러남.\n학습 중 발생한 실수를 분석하고 개선하며, 이를 통해 더욱 나은 해결 방법을 찾아가는 학습 자세가 인상적임.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"'정부의 가짜 뉴스 규제'에 대해 '주장하는 글쓰기 활동'에서 평소 관심이 있는 뉴스 분야와 배경지식을 토대","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"수업 시간 배운 기술을 능숙하게 구사하기 위해 성실히 노력하여 눈에 띄게 성장한 모습이 대견한 학생임. 탁구 스트로크에 대한 꾸준한 노력으로 포핸드 드라이브 실력이 점진적으로 향상되어 파트너와 지속해서 안정적인 랠리를 할 수 있게","c":"로 체계적인운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 언어가 개인의 사회적 지위를 나타낸다는 저자의 견해에 동의하며 교육 환경의 격차가 언어의 차이로 고착화되는 현상을 비판적으로 고찰함. 상류층이 사용하는 언어 자본에 접근하기 어려운 중하위 계층의 사회적 한계를 지적하며 언어에서 나타나는 작은 격차가 극복하기 힘든 수준의 계급 차이를 만든다고 분석함. 교육 기관에 따라 사용하는 언어가 분화된다는 점을 근거로 언어적 불평등이 고착되는 과정에 우려를 표하며 자신만의 주체적인 의견을 만들어낼 수 있는 독서 역량을 발휘함.\n소통적 독서 활동에서는 지위에 따른 소통 방식의 차이가 사회적 구조의 산물이라고 주장함. 지위가 높은 이들의 여유는 타인의 시선에서 자유로웠던 성장 배경에서 기인하며, 불안정한 지위의 사람들의 성급함은 눈치를 보며 의견을 전달해야 했던 환경적 압박의 결과임을 적절히 추론함. 또한, 책에서 설명하는 '수용 감각' 개념을 활용해 바람직한 소통 방법을 제시함. '수용 감각'을 통해 자아를 전략적으로 조절할 수 있으며 진솔한 관계의 기반이 된다는 창의적 견해를 밝힘. 이처럼 인문 분야의 글을 읽고 삶과 연결시켜 내면화하는 역량이 우수한 학생임.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '관내분실(김초엽)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 작품에 드러나지 않은 인물의 심리와 주제의식에 대해 의견을 나눔. 책대화 내용을 바탕으로 '자신의 삶에 대해 고민하는 사람들에게'라는 제목의 서평을 작성함. 자신을 이해해주는 딸에게 느꼈을 엄마의 감정을 구체적으로 추론하며 작품을 잘 이해하는 모습을 보였으며, 엄마의 행동 이유를 우리 사회의 모습과 연결시켜 여성의 경력 단절 문제를 지적함. 여러 통계 자료와 기사문을 통해 여성 경력 단절 문제의 심각성을 부각하여 문학 작품을 통해 사회적 문제를 인식하고 해결 방안을 고민한 점이 돋보임. 시 처방하기 활동에서 스트레스가 많아 고민이라는 친구의 편지를 읽고 시 '구름 속 종달(김영랑)'을 처방하여 발표함. 시에 등장하는 새가 구슬을 물 속에 버리는 것처럼 고민하는 친구의 스트레스가 모두 사라졌으면 좋겠다는 응원의 메시지를 전달함. 다양한 현대시를 폭넓게 감상하고 그 결과를 바탕으로 타인과 문학적 소통을 할 수 있는 학생임을 발견함.\n\n수학Ⅰ: 확진자 수 증가 추이를 분석하기 위해 로그 그래프를 활용하고, 로그 함수의 기울기가 시간이 지남에 따라 감소하는 현상을 통해 지수적 증가에서 선형적 증가로의 변화 과정을 해석함. 또한 완치율 역시 지수함수 형태의 그래프를 나타냄을 관찰함. 수학적 함수 개념을 바탕으로 감염병 데이터의 변화 양상을 분석하고 이를 시각화하며 수학의 실제 적용 가능성을 탐구함. 지수함수와 로그함수의 개념 및 성질, 정의역, 치역, 점근선, 항상 지나는 점을 정확한 수식과 기호를 활용하여 서술하며,","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"작품을 만들 때 주제에 적합한 표현 방식을 스스로 탐색하고, 자신의 의도를 분명히 담아낼 수 있도록 계획적으로 작업을 진행하는 모습이 돋보임. 언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 얼음, 고양이, 바다, 거북이, 사탕, 노래, 사진, 물로 선정하고, 각 단어를 시각적 상징으로 전환하여 작품 화면에 초현실적으로 결합함. 아이디어를 구상하는 과정에서 자신과 연결되는 요소들을 깊이 고민하며, 구체적으로 작품 제작 계획을 세우는 모습에서 자기 주도적 미술 학습 역량이 잘 발휘됨. 자신이 좋아하는 대상을 데페이즈망 기법으로 능숙하게 화면에 배치하며 미적 감수성을 드러내고, 색연필로 부드러운 느낌을 잘 살려 통일감 있게 채색함. 친구들의 작품을 감상할 때, 작품의 강점과 특징을 파악하면서도 친구들의 이야기를 경청하고 소통하는 능력을 잘 발휘함. 판화 제작 과정에서 아트나이프를 활용해 지우개 판에 스케치한 애니메이션 캐릭터를 조각하며 형태의 정확성과 조형 감각을 발전시킴. 처음에는 아트나이프 사용이 낯설어 어려움을 겪었지만, 여러 번의 실수를 수정하고 표현 방법을 스스로 개선하며 문제 해결력과 포기하지 않는 끈기를 보임.","c":"이를미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간 중 과학 기술의 발전이 스포츠에 미치는 영향에 대해 깊이 고민하며, 공정성과 형평성의 중요성을 인식함. 첨단 장비 사용에 따른 불평등 문제를 인지하고, 모두가 공평하게 경쟁할 수 있도록 공식적인 규제의 필요성을 주장함. 스포츠가 공명정대하게 진행되어야 한다는 원칙을 중시하며, 다양한 상황을 고려한 균형 잡힌 시각을 보임. 사회적 약자를 배려하는 윤리적 사고와 합리적 문제 해결 의지가 뛰어남. 플라잉디스크의 역사와 유래를 이해하고 과학적 원리를 바탕으로 역학적 이동 방향을 명확히 서술함. 플라잉디스크의 파지법과 릴리스 타이밍을 익혀 백핸드를 활용하여 정확하게 던지는 모습을 보임. 2인 1조 패스 활동에서 동료가 패스를 받기 좋게 던져 우수한 기록을 세움. 디스크의 비행 궤적을 파악하여 이동 수비를 성공적으로 수행함. 빅발리볼의 기본 기능을 어려워했으나, 꾸준히 언더핸드와 오버핸드 토스를 연습하며 기술을 향상시킴. 리그전에","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학급 내 긍정적인 분위기를 조성하기 위해 노력하며, 학우들 간의 협력과 조화를 이끌어내는 역할을 함. 정리 정돈과 시간 준수 등 생활습관이 매우 올바르며, 이를 통해 다른 학생들에게도 좋은 영향을 끼침. 학급 내 활동에 적극적으로 참여하고, 타인의 의견을 존중하며 의사소통 능력을 발휘함. 교우 관계가 매우 두터워 다양한 학생들과 원활하게 소통하고 협력하는 모습이 인상적임. 특히 갈등 상황에서도 성숙한 태도로 문제를 해결하려는 노력과 타인의 입장을 배려하는 모습이 돋보임. 학급 단합을 위해 선도적인 역할을 하며, 교내 다양한 행사와 활동에서도 적극적으로 참여해 학급의 분위기를 밝게 만드는 데 기여함. 이러한 행동들은 학급 전체에 긍정적인 변화를 가져오며, 주변 학생들에게도 좋은 본보기가 됨."},{"y":2,"b":"1인 1역으로 '유인물 관리 도우미'를 자원하여 학급 토론 안내문, 가정통신문 등 중요한 자료들을 학급 전체에 신속하고 오류 없이 배부 및 수합함. 학급 행정의 효율성을 높이기 위해 자료를 종류별로 깔끔하게 정리해 두는 등 남다른 책임감과 정리정돈 능력을 발휘함. 본인이 맡은 역할을 묵묵히 수행함은 물론, 정해진 규칙을 철저히 준수하며 학교생활에 성실하게 임하는 모범적인 태도를 보임. 대화에서 자신의 주장을 논리정연하게 개진하여 상대를 설득하는 능력이 탁월함. 단순히 주장만 하는 것이 아니라, 자신의 논리에 허점이 발견되면 이를 깨끗하게 인정하고 타인의 이견을 유연하게 수용할 줄 아는 지적 겸손함과 성숙한 자세를 겸비함. 종종 교사를 찾아와 자신의 태도와 행동, 학업에 대한 피드백을 요청하고, 조언을 바탕으로 단점을 개선하려는 적극적인 성장 의지가 돋보임. 겉으로는 다소 차가워 보일 수 있으나, 그 이면에 숨겨진 솔직함과 반전 매력으로 친구들을 자연스럽게 끌어당기며 원만한 교우 관계를 형성함. 자신이 잘 모르는 분야는 이해할 때까지 파고들고, 서툰 과제는 기필코 해내고야 마는 끈기를 지녀, 어떠한 난관에 봉착하더라도 결국엔 해낼 것이라는 강한 믿음과 기대를 주는 학생임."}]},{"name":"김병찬","seat":3,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":3,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":7,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":3,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":7,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"수업 시간에 성실히 참여하며 매일 국어 학습 시간을 내어 실력 향상을 위해 노력하는 학생임. '세계사를 바꾼 10가지 약'이라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 약은 항상 좋은 것이 아니라 양을 잘못 측정하면 독이 될 수도 있기에 안전하게 복용하는 것이 중요하다는 점을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '옛날에는 모르는 병에 걸리면 그 병에 대해 어떻게 해결책을 찾았을까요?'를 질문해 친구들이 질병에 대해 깊은 사고를 할 수 있도록 유도하는 등 독서의 가치를 체득한 모습을 보임. 현대시 '눈'을 배우며 이 작품이 한국사 시간에 배운 4·19 혁명과 공통점이 있다는 점을 발견하고, 그 시대를 살아간 사람들의 심정과 노력이 궁금해져 '진달래도 피면 무엇하리'라는 시를 찾아 읽음. 이를 통해 4·19 혁명의 정신이 점차 변질되어 갔음을 알게 되었고, 이 혁명이 사람들에게 희망이자 좌절로 다가왔다는 사실을 새롭게 깨달았으며 이를 바탕으로 자신 또한 역사에 대한 방관자가 아닌 주인 의식을 갖고 살아야겠다는 포부를 담은 보고서를 작성함. 이처럼 배움을 통해 성장하고자 하는 의지가 돋보이는 학생임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 복식 경기 중 동료의 의견을 경청하며 존중하는 모습을 보이고, 자기 생각을 논리적으로 주장하여 전략을 세우는 협력적 의사소통 능력을 보여줌. 탁구 경기 중 손목의 힘을 잘 이용하여 정확하게 자신이 목표하는 지점에 공을 보낼 수 있고 상대 선수들이 예측하지 못하는 지점으로 공을 보내는 능력을 발휘하여 득점력이 높음. 티볼 경기에서 포지션의 역할을 잘 이해하여 적재적소에 동료들을 배치하고 상황에 맞는 전략을 잘 세우며 상황에 따른 적절한 피드백을 제공하는 소통 능력을 발휘함. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 주변 사람 챙기기를 즐기는 성격을 바탕으로 팀원들 개개인의 입장에서 상황을 고려하며 공감해 주는 피드백을 통해 사기를 진작시키는 리더가 되고싶다고 발표함. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 도전이란 포기하지 않고 최선을 다해 노력하는 것이며 이 과정에서 어려움이 있더라도 할 수 있다는 긍정적인 사고가 중요함을 활동지에 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 게임 음악의 역할을 생각하며 감상하는 활동에 참여함. 멜로디가 거의 없고 저음 타악기로 리듬을 연주한 게임 음악은 집중과 몰입에 효과적이라고 게임 음악의 역할을 작성함. 수업 시간에 감상한 '프렐류드와 푸가'는 바로크 시대의 음악적인 특징 중 다성 음악을 잘 표현한 것 같고, '피아노 소나타 제16번 다장조'는 고전파 시대의 음악적인 특징 중 소나타 형식에 대해 이해할 수 있는 곡이라고 활동지를 작성함. 칼림바를 연주하면서 칼림바로 화음을 연주할 수 있다는 점이 신기했고, 이를 통해 어울리는 음과 어울리지 않는 음이 무엇인지 알게 되었으며 친구들과 악곡을 연주하면서 화음이 주는 매력을 느낄 수 있었다고 활동지를 작성함. 우쿨렐레를 연주하면서 슬로우 고고 리듬과 변형 리듬을 연결하여 연주하는 부분이 미흡했지만, 구음으로 리듬을 익히고 허공에서 스트로크 연습을 하여 익숙하게 한 후 악기로 연주하는 방법을 선택하여 좋아하는 악곡을 자연스럽게 연주하게 되었다고 연습 과정을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"스무 살의 나의 하루를 주제로 그리는 활동에서 평상시에는 전공 공부를 열심히 하고 휴일에는 자신이 좋아하는 친척 형을 만나기 위해 해외여행을 가는 일정을 상상하여 그림으로 표현함. 작품을 제작하면서 수학 관련 학과에 입학하기 위해 더 열심히 공부해야겠다고 다짐하게 되었고 미래에 여행을 가기 위해 지금부터 저축해야겠다고 발표한 점이 인상적임. 그림을 그릴 때 주제에 적합한 표현 기법과 방법을 조사하고 의도를 명확히 전달하기 위해 계획을 세우는 등 노력하는 모습을 보임. 전통공예의 한 종류인 지승공예 제작하기 활동에서 자신의 이름을 자음과 모음으로 나누어 김밥의 이미지를 만들어 독특한 취향과 개성을 표현함. 한지를 끈으로 만드는 제작 과정이 매우 힘들었음에도 불구하고 긍정적인 마음으로 끈기 있게 완성해 나가는 모습이 인상 깊었으며, 자기 작품을 소중히 여기고 사랑하는 마음이 드러났음. 오일파스텔을 활용한 작품 제작하기 활동에서 재료의 특성을 잘 살려 키스 해링의 작품을 훌륭하게 모작하였으며 작품에 대한 애정을 가지고 열심히 완성하는 태도가 훌륭함. 자신이 만든 작품을 통해 모작한 작품의 가치를 인식하였으며 미술 문화에 대한 통찰력이 뛰어남.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에 참여하여 '거의 모든 물질의 화학(김병민)'의 7장 '염료로 시작해 약을 합성하다'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 교사와의 대담을 통해 글에 대한 자신의 생각을 구술함. 기업의 좋은 이미지를 위해 '지속 가능함'이 쓰인다는 글쓴이의 입장에 동의하면서 소비자는 지속적으로 기업에 투명성을 요구해야한다고 주장함. 또한 소비자 개개인의 작은 선택이 환경 문제와 큰 연관이 되어 있다는 글쓴이의 주장에 동의하면서 자신을 포함한 소비자 모두가 '나 하나쯤이야'와 같은 생각에서 '나라도 하면'이라는 인식의 전환이 필요할 것 같다고 말함. 분석적 독서 활동에 참여하여 다양한 주제의 글을 읽고 분석함. 특히 과학, 사회 분야의 글을 읽고 핵심어를 추출하여 글의 내용을 간략하게 요약하며 독서 실력을 향상시키는 모습을 보임.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 친구의 나태함에 대한 고민을 접하고, '서시(윤동주)'를 처방한 뒤 '의지를 불어 넣어줄 시'라는 제목으로 발표를 진행함. 작품 속 구절을 근거로 화자의 태도와 정서를 도출했으며 묵묵히 '주어진 길을 걸어가야겠다'고 말하는 화자의 태도를 친구가 본받아야한다고 조언함. 친구 뿐 아니라 지금 자신의 발표를 듣고 있는 누구든 나태해지고 의지가 사라지는 때가 있을 것이라고 말하면서 그때 포기하지 않고 일어나라고 모든 청중을 응원함.\n소설 서평 쓰기 활동에서 '관내분실(김초엽)'을 선택하여 읽고 서평을 작성하는 활동에 참여함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 함께 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 소설을 함께 읽은 친구들 사이에서 가장 큰 쟁점이었던 '저장된 데이터를 원래의 인격과 동일하다고 볼 수 있는가'라는 질문에 대해 연속성의 부재, 정보손실의 가능성을 근거로 동일하다고 볼 수 없다고 주장함. 이를 바탕으로 '기억의 존재와 의미는 무엇인가'라는 제목의 서평을 작성함. 기억 저장을 통한 죽음의 의미 변화에 초점을 두고 자신의 생각과 작품에 대한 평가를 논리정연하게 서술함.\n\n수학Ⅰ: 문제 해결을 위한 다양한 접근 방식을 탐색하며 개념 정리에 충실히 임함. 친구들의 풀이 과정을 관찰하고 자신의 방식과 비교하며 문제 해결 능력을 높이기 위해 노력하는 모습을 보임. 삼각함수 그래프 실습 활동에서 단위원의 각도","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"타교에 개설된 공동교육과정(고급 화학)을 이수함. 이원자 분자의 분자 오비탈을 주제로 결합 차수와 홀전자 수의 개념을 스스로 정리하며 심화 탐구함. 분자 오비탈 수행평가 활동에서 시그마–파이 오비탈 역전 현상을 근거로 질소 분자의 분자 오비탈 배열을 정확하게 추론하였고, 루이스 구조에서 나타나는 질소 분자의 삼중 결합을 분자 오비탈 이론으로 설명하며 결합 이론을 확장하여 설명함. 분자 오비탈 다이어그램을 단순히 해석하는 데 그치지 않고 전자 배치를 단계적으로 추론하여 분자의 결합 차수와 자기적 성질을 정확하게 예측함. 결정장 이론 실험 설계 활동에서 코발트 착화합물의 합성과 색 변화를 중심으로 탐구를 수행함. 리간드 종류에 따라 착화합물의 색이 달라지는 이유를 d-오비탈 갈라짐과 d-d 전이 에너지 차이를 근거로 분석함. 암모니아 리간드가 염화 이온보다 더 큰 결정장 갈라짐을 일으키는 원리를 정확히 설명함. 발표 준비 과정에서 결정장 이론과 배위 결합 개념의 이해가 부족했던 부분을 스스로 성찰하고 추가 자료를 탐색하며 보완하는 모습을 보였으며 이를 통해 착화합물의 성질을 다른 전이 금속에도 적용해 보고자 하는 탐구 의지를 드러냄.","c":"에 따라 그래고급 화학"},{"y":2,"t":"세부능력및특기사항","b":"연주 활동에서 직면하는 어려운 점을 극복하고 과제를 완수하기 위해 끊임없이 노력하는 모습이 돋보이는 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 주법을 익혀 연주에 참여함. 개인 연습을 성실히 하여 타브 악보로 구성된 재즈곡을 안정적인 흐름으로 연주함. 수업을 통해 보사노바 리듬을 새롭게 알게 되었으며, 카포 사용 시 음역이 변화하는 음악적 원리를 깊이 깨닫게 되었다는 성찰문을 작성함. 드럼 연주 활동에서는 자신이 부족한 부분을 개선하기 위해 꾸준히 연습하고 친구에게 도움을 요청하는 등 적극적인 연습 태도를 보임. 수업 시간 이외에도 음악실에 찾아와 연습하는 모습이 인상적임. 특히 어려웠던 손과 발의 협응 문제를 해결하기 위해 손 리듬을 숙지한 뒤, 익숙해지면 킥을 더하는 등 체계적인 연습 과정을 거침. 노력의 결과, 올바른 연주 자세로 8비트 응용 리듬과 필인을 정확히 구사하여 완성도 높은 연주를 선보였으며, 눈에 띄는 실력 향상을 보여줌. 스스로 문제를 인식하고 단계적 접근으로 해결하는 자기관리 역량과 동료와 협력하며 연습하는 음악적 소통 역량이 돋보임.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육 시간에 과학 기술 발전에 따른 스포츠 장비의 영향에 대해 스포츠 경기에서 기술과 장비의 발전이 경기의 순수성을 해칠 수 있음을 인식함. 올림픽과 같은 중요한 경기에서 실력 이외의 요소로 격차가 커지는 문제를 비판적으로 바라봄. 기술 도핑에 대한 규제의 필요성을 논리적으로 주장함. 공정성과 스포츠 정신을 중시하는 태도가 돋보임. 플라잉디스크를 목","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"매우 우수한 공동체 역량을 가진 학생임. 1학기에는 에너지 절약 도우미로서 이동 수업 시 전등과 냉·난방기를 끄고 문단속을 철저히 하며 탄소 중립 실천에 이바지함. 2학기에는 휴대전화 도우미를 맡아 조회 후 휴대전화를 보관함에 가져다 두고, 마지막 교시가 끝난 후 교실로 가져오며 학급의 학습 환경 조성에 힘씀. 책임감 있게 맡은 임무를 수행하며 원활한 학급 운영에 도움을 줌. 학급의 칭찬 릴레이에서 친구들과 잘 어울린다는 평가를 받을 정도로 원만한 교우관계를 유지하며 긍정적인 태도로 학급 분위기를 밝게 함. 자기관리 역량을 갖추고 있어 지필평가 준비 기간 동안 평소보다 35분 일찍 등교해 조회 전까지 국어 기출문제를 풀고 분석하며 학습을 준비함. 과목별 학습 순서를 정해 계획표를 달력에 작성하고, 수업 후에는 복습하며 문제를 추가로 풀어 실력을 다져나감. 지필평가 이후 네 번의 문항 분석 중 두 번 참여하여 준비 과정을 성찰하고 부족한 개념을 보완하는 모습을 보여줌. 공동체 의식과 자기 주도적 학습 태도를 바탕으로 학급과 학습에 적극적으로 기여하는 학생임. 자신의 강점과 약점을 분명하게 알고 약점을 보완·개선하고 있기에 더욱더 큰 발전이 있을 것임."},{"y":2,"b":"학업적인 면에서 꾸준함과 자기주도성이 돋보이는 학생임. 학교에서 실시하는 야간자기주도학습에 빠짐없이 참여하며 자기관리능력을 높이고 있으며, 매일 계획에 의거한 학습을 실천하는 모습이 급우들의 모범이 됨. 실험 활동 시 결과의 원인을 스스로 분석하고 심화 질문을 제기하는 등 지적 호기심이 뛰어나며, 독서와 주제 탐구를 통해 지식을 확장하는 탐구 역량이 우수함. 이러한 학문적 열정은 학급 내 학습 멘토 활동으로 이어져, 수학 등 어려운 교과 개념을 친구들의 눈높이에서 차분하게 설명하며 협력적 학습 환경을 조성하는 데 기여함.\n인성 및 행동면에서 거짓이 없고 진실한 언행을 보여 급우들로부터 신뢰를 얻고 있음. 학교 행사와 학급 일에 적극적으로 참여하였고, 항상 마지막까지 남아서 도울 일이 없는지 묻는 마음씨가 착한 학생임. 스포츠한마당에 참여하며 응원 춤 연습에 열정적으로 임함. 밤 늦게까지 남아 담임 선생님에게 춤을 가르쳐 주며 협력적인 태도를 보임. 팀워크와 리더십을 발휘하며 동료들과의 소통을 통해 긍정적인 분위기를 조성함.\n화학공학자라는 진로에 대한 확고한 가치관이 성립되어 있고, 항상 노력하는 모습과 협동심, 책임감 등을 두루 갖추고 있어 앞으로의 성장이 기대됨."}]},{"name":"김수안","seat":4,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":3,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":4,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":1,"s":1,"g":2,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":4,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":1,"g":4,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":3,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":4,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":3,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":4,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":4,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"학문적 호기심이 강해 스스로 심화 학습을 하는 과정을 즐기고 확장된 지식을 자신의 것으로 흡수하는 학업 태도가 내면화됨. 한 예로, '변신'을 읽고 '소외감'에 대해 생각했던 경험을 바탕으로 '인간의 5단계 욕구'를 다룬 지문을 읽으며 이를 연계해 고찰해 보는 시간을 가짐. 그 후 자신의 진로 분야를 고려하여 '소외되는 것의 교육적 영향과 극복 방안'을 주제로 발표함. '교사'의 관점에서 다양한 해결책을 제시하고 준비 과정에서 자신이 성찰한 바를 차분하면서도 진솔하게 전달하는 모습이 인상적이며 가독성 높은 자료 구성력이 돋보임. '고전시가 감상 및 성찰하는 글쓰기' 활동에서 상호텍스트적 관점에서 책의 내용과 연결되는 사회 현상을 찾아 깊이 있게 성찰하고 이에 대한 자신의 생각을 진솔하게 담아내는 한편의 글을 씀. 구체적으로 '두터비 파리를 물고~'를 다양한 관점에서 감상하고 핵심 가치를 '부패한 지배층에 대한 비판 의식'으로 분석한 후 상호텍스트성을 지닌 '동물 농장'을 선택해 읽음. 책과 관련된 사회 현상으로 '프로파간다'를 제시하며 둘을 비교하여 분석하는 모습을 보임. '권력남용'을 경계하고 '비판적 사고력'을 강조하는 모습에서 학생의 도덕적 가치관이 뚜렷하게 드러남.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 경기 규칙과 방법을 논술 활동에서 정확하게 적용한 모습을 보여줌. 탁구 리그전 경기에서 열심히 노력하는 모습을 보여줌. 서브 활동 시 자신이 원하는 코스로 서브를 보낼 수 있게 노력함. 랠리 활동 짝과 협동하여 연속적인 랠리를 활동할 수 있게 노력함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능 연습을 통해 일정 수준 이상의 수행 능력을 보이며, 송구를 정확하게 하기 위해 거리별 연습을 통해 지속적으로 발전함. 티볼 경기 규칙 및 방법에 대해 정확히 인지하여 경기 상황에 적용하려는 모습을 보임. 빈볼시비에 대한 자신의 생각을 스포츠맨십 관점을 서술하면서 스포츠 윤리성을 함양함. 경기 중에 차분하게 자신의 역할을 해내려 노력하며 상황에 맞춰 즐겁게 임하는 태도를 보임. 스포츠 인성 수업 중 도전정신에 대해 유연한 사고로 포기하지 않아서 교훈을 얻게 된 경험을 활동지에 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고, 가사의 의미를 생각하며 이야기 만드는 활동에 참여함. 지친 마음을 달래줄 수 있고 비트가 잘 들리는 장르의 노래를 좋아하며, '포크', '발라드', '힙합', '랩'의 특징을 조사하여 작성함. 교과서 수록곡 중 마음을 다독여주는 가사로 이루어진 곡을 듣고, 가사의 의미를 담아 이야기를 만들어 친구와 공유함. 칼림바는 맑은 종소리가 연상되며 연주 방법이 간단하여 배우기 쉬운 악기라고 소개함. 칼림바를 연주하면서 미흡한 부분을 보완하기 위해 칼림바 앱을 설치하여 연습 시간을 확보하고, 음계 연습을 꾸준히 하여 건반을 익숙하게 하는 등 곡의 완성도를 높이기 위해 노력한 과정을 활동지에 작성함. 우쿨렐레를 연주하면서 연주 실력이 향상되었고, 코드를 암기하면서 암기력과 합주를 통해 협동심이 생겼다고 소감을 발표함. 우쿨렐레로 악곡을 연주할 때 셈여림을 지킬 때와 지키지 않을 때 곡의 분위기가 다름을 알게 되었고, 스트로크하면서 강, 약을 조절하는 연습을 통해 곡의 완성도를 높였다고 연습 과정을 작성함. 바로크, 고전파, 낭만파 시대의 음악적인 특징을 조사하며 그 시대에 맞는 곡을 선정하여 감상하고 느낀 점을 충실하게 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"지승공예 제작하기 활동에서 작품을 기획, 준비하는 태도가 우수하고 표현력이 창의적이며 완성도가 높은 작품을 제작하기 위해 노력하는 모습 등 전반적인 수업 태도가 우수함. 창조의 기둥 만들기 조별 활동에서 카프라를 활용하여 이집트의 피라미드를 입체 조형물로 제작함. 무너지지 않게 쌓기 위해 기단부를 튼튼하게 쌓아 올리는 등 성실한 모습을 보임. 차분하고 신중한 모습으로 작품을 제작하였으며 협동 작품에서도 자신의 역할에 최선을 다하였으며 친구들과 함께 만들어가는 즐거움을 느끼는 등 공동체 역량을 키워가는 모습이 돋보임. 친구들의 작품을 감상할 때는 항상 개방적인 태도를 유지하며, 다른 사람의 작품 설명을 경청하는 등 미술 문화 이해 능력이 뛰어남. 작품을 만들 때 주제에 적합한 표현 기법과 방법을 조사하고 의도를 명확히 전달하기 위해 계획을 세우며 주도적으로 창작함. 스무 살의 나의 하루를 주제로 그리는 활동에서 대학생이 되면 전공 수업을 들은 후 친구들과 함께 차를 타고 여행 가는 일정을 그림으로 잘 표현함. 채색 과정에서 자신이 좋아하는 색상들을 조화롭게 배","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '블루멘베르크의 은유'에 관한 글을 읽고, 은유가 단순히 말을 꾸미는 표현법이 아니라 세상을 이해하는 도구가 될 수 있다는 내용을 알게 되어 이를 바탕으로 탐구 활동을 진행함. 독서 자료의 추상적인 내용을 이해하기 위해 내용과 관련된 구체적인 사례를 찾아본 결과, 화학자 케쿨레가 뱀이 꼬리를 무는 꿈을 통해 벤젠의 분자 구조를 발견한 일화를 접하게 되어 은유가 과학적 발견에도 도움을 줄 수 있음을 확인하게 되었다고 기술함. 문학적 표현 기법으로써의 은유가 삶을 이해하는 데에도 쓰일 수 있음을 깨닫고 이와 관련하여 추가 탐구 활동 계획을 세움. 확장적 독서 활동에서 '떨림과 울림(김상욱)'을 발췌독한 후, 성공적인 삶을 위한 태도로서 '수용 감각'과 '언어적 공간 확보'의 중요성을 깨닫고 자신의 경험에 비추어 감상문을 작성함. 타인에게 호감을 얻기 위해 무조건 상대에 맞추는 태도보다는 자신의 의견을 명확히 전달하면서도 상대를 존중하는 균형 감각이 필요함을 역설함. 자신의 언어적 공간을 확보하기 위해 품위 있고 신중한 어휘를 선택하되, 경청과 공감을 통해 상대방이 무시당한다고 느끼지 않게 배려해야 한다는 구체적인 소통 전략을 제시함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"갤러리 공간 디자인 활동에서 자신이 미래에 교사가 되어 학생들과 함께 생활하고 교육할 공간인 '교실'을 전시 공간으로서 새롭게 디자인함. 익숙한 공간을 새로운 시각으로 재해석하며, 단순한 전시 공간이 아닌 학생들이 심리적 안정감을 느끼고 스트레스를 완화할 수 있는 공간으로 기획함. 감성적이고 따뜻한 분위기의 공간 콘셉트를 설정하고, 예술이 일상 안에 스며드는 경험을 제공하려는 의도를 시각적으로 표현하며 높은 미적 감수성을 드러냄. 언어에서 이미지로 전환하기 활동에서 단순히 독창적인 구성을 추구하기보다, 자신이 진정으로 좋아하고 흥미를 느끼는 주제를 중심으로 생각을 전개하며 자기 주도적 미술 학습 능력을 보여줌. 표현 과정에서 교사와의 피드백을 적극적으로 수용하고 수정하며 완성도를 높이는 미술적 소통 역량을 잘 발휘함. 판화 제작 활동에서 자신이 좋아하는 캐릭터를 주제로 아트나이프로 섬세히 조각함. 아트나이프 사용이 낯설어 처음에는 힘들어했지만, 여러 번 연습을 거듭하며 기술을 발전시키는 모습에서 자기 주도적 미술 학습 능력이 잘 발휘됨. 전반적으로 예술 활동을 통해 감정을 시각적으로 표현하는 성숙한 태도를 보이며 미술 문화 이해 능력을 잘 드러냄.","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 사이클 경주에서 사용되는 자전거에 탄성력이 좋은 카본 소재로 제작하여 안정성을 높이고 에너지 소모를 낮춤으로써 선수들의 경기력에 도움이 된 사례를 제시함. 스포츠의 본질은 신체 기량과 기술의 우위를 겨루는 것이기 때문에 스포츠 과학 기술은 규제해야 한다는 의견임을 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 빠른 기동력과 위치선정이 탁월하다는 강점이 있지만, 전체적인 수비 운영이 다소 부족하여 협력 수비가 필요함을 인지하여 서로 이야기하며 수비 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 일정한 거리를 유지하고 팀원 간의 대형을 유지하며 패스 플레이를 활용할 수 있는 자신만의 필승 전략을 세움. 동료가 패스 주기 좋은 위치로 이동하여 디스크를 받는 상황에서 실수를 줄임으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능 연습이 처음에는 어려웠으나 위축되지 않고 노력한 결과 자신감을 가지고 경기에 참여함으로써 발전된 자신의 모습을 보고 자아존중감이 향상됨.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 선수가 주변의 굳건한 믿음을 바탕으로 최고의 자리에 오르는 과정을 지켜보며, 타인의 기대와 신뢰가 개인의 자기효능감 형성에 미치는 심리적 영향을 탐구함. 자기효능감 이론과 피그말리온 효과를 바탕으로 타인의 신뢰가 단순한 격려를 넘어 스스로 가능성을 인식하고 도전하게 만드는 핵심 요인임을 분석함. 이러한 심리적","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"예의가 바르고 긍정적인 태도로 항상 주변을 밝게 만드는 모습이 인상적임. 학급 활동에 적극적으로 참여하여 친구들에게 좋은 본보기가 되고 있으며, 수업 중에도 항상 활발하게 의견을 제시하고, 다른 친구들의 의견을 경청하는 태도가 훌륭함. 평소 자신의 지식을 나누어 주는 것을 좋아하여 학급 친구에게 멘토가 되어 수학, 국어, 과학 과목에 대한 도움을 제공함. 친구가 어려워하는 문제의 풀이를 도와주며 오개념을 바로잡아 내신 시험 준비에 실질적인 도움을 줌. 이러한 과정에서 분석적 사고와 문제 해결 능력을 발휘하였고 친구에 대한 배려와 책임감을 가지고 행동하는 모습이 인상적임. 상담 활동을 통해 나눔의 가치를 체험하고, 학습의 즐거움을 함께 나누는 기회를 가짐. 여름방학 때 22명의 학급 친구들과 함께 학습 공동체를 구성하자는 아이디어를 낸 후 열정적으로 운영함. 기상 시간과 공부하는 모습을 매일 공유하며 바른 생활 습관을 갖는 모습을 보임. 매일 아침 7시 기상과 8시간 이상의 학습 시간 등 엄격한 자기 규제를 통해 강한 자기 통제력과 목표 달성을 위한 끈기 있는 노력이 감동적이었음. 학교행사 중 양성평등 도우미를 맡아 포스터를 직접 제작, 홍보에 적극 참여함."},{"y":2,"b":"친구들과 원만한 관계를 유지하며 한 해 동안 안정적으로 학교생활에 성실히 임한 학생임. 한 해 동안 학급 임원으로 활동하며 학급 경영 전반에 적극적으로 참여하여 실질적인 기여를 함. 학교생활 속에서 친구들이 느끼는 불편함을 스스로 살피고 이를 해결하고자 우산 대여와 시험 기간 간식 비치 등의 공약을 제시하였으며, 계획에 그치지 않고 이를 성실히 실천함. 그 결과 해당 공약이 실제로 학급 친구들에게 많은 도움이 되었고, 또래 학생들로부터 큰 호응을 얻음. 공동체 역량이 기본적으로 뛰어나 학급에서 도움이 필요한 상황이 발생할 경우 자발적으로 나서 교사를 돕는 모습이 자주 관찰되었으며, 교사의 부탁을 적극적으로 수용하여 학급 운영에 있어 많은 도움을 준 고마운 학생임. 또한 새로 전학 온 학생을 위해 먼저 다가가 함께 급식을 먹고 말을 건네는 등 학교생활에 잘 적응할 수 있도록 돕는 배려심 있는 태도가 인상적이었음. 책임감 또한 뛰어나 학급 프로젝트나 과제가 제시될 때마다 완성도 높은 결과물을 꾸준히 만들어 냄. 조원들을 독려하여 모두가 과제에 적극적으로 참여할 수 있도록 이끄는 과정에서 리더십과 책임감이 잘 드러났던 점이 인상적임. 학급 공동체 안에서 신뢰받으며 성실하게 생활함."}]},{"name":"김태양","seat":5,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":9,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":7,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":9,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":7,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":8,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"화학I","c":"과학"},{"y":3,"s":1,"g":7,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":9,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":9,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":9,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":8,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":2,"g":7,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로나 관심사를 발견하기 위한 독서 활동에서 '과학자가 되는 방법'을 선정하여 읽고 독서 일지를 부분적으로 작성함. 이를 토대로 한 즉문즉답 인터뷰 활동에서 과학자가 되기 위해서는 과학을 진정으로 좋아해야 한다는 주제를 자신의 말로 표현하는 모습에서 의사소통 역량이 엿보임. 고전시가 감상 발표 수업에서 시조 '발가벗은 아해'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 개성 있는 시각 보조 자료를 활용하여 약육강식의 험난한 세태를 풍자한 작품의 주제를 잘 전달하는 모습에서 주체적 문학 감상 역량을 보여줌. 성 소수자와 차별에 대한 이야기인 '킹과 잠자리'를 읽고 감상문을 씀. 작품 속 동성애자인 주인공이 성 소수자라는 이유로 차별받는 모습을 통해, 과거 내향적이라는 이유로 따돌림을 당했던 자신의 유년 시절의 경험을 상기하여 그 때의 아픔을 문학적으로 승화하는 모습에서 심미적 감수성이 드러남.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수학 독서 탐구 활동에 참여함. 수학 문제해결 활동에 참여함. 도형의 이동을 주제로 한 카드 뉴스 작성 활동에서 도형을 평행이동, 대칭이동 시켜도 도형의 모양이나 크기는 변하지 않는다는 특징을 언급하며 그림으로 표현함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"수업 중 독해 활동에서 어려움을 겪었지만, 자신의 속도와 단계에 맞춰서 수업 활동에 참여하려고 함. 영어 과목에 대한 흥미가 더욱 강조된다면 학습 능력이 한층 더 향상될 가능성이 있음. '영어 독서록 활동'에서 어법 및 어휘 사용에 다소 어려움이 있었으나, 부족한 부분을 스스로 찾아가며 노력하는 모습이 인상적임. 영어 학습에 대한 끈기와 의지가 강하게 느껴지며, 지속적인 노력 덕분에 점차 자신감을 얻고 있는 과정이 돋보임.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"역사 연구에 꼭 필요한 자료인 '사료'의 중요성을 학습하고 사료 수집 후에 사료 비판이 꼭 필요하다는 사실을, 사례를 통해 확인함. 전근대 한국사를 학습하면서 생긴 궁금증을 모아 호기심 일지를 작성하고, 특히 고려 시대에 9재 학당을 세워 교육과 인재 양성에 힘쓴 최충에 대해 자세히 조사하여 정리함. 풍자화를 통해 개항부터 국권 피탈까지의 과정을 학습하며 그림 속 요소들이 역사적 사건에서 상징하는 바가 무엇인지 분석을 시도하였으며, 강화도 조약을 주제로 자기만의 풍자화를 그림. 대한민국 정부 수립 후 시급하게 해결해야 할 과제로 친일파 청산을 골라, 비록 실패하였으나 친일 반민족 행위자들을 조사하고 주요 인물을 검거하여 정의를 실현하려고 노력한 점을 높이 평가한다고 발표함.","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"일상 속 다양한 불평등 현상에 대해 관심을 갖고 지구 온난화로 촉발된 에너지 빈부 격차를 주제로 활동지를 작성함.","c":"통합사회"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업을 통해 탁구에 대한 경기 규칙과 방법을 전반적으로 이해할 수 있게 되었고 리그전 경기를 통해 승패에 굴복할 수 있는 마음가짐을 갖게 됨. 랠리 활동을 통해 20회 이상 연속으로 랠리를 주고받을 수 있는 능력을 보여주었고 서브 활동을 통해 서브된 공을 원하는 구역으로 보낼 수 있는 능력도 갖춤.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기본 기능 연습에 적극적으로 참여하며 송구 방법을 꾸준히 노력해 좋은 수행을 보임. 송구 실수를 만회하기 위해 끊임없이 시도하는 모습이 돋보임. 스포츠 인성 수업 중 자신의 성격과 장점을 살릴 수 있는 리더십에 대해 자신의 경험을 바탕으로 팀원들에게 흥미를 불어넣어주고 수준에 맞게 가르쳤던 점을 활동지에 꼼꼼하게 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 게임 음악의 역할과 음악 산업에 관련된 직업을 조사하는 활동에 참여함. 칼림바 건반의 위치가 피아노 건반의 배열과 다르고, 칼림바 건반이 좁고 얇아서 실수 횟수가 많았지만 악보를 외우고 계이름으로 노래 부르며 연습하여 곡의 완성도를 높였다고 연습 과정을 작성함. 또한 작곡가의 의도를 생각하며 음을 끊어서 표현하는 부분과 연결하는 부분을 구분하여 연주하고, 느낌을 살려 연주하여 친구들에게 좋은 호응을 얻음. 우쿨렐레를 연주하면서 자연스럽게 코드를 바꾸기 위해 운지법을 숙지하고, 악보를 미리 보는 등 다양한 방법으로 연습하여 실력을 향상했고, 노래를 부르며 연주하는 부분이 즐겁고 흥미로웠다고 연습 과정과 느낀 점을 작성함. 고전파 시대, 낭만파 시대의 곡을 감상하고, 두 시대의 음악적인 특징과 사용된 악기의 연주 방법을 조사하여 활동지를 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"사물을 그릴 때 다소 어려움을 느끼지만 포기하지 않고 끝까지 완성하려고 노력하며 주제에 적합한 표현 기법과 방법을 조사하고 의도를 명확히 전달하기 위해 계획을 세우는 등 노력함. 미래의 명함 만들기 수업에서 스포츠 트레이너, 스포츠 강사가 하는 일과 관련 전공을 조사하여 보고서를 성실히 작성함. 스포츠 강사는 탁구, 테니스, 줄넘기 등 각 종목의  숙달할 수 있도록 도와주는데 특히, 줄넘기 종목에 재능이 있고 흥미가 있음. 미래의 명함 앞면에 줄넘기하는 사람의 모습을  표현하여 명함을 제작하고 자신의 꿈을 표현함. 창조의 기둥 만들기 조별 활동에서 카프라를 활용하여 우리나라 국보인 다보탑을 입체 조형물로 제작함. 무너지지 않게 쌓기 위해 기단부를 튼튼하게 쌓아 올리는 등 성실한 모습을 보임. 차분하고 신중한 모습으로 작품을","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '떨림과 울림(김상욱)'을 읽고 6가지 핵심 질문에 대한 자신의 생각을 글로 표현함. 과학 이론과 삶을 연결시켜 통찰하도록 유도하는 책의 내용을 잘 이해하고 이를 바탕으로 자신의 생각을 확장하는 과정을 글에 담음. 엔트로피 법칙으로 인해 시간이 일방향으로 흐르는 것이 인간의 삶에 어떤 영향을 미치는지 묻는 질문에 대해 우리의 현재 삶의 가치를 중심으로 답변한 점이 인상적임. 시간을 되돌릴 수 없기에 인간은 과거를 기억하고 후회하면서 더 나은 현재와 미래를 위해 노력하는 삶을 살게 된다고 글로 표현함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 구술함. 모르는 것이 과학의 발전과 인류의 삶에 어떤 의미가 있냐고 묻는 질문의 답변을 진지하게 고민했으며 해답을 찾는 과정이 인간을 성장시키고 있다고 답변함. 이렇게 자신의 생각을 말로 표현하는 과정에서 책의 내용을 깊이 이해하려고 노력하는 모습을 보임.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '오직 운전하는 이들만이 살아남는다(박서련)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 책을 차분하게 읽은 후 모둠 책대화를 나누며 등장 인물 간 관계 변화에 대한 의견을 나눔. 책대화에 적극적인 태도로 참여하고 친구들의 의견을 경청하는 바람직한 태도를 보임. 책대화 내용을 바탕으로 '사람의 마음을 여는 것이란'이라는 제목의 서평을 작성함. 이 소설에서는 좀비의 출몰이라는 극한 상황 속에서 살아남으려면 타인을 경계하기보다 연대해야 한다는 메시지를 전달한다고 해석하며 우리 삶에서 사람 사이 감정 교류가 중요하다는 내용을 글로 표현함. 특히 같은 소재를 다룬 영화들과 비교하며 매체에 따라 달라지는 표현 양상을 분석한 점이 인상적임. 시 처방하기 활동에서 성적이 잘 나오지 않아 고민하는 친구의 편지를 읽고 시 '모래 시계(육근철)'를 처방하여 발표함. 모래 시계 속에 비움과 채움의 시간이 담겨있는 것처럼 꾸준히 노력하여 공부해보라는 응원의 메시지를 진솔하게 전달함.\n\n수학Ⅰ: 대학수학능력시험의 출제 경향을 분석하며, 특히 수학1 과목의 문항을 자세히 탐구하여 수학 기사문을 작성함. 지수와 로그의 개념을 정확히 이해하고, 이를 바탕으로 지수함수와 로그함수의 역함수 관계를 활용한 문항을 논리적으로 분석함. 출제 의도와 문제의 핵심을 파악하며 수능 수학을 대비하는 자세를 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 해결하는 활동에 참여함. 자신이 잘하는 것과 못하는 것에 대해 잘 알고 있으며, 잘하는 것에 집중하는 모습을 보임.\n\n수학Ⅱ: 수업 전반에 대해 비교적 조용하고 차분한 태도로 임하며 주변 학습 분위기를 해치지 않고 자연스럽게 녹아드는 편임. 자신의 진로와 관련된 학습을 스스로 탐색하는 경향이 강해 수업 시간에도 개인 관심사와 연계된 자료를 찾아보며 자기 주도적 탐색 활동을 지속함. 수학이 진로와 직접적으로 연결되지 않는다고 판단하여 과제 수행 및 수업 참여가 다소 소극적으로 나타나기도 했으나, 본인이 흥미를 느끼는 분야에서는 높은 집중력을 보이며 오랜 시간 몰입하는 모습이 관찰됨. 문제","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"연주 활동에 적극적으로 참여하며, 자신의 학습 과정을 성찰하고 동료의 피드백을 수용하며 성장하는 모습이 돋보이는 학생임. 우쿨렐레 연주 활동에서 장르별 리듬과 타브 독보법, 커팅 및 뮤트 등 심화 기법을 학습함. 어려웠던 점으로 다양한 코드를 정확하게 짚는 것을 꼽고, 이를 개선하기 위해 느린 속도부터 단계적으로 연습하며 코드가 숙달되도록 하였다는 성찰을 남김. 연습의 결과, 악기에 따른 바른 자세와 주법으로 코드를 정확하게 짚고 특징적인 리듬을 살리며 안정적인 연주를 선보임. 드럼 연주 활동에 흥미를 보이며 적극적으로 참여하였으며, 친구들과 즐겁게 합주하는 모습이 인상적임. 초반에 악보 독보법이 익숙하지 않아 악보보다 감각에 의존하여 연주하였으나, 반복적인 연습을 통해 악보에 익숙해지는 모습을 보임. 또한, 교사의 조언을 통해 연주를 개선하는 등 점차 향상되는 모습을 보여줌. 꾸준한 노력의 결과, 8비트 리듬과 난도 있는 필인을 안정적으로 소화하며 '자세가 바르고 박자가 안정적이며 세기 조절이 뛰어나다'라는 긍정적인 동료평가를 받음. 연습의 과정에서 기술적 한계를 극복하려는 자기관리 역량이 엿보임.","c":"해결 과정에서음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에서 과학기술의 발전이 스포츠에 미치는 영향에 대해 긍정적인 시각을 가지고 있음. 기술의 발전이 스포츠의 효율성을 높이고 선수들의 성과를 극대화하는 데 기여한다고 생각함. 그러나 기술 사용에 있어 적절한 균형이 필요하다고 인식하고 있으며, 지나친 의존은 오히려 부작용을 초래할 수 있음을 강조함. 스포츠의 본질을 유지하면서 기술을 활용하는 방안을 모색하는 태도가 돋보임. 플라잉디스크 활동에서 처음에는 정확하게 던지지 못하는 어려움이 있었으나, 꾸준한 노력과 동료와의 지속적인 패스 연습을 통해 점차 실력이 향상됨. 이동 수비에서 디스크의 비행 궤적을 파악하여 성공적으로 수비함. 빅발리볼 기초 기능인 언더핸드, 오버핸드 토스에서 실수가 있더라도 재도전하여 좋은 기록을 보임. 이러한 능력을 바탕으로 리그 경기에서 뛰어난 경기 능력을 보여줌. 다양한 종목에서의 경험을 통해 협동심과 책임감을 기르며, 체육 활동에 대한 열정을 지속적으로 보여줌.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 스포츠 사회학 및 심리학 진로와 연계하여 스포츠 활동이 개인의 삶과 사회적 관계에 미치는 파급력을 탐구함. 스포츠가 신체 건강 증진과 스트레스 완화라는 개인적 차원을 넘어, 타인과의 상호작용을 통해 유대감을 형성하고 또래 관계를 공고히 하는 사회적 순기능을 수행함을 규명함. 특히 운동 종목과 참여 정도에 따라 개인의 주관적 삶의 만족도와 능동적인 생활 태도가 차별적으로 형성됨을 확인람. 결과적으로 스포츠가 개인의 전인적 발달은 물론, 공동체적 가치와 사회적 자본을 형성하는 중추적 역할을 수행함을 깨달음.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학업적인 측면에 다소 어려움을 겪고 있지만, 자신의 강점을 찾아가며 노력하는 성실한 모습이 돋보임. 학습 과정에서 자신이 할 수 있는 부분을 꾸준히 탐색하며, 수업 중에 주어진 과제를 완수하기 위해 최선을 다하는 노력을 보여줌. 음악 줄넘기를 비롯한 생활체육 분야에 깊은 관심이 있어 친구들과의 공동 과제나 조별 활동에서 자신의 장점을 적극적으로 발휘하며 도움을 주는 모습을 자주 보임. 또한, 평소 스포츠와 관련된 다양한 경험을 쌓고, 여러 교내 활동에 열정적으로 참여하며, 자신의 진로를 개척하려는 의지를 보임."},{"y":2,"b":"체육 계열 진로에 대한 목표 의식이 확고하며, 꿈을 향해 끊임없이 노력하는 멋진 학생임. 예상치 못한 부상을 겪는 상황에서도 좌절하기보다 긍정적인 태도로 재활에 임하며 다시 운동할 날을 준비하는 단단한 정신력을 보여줌. 진로 관련 자격 취득을 위해 틈틈이 이론 공부를 병행하고 생소하거나 어려운 내용은 다양한 매체를 활용해 적극적으로 탐색하며 전문성을 쌓아가는 자기주도적 탐구 자세가 인상적임.\n학급 공동체를 위한 일에 누구보다 협조적이며 매 순간 자신의 성실함을 행동으로 증명함. 학급 휴대폰 수거 도우미로서 매일 한결같이 교무실을 오가며 수거한 휴대폰 수량을 정확히 확인하고 미제출 학생이 있는지 점검함. 친구들이 수업에 집중할 수 있도록 절제력 있는 스마트폰 활용 환경을 조성하는 데 크게 기여하였으며 수거된 기기가 안전하게 관리되도록 세심"}]},{"name":"김현지","seat":6,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":2,"g":9,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":8,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":7,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":9,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":7,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":7,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":9,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'불량한 자전거 여행'이라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 힘든 일이 생겼을 때 회피만 하는 것이 아니라 적극적으로 고민하고 성찰하는 등의 대처 방법에 대해 깨닫게 되어 이를 바탕으로 즉문즉답 활동을 함. '당신은 무엇을 할 때 행복합니까?'를 질문해 친구들의 깊은 사고를 유도하는 등 독서의 가치를 체득한 모습을 보임. 시조 '개야미 불개야미'를 내재적 관점과 외재적 관점에서 종합적으로 감상하고 주체적으로 비평한 후 말과 인간관계의 관련성에 대해 고찰하기 위해 '말 그릇'을 읽음. 책을 통해 말에 대한 잔기술을 익히는 데 집중하기보다 말을 담아 내는 '말 그릇' 자체를 키우는 것에 집중해야 한다는 점을 인식하고 자신의 어린 시절 경험과 연결하여 삶을 성찰한 글을 진솔하게 작성함. 이처럼 독서를 통해 얻은 깨달음을 바탕으로 삶의 의미를 부여하는 능력이 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"집합의 뜻과 포함관계를 학습한 후 멘토의 도움을 받으며 간단한 예제를 해결함. 친구들이 관련 기출문제를 해결하는 것을 경청하며 자신의 문제 해결 역량을 신장시킴.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"탁구 스트로크에 대한 꾸준한 노력으로 포핸드 드라이브 실력이 점진적으로 향상되어 파트너와 지속해서 안정적인 랠리를 할 수 있게 됨. 탁구 연습에 성실히 참여하여 다양한 스트로크 전환을 빠르고 자연스럽게 연결할 수 있으며 경기 중 높은 집중력을 발휘하여 실수를 줄여 나가려는 모습이 돋보임. 티볼 경기 중 정확한 동작을 통해 힘을 효율적으로 사용하여 타격 상황에서 집중하여 공을 멀리 정확히 쳐 내는 능력이 우수함. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 목표를 위해 노력하는 과정에서 장애물을 만났을 때 긍정적인 마음가짐과 끈기 있는 자세의 중요성에 관해 주장하며, 어려움을 극복하는 과정에서 느끼는 성취감과 자신감이 다른 일을 해나가는 원동력이 될 것이라는 생각을 활동지에 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르와 가사의 의미를 생각하며 감상하는 활동에 참여함. 여러 곡을 감상하며 가장 마음에 와 닿은 곡의 가사는 꿈을 이루기 위해 노력하고 간절함을 담은 노래라고 선정 이유를 활동지에 작성함. 칼림바를 연주하면서 정확한 음을 연주하는 것과 박자와 리듬을 악보에 표시된 대로 연주하는 부분을 잘했고, 단선율의 악보를 보고 화음을 구상하는 작업을 통해 어울리는 음과 어울리지 않는 음을 구별하는 능력을 키워감. 노래를 부르면서 우쿨렐레를 연주하는 활동에 참여함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"표현력이 창의적이며 완성도가 높은 작품을 제작하기 위해 노력하는 모습 등 전반적인 수업 태도가 우수함. 스무 살의 나의 하루를 주제로 그리는 활동에서 친구들과 여행을 가는 일정을 상상하여 성실히 그리는 등 자기 작품에 애정을 갖는 모습을 보임. 여행 가방과 수영용품을 그려서 주제를 강조하였으며 색연필의 특징을 살려 사물을 섬세하게 묘사한 점이 인상적임. 오일파스텔을 활용한 작품 제작하기 활동에서 재료의 특징을 살려 인상주의 작품을 훌륭히 모작해 냄. 자기 작품에 애정을 가지고 최선을 다하여 완성하는 모습이 훌륭함. 작품을 제작하면서 자신이 모작한 작품에 대한 가치를 판단하는 등 미술 문화 이해 역량이 우수함. 창조의 기둥 만들기 조별 활동에서 카프라를 활용하여 입체 조형물로 만듦. 주제를 효과적으로 시각화하기 위해 도전하고 실험하는 모습이 훌륭하며 작품을 완성하기 위해 주도적으로 참여하는 모습이 인상적임. 협동 작품에서도 자신의 역할","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '하이퍼리얼리즘과 현대 사회'에 관한 글을 읽고 자신의 생각을 피력함. 하이퍼리얼리즘 사조가 단순한 재현을 넘어 대량 소비 사회를 비판하는 도구임을 파악하며 화려한 포장에 가려진 현대 산업의 과소비 문제에 경각심을 느꼈다고 기술함. 후속 탐구 주제로 '하이퍼리얼리즘 기법을 활용한 뷰티 과소비 실태 시각화 프로젝트'를 제안함. 다 쓴 화장품 공병이나 버려지는 패키지를 실제보다 거대하고 정교하게 재현하거나, 질감을 극도로 사실적으로 묘사하여 소비의 흔적을 보여주면 무심코 행하는 소비 습관을 되돌아보게 할 수 있다고 설명함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 발췌독한 후, 언어와 사회의 관계를 중심으로 자신의 생각을 설명하는 활동에 참여함. 필자가 제시한 '수용 감각'의 개념을 이해하여 자신의 실제 언어 생활에서 '수용 감각'이 발휘된 예를 성찰해 보고 그 의미에 대해 기술함. 인간 관계를 형성할 때에 특정 한 사람이 아닌 관계 형성에 참여하는 모든 사람이 '수용 감각'을 적절하게 사용해야 함을 강조하며 언어 공동체의 합의된 소통 규칙이 바람직한 공동체 문화를 만들 수 있다고 강조함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '저건 사람도 아니다(서유미)'를 읽고 비평 활동을 진행함. 완벽한 존재가 되기를 갈망하는 인간의 욕망을 그리고 있는 작품이라고 평가하며, '트윈 사이보그'로 인해 느끼는 편리함 이면에 존재하는 허탈감과 씁쓸함에 주목하여 서평을 작성함. 오늘날 인공지능이 사회 곳곳에서 인간을 대신하고 있는 상황을 떠올리며 인간 고유의 정체성을 지키면서 인공지능과 공존할 수 있는 방법에 대해 고민해 보아야 함을 강조함. 심미적 문학 체험 활동에서 사소한 일도 그냥 넘기지 못하고 골똘히 생각하는 성격 때문에 잡생각이 많아 고민이라는 동료 학습자의 고민편지를 받고 시 처방전을 작성함. 시 '나비에게(이해인)'에서 시적 화자가 나비에게 끊임없이 말을 건네는 모습이 고민 대상자와 비슷하다고 설명하며 시를 통해 자신에 대한 답답함을 해소하기를 바란다는 내용의 메시지를 남김. 질문이 많은 시적 화자이지만 그 어느 질문도 부정적인 질문은 없는 것처럼 생각이 많은 고민 대상자 역시 생각을 많이 하는 것이 나쁜 것은 아니라고 위로하며 자기 자신을 있는 대로 인정할 것을 권유함. \n\n수학Ⅰ: '토끼의 개체 수 증가와 수열, 지수함수의 활용'을 주제로 수학 기사문을 작성하며, 실생활 현상을 수학적으로 분석하려는 융합적 사고력을 보임. 토끼가 일정한 비율로 번식하는 상황을 등비수열과 지수함수의 모델로 표현하고, 시간에 따른 개체 수의 변화를 수학적으로 설명함. 지수함수의 그래프를 활용하여 증가 속도의 특징을 시각적으로 해석하였으며, 수학이 생물학적 현상의 예측에 효과적으로 활용될 수 있음을 이해함. 기본 개념을 충실히 학습하며, 수업 중 주어진 문제를 빠르게 이해하고 해결하려는 자세가 좋음. 친구들의 발표를 경청하고 토론에 적극 참여하며, 예의 바르고 협력적인 태도를 꾸준히 유지함. 사인함수의 성질을 학습한 후 그래프를 통해 주어진 함수의 최댓값과 최솟값을 구하는 활동에 참여함.\n\n수학Ⅱ: 간단한 미분 개념과 기본적인 미분법을 학습하는 수업에 성실하게 참여하며 도함수의 의미를 이해하고 이를 활용한 기본 계산을 안정적으로 수행함. 함수의 미분을 통해 변화율을 구하는 과정을 따라가며 주어진 다항식에 대해 간단한 도함수를 정확히 구하는 모습을 보임. 수업 중 제시되는 핵심 내용을 빠짐없이 필기하며 학습 내용을 정리하는 태도가 성실하고 일관되게 관찰됨. 또한 친구들의 발표와 풀이 설명을 집중하여 경청하고 긍정적인 반응으로 적극적인 수업 분위기 형성에 기여함. 교과 학습 전반에 책임감 있게 임하며 주어진 수업 활동을 끝까지 수행하려는 태도가 돋보임. 전반적으로 차분하고 성실한 학습 자세를 바탕으로 수업에 참여하며 기본 개념을 중심으로 학습 내용을 꾸준히 습득해 나가고 있음.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 꾸준한 연습을 통해 실력을 점진적으로 향상시키며 노력의 중요성을 보여준 학생임. 초기에는 코드 운지나 타브 악보 독보에 다소 어려움을 보였으나, 모르는 부분은 교사에게 적극적으로 질문하고 친구들의 도움을 받는 등 성실히 연습함. 명확한 소리가 나지 않는 코드를 집중적으로 훈련하고, 악곡의 리듬을 정확하게 표현하기 위해 꾸준히 연습함. 그 결과, 주어진 악곡의 음악적 특징을 이해하며 대체로 안정적인 연주를 선보임. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 수업시간 외에도 음악실에 찾아와 부족한 부분을 보완하고자 노력하는 태도를 보여줌. 손과 발의 자연스러운 협응을 위해 노력하고, 악곡의 리듬과 필인을 표현하기 위해 친구에게 도움을 청하며 소통하는 모습을 보임. 연습의 결과, 곡의 특징을 이해하고 8비트 기본 리듬과 응용 리듬을 연주하며 이전보다 향상된 실력을 보임. 가장 애착이 가는 곡으로 난도 높은 필인이 나오는 곡을 선정하고, 필인을 소화하기 위해 가장 많은 노력을 기울였기 때문이라는 이유를 밝히며 어려운 곡도 끝까지 완수하고자 하는 자기관리 역량을 보여줌.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 다양한 스포츠 장비의 과학적 발전 상황을 이해했으며, 과학 기술의 개입이 선수들의 경기 능력에 큰 영향을 주는 것은 스포츠 문화의 본질에 맞지 않는다고 생각하여 스포츠 장비의 과학 기술 발전은 기술 도핑이며 도입에 반대한다는 견해를 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 활발한 의사소통과 수비 압박 및 공격 전환에서 빠르다는 강점이 있지만, 패스 연결이 다소 불안하다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 득점에 성공했을 경우와 실수한 상황이라도 서로 응원할 수 있는 팀 문화를 만들며 자신만의 필승 전략을 세움. 디스크의 비행궤적을 이해하고 득점 연결을 할 수 있는 공간에 위치함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 패스 기능 연습을 통해 언더핸드 패스 및 오버핸드 패스 기능 수행 능력이 향상되어 실제 경기 상황에 적용하는 모습을 보임. 경기에서 팀 수비에 적극적으로 참여하며 팀원들의 협동이 중요하다는 점을 배웠다는 소감을 밝힘.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"밝고 긍정적인 성격을 지닌 학생으로 애교가 넘치며 발랄한 모습으로 생활해 주변 사람들을 기분 좋게 만드는 학생임. 순수하고 정직한 성격을 지녔으며 언제나 솔직한 모습으로 주변인을 대하는 모습이 인상 깊음. 예술적인 감각이 뛰어나고 디자인이나 꾸미기에 관심을 갖고 있어 물건이나 공간을 자신만의 섬세하고 창의적인 아이디어로 꾸며냄. 다양한 분야에 호기심이 가득하며 좋아하는 일에 있어서는 집중력도 뛰어나기 때문에 스스로 하고자 하는 것에 진지하게 임한다면 자신만의 길을 찾아 발전할 가능성이 높은 학생임."},{"y":2,"b":"야무지고 자기주장이 분명한 성격으로 자신의 생각과 의견을 상황에 맞게 조리 있게 표현할 줄 아는 학생임. 진로 방향을 결정하기 위해 자신의 적성과 흥미를 깊이 탐색하는 모습을 보임. 특히 위탁과정에 참여할지에 대해 결정하는 과정에서 담임교사와 여러 차례 진로 상담을 진행하는 등 신중하게 고민하는 자세를 보임. 상담 과정에서 단순한 선호가 아닌 직업의 특성과 요구 역량, 향후 진로 경로까지 폭넓게 고려하며 숙고하는 모습에서 진로에 대한 진지함과 책임감이 엿보임. 충분한 고민 끝에 미용 분야 위탁과정 참여를 결정한 이후에는 스스로 선택한 진로에 대한 책임감을 바탕으로 높은 몰입도를 보이며 학습에 임함. 특히 관련 전공 이론 학습에 성실히 참여하여 미용 관련 전문자격에 도전하여 성과를 내는 등 목표 달성을 위해 꾸준히 노력하는 태도가 인상적임. 또한 함께 위탁과정에 참여하는 같은 반 친구가 교통사고로 입원하자 친구의 안부를 걱정하고 친구를 대신해 학교에 제출해야 할 여러 가지 서류를 챙겨주는 모습에서 주변을 세심하게 살피고 배려하는 따뜻한 인성을 지니고 있음이 엿보임."}]},{"name":"민병철","seat":7,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":4,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":3,"s":1,"g":6,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":2,"n":"한문I","c":"기가/제2외"},{"y":1,"s":2,"g":4,"u":2,"n":"한문I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":4,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":4,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":3,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"음악","c":"예술","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"음악","c":"예술","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":1,"g":4,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":4,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":3,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":3,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":4,"u":4,"n":"영어I","c":"영어"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로와 관련된 책 읽기를 학습한 후 '치과 의사, 치의학 메디컬'을 읽고 독후감을 작성하며 체계적으로 문단을 구성하는 글쓰기 능력을 보여줌. 인상 깊은 문장과 새롭게 알게 된 내용을 중심으로 논리적으로 내용을 전개하였으며, 발표에서는 시각 자료와 동영상을 활용해 주요 개념을 알기 쉽게 설명하고 퀴즈를 통해 청중과 소통하며 이해를 확인하는 등 뛰어난 발표 역량을 발휘함. 독서를 통해 치과 의사에게 필요한 유연성과 창의력을 깨닫고, 직업 선택 시 적성과 가치가 중요하다는 점을 깊이 인식하며 성찰하는 모습을 보임. 국어와 통합 사회 융합 프로젝트에서 '의대 정원 확대'를 주제로 비평문을 작성하며, 수도권 외 지역의 의사 부족과 과도한 업무로 인한 무기력 문제를 분석함. 이러한 상황이 의료 서비스 질 저하로 이어지고 있음을 지적하며, 의사 근무 여건 개선과 전국적인 의사 인력 확충의 필요성을 강조함. 보건 관련 기관의 설문조사를 근거로 의대 정원을 최소 천 명 이상 확대해야 한다고 주장하고, 지역별 의사 배치 조정 및 농어촌 의사에게 장학금, 보조금, 세금 감면 등의 혜택 제공 방안을 제시함. 전국적으로 균등한 의료 서비스 제공과 진료 형태 개선의 필요성을 강조하며 설득력 있는 논의를 전개함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"독서논술형 평가에서 '잡아라 식과 그래프'를 읽고 고등학교 1학년 수학 교과에 등장하는 정비례, 반비례, 일차함수, 이차함수, 유리함수, 무리함수, 일대일 함수, 일대일 대응 등 함수와 관련된 모든 단원들에 대해 탐구함. 개념들의 연계성을 보다 체계적으로 이해하기 위해 각 단원들의 중요 내용들을 마인드맵의 형태로 정리함. 수학 탐구 보고서 작성에서는 산에 오를 때 발생하는 고산병 증상에 대해서 기체의 압력과 부피의 관계를 이용하여 분석함. 기압과 부피의 관계가 기압이 낮아질수록 부피가 증가하는 형태의 유리함수 그래프로 표현됨을 이용하여, 기압이 낮아지면 혈액 속 산소량이 왜 감소하게 되는지를 분석하여 고산병 증상이 나타남을 설명함. 이 활동을 통해 학문 간 융합적 사고와 응용의 중요성을 느끼고 수학이 다","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"뇌와 유전자 도핑의 복잡성과 이를 탐지하고 예방하기 위한 첨단 기술의 중요성을 분석함. 스포츠의 공정성과 선수 건강을 보호하기 위해 연구기관 도핑 컨트롤 센터가 수행하는 첨단 도핑 검사 기술과 국제적 협력의 역할을 탐구하고, 크리스퍼 유전자 가위 기술과 인공지능 분석을 포함한 최신 기술의 도입이 스포츠계에 미친 긍정적 영향을 논리적으로 서술함. 또한, 도핑 문제의 역사적 배경과 현황을 심도 있게 탐구하며, 뇌 도핑과 유전자 도핑의 윤리적 문제와 스포츠 공정성 훼손 가능성을 강조함. 이를 바탕으로 첨단 기술 발전과 국제적 협력을 통해 깨끗하고 공정한 스포츠 환경 조성을 위한 노력의 필요성을 강조하며, 도핑 방지를 위한 구체적 실행 방안과 사회적 인식 개선 방향을 제안함. 도핑 문제에 대한 과학적 접근과 공정성 유지의 중요성을 이해하며 관련 과제에 대한 지속적 관심과 탐구를 이어가는 태도를 보여줌.","c":"양한 분야에서 실질체육"},{"y":1,"t":"세부능력및특기사항","b":"긍정적인 에너지로 주변 친구들에게 즐거움과 희망을 불어넣으며, 학급 분위기를 밝고 건강하게 만들어 높은 공동체 역량을 지닌 모범적인 학생임. 칼림바 연주곡 중 '사랑의 기쁨'을 선택하여 연주함. 멜로디 및 3, 6도 화음 연주 등 곡의 특성에 맞는 주법을 활용하며 세부 표현을 정확히 구현함. 보이는 라디오 활동에 디스크자키 역할을 맡아 '웃음이 필요해'라는 제목으로 발표함. 모든 과정에 주도적으로 참여하며, 재미있는 라디오가 되도록 참신하고 창의적인 아이디어를 제시함. 친구들과 끊임없이 소통하며 의견을 조율하고 원활한 진행을 하고자 조율하는 모습이 인상적임. 매우 밝은 분위기로 디스크자키의 역할을 맡아 사연에 맞는 성대모사를 하는 등 학급 친구들에게 매우 큰 즐거움을 줌. 적절한 배경음악으로 즐거운 분위기를 표현하며 라디오 중간 실제 광고와 같은 내용을 추가하며, 전화 연결음으로 실제 전화 연결하는 것처럼 연출하며 창의적으로 발표함. 음악 독서 활동에서 자신의 힘든 삶을 음악으로 아름답게 승화시키고 어려움을 극복하고자 노력한 슈베르트처럼, 자신도 힘든 일이 있을 때 자책하는 것이 아니라 잘하는 점을 통해 이겨나가고 싶다고 소감을 작성함.","c":"음악"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 아비투스의 개념을 바탕으로 언어 자본이 사회적 계층 형성에 미치는 영향과 소통의 윤리적 측면을 깊게 고찰함. 특히 '언어와 사회적 지위'에 대한 질문의 답변이 인상적임. 언어가 사람을 만든다는 책의 구절을 인용하면서 전문적인 표현과 세련된 말을 사용하는 사람을 지식인 상류층으로, 천박한 말투를 사용하는 사람을 하류층으로 인식하는 현실을 언급함. 처한 환경에 따라 교육 수준, 가정 환경의 차이가 있기 때문에 언어가 사회적 지위를 나타내는 표식이 될 수밖에 없다고 분석함. 이로 인해 사회적 격차가 재생산 될 것이라는 결론을 내려 책을 통해 우리 사회를 비판적으로 이해할 수 있는 독서 역량을 성장시킴. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 특히 바람직한 소통 방법을 묻는 질문에 대한 답변이 인상적임. 의견을 확고하게 전달해 언어적 공간을 확보하면서도 타인을 존중하는 방법으로 '나-전달법' 활용을 제안함. 이 과정에서 책의 내용을 바탕으로 자신만의 의견을 제안할 수 있는 창의적 독서 역량을 갖춘 독자로 성장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"수업 태도가 진지하고 학습 의욕이 높은 학생이며, 꾸준한 독서로 배경지식이 풍부해 글에 드러나지 않은 의미를 추론해내는 능력이 뛰어남. 소설 서평 쓰기 활동에서 'trs가 돌보고 있습니다(김혜진)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 로봇 trs가 저지른 살인은 누구에게 책임을 물을 수 있는지에 대해 서로의 의견을 나눔. 책대화 내용을 바탕으로 '차가운 손길의 손을 잡다'라는 제목의 서평을 작성함. AI가 의료사고를 낸 사례를 먼저 제시한 후 소설 내용과 연결시키고 인간이 기술에 대해 어떤 책임을 져야하는지 다각도로 분석한 완성도 높은 글을 씀. 글의 흐름이 매끄럽고 체계적으로 구성되어 있어 논리성이 돋보임. 시 처방하기 활동에서 연애 고민을 담은 친구의 편지를 읽고 시 '사진을 찍으며(나태주)'를 처방해 발표함. 기다림까지 행복이라 여기는 화자의 태도를 설명하며 친구를 위로하고 공감해주는 모습으로 따뜻한 문학적 소통 역량을 발휘함. 발표 준비 과정에서 교사의 피드백을 구하고 수정하는 적극적인 모습을 보였으며, 완성도 높은 발표를 진행해 청중에게 좋은 평가를 받음. \n\n수학Ⅰ: 사인함수의 그래프와 삼각형의 존재 조건을 이용하여 자연수의 최댓값을 구하는 문제를 풀이하고 그 과정을 발표함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"매시간 교사의 설명을 경청하고 시범 연주에 집중하며, 성실한 태도로 임하는 모습이 모범적인 학생임. 우쿨렐레 연주 활동에서 모르는 점이 생기면 교사에게 적극적으로 질문하고 개별 점검을 요청하는 등 능동적인 자세를 보여줌. 수업 시간 외에도 아침과 점심시간, 쉬는시간 등을 활용하여 연습하는 노력이 인상적임. 힘 있는 음색과 빠른 코드 변환을 위해 노력하고, 타브 연주에서 손가락의 이동이 유연하도록 꾸준히 연습함. 그 결과, 이전보다 향상된 실력을 보여주며 악곡의 음악적 특징을 안정적으로 소화함. 드럼 연주 활동에도 성실히 참여한 학생으로, 어려운 부분은 친구들의 연주를 관찰하며 개선해 나가고 누구보다 열정적으로 임함. 기본기에 집중하며 정확한 타점으로 깨끗한 음색을 내고자 노력하고, 킥 연주 자세를 올바르게 갖추기 위해 연습함. 그 결과, 올바른 주법으로 악곡의 음악적 특징을 능숙히 소화하며 노력이 엿보이는 연주를 선보이고, '박자가 안정적이고 필인을 잘 소화한다'라는 긍정적인 동료평가를 받음. 수업 이후 음악을 감상할 때 이전과 달리 드럼 소리에 귀 기울이며 연주 리듬을 파악하고, 악기 간 조화를 느끼게 되었다는 소감을 남기며 음악적 감성 역량이 한층 확장되었음을 드러냄.","c":"주음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 탄소섬유 강화 플라스틱 소재의 자전거 휠세트가 경량화와 강성을 동시에 확보하여 선수의 가속력과 항속 성능을 극대화하는 사례를 제시함. 과학 기술의 발달을 스포츠 정신의 훼손이 아닌 인간","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 축구와 배구 등 현대 스포츠에 도입된 비디오 판독 시스템(VAR)의 다각적 효과를 탐구함. 첨단 미디어 기술을 활용한 판독이 오심을 획기적으로 개선하여 경기의 공정성과 판정의 신뢰도를 높인 기술적 순기능을 분석함. 반면, 판독 과정에서 발생하는 잦은 경기 중단이 시합의 흐름을 끊고 관객의 몰입도를 저해한다는 스포츠 산업적 양면성을 규명함. 결과적으로 기술적 정확성이 스포츠의 신뢰를 담보하는 핵심 동력임을 파악하고, 향후 공학적 알고리즘 고도화를 통해 신속성을 확보함으로써 경기의 박진감과 공정성 간의 역학적 균형을 이루어야 함을 도출함.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"동료평가에서 '친절한', '열정적인', '성실한' 친구 부분에서 압도적인 지지로 선정될 만큼 학우들과 선생님에게 인정받음. 듬직하고 태도가 정중하여 급우들 사이에서 신뢰감이 가장 높음. 자신의 이야기를 하기보다는 급우의 학업 문제나 교우 관계 문제 등에 대하여 잘 들어주고, 공감해 주는 모습이 탁월함. 학교, 학급의 규칙을 준수하는 모습은 전교생의 본이 되며, 학급 조회 20분 전에 자유롭게 진행되는 '인성 블록 쌓기' 활동에 미리 책을 준비하고 분위기를 조성하는데 자원하는 모습을 1년 동안 보여줘 격려함. '절대 졸지 않는 친구'라는 피드백을 학우들로부터 받을 만큼 모본이 되는 학업 의지로 수업에 참여함. 사교육에 의지하지 않고 교내 심화 자기주도학습 프로그램(2024.03.04.-2025.02.28.)에 참여해 633시간 이상 참여하며 진로를 위해 늦은 밤까지 노력하는 모습이 돋보이며, 친구들과 시험 준비 중 질의응답을 통해 학습 내용을 깊이 내재화함. 학습이 부진한 친구들에게 멘토로서 역사 과목을 친절히 가르치며, 멘티의 마음을 세심히 배려하는 모습으로 진정성을 발휘함. 음악적 재능을 발휘해 축제에서는 비트박스 공연, 합창단원으로는 채플과 음악회(10회 이상)에서 아름다운 선율로 감동을 선사함."},{"y":2,"b":"많은 교과 교사에게 학급을 대표하는 훌륭한 학생으로 꼽힐 정도로 언행이 단정하고 예의 바르며 타인에 대한 깊은 배려심을 보여주는 학생임. 학년 초 전학을 왔음에도 누구에게나 상냥하게 대하고 진심 어린 모습을 보여 많은 친구들에게 인기를 얻었으며, 수학여행과 축제 무대에서는 숨겨둔 끼를 발산하여 환호를 받는 등 유쾌한 에너지를 겸비한 다재다능한 인재임."}]},{"name":"박성윤","seat":8,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":5,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":6,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":3,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":4,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":4,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"포기하지 않는 긍정적이고 적극적인 학업 태도가 눈에 띔. '미적분으로 바라본 하루'를 읽고 관심 분야를 깊게 탐구하며 일상 속 정말 사소한 것들조차도 수학 개념과 연관되어 있음을 깨닫고 즉문즉답 활동을 함. '미적분이 우리의 일상생활과 다양한 현상을 이해하는 데 어떤 도움을 줄까?'를 질문해 친구들이 평소 생각하지 못했던 사고를 할 수 있도록 유도하는 등 독서의 가치를 체득한 모습을 보임. 수업을 통해 깊은 인상을 받은 '일제 강점기 시대를 살아간 평범한 사람들의 저항 의지'가 한국사 시간에 배운 일제 강점기의 토지 조사 사업, 산미 증식 계획과 관련이 있음을 발견하여 이기영 작가의 '고향'을 통해 해당 역사적 맥락에 대해 탐구함. 이를 바탕으로 식민지 시대 농민의 고통과 투쟁, 단결과 갈등을 하나의 큰 역사적 사건이 아닌 일반 사람들의 시선으로 볼 수 있다는 점을 깨닫게 되어 미시적 역사의 기록으로서 문학이 중요하다는 점을 중심으로 보고서를 작성함. 또한 작가나 작품 속 인물의 시각으로 일기 형식의 글을 써보는 것이 문학을 잘 이해하는 방법이 될 것 같기에 앞으로 이러한 활동을 해보고 싶다고 밝히는 등 작품과 현실을 연결하며 배움의 깊이를 확장하고자 하는 태도와 융합적 사고가 우수함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"문제를 해결할 때 정형화된 풀이에서 벗어난 자신만의 독창적인 풀이를 소개하기를 즐겨 하는 학생으로, 1학기 수학학습지원단으로 활동하면서 보충 학습지의 문제를 다양한 시각으로 접근해 풀이한 우리반 해설지를 제공해 급우들에게 좋은 반응을 얻음. 원의 접선의 방정식을 구하는 법을 소개하는 수학 카드 뉴스를 제작함. 판별식을 이용한 원과 직선의 위치 관계를 파악하여 접선의 방정식을 구하는 상황을 만화로 그리고, 기울기가 주어졌을 때와 원 위의 한 점이 주어졌을 때 원점을 중심으로 하는 원의 접선의 방정식을 구하는 공식을 정확하게 유도함. 바퀴가 굴렀을 때 바깥쪽 원과 안쪽 원이 이동한 거리가 같다고 할 수 있을지 의문이 생겨, '바퀴의 역설'을 주제로 자유 주제 탐구 프로젝트에 참여함. 기존에 가지고 있던 자신의 생각이 바깥쪽 원 위의 점과 안쪽 원의 점이 일대일 대응일 것이라는 오해에서 비롯된 것임을 소개하고, 바퀴의 모양이 삼각형일 때로 가정하여 바깥쪽 삼각형과 안쪽 삼각형 위의 한 점이 구르는 동안 실제 이동한 궤적을 표현하면서 점프의 원리를 설명해 급우들의 이해를 도움. 이를 확장하여 원은 무한개의 각으로 이루어져 있다고 볼 수 있다는 점을 이용해 역설을 증명해냄.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"주장하는 글쓰기 활동에서 '수학 교육은 살아가는 데 반드시 필요하다'는 주제로 글을 완성함. 수학이 보편적 언어로 다양한 분야에 활용되며, 논리력과 정보 처리 능력을 키운다는 근거를 논리적으로 제시함. 과학과 수학의 활용, 미적분으로 인한 수학의 발전, 자기 이해의 중요성, 협력과 사회적 기술 교육의 필요성 등의 지문을 선택해 주제문, 제목 등을 영어로 정확하게 작성함. 지식품앗이 활동에서 뇌의 가소성에 대해 발표하며 개념, 관련 연구, 실생활 연관성을 설명함. 폭넓은 배경지식과 핵심 내용을 담은 시각 자료와 철저한 준비가 돋보임. 차별을 주제로 한 The Elephant Man과 Night를 읽고, 줄거리 요약, 제목의 의미, 인상 깊은 장면과 그 이유, 독서 후 변화된 관점을 포함한 독서 일지를 작성함. 종교, 인종, 장애로 인해 차별받은 주인공의 사례를 현대에서 일어난 사건과 연결해 이러한 차별이 여전히 존재함을 강조함. 다양한 사례를 조사해 차별의 부당성을 논리적으로 뒷받침하며 설득력 있는 영어 에세이를 작성함. 직소모형을 활용한 거꾸로 수업에서 디딤영상을 반복 시청하고 미리 연습하는 책임감을 보여줌. 수업을 거듭하며 내용 전달력이 향상되었다는 모둠원들의 평가를 받음.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"전근대 한국사를 학습하면서 서경으로 삼았던 평양의 현재 모습, 거란과의 협상 성공 이외 서희의 업적 등을 묻는 호기심 일지를 작성함. 호기심 질문 중 '14세기 원이 쇠퇴한 이유'를 탐구 주제로 선택하여, 제위 계승을 둘러싼 귀족들 간의 권력 다툼이라는 정치적 측면과 근거지인 몽골 초원의 유지라는 지리적 측면 등의 이유로 원이 쇠퇴하였음을 정리함. 활동","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기 중 수비 실수를 한 동료에게 괜찮다고 먼저 이야기하며 배려하는 모습을 통해 관용을 베푸는 모습을 보임. 탁구 경기에서 높은 집중력과 경기 몰입도를 바탕으로 서브에 대한 리시브가 안정적이며 포핸드 및 백핸드의 다양한 스트로크를 자유자재로 구사함. 티볼 경기 상황을 판단하는 시야가 넓고 글러브와 공을 다루는 능력을 바탕으로 수비 상황에서 정확한 패스를 연결하여 경기를 주도적으로 이끌어감. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 진취적인 성격을 바탕으로 먼저 앞장서서 솔선수범하며 조직이 위기에 처했을 때 적극적으로 소통하여 해결책을 제시하는 리더가 되고 싶다는 다짐을 발표하여 친구들의 호응을 얻음.","c":"을 통해 아운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"수업에 임하는 자세가 진지하고 모든 활동에 주도적으로 참여하는 모습이 돋보임. 생활 속 음악 중 우리나라 대중음악의 장르를 조사하는 활동에 참여함. '랩'은 '힙합'과 다르게 보컬 형식을 띠며 독특한 라임과 흐름이 특징이라고 활동지를 작성함. 좋아하는 악곡의 가사를 읽고, 가사의 내용이 자유와 희망을 향한 갈망과 모든 역경을 극복하는 과정을 담고 있다고 정리하여 친구들과 공유함. 교과서에 수록된 '오! 샹젤리제'를 부르면서 합창의 형태에 대해 조사하여 이해하기 쉽게 정리한 후 활동지를 작성함. 칼림바는 소리가 맑고 부드러워 듣기에 좋고 쉽게 배울 수 있는 장점이 있는 악기라고 소개함. 칼림바를 처음 연주할 때는 음과 음을 연결하는 부분이 어려웠고, 건반의 위치를 찾는 데 시간이 오래 걸렸지만 연주하면서 건반의 위치가 익숙해지고, 음을 연결하여 소리 내는 연습을 통해 곡의 완성도가 높아지면서 연주에 즐거움을 찾게 되었다고 소감문을 작성함. 우쿨렐레를 연주할 때 운지법이 정확하며 악곡의 흐름을 파악하여 맞는 리듬을 선택한 후 연주하는 능력이 뛰어남.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"지승공예로 컵 받침을 제작하는 활동에서 자신의 이름 중 모음을 활용하여 디자인한 후 작품을 제작함. 한지를 끈으로 제작하는 과정이 어려웠지만 끝까지 포기하지 않고 작품을 완성하는 모습에서 끈기와 성실함이 엿보임. 수업이 거듭될수록 한지를 끈으로 제작하는 기술이 능숙해졌으며 점점 속도가 빨라져서 자신도 보람을 느꼈다고 발표함. 오랜 시간 동안 작품을 제작하면서 전통공예의 소중함과 전통 기술 보존이 매우 필요함을 깨달았다고 작품 소감문을 작성함. 스무 살의 나의 하루를 주제로 그리는 활동에서 대학생이 되어 전공 수업을 들은 후 저녁에는 독서하고 기타 연주하는 모습을 상상하여 그림으로 표현함. 대학생이 되면 자신이 전공하는 학문 분야를 깊이 있게 공부할 수 있어서 매우 기대가 된다고 자신의 느낌과 생각을 친구들 앞에서 즐겁게 발표함. 친구들의 작품을 감상할 때도 유연하고 개방적인 태도를 보이며, 다른 사람의 작품 설명을 경청하는 등 미술 문화 이해 능력이 돋보임. 창조의 기둥 만들기 조별 활동에서 카프라를 활용하여 입체 조형물로 제작함. 주제를 정할 때 아이디어를 적극적으로 제시하였으며 모둠원과 협력하여 문제를 해결하는 등 도전정신을 보임.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '떨림과 울림(김상욱)'을 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 과학 이론을 인간의 삶과 의사결정 과정에 연결하여 심층적인 고찰을 수행함. 특히 과학적 관점에서 인간","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"수업 중 주어지는 과제를 완수하기 위해 꾸준히 연습하는 성실함이 돋보이는 학생임. 우쿨렐레 연주 활동에서 칼립소 리듬을 구사하며 코드를 자연스럽게 전환하기 위해 노력하고, 리듬에 생동감을 더하는 악센트 기법을 구현하기 위해 꾸준히 연습함. 그 결과, 올바른 자세와 주법으로 악곡의 리듬과 선율의 흐름을 안정적으로 표현함. 아르페지오 주법으로 연주한 발라드 곡의 학습 경험이 타브 연주 실력 향상으로 이어졌음을 밝히며, 특정 학습 경험을 다른 영역에 적용하는 창의·융합 사고 역량을 보여줌. 드럼 연주 활동에서 킥 타이밍을 맞추기 위해 노력하고, 더블킥과 필인 구간을 안정적으로 소화하기 위해 꾸준히 연습함. 그 결과, 안정적인 자세와 주법으로 악곡의 8비트 리듬과 필인을 소화했으며, 특히 스네어를 강하게 타격하여 명확한 음색을 표현함. '전체적인 자세나 박자 및 리듬이 안정적이고 깔끔하다'라는 긍정적인 동료평가를 받음. 연습용 패드와 실제 드럼의 구조적 차이를 인식하고, 이를 극복하기 위해 실제 드럼 배치를 상상하며 연습하였다는 성찰을 남기며 능동적 태도를 보여줌. 자신의 연주 과정을 성찰하고 문제 해결을 위해 연습 과정을 체계적으로 관리하는 자기관리 역량이 엿보임.","c":"의 자유 의지음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 상어 피부를 본떠 만든 수영복은 얇은 막과 같아 완벽에 가깝게 면도한 인체의 피부보다도 물의 저항을 감소시켜 경기기록 향상에 도움이 된 사례를 제시함. 과학 기술의 개입이 선수들의 경기 능력에 큰 영향을 주는 것은 스포츠의 본질에 맞지 않는다고 생각하여 규제해야 한다는 견해를 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 1 대 1 압박 수비 및 팀원 간의 단합력이 우수하다는 강점과 동료가 패스 주기 좋은 위치로 이동하여 디스크를 받는 움직임이 우수하여 다양한 전술 대형을 활용하는 모습이 돋보임. 승리하기 위한 전략을 구상할 때 일정한 거리를 유지하고 팀원 간의 대형을 유지하며 패스 플레이를 활용할 수 있는 자신만의 필승 전략을 세움. 중앙구역에서 수비 압박과 공격 속도를 적절하게 조율함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에 참여하면서 동료, 심판 등에 대한 예의범절을 지키는 태도를 이해하고 실천함. 모든 수업에서 성실하고 적극적인 자세로 참여하며 학습하고자 하는 의욕을 보이는 학생으로 경기에 대한 이해가 빨라 집중력 있게 수업에 임함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"무던한 성격의 소유자로 차분하고 여유로워 보이는 특유의 분위기와 위트 있는 언행에 본인만의 매력이 있어 호감을 불러일으키기에 대인 관계가 원만함. 현실적인 성격이지만 자신의 올바른 신념이 있기에 주변에 이 학생을 믿고 의지하는 친구들이 많고 친구들 사이에서 항상 연결점이 되어 준다는 평판이 있음. 조별 과제에서 어려움이 있더라도 자신의 역할을 끝까지 최선을 다해 수행하여 '일상에서의 책임감이 돋보이는 친구'로도 선정됨. 분리수거 청소를 맡아 힘들 법한데도 한 번도 게으름을 피우지 않았으며, 분리배출이 제대로 되지 않은 쓰레기는 직접 손으로 다시 분리배출하는 일을 꺼려 하지 않는 등 궂은 일을 할 때 머뭇거리지 않음. 심지어 자신의 청소가 다 끝나면 다른 친구들의 청소를 도와주기도 하는 등 이타심이 매우 돋보이는 학생임. 이렇듯 어떤 상황에서도 자신에게 주어진 일은 완수하며 요란하진 않지만 어디에서든 자신의 역할을 해내는 학급의 소금과 같은 존재임. 수학 교과를 가장 좋아하고 자신의 적성과 흥미에 확신을 갖고 있는 학생으로 지금과 같이 노력한다면 본인이 희망하는 교육 분야에서 자신의 역량을 발휘하면서 선한 영향력을 미치는 인재가 될 것임을 믿어 의심치 않음."},{"y":2,"b":"차분한 성향을 지녔으며 주변 친구들과 두루 원만한 관계를 유지하며 공동체 속에 조화롭게 어울리는 학생임. 평소 교사를 마주칠 때마다 항상 정중하게 고개 숙여 인사하는 예의 바른 모습이 매우 인상적임. 학급의 1인 1역할로 시험장 관리 도우미를 담당하여, 모의고사와 지필고사 때마다 교실 환경을 정비하고 정리하는 등 원활한 시험 운영 과정에 묵묵히 기여하는 책임감을 보여줌. 또한, 수학 분야에 대한 깊은 지적 호기심을 바탕으로 자기주도적인 학업 계획을 수립하고 본인의 진로를 주체적으로 탐색하며 설계하는 능동적인 태도가 돋보임. 방과후 자기주도학습에 성실하게 참여하였으며, 집중력을 발휘하여 본인만의 체계적인 학습 습관을 탄탄히 구축해 나감. 특히 여름방학 기간에도 자기주도학습에 자진 참여하여 학업에 대한 강한 의지와 흔들림 없는 근면함을 몸소 증명함. 급우들로부터 수업 시간의 집중도가 높고 학업 태도가 바르며, 어려운 수학 문제를 친절하게 설명해주는 친구라는 평가를 받음. 이처럼 뛰어난 학업적 몰입도와 타인을 배려하는 인성을 두루 갖춘 학생이기에, 현재의 노력을 지속한다면 다양한 역량을 발휘하는 인재로서의 성장이 기대됨."}]},{"name":"박준영","seat":9,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"과학과제연구","c":"과학","a":"A"},{"y":3,"s":1,"g":8,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":8,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":3,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":3,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":1,"s":2,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":3,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":1,"g":5,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"2학기 국어 부장으로 수업자료 관리와 더불어 수업에 적극적인 태도로 참여하여 수업 분위기 조성에 기여하는 등 책임감과 성실성을 보임. '별별 생물들의 희한한 사생활'을 읽고 관심 분야를 깊게 탐구하는 시간을 가짐. 동식물과 공존하지 않으면 인간 또한 멸종하게 될 것임을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '동식물을 보존하는 방법에는 무엇이 있을까?'를 질문해 친구들의 깊은 사고를 유도하는 등 독서의 가치를 체득한 모습을 보임. '모비딕'을 비롯한 다양한 문학 작품을 접하며 '자연과 인간'이라는 가치에 관심을 갖게 되어 '인간과 자연의 비밀 연대'를 읽으며 해당 주제 의식에 대해 탐구함. 이를 통합 과학 시간에 배운 생태 피라미드의 회복 개념과 연결하여 탐구하며, 자연은 스스로 회복할 수 있지만 인간이 그 과정을 기다리지 못하고 인공 조림을 조성하는 것이 오히려 생태계를 왜곡하는 잘못된 접근법임을 깨닫는 모습을 보임. 또한 생태계 보전에서 중요한 것은 인위적 개입이 아니라 자연과의 연대임을 발견하고, 이를 바탕으로 생태계 회복에 대해 더 조사해보고 싶다는 포부를 밝힌 보고서를 작성하고 발표함. 자기 주도적 탐구를 통해 자신의 관심사를 확장시켜 나가는 태도가 인상적임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"복잡한 다항식 문제를 풀이할 때 인수분해 공식을 활용하여 계산 과정을 간소화하고, 이러한 접근 방식을, 발표를 통해 공유하여 학우들로부터 긍정적인 평가를 받음.\n수업 시간에는 주어진 문제를 다양한 관점에서 해석하려는 시도를 통해 창의적 사고를 발휘하며, 그래프와 수직선을 활용한 문제 풀이에서는 꾸준한 연습으로 극복하며 풀이 능력을 향상시킴. 새로운 개념을 배우는 과정에서 발생하는 의문점을 적극적으로 질문하고, 이를 해결하기 위해 노력하는 모습이 인상적임. 이러한 태도는 수업 내용을 체계적으로 이해하고 응용할 수 있는 능력으로 이어져 앞으로 더욱 발전 가능성이 높은 모습을 보여줌.\n현실적 문제를 수학적 관점에서 접근하려는 태도 역시 돋보임. 기후 변화와 농업 생산성 감소를 주제로 한 탐구 과제에서 기초적인 선형 회귀 분석과 목적 함수를 활용하여 농업 수확량 예측 모델을 수립하며, 이를 실생활에 적용할 수 있는 가능성을 탐구함. 수학적 모델링을 활용한 효율적 자원 관리 방안을 제시하며, 제한된 자원을 효과적으로 활용하는 데 필요한 논리적 사고력을 발휘함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"체력 전 분야에 걸쳐 뛰어난 능력을 갖추고 있으며 체육교과에 대한 높은 흥미를 바탕으로 수업에 성실하고 열정적인 자세로 참여하여 긍정적인 수업 분위기 형성에 기여함. 탁구 경기 중 손목의 힘을 잘 이용하여 정확하게 자신이 목표하는 지점에 공을 보낼 수 있고 상대 선수들이 예측하지 못하는 지점으로 공을 보내는 능력을 발휘하여 득점력이 높음. 티볼 수비 연습을 충실히 참여하여 포핸드와 백핸드 그립을 전환하는 능력이 뛰어나며 캐치와 패스의 연결이 매우 자연스러움. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 이성적이고 날카로운 판단력을 바탕으로 모둠원들에게 시기적절한 피드백을 제공할 것이며 어려움에 부닥쳤을 때 합리적인 해결책을 제시하는 리더가 되고싶다는 포부를 밝힘. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 장애물을 어려움을 주는 걸림돌이라고 생각하지 않고 자신을 성장시키는 디딤돌로 여기며, 극복하기 위해 포기하지 않고 끝까지 노력하겠다는 다짐을 활동지에 충실히 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하는 활동과 가사의 의미를 생각하며 이야기를 만드는 활동에 적극적으로 참여함. '포크'와 '발라드'에 대해 조사하고, 악곡을 찾아 감상하며 느낀 점을 활동지에 작성함. 좋아하는 노래를 선정하여 전달하고자 하는 의미를 찾아 본인만의 생각이 담긴 이야기로 만들어 친구들과 공유한 후 소감을 작성함. 칼림바를 연주하면서 정확한 박자로 건반을 연주하는 부분을 잘했고 8분음표가 연속으로 나오는 부분의 리듬 연주가 미흡했지만 느린 속도로 반복하여 연습한 결과 만족할 만한 연주를 하게 되었다고 연습 과정을 활동지에 자세히 작성함. 우쿨렐레를 연주하면서 박자와 빠르기에 맞춰 코드를 바꾸는 부분을 잘했고, 악곡에 어울리는 리듬을 찾아 노래를 부르며 연주하는 활동에 적극적으로 참여하여 좋은 연주를 선보였다고 연주 후 소감을 작성함. 바로크 시대의 음악적인 특징을 조사하며 바흐와 헨델의 작품을 감상한 후 느낀 점을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"오일파스텔을 활용한 작품 제작하기 활동에서 클로드 모네의 '황혼, 베니스' 작품을 모작하고 자기 작품에 대한 애정과 열정을 다하는 모습이 뛰어남. 자신이 제작한 작품을 통해 모작한 작품의 가치를 분석하고 미술 문화에 대한 이해가 뛰어남. 분필을 조각하는 활동에서 자기 주도적으로 미술 학습을 진행하며 분필 조각 활동의 표현 과정을 계획하고 성공적으로 작품을 완","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '미세조류 바이오연료의 생산 과정과 기술적 난제'에 관한 글을 읽고 핵심 내용을 정리함. 바이오연료와 관련된 국제기구의 보고서를 추가로 조사하여 미세조류가 탄소 중립과 자원 확보를 동시에 달성할 수 있는 핵심 소재임을 재확인하여 기술함. 독서 후 '도시형 미세조류 탄소 흡수 패널'을 후속 탐구 주제로 제안함. 도심 공간에 설치된 패널이 이산화탄소를 저감하는 동시에 바이오디젤 및 플라스틱 원료를 생산하는 시스템을 아이디어로 제시하며 후속 탐구의 필요성을 강조함. 확장적 독서 활동에서 '거의 모든 물질의 화학(김병민)'을 발췌독한 후 비평문을 작성함. '지속 가능함'이라는 슬로건을 내건 기업들 중 친환경적 이미지를 마케팅 방법으로만 활용하는 기업들을 선별해 낼 수 있는 방법에 대해 고민한 후, 기업의 환경 친화 정책에 대해 정확하게 판단하기 위해서는 기업의 유통 구조에 대한 정확한 정보가 공유되어야 한다는 견해를 제시함. 또한 천연 물질과 합성 물질의 개발과 관련된 논의를 접하며 두 물질이 대립적 관계가 아닌 상호 보완적 관계임을 확인하게 되었다고 기술한 후, 두 물질이 환경에 미치는 부정적 영향을 염두에 두고 두 물질을 균형 있게 개발해야 한다는 주장을 펼침.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '노찬성과 에반(김애란)'을 읽고 비평 활동을 진행함. 작품을 이해하는 핵심어로 '책임'을 꼽으며, 작품의 주제와 인물의 행동을 '책임'과 관련지어 독서 일지에 기술함. '노찬성'이 '에반'의 고통을 줄여주고자 안락사를 시키려고 했던 것이 책임감과 연관되는지에 대해 고민해 본 내용을 모둠 책 대화 활동의 주제로 제시하였으며, 모둠원들의 다양한 의견을 청취한 후 병든 노견을 주인이 안락사 시키기로 한 것은 반려동물에 대한 책임을 다하는 행동이라고 결론 지어 서평에 제시함. 심미적 문학 체험 활동에서 진로에 대한 고민으로 힘들어하는 고민 대상자의 고민편지를 읽고 시 처방전을 작성함. 시 '어느 소나무의 말씀(정호승)'에서 전하고 있는 욕심 없는 삶의 철학을 소개하며 고민 대상자가 자신의 가치관을 제대로 정립한다면 현재의 복잡한 심정이 해소될 것이라는 내용을 시 처방전에 제시한 것에서 문학 작품을 통해 인간다운 삶을 가꾸고 가치관을 정립하려는 모습을 엿보임.\n\n수학Ⅰ: 수학이 실생활 속 경제 활동과 밀접하게 연결된다는 점에 주목하여 ‘수열, 일상을 계산하다’를 제목으로 한 수학 기사문을 작성함. 매달 일정한 금액을 저축하는 월급 모으기 상황을 등차수열로, 이자가 붙는 복리 저축을 등비수열로 모델링하여 비교 분석함. 각 수열의 일반항과 합 공식을 적용하여 장기적인 자산 증가 추이를 구체적으로 계산하고, 이를 시각적으로 표현함으로써 내용의 완성도를 높임. 수열의 수학적 개념을 실생활의 경제적 판단과 연계하여 창의적으로 활용했으며, 수","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"타교에 개설된 공동교육과정(과학과제 연구)을 이수함. 미생물과 인간 건강의 상관관계를 주제로 탐구함. 미생물이 인간의 면역 체계와 소화계에 미치는 영향을 다양한 자료를 수집, 분석하며 체계적으로 고찰함. 병원성 미생물과 유익한 미생물의 차이를 이해하고 장내 미생물 군집이 건강 유지에 미치는 역할을 정리함. 항생제의 사용과 내성 문제, 프로바이오틱스의 기능과 효과에 대해 심층적으로 분석하며 최신 연구 동향을 파악하고 이를 탐구 보고서에 반영함. 탐구 과정에서 국내외 학술 자료와 기사 등을 폭넓게 참고하며 미생물과 건강의 상호작용에 대한 융합적 시각을 기름. 보","c":"학적 사고과학과제 연구"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육 활동을 통해 과학 기술이 스포츠에 미치는 영향에 대해 깊이 있는 시각을 보임. 선수의 안전과 편안함을 위한 기술 발전은 긍정적으로 평가함. 반면, 기록 단축만을 위한 기술 개입에는 비판적 입장을 견지함. 스포츠의 본질과 인간의 도전에 대한 통찰력이 뛰어남. 운동신경이 뛰어나고 운동에 대한 태도가 적극적임. 수업 시간에 항상 집중하여 참여하며, 플라잉디스크의 과학적 원리를 이해하고 실제 활동에 적용하는 모습을 보임. 목표하는 방향으로 정확하게 던질 수 있으며, 동료와의 패스 능력이 우수함. 순발력과 상황 판단이 빨라 이동하는 디스크를 효과적으로 수비함. 빅발리볼의 기초 기능인 언더핸드와 오버핸드 토스의 자세와 수행 능력이 뛰어나며, 상위 기술에서도 쉽게 적용함. 숙달된 기술을 바탕으로 리그전에서 자신의 역할을 충분히 수행하여 팀에 기여하는 모습이 인상적임. 학급 리그전에서 팀의 주장을 맡아 팀을 항상 우승으로 이끌었으며, 상대팀에 대한 배려와 존중의 태도를 갖추고 있음. 이러한 태도는 향후 다양한 분야에서도 긍정적인 영향을 미칠 것으로 기대됨.","c":"고서 작성 과정에서체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 배구 경기 중 생긴 의문을 바탕으로 체공시간의 생물·물리학적 요인을 탐구함. 체공시간은 점프 순간의 수직 속도로만 결정된다는 물리 법칙을 이해하고, 높은 점프의 비결이 폭발적인 속근 발달, 힘줄의 탄성을 활용하는 신장-단축 사이클, 빠른 근섬유 동원 능력에 있음을 분석함. 나아가 실전 체공시간을 늘릴 훈련 방안으로 하체의 지면 반발력을 키우는 플라이오메트릭 훈련을 도출함. 근육과 신경계의 협응력을 높이는 역학적 접근의 중요성을 인지하며, 신체 한계를 극복하는 과학적 훈련 체계의 가치를 깨달음.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"주어진 역할에 최선을 다하며 책임감을 가지고 적극적으로 참여하는 모습이 돋보임. 맡은 임무를 성실히 수행하며, 어려운 상황에서도 해결책을 모색하려는 끈기를 보여줌. 학급 내 소통과 협력의 중요성을 인지하고, 구성원 간의 화합을 도모하며 긍정적인 환경 조성에 기여함. 동료들과 협력하여 학급 분위기를 밝고 활기차게 유지하려는 노력이 눈에 띔. 특히, 갈등 상황에서도 차분하게 문제를 해결하려는 태도와 타인을 배려하는 행동으로 주변 친구들에게 신뢰를 얻음. 학급 내 각종 활동에서도 적극적으로 참여하며 솔선수범하는 모습을 보임. 학급 구성원들이 원활하게 활동에 참여할 수 있도록 돕는 역할을"},{"y":2,"b":"보는 이에게 기분 좋은 에너지를 전하는 환한 미소를 지닌 학생으로 사람을 대하는 친근한 표정과 부드러운 말투가 특징적임. 주변에 늘 친구들이 모여 있으며, 특유의 편안함으로 친구들로부터 두터운 신뢰를 받음. 대화할 때 상대방과 눈을 마주치며 경청하는 자세를 보이며 상대의 감정을 정확하게 파악한 후, 상황에 맞는 적절한 리액션을 보여주어 함께 대화하는 사람에게 정서적 안정감과 즐거움을 선사하는 모습을 보임. 타고난 신체 조건과 탄탄한 체력을 바탕으로 각종 체육 활동에서 남다른 두각을 나타냄. 특히 교내 스포츠 한마당이나 체육 수업 등 경기 상황에서 지칠 줄 모르는 지구력과 포기를 모르는 끈질긴 승부욕을 발휘하여 팀의 활력을 주도하는 에이스로 활약함. 또한 자신이 맡은 일에 대해서는 요령을 피우지 않고 묵묵히 최선을 다하는 우직한 성품을 지님. 학급 공헌 프로젝트에서 칠판지기로 활동하여 매 쉬는 시간마다 칠판을 말끔히 닦아 쾌적한 수업 환경을 조성하는 등 보이지 않는 곳에서 학급을 위해 헌신함. 따뜻한 인성과 강인한 체력, 책임감을 두루 갖춘 인재로 장차 큰 성장이 기대됨."}]},{"name":"박현민","seat":10,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":7,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":7,"u":4,"n":"화법
