  '전과목_학년별가중': compute전과목,
  '전과목_학과별상이': compute전과목,
  '공통선택_전과목+진로선택_상위N': compute복합공통선택진로선택별도,
  '복합_공통선택전과목+진로선택_상위N': compute복합공통선택진로선택별도,
  '전과목+진로선택상위N': compute불명확,
  '전과목+진로선택상위N_계열별상이': compute불명확,
  '복합_학과별상이': compute불명확,
  '복합_전형별상이': compute불명확,
  '복합_전형별학과별상이': compute불명확,
  '전형별_상이': compute불명확,
  '유형비교_우수성적채택': compute불명확,
  '학과별_상이': compute불명확,
  '학과별_상이_복잡': compute불명확,
  '재검토_필요': compute불명확,
  '불명확_과목분류표만확인': compute불명확,
};

/**
 * 메인 진입점.
 * @param {Array} studentSubjects - 학생의 과목단위 성적 배열
 *   [{ 학년, 학기, 교과, 과목명, grade, achievement, unit, is_career }, ...]
 * @param {Object} ruleDict - NAESIN_RULES[대학명] 형태의 규칙 객체
 * @param {Object} achievementMap - 예: { A: 1, B: 3, C: 5 }
 */
function computeScore(studentSubjects, ruleDict, achievementMap = null) {
  const ruleType = ruleDict.규칙_종류 || '미분류';
  const handler = RULE_DISPATCH[ruleType] || compute불명확;
  const result = handler(studentSubjects, ruleDict, achievementMap);
  result.적용규칙타입 = ruleType;
  return result;
}

function esc(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function gradeColor(g) {
  if (g == null) return '#9B958A';
  if (g <= 2) return '#2E7D5B';
  if (g <= 3.5) return '#15827C';
  if (g <= 5) return '#C77B3C';
  return '#B14A36';
}

function judgeBand(diff) {
  if (diff <= -0.5) return { label: '안정', cls: 'badge-safe', color: '#2E7D5B' };
  if (diff <= 0.3) return { label: '적정', cls: 'badge-fit', color: '#15827C' };
  if (diff <= 1.0) return { label: '소신', cls: 'badge-bold', color: '#C77B3C' };
  return { label: '상향', cls: 'badge-reach', color: '#B14A36' };
}

function gaugePaths(value) {
  const cx = 130, cy = 130, r = 100;
  const pct = Math.max(0, Math.min(1, (value - 1) / 8));
  const start = Math.PI, ang = start + (0 - start) * pct;
  const polar = (a) => [cx + r * Math.cos(a), cy - r * Math.sin(a)];
  const arc = (a0, a1) => {
    const [x0, y0] = polar(a0), [x1, y1] = polar(a1);
    const large = Math.abs(a1 - a0) > Math.PI ? 1 : 0;
    return `M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`;
  };
  const [hx, hy] = polar(ang);
  return { bg: arc(start, 0), fg: arc(start, ang), hx: hx.toFixed(1), hy: hy.toFixed(1) };
}

// ── COMBO calculations ──
const COMBO_ORDER = ["전교과", "국수영사", "국수영과", "국수영사과", "국수영", "국영사", "수영과", "수과"];
const COMBO_LABELS = { 전교과:"전 교과", 국수영사:"국·수·영·사", 국수영과:"국·수·영·과", 국수영사과:"국·수·영·사·과", 국수영:"국·수·영", 국영사:"국·영·사", 수영과:"수·영·과", 수과:"수·과" };
const COMBO_SUBJECTS = {
  전교과: null,
  국수영사: ["국어","수학","영어","사회","한국사"],
  국수영과: ["국어","수학","영어","과학"],
  국수영사과: ["국어","수학","영어","사회","과학","한국사"],
  국수영: ["국어","수학","영어"],
  국영사: ["국어","영어","사회","한국사"],
  수영과: ["수학","영어","과학"],
  수과: ["수학","과학"]
};

function calcComboScores(student) {
  const graded = student.subjects.filter(s => s.g != null && s.g >= 1 && s.g <= 9);
  const result = {};
  for (const [combo, targets] of Object.entries(COMBO_SUBJECTS)) {
    const pool = targets ? graded.filter(s => targets.includes(s.c)) : graded;
    if (pool.length === 0) continue;
    let wsum = 0, wcnt = 0;
    pool.forEach(s => { wsum += s.g * (s.u || 1); wcnt += (s.u || 1); });
    result[combo] = wsum / wcnt;
  }
  return result;
}

// ── Calculations ──
function calcAvg(student) {
  const graded = student.subjects.filter(s => s.g != null && s.g >= 1 && s.g <= 9);
  if (graded.length === 0) return 0;
  let wsum = 0, wcnt = 0;
  graded.forEach(s => { wsum += s.g * (s.u || 1); wcnt += (s.u || 1); });
  return wsum / wcnt;
}

function calcSubjectAvgs(student) {
  const map = {};
  student.subjects.forEach(s => {
    if (s.g == null || s.g < 1 || s.g > 9) return;
    if (!map[s.c]) map[s.c] = { sum: 0, cnt: 0, wsum: 0, wcnt: 0 };
    map[s.c].wsum += s.g * (s.u || 1);
    map[s.c].wcnt += (s.u || 1);
    map[s.c].cnt += 1;
  });
  const result = [];
  for (const [k, v] of Object.entries(map)) {
    result.push({ name: k, avg: v.wsum / v.wcnt, count: v.cnt });
  }
  result.sort((a, b) => a.avg - b.avg);
  return result;
}

function calcSemesterTrend(student) {
  const map = {};
  student.subjects.forEach(s => {
    if (s.g == null || s.g < 1 || s.g > 9) return;
    const key = s.y + '-' + s.s;
    if (!map[key]) map[key] = { wsum: 0, wcnt: 0 };
    map[key].wsum += s.g * (s.u || 1);
    map[key].wcnt += (s.u || 1);
  });
  const keys = Object.keys(map).sort();
  return keys.map(k => ({ label: k, avg: map[k].wsum / map[k].wcnt }));
}

function gradesByYear(student) {
  const map = {};
  student.subjects.forEach(s => {
    if (s.g == null || s.g < 1 || s.g > 9) return;
    const key = s.y + '-' + s.s;
    if (!map[key]) map[key] = { wsum: 0, wcnt: 0, subs: [] };
    map[key].wsum += s.g * (s.u || 1);
    map[key].wcnt += (s.u || 1);
    map[key].subs.push(s);
  });
  return map;
}

// ── Naesin Engine ──
function runEngine(student) {
  if (typeof NAESIN_RULES === 'undefined' || typeof computeScore !== 'function') return [];
  const engineSubjects = student.subjects.map(s => ({
    학년: s.y, 학기: s.s, 교과: s.c, 과목명: s.n,
    grade: s.g, achievement: s.a || null, unit: s.u, is_career: !!s.ic
  }));
  const results = [];
  for (const [univKey, ruleDict] of Object.entries(NAESIN_RULES)) {
    try {
      const r = computeScore(engineSubjects, ruleDict, { A: 1, B: 3, C: 5 });
      if (r && r.환산등급 != null && !isNaN(r.환산등급)) {
        results.push({
          univKey,
          univ: ruleDict.대학명 || univKey,
          type: ruleDict.전형명 || '',
          score: r.환산등급,
          reliability: r.reliability || 'low',
          detail: r,
          ruleType: r.적용규칙타입 || ''
        });
      }
    } catch(e) {}
  }
  results.sort((a, b) => a.score - b.score);
  return results;
}

let favs = {};
try { favs = JSON.parse(localStorage.getItem('susiFavs') || '{}'); } catch(e) {}
function toggleFav(studentSeat, univKey) {
  const key = String(studentSeat);
  if (!favs[key]) favs[key] = [];
  const idx = favs[key].indexOf(univKey);
  if (idx >= 0) favs[key].splice(idx, 1);
  else favs[key].push(univKey);
  try { localStorage.setItem('susiFavs', JSON.stringify(favs)); } catch(e) {}
}
function isFav(studentSeat, univKey) {
  return (favs[String(studentSeat)] || []).includes(univKey);
}

// ── Build Roster ──
const rosterEl = document.getElementById('roster');
const searchEl = document.getElementById('rosterSearch');
const countEl = document.getElementById('rosterCount');
let selectedIdx = null;

function buildRoster(filter) {
  rosterEl.innerHTML = '';
  const q = (filter || '').toLowerCase();
  let count = 0;
  STUDENTS.forEach((s, i) => {
    if (q && !s.name.includes(q) && !String(s.seat).includes(q)) return;
    count++;
    const avg = calcAvg(s);
    const initial = s.name.charAt(0);
    const btn = document.createElement('button');
    btn.className = 'student-btn' + (i === selectedIdx ? ' active' : '');
    btn.innerHTML = `
      <div class="student-avatar">${esc(initial)}</div>
      <div class="student-meta">
        <div class="name">${s.seat}번 ${esc(s.name)}</div>
        <div class="grade-chip" style="color:${gradeColor(avg)}">${avg.toFixed(2)}</div>
      </div>
    `;
    btn.onclick = () => selectStudent(i);
    rosterEl.appendChild(btn);
  });
  countEl.textContent = count;
}

searchEl.addEventListener('input', () => buildRoster(searchEl.value));
buildRoster();

// ── Select Student ──
function selectStudent(idx) {
  selectedIdx = idx;
  buildRoster(searchEl.value);
  const student = STUDENTS[idx];
  const analysis = ANALYSIS[student.seat] || {};
  renderMain(student, analysis);
  localStorage.setItem('susi27_last', idx);
}

  // Alerts
  if (analysis.alerts && analysis.alerts.length > 0) {
    html += `<div class="glass"><h3>확인 필요 사항</h3>`;
    analysis.alerts.forEach(a => { html += `<div class="alert-item">${esc(a)}</div>`; });
    html += `</div>`;
  }
  html += `</div>`; // end score tab

  // ── Susi Tab ──
  html += `<div class="tab-panel" id="panel-susi">`;

  // Engine results + cutline comparison
  const engineResults = runEngine(student);
  const cutlineMap = {};
  CUTLINES.forEach(c => { cutlineMap[c.univ] = c; });

  // Compute stability distribution for ALL cutline results
  const allCutResults = [];
  engineResults.forEach(r => {
    const cut = cutlineMap[r.univ];
    if (cut) {
      const diff = r.score - cut.cutline;
      const band = judgeBand(diff);
      allCutResults.push({ ...r, cut, band, diff });
    }
  });
  const stabDist = { 안정: 0, 적정: 0, 소신: 0, 상향: 0 };
  allCutResults.forEach(r => { stabDist[r.band.label] = (stabDist[r.band.label] || 0) + 1; });
  const stabTotal = allCutResults.length || 1;

  // Search & filters + stability distribution
  html += `<div class="glass">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap">
      <div style="font-size:13px;font-weight:700">수시 탐색</div>
      <div style="font-size:11px;color:var(--muted)">전형 ${engineResults.length}건</div>
    </div>`;

  // Stability distribution bar
  if (allCutResults.length > 0) {
    html += `<div style="margin-bottom:12px">
      <div style="font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.3px">안정성 분포 (등급컷 대비)</div>
      <div style="display:flex;height:24px;border-radius:6px;overflow:hidden;margin-bottom:6px">`;
    const bandColors = { 안정: 'var(--green)', 적정: 'var(--blue)', 소신: 'var(--orange)', 상향: 'var(--red)' };
    for (const [label, count] of Object.entries(stabDist)) {
      if (count === 0) continue;
      const pct = (count / stabTotal * 100).toFixed(1);
      html += `<div style="width:${pct}%;background:${bandColors[label]};display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:700">${count}</div>`;
    }
    html += `</div>
      <div style="display:flex;gap:12px;font-size:10px">`;
    for (const [label, count] of Object.entries(stabDist)) {
      html += `<span style="color:${bandColors[label]}"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${bandColors[label]};margin-right:3px;vertical-align:middle"></span>${label} ${count}</span>`;
    }
    html += `</div></div>`;
  }

  // Search bar + filter buttons
  html += `<div class="search-bar">
      <input class="search-input" id="univSearch" placeholder="대학명 검색..." autocomplete="off">
      <button class="filter-btn active" data-filter="all" onclick="filterUniv(this)">전체</button>
      <button class="filter-btn" data-filter="fav" onclick="filterUniv(this)">즐겨찾기</button>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px" id="bandFilters">
      <button class="band-chip active" data-band="all" onclick="filterBand(this)" style="background:var(--cream);color:var(--sub)">전체</button>
      <button class="band-chip" data-band="안정" onclick="filterBand(this)" style="background:var(--green-light);color:var(--green)">안정</button>
      <button class="band-chip" data-band="적정" onclick="filterBand(this)" style="background:var(--blue-light);color:var(--blue)">적정</button>
      <button class="band-chip" data-band="소신" onclick="filterBand(this)" style="background:var(--orange-light);color:var(--orange)">소신</button>
      <button class="band-chip" data-band="상향" onclick="filterBand(this)" style="background:var(--red-light);color:var(--red)">상향</button>
    </div>
  </div>`;

  // Cutline comparison cards
  if (allCutResults.length > 0) {
    html += `<div class="glass"><h3>등급컷 비교</h3>`;
    allCutResults.sort((a, b) => a.diff - b.diff).forEach(r => {
      const favOn = isFav(student.seat, r.univKey);
      const diffSign = r.diff >= 0 ? '+' : '';
      html += `<div class="match-row" data-band="${r.band.label}">
        <span class="match-badge ${r.band.cls}">${r.band.label}</span>
        <div class="match-body">
          <div class="univ">${esc(r.univ)}</div>
          <div class="jeon">${esc(r.cut.type)} &middot; ${esc(r.cut.ratio)}${r.cut.suneung ? ' &middot; 수능최저 ' + esc(r.cut.suneung) : ''}</div>
        </div>
        <div class="match-num">
          <div class="big" style="color:${r.band.color}">${r.score.toFixed(2)}</div>
          <div class="unit">컷 ${r.cut.cutline} (${diffSign}${r.diff.toFixed(2)})</div>
        </div>
        <button class="fav-btn ${favOn ? 'on' : ''}" onclick="doFav(${student.seat},'${r.univKey}',this)" title="즐겨찾기">${favOn ? '★' : '☆'}</button>
      </div>`;
    });
    html += `</div>`;
  }

  // All university results with sort controls
  html += `<div class="glass"><h3>전체 대학 환산 결과 <span style="color:var(--muted);font-weight:400">(${engineResults.length}개)</span></h3>
    <div class="sort-controls">
      <button class="sort-btn active" data-sort="score" onclick="sortUniv(this)">등급순</button>
      <button class="sort-btn" data-sort="name" onclick="sortUniv(this)">이름순</button>
      <button class="sort-btn" data-sort="reliability" onclick="sortUniv(this)">신뢰도순</button>
    </div>
    <div class="scroll-table" id="univResultsWrap">
    <table class="g-table" id="univResults"><tr><th>대학명</th><th>환산등급</th><th>신뢰</th><th>규칙</th><th></th><th></th></tr>`;
  engineResults.forEach((r, i) => {
    const favOn = isFav(student.seat, r.univKey);
    const relColor = r.reliability === 'high' ? 'var(--green)' : r.reliability === 'medium' ? 'var(--orange)' : 'var(--muted)';
    const relOrder = r.reliability === 'high' ? 0 : r.reliability === 'medium' ? 1 : 2;
    html += `<tr class="univ-row" data-univ="${esc(r.univ)}" data-score="${r.score.toFixed(4)}" data-rel="${relOrder}">
      <td style="font-weight:600">${esc(r.univ)}</td>
      <td><span class="mono" style="font-weight:700;color:${gradeColor(r.score)}">${r.score.toFixed(2)}</span></td>
      <td><span style="font-size:10px;color:${relColor}">${r.reliability}</span></td>
      <td style="font-size:10px;color:var(--muted)">${esc(r.ruleType)}</td>
      <td><button class="dtgl" onclick="toggleDtl(this,${i})">상세</button>
        <div class="detail-box" id="dtl-${i}">${formatDetail(r.detail)}</div></td>
      <td><button class="fav-btn ${favOn ? 'on' : ''}" onclick="doFav(${student.seat},'${r.univKey}',this)">${favOn ? '★' : '☆'}</button></td>
    </tr>`;
  });
  html += `</table></div></div>`;
  html += `</div>`; // end susi tab

  // ── Record Tab ──
  html += `<div class="tab-panel" id="panel-record">`;

  if (student.records.length === 0 && student.opinions.length === 0) {
    html += `<div class="glass"><div class="empty"><div class="icon">&#x1F4CB;</div><p>생기부 기록이 없습니다.</p></div></div>`;
  } else {
    // Year sub-tabs
    const recYears = [...new Set(student.records.map(r => r.y))].sort();
    if (recYears.length > 0) {
      html += `<div class="glass">
        <div style="display:flex;gap:4px;padding:3px;background:var(--cream);border-radius:12px;margin-bottom:14px" id="recYearBar">
          <button class="rec-year-btn active" data-ry="all" onclick="filterRecYear(this)" style="flex:1;padding:7px 8px;border:none;background:var(--teal);color:#fff;font-family:inherit;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer">전체</button>`;
      recYears.forEach(y => {
        const cnt = student.records.filter(r => r.y === y).length;
        html += `<button class="rec-year-btn" data-ry="${y}" onclick="filterRecYear(this)" style="flex:1;padding:7px 8px;border:none;background:transparent;color:var(--sub);font-family:inherit;font-size:12px;font-weight:600;border-radius:9px;cursor:pointer">${y}학년 <span style="font-size:10px;opacity:.6">${cnt}</span></button>`;
      });
      html += `</div>`;

      // Record summary
      const typeMap = {};
      student.records.forEach(r => {
        const t = r.t || '세특';
        typeMap[t] = (typeMap[t] || 0) + 1;
      });
      html += `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">`;
      for (const [t, cnt] of Object.entries(typeMap)) {
        const tagColors = { '세부능력및특기사항': ['var(--blue-light)', 'var(--teal)'], '세특': ['var(--blue-light)', 'var(--teal)'], '자율활동': ['var(--green-light)', 'var(--green)'], '동아리활동': ['var(--purple-light)', 'var(--purple)'], '진로활동': ['var(--copper-light)', 'var(--copper)'] };
        const [bg, fg] = tagColors[t] || ['var(--cream)', 'var(--sub)'];
        html += `<span style="padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600;background:${bg};color:${fg}">${esc(t)} ${cnt}</span>`;
      }
      html += `</div>`;

      // Records grouped by year
      recYears.forEach(year => {
        const yearRecs = student.records.filter(r => r.y === year);
        html += `<div class="rec-year-group" data-ry="${year}">
          <div style="font-size:13px;font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--border)">${year}학년 세부능력 및 특기사항</div>`;
        yearRecs.forEach(r => {
          const tagColors = { '세부능력및특기사항': ['var(--blue-light)', 'var(--teal)'], '세특': ['var(--blue-light)', 'var(--teal)'], '자율활동': ['var(--green-light)', 'var(--green)'], '동아리활동': ['var(--purple-light)', 'var(--purple)'], '진로활동': ['var(--copper-light)', 'var(--copper)'] };
          const tName = r.t || '세특';
          const [tbg, tfg] = tagColors[tName] || ['var(--cream)', 'var(--sub)'];
          html += `<div class="rec-item">`;
          if (r.c) html += `<span class="rec-tag" style="background:var(--blue-light);color:var(--teal)">${esc(r.c)}</span>`;
          html += `<span class="rec-tag" style="background:${tbg};color:${tfg}">${esc(tName)}</span>`;
          html += `<div style="margin-top:6px">${esc(r.b)}</div></div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    }

    // Opinions
    if (student.opinions.length > 0) {
      html += `<div class="glass"><h3>행동특성 및 종합의견</h3>`;
      student.opinions.forEach(o => {
        html += `<div class="opinion-box">
          <div style="font-weight:700;margin-bottom:6px;color:var(--purple);font-size:12px">${o.y}학년</div>
          ${esc(o.b)}</div>`;
      });
      html += `</div>`;
    }
  }
  html += `</div>`; // end record tab

  // Footer
  html += `<div class="footer">
    학생 데이터는 브라우저 내에서만 처리되며 외부로 전송되지 않습니다.
    <button onclick="if(confirm('모든 로컬 저장 데이터를 삭제하시겠습니까?')){localStorage.clear();location.reload();}">데이터 삭제</button>
    &nbsp;&nbsp;
    <button onclick="window.print()" style="background:var(--teal-light);color:var(--teal)">인쇄</button>
  </div>`;

  el.innerHTML = html;

  // Wire up tab switching
  document.getElementById('tabBar').addEventListener('click', e => {
    if (!e.target.classList.contains('tab-btn')) return;
    el.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    el.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    e.target.classList.add('active');
    document.getElementById('panel-' + e.target.dataset.tab).classList.add('active');
  });

  // Wire up university search
  const searchInput = document.getElementById('univSearch');
  if (searchInput) {
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase();
      document.querySelectorAll('.univ-row').forEach(row => {
        const name = (row.dataset.univ || '').toLowerCase();
        row.style.display = (!q || name.includes(q)) ? '' : 'none';
      });
    });
  }
}

function formatDetail(d) {
  if (!d) return '';
  let s = '';
  for (const [k, v] of Object.entries(d)) {
    if (k === '적용규칙타입') continue;
    s += `<div><strong>${esc(k)}:</strong> ${esc(typeof v === 'object' ? JSON.stringify(v) : String(v))}</div>`;
  }
  return s;
}

function toggleDtl(btn, idx) {
  const el = document.getElementById('dtl-' + idx);
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? '닫기' : '상세';
}

function doFav(seat, univKey, btn) {
  toggleFav(seat, univKey);
  const on = isFav(seat, univKey);
  btn.textContent = on ? '★' : '☆';
  btn.classList.toggle('on', on);
}

function filterUniv(btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mode = btn.dataset.filter;
  if (mode === 'fav' && selectedIdx != null) {
    const seat = STUDENTS[selectedIdx].seat;
    document.querySelectorAll('.univ-row').forEach(row => {
      const univName = row.dataset.univ || '';
      const faved = (favs[String(seat)] || []).some(k => {
        return k === univName || univName.includes(k) || k.includes(univName);
      });
      row.style.display = faved ? '' : 'none';
    });
  } else {
    document.querySelectorAll('.univ-row').forEach(row => { row.style.display = ''; });
  }
}

function filterBand(btn) {
  document.querySelectorAll('.band-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const band = btn.dataset.band;
  document.querySelectorAll('.match-row[data-band]').forEach(row => {
    row.style.display = (band === 'all' || row.dataset.band === band) ? '' : 'none';
  });
}

function filterRecYear(btn) {
  document.querySelectorAll('.rec-year-btn').forEach(b => {
    b.style.background = 'transparent';
    b.style.color = 'var(--sub)';
    b.classList.remove('active');
  });
  btn.style.background = 'var(--teal)';
  btn.style.color = '#fff';
  btn.classList.add('active');
  const ry = btn.dataset.ry;
  document.querySelectorAll('.rec-year-group').forEach(g => {
    g.style.display = (ry === 'all' || g.dataset.ry === ry) ? '' : 'none';
  });
}

function sortUniv(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const mode = btn.dataset.sort;
  const table = document.getElementById('univResults');
  if (!table) return;
  const rows = Array.from(table.querySelectorAll('.univ-row'));
  rows.sort((a, b) => {
    if (mode === 'name') return (a.dataset.univ || '').localeCompare(b.dataset.univ || '');
    if (mode === 'reliability') return parseFloat(a.dataset.rel || 9) - parseFloat(b.dataset.rel || 9);
    return parseFloat(a.dataset.score || 9) - parseFloat(b.dataset.score || 9);
  });
  const parent = rows[0]?.parentElement;
  if (parent) rows.forEach(r => parent.appendChild(r));
}

// ── Restore last selection ──
const saved = localStorage.getItem('susi27_last');
if (saved != null && STUDENTS[parseInt(saved)]) {
  selectStudent(parseInt(saved));
}

</script>
</body>
</html>
