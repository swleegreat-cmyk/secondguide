자신의 의견을 반·비언어적 표현을 활용하여 효과적으로 전달함. 구체적으로 '군인'에 관심이 있는 학생이기에 이에 대해 자세히 다루고 있는 '바우트 원'을 선택해 읽음. 책을 통해 한국 군인들의 모습을 간접적으로 접하며 의지의 중요성을 재인식하고, 앞으로의 삶 속에서 소소한 역할이라도 책임감을 하며 살아가겠다는 다짐을 표현함. 또한 '어쨌든 날아오르라! 활주로만 벗어나면 그다음은 어떤 기류를 만날 지는 모","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 기능적 원리를 통해 탁구 서브, 리그전, 랠리 활동에서 이를 적용하는 모습을 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능을 집중력 있게 연습하여 좋은 기록을 보임. 경기 수행 능력이 우수하며 전술 이해도가 높음. 타격에서 배트의 타점을 이해하고 자신이 원하는 방향으로 타격함. 플라이볼의 낙하지점을 파악하여 실수하지 않고 포구하는 노력을 보여주며, 경기 상황에서도 뛰어난 포구능력을 보임. 경기 중 자신의 역할을 충실히 수행하려는 노력을 통해 팀워크의 중요성을 깨닫는 모습이 관찰됨. 스포츠 인성 수업 중 도전정신에 대해 목표를 이루기 위한 과정의 통해 포기하지 말고 자신의 목표를 다시 한번 생각하는 계기를 활동지에 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"좋은 소리로 칼림바를 연주하기 위해 여러 가지 방법을 시도하며 찾아낸 연주 기법을 친구들과 공유하고 정리하여 활동지를 작성함. 우쿨렐레를 연주할 때 쉬운 노래를 선택하여 반복하며 연습하고, 노래를 부르며 곡의 분위기를 살려 연주하려는 모습을 보임. 고전파 시대, 낭만파 시대의 음악적인 특징을 조사하여 정리함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"우리나라 전통공예인 지승공예 제작 활동에서 작품 기획할 때 밑그림을 열심히 그리고 자신의 이름에 있는 획으로 사람의 얼굴을 그려서 표현함. 자음과 모음을 활용하여 자신의 이름을 디자인하며 한글의 아름다움에 대한 인식을 확장하게 되었다고 활동지를 작성함. 종이를 끈으로 제작하는 과정이 처음에는 서툴렀지만, 끝까지 완성하는 모습을 보임. 예술의 정의에 관해서 토론하는 활동에서 예술이란 작가가 작품에 뜻을 담아 제작하거나 사람들이 작품을 보고 조금의 관심이라도 갖게 한다면 그것은 예술이며 사람이 아닌 인공지능이 제작한 작품 또한 감상자가 아름답다고 느꼈다면 예술이 될 수 있다고 자기 생각을 글로 작성함.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 10차시에 걸쳐 다양한 비문학 제재를 바탕으로 요약하기, 내용 구조도 정리하기 등의 읽기 전략을 활용해 사실적 독해를 수행하고자 노력함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 현대 사회에서도 소통 방식의 차이가 사회적 구조에 의해 만들어졌다고 주장하면서 상류층과 하류층의 언어 사용이 그들의 삶과 더불어 어떻게 형성되는지 타당한 근거를 바탕으로 제시함. 또한 바람직한 소통 방법에 대해 답변한 내용이 인상적임. 상대에 맞춰 자신의 말과 태도를 조절하는 '수용 감각'은 진정한 관계 형성에 도움이 된다고 주장함. 실제 자신의 대화 상황을 사례로 들며 상대방의 상황에 맞게 대화의 수준, 내용을 조절하는 것이 얼마나 중요한지에 대해 표현함. 이 과정을 통해 책의 내용을 바탕으로 자신의 의견을 논리적으로 개진하는 독서 역량을 발휘함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '노찬성과 에반(김애란)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 작성하며 책을 읽은 후 모둠 책대화를 통해 작품의 주제 의식에 대해 의견을 나눔. 시 처방하기 활동에서 짝사랑하는 상대에게 어떻게 다가가야할지 몰라 고민이라는 친구의 편지를 읽고 시 '그리움만 남아있어도(용혜원)'를 처방해 발표함. 사랑의 의미에 대해 이야기하는 시를 낭송하며 고민하는 친구에게 용기를 가지라는 응원의 메시지를 전함.\n\n수학Ⅰ: 지수함수가 감염병 확산, 금융 이자 계산 등 실생활에서 다양하게 활용된다는 점에 주목하여 수학 기사문을 작성함. 현실 문제를 수학적으로 해석하며 수학 개념의 실용성과 사회적 중요성을 인식하려는 태도를 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후 학습지를 작성함. 함수 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 최대 최소, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 제시한 명제가 참인지 거짓인지 판정하는 활동을 함.\n\n수학Ⅱ: 수업 전반에서 교실 규칙을 인식하고 이를 수용하며 조용히 학습 환경을 유지하려는 태도가 관찰됨. 교사의 지시에 대해 즉각 반응하며 요구 사항을 따르는 모습이 반복적으로 나타남. 읽기 자료를 활용한 수업 장면에서는 비교적 적극적인 모습을 보여, 자료를 큰 목소리로 또박또박 읽으며 반 전체가 내용을 인지할 수 있도록 도움을 줌. 발음이 정확하고 전달력이 있어 읽기 활동의 흐름을 안정적으로 이끎. 수업 중 자기 행동을 상황에 맞게 조절하며 공동체 내 질서를 유지하려는 모습이 지속적으로 관찰되어, 학습 태도의 변화 가능성은 열려 있다고 느껴짐.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"평가 과제나 프린트 학습 등 최소한의 활동을 통해 기본 개념을 확인하고, 쉬운 예제를 반복하며 기초적인 계산 과정을 따라가려는 모습은 부분적으로 관찰됨. 수학적 개념에 대한 관심은 뚜렷하지 않았으나, 실생활과 연관된 주제에서 흥미를 가질 가능성이 있으며, 향후 스스로의 학습 방식에 대한 점검과 동기 유발이 병행된다면 점진적 성장이 기대됨.\n\n영어Ⅰ: 지필고사에서 자신이 풀 수 있는 문제는 풀고자 노력하며 정답을 맞혔을 때 성취감을 느끼는 모습으로 보아, 영어 교과에 대한 적절한 공부 전략 및 노력이 수반된다면 큰 성장을 기대해 볼 수 있는 학생임. 'Wonder(R.J.Palacio)'를 4","c":"확률과 통계"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 새롭게 접한 코드를 숙지하기 위해 연습함. 어려웠던 점으로 코드 암기와 코드 변환을 선정하고, 이를 극복하기 위해 반복적으로 연습했다는 성찰문을 작성하며 자기주도적인 연습과정을 보여줌. 드럼 연주 활동에서","c":"회에 걸쳐 읽음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 운동 분석 소프트웨어가 골프 스윙의 궤적, 배구 서브의 타점, 축구 킥의 임팩트 각도 등을 정밀 분석하여 선수의 기량 향상에 기여하는 과정을 조사함. 모든 선수가 동등한 조건에서 과학기술이 적용된 도구나 장비를 사용한다면 공정한 경쟁을 도울 수 있다고 판단하여 기술 혁신을 찬성한다고 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 빠른 기동력과 위치선정이 탁월하여 원활한 경기 운영 능력에 강점이 있지만, 안정적인 패스가 엔드존 이전까지는 연결되나 최종에서 패스 실수가 발생하여 득점 기회를 놓치는 점을 인지하여 패스 캐치 집중력을 유지하고 움직임으로써 팀 조직력이 향상됨. 주 공격수로서 뛰어난 캐치 능력과 동료와의 매끄러운 패스 연결을 함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능 연습을 꾸준히 참여하여 경기 수행에 필요한 서브와 리시브의 기능 수행 능력이 우수함. 리그전 수행과정에서 경기력 향상을 위해 창의적 전략을 제시하고 팀원과 협력하여 다양한 전술연습을 실시하여 팀의 승리에 기여함.","c":"악기의 구조와 연주체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 운동생리학 및 스포츠 과학 진로와 연계하여 폭발적인 퍼포먼스의 원천인 속근(빠른 근육 섬유)의 특성과 발달 메커니즘을 탐구함. 스포츠 경기에서 폭발적인 움직임을 구현하고 운동 능력을 극대화하기 위해서는 속근의 발달이 필수적이며, 이는 단순한 근육량 증가를 넘어 신경근계의 반응 속도와 파워를 향상시키는 핵심 요소임을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"복도에서 마주치면 인사를 빠트리지 않으며 교사의 조언에 귀 기울이려 노력하는 학생임. 또한 마음이 통하는 친구들과 끈끈한 우정을 지니고 있으며 교사가 무거운 것을 들고 갈 때 멀리서도 다가와 대신 들어주는 등 자발적으로 협력하는 태도를 보임. 이처럼 타인과의 의리를 중요하게 여기며 기본 예의를 갖춰 늘 주변에는 많은 사람들이 있음. 기본적인 신체 능력이 출중해 축구 등 다양한 체육 분야에서 두각을 드러냄. 교과 성적은 다소 취약하나 학년 초 수업 시간에 보인 열의와 반짝거"},{"y":2,"b":"조용하고 차분한 성격이지만 친한 친구들과 함께면 밝고 활달한 모습을 보이며, 대화를 나누다보면 순수한 내면을 지녔음을 알 수 있음. 교사를 마주치면 멀리서도 웃으며 인사할 만큼 기본 예절이 바르고, 소수의 친구들과 깊고 진실된 우정을 나누며 주변 사람을 챙길 줄 아는 따뜻한 마음씨를 지님. 잦은 건강상의 문제로 등교에 어려움이 있었으나, 포기하지 않고 한 시간이라도 더 수업에 참여하여 학교생활을 이어가려는 의지와 노력을 보여주어 대견함. 자신이 맡은 청소 구역은 책상과 의자 밑 등 눈에 잘 띄지 않는 곳까지 묵묵히 쓸고 닦는 등 보이지 않는 곳에서 성실함을 발휘함. 평소 체육 활동에서 두각을 나타내고, 스포츠 한마당 행사에서 학급의 핵심 전력으로 활약하는 등 뛰어난 신체 능력을 보여줌. 학업 외적인 분야에서 자신의 길을 모색 중이며 진로 상담을 통해 자신의 적성을 치열하게 고민하고 있어, 이러한 고민의 나날들이 훗날 성장의 밑거름이 될 것임. 자신이 선호하는 활동에는 열정을 가지고 임하는 집중도를 보이므로, 향후 명확한 목표 의식을 가지고 정진해나간다면 더 훌륭히 성장할 가능성이 있음."}]},{"name":"정우철","seat":26,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":8,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":9,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":9,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":9,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":2,"g":9,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"발표하는 것에 어려움을 느끼자 꾸준히 연습하며 실수해도 괜찮다는 긍정적인 생각을 통해 자신감을 향상하고 두려움을 극복할 줄 아는 학생임. '호오포노포노 실천법'이라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 좋은 습관과 좋은 생각을 형성할 수 있는 방법과 실천의 중요성을 깨달았다고 밝힘. 이를 바탕으로 즉문즉답 활동을 하며 책의 주제와 자신의 삶에 대해 성찰한 내용을 설명함. 시조 '강산 죠흔 경을'을 내재적 관점과 외재적 관점에서 종합적으","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기의 모든 순간에 최선을 다하는 자세가 돋보이는 학생으로서 정확한 패스와 상황 판단 능력이 우수하고 투지가 좋아 팀의 분위기를 긍정적으로 이끄는 팀의 활력소 역할을 함. 티볼 경기 규칙에 대한 이해가 정확하고 경기에서 공격 상황에 대한 빠른 판단력을 바탕으로 주루 플레이를 긴밀하게 수행하여 득점으로 연결하는 능력이 탁월함. 탁구를 좋아하고 탁구의 규칙과 용어를 잘 알고 있으며 경기를 전체적으로 조율할 수 있는 능력이 뛰어나고 기초체력이 뛰어나 연습 시간 내내 쉬지 않고 경기에 임하는 적극성이 돋보임. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 긍","c":"로 감상하고운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 언어가 개인의 삶의 태도와 수준을 투영하여 사회적 지위를 나타내는 중요한 표식이 된다는 주장을 글에 담음. 어휘력이 부족하거나 거친 언어를 사용하는 것이 개인의 가치를 떨어뜨린다고 분석하고, 침착하게 말하는 습관이 인생의 가치를 높이는 핵심 자산임을 주장함. 특히 자신의 대화 방식을 반성하며 현재는 상대에 대한 존중을 바탕으로 친밀도에 따라 대화의 기준을 유연하게 조율하는 신중한 소통 태도를 정립했다고 밝힘. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 책에서 설명하는 '수용 감각' 개념을 활용해 바람직한 소통 방법을 제시한 점이 인상적임. 상대에게 자신을 맞추는 '수용 감각'을 배려의 도구로 인정하고, 자신의 강점과 진솔함을 잃지 않는 균형 잡힌 소통이 성공의 진정한 조건임을 역설함. 가족과의 갈등 상황에서 감정을 섞지 않고 존중하는 마음을 담아 '친절하면서도 단호한 언어'를 사용해 의견을 관철했던 실제 경험을 근거로 이성적 판단과 상호 배려가 조화로운 대화를 이끄는 열쇠임을 주장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '오직 운전하는 이들만이 살아남는다(박서련)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 작품의 주제 의식이 무엇인지에 대해 의견을 나눔. 책대화 내용을 바탕으로 '자신을 위한 거리 의식'이라는 제목의 서평을 작성함. 좀비가 창궐하는 극한 상황에서 주인공이 고군분투하는 내용을 바탕으로 인간과 인간 사이 신뢰의 중요성을 주제로 드러낸다는 자신의 의견을 제시함. 또한 좀비를 소재로 하는 다른 영화와 비교하면서 작품에 따라 주제가 어떻게 달라지는지 상세히 설명한 점이 인상적임. 시 처방하기 활동에서 자신의 진로 방향에 대해 부모님과 생각이 달라 고민이라는 친구의 편지를 읽고 시 '네가 있어(나태주)'를 처방해 발표함. 네가 있어 행복하다고 말하는 화자의 말을 언급하며 시를 통해 고민하는 친구에게 응원과 격려의 메시지를 전함. 적절한 보조 자료를 활용해 낯선 시를 친구들이 이해하기 쉽게 설명한 점이 돋보임.\n\n수학Ⅰ: 인공지능과 빅데이터 시대의 가속화 속에서 수학의 역할과 중요성에 주목하며 수학 기사문을 작성함. 수학이 인공지능 모델의 내부 구조를 설명하고 검증하는 핵심 도구로 활용되며, 수학적 알고리즘과 모델링이 데이터 처리 및 의사결정 과정에 필수적임을 설명함. 수학을 왜 배우는가에 대한 근본적인 질문에서 출발하여, 첨단 기술 사회에서 수학이 수행하는 실제적 역할을 탐색하며 수학 학습의 필요성과 가치를 스스로 성찰하는 모습을 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후, 학습지를 작성함. 함수의 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 진위 판정하는 활동에 참여함.\n\n수학Ⅱ: 수업 시간에 차분하고 온화한 태도로 임하며 친구들과의 관계도 원만하게 유지함. 수업 중 불필요한 소음을 내거나 분위기를 흐리는 행동 없이 교실 공동체의 학습 환경을 존중하는 모습이 지속적으로 관찰됨. 자신의 진로를 중심으로 학습의 우선순위를 설정하는 성향이 뚜렷하며, 특정 분야에 흥미를 느끼면 깊이 있게 탐구하고, 관련 자료를 찾아 읽고 정리하는 과정에서 높은 집중력과 자기 주도성을 보임. 상담을 통해 적절한 맥락이 제공되면 학습 동기가 높아질 수 있음을 확인함. 앞으로 진로 탐색과 교과 학습을 연계한 개별 맞춤형 활동을 제공한다면 수업 내용에 대한 이해와 참여도가 점차 향상될 것으로 기대됨. 자신의 장점인 몰입 능력을 수학 학습에도 확장해 나갈 필요가 있음.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 심화 연주기법을 익혀 연주에 참여함. 아르페지오 주법과 보사노바 리듬을 숙지하기 위해 노력하고, 타브 악보 연주에서 선율을 정확한 리듬으로 표현하기 위해 꾸준히 연습함. 연습의 결과, 악곡의 음악적 특징을 이해하고 코드와 선율 흐름 등을 대체로 안정적으로 표현함. 우쿨렐레는 다양한 느낌을 표현할 수 있는 악기임을 깨달았다는 소감을 드러내며, 악기에 대한 이해도를 확장하는 모습을 보여줌. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 악기 각 구성 요소의 위치와 악보를 정확히 숙지하기 위해 노력하고, 박자를 일정하게 표현하기 위해 연습함. 그 결과, 악곡의 특징을 파악하고, 음악에 맞춰 8비트 기본 리듬과 응용 리듬을 표현함. 모르는 부분은 친구들에게 조언을 구하며 연습하였다는 성찰을 남기며 협력하며 연습하는 소통 역량을 보여줌.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간 중 과학 기술의 발전이 스포츠에 미치는 영향에 대해 비판적으로 사고하며, 기술 도입에 따른 긍정적·부정적 측면을 균형 있게 탐구함. 기술 도핑 논란에 대한 사회적 이슈를 인식하고, 공정성과 스포츠의 본질을 지키기 위한 규제의 필요성을 논리적으로 제시함. 신기록 경신, 독점 문제 등 다양한 관점에서 문제를 분석하며, 기술 발전과 스포츠의 조화로운 발전 방향을 고민함. 체육시간에 긍정적인 태도로 참여하며, 플라잉디스크의 과학적 원리를 이해하고 역학적 힘을 구분함. 플라잉디스크를 활용한 변형스포츠를 창의적으로 개발하여 작성함. 기본적인 운동신경이 뛰어나고 민첩성, 순발력, 협응력이 우수하여 새로운 종목도 빠르게 습득함. 빅발리볼에서는 리시브, 토스, 스파이크의 일련의 콤비네이션 과정을 매끄럽게 수행함. 학급 리그 경기에서 탁월한 경기 능력을 발휘하며 팀워크와 전략적 사고도 뛰어남. 이러한 능력을 바탕으로 리그 경기에서 뛰어난 경기 능력을 보여줌. 공격과 수비 양면에서 리더십을 발휘하며 팀원들을 이끌어감. 다양한 종목에서의 경험을 통해 협동심과 책임감을 기르며, 체육 활동에 대한 열정을 지속적으로 보여줌.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"우수한 공동체 역량을 가진 학생임. 1학기에는 비품 관리 도우미로 활동하며 학급 공용 물품을 정리하고 정돈된 학습 환경을 조성함. 2학기에는 환기 도우미를 맡아 창문을 열어 교실 공기 순환을 돕고, 쾌적한 교실 환경을 유지하는 데 힘씀. 또한 청소 당번, 주번일 때 학기 초에 알려준 방법대로 청소하며 성실함과 책임감 있는 태도를 보여줌. 학급의 칭찬 릴레이에서 운동을 잘하고 유머러스하다는 평가를 받을 정도로 활발하고 긍정적인 성격을 지니며, 원만한 교우관계를 형성함. 특히 칭찬 릴레이에 참여하여 급우들의 장점을 하나하나 꼼꼼하게 기록하는 모습을 통해 따뜻한 마음씨와 뛰어난 관찰력을 확인함. 자기관리 역량을 갖추고 있어 지필평가 전에는 계획적으로 학습 방향을 설정하며 컨디션을 조절하고, 독서를 통해 한국사와 통합사회 과목을 학습함. 지필평가 이후 네 번의 문항 분석 중 한 번 참여하여 준비 과정을 점검하고, 부족한 점을 보완하며 자기주도 학습 역량을 기르려고 노력함. 학업적·인격적인 면에서 점차 성장하는 모습이 보이는 학생으로, 긍정적인 경험의 폭을 넓히고 자기 잠재력을 실현하기 위해 노력한다면 더 큰 발전이 있을 것으로 기대됨."},{"y":2,"b":"소란스러운 상황에서도 평정심을 잃지 않는 차분함과 타인을 먼저 배려하는 온화한 성품을 가짐. 쉬는 시간이나 점심시간 등 자투리 시간을 활용하여 꾸준히 독서를 실천하는 습관이 몸에 배어 있음. 다양한 분야의 독서를 통해 문학적 감수성과 언어적 소양을 깊이 있게 함양하고 있으며, 책을 통해 얻은 폭넓은 간접 경험을 바탕으로 타인의 감정을 세밀하게 파악하고 공감하는 능력이 탁월함. 이러한 깊이 있는 공감 능력을 바탕으로 학급 내뿐만 아니라 다른 반 친구들과도 격의 없이 소통하며 폭넓고 원만한 교우 관계를 형성하고 있음. 자신의 주장을 앞세우기보다 친구들의 이야기를 진심으로 경청하는 태도가 돋보여, 교우들에게 편안함을 주는 친구로 깊은 신뢰를 얻고 있음. 정적인 독서 활동과는 대조적으로, 방과 후에는 복싱을 취미로 하여 자기 단련에 힘쓰는 반전 매력을 지님. 격렬한 운동을 통해 학업 스트레스를 건강하게 해소하는 것은 물론, 해당 과정에서 기른 강인한 체력과 쉽게 포기하지 않는 끈기는 학업으로도 이어져 점차 발전해 나갈 것으로 기대됨. 지적 탐"}]},{"name":"정종인","seat":27,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":2,"s":1,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":9,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":2,"g":9,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":9,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":9,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":8,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":7,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":7,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"C"},{"y":2,"s":1,"g":9,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'딸에게 들려주는 인종차별 이야기'를 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 인종차별의 심각성을 인식하고, 차별 관련 교육은 어릴 때부터 시작하는 것이 중요하다는 점을 깨달아 이를 바탕으로 즉문즉답 활동을 함. '동영상 플랫폼에서 한번쯤 뜨는 인종차별 영상을 보고 웃었던 적이 있으신가요?'를 질문해 친구들이 깊은 사고를 할","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"주어진 과제 해결을 위해 성실하게 노력하는 자세를 보여주며 탁구 실기 활동에서 안정된 자세를 바탕으로 다양한 스트로크 기술의 전환을 빠르고 자연스럽게 연결할 수 있음. 티볼의 타격 자세가 안정적이며 자신이 원하는 방향으로 공을 보내","c":"수 있도록운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '하이퍼리얼리즘의 미학'과 관련된 글을 읽고 핵심 내용을 분석한 후, 자신의 생각을 기술함. 현실에 자연스럽게 녹아 있는 미술품이 주는 미적 가치에 대해 새롭게 알게 되어 예술품을 감상하는 심미안을 갖추게 되었다고 밝힘. 하이퍼리얼리즘이 작가와 감상자의 소통 방식을 중요하게 여긴다는 사실을 오늘날 디지털 문화와 관련지어 보며, 오늘날 디지털 문화 속에서 제대로 예술을 감상하는 방법에 대해 고민해 본 것을 기술함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 발췌독한 후, 사회 문제에 대한 필자의 생각을 바탕으로 자신의 생각을 확장하는 활동을 진행함. 언어가 개인의 사회적 지위를 반영한다는 필자의 견해에 대해 과거의 상황과 달라진 오늘날의 상황을 언급하며 비판적 견해를 드러냄. 언어 사용 양상으로 개인을 판단하는 것에 우려를 표명하며 사회적 지위보다는 개인의 필요에 의해 선택되는 언어 사용의 예시를 제시함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '관내분실(김초엽)'을 읽고 비평 활동을 진행함. 작품의 갈등 양상이 엄마와 주인공의 외적 갈등으로 시작되어 주인공의 내적 갈등으로 이어진다고 설명하며, 주인공의 내적 갈등이 해소되는 과정을 통해 주제를 강조하고 있다고 기술함. 작품 속 기억 데이터인 '마인드'를 자아라고 볼 수 있을 것인가에 대해 모둠 책 대화에서 토의를 진행하였으며, 이 과정에서 기억을 저장하는 것이 기록하는 것과 다름이 없기 때문에 자아라고 볼 수 없다는 결론을 도출하여 독서 일지에 정리하고 이를 토대로 서평을 작성함. 심미적 문학 체험 활동에서 학업 성적이 잘 나오지 않아 힘들어하는 동료 학습자의 고민편지를 읽고 시 처방전을 작성함. 시 '태풍이 지나고(이해인)'에서 태풍이 휩쓸고 간 어지러운 곳을 정리하는 시적 화자의 모습을 소개하며, 자신이 원하는 만큼의 결과를 얻지 못한 고민 대상자 역시 힘든 이 시기를 태풍으로 생각하며 언젠가는 지날 것을 기다리라는 내용을 기술함. 시적 상황과 고민 대상자의 상황을 연관지어 고민 대상자가 가져야 할 삶의 태도를 제시한 점에서 문학 작품을 창의적으로 해석하는 모습이 확인됨. \n\n수학Ⅰ: 카드뉴스를 통한 수학 개념 탐구 활동에서 지수함수의 기본 개념을 중심으로 증가 및 감소, y절편, 실생활 적용 사례를 간단하게 정리함. 카드뉴스에서는 금리, 인구 변화, 바이러스 확산 등 일상적인 주제를 활용하여 지수함수가 실생활과 밀접하게 연결된다는 점의 전달을 시도함. 시각적 구성과 간단한 문장을 통해 지수함수를 어렵지 않게 소개하려는 태도가 나타나는 결과물을 완성함. 지수 단원에서는 지수법칙을 활용한 계산 문제에 반복적으로 도전하며 계산과정에서 실수를 줄이기 위한 노력을 기울임. 특히 거듭제곱근의 의미와 계산법에 대해 다각도로 접근하려는 태도와 피드백을 수용하고 수정하는 자세를 통해 꾸준히 향상하고자 노력하는 모습을 보임. 로그의 기본 정의와 성질을 이해하고 이를 적용하여 로그 방정식을 해결할 수 있으며, 개념을 정확히 이해하려는 노력을 보임. 삼각함수 그래프 실습활동에서 사인, 코사인, 탄젠트 함수의 그래프를 단위원","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"연주 활동에서 친구들의 연주에 맞춰 노래를 부르는 등 합주 분위기를 즐겁게 조성한 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 여러 가지 리듬, 타브 악보 독보법과 심화 기법을 익혀 연주에 참여함. 어려웠던 점으로 코드를 숙지하고 빠르게 변환하는 것을 꼽고, 이를 개선하기 위해 악곡에서 많이 사용되는 코드를 먼저 익히고 어려운 코드는 친구들에게 운지법을 질문하며 익혔다는 성찰문을 작성함. 드럼 연주 활동에서 악기의 구조와 8비트 리듬, 필인 연주법 등을 학습함. 악보 읽는 법을 익히기 위해 노력하고 손과 발의 협응, 킥 연주법을 숙지하기 위해 연습함. 필인 창작 활동에 흥미를 갖고 참여하였으며, 스네어와 탐을 이용하여 음악에 어울리는 필인을 만들고 정확한 박자로 깔끔한 연주를 선보임. 수업 이후 음악 감상 시 드럼의 소리가 더욱 잘 들리게 되었다는 소감을 밝히며, 악기를 다룰 땐 악보와 악기 각 구성 요소의 명칭을 숙지하는 것이 중요함을 느꼈다는 성찰 태도를 보임.","c":"의 회전을 바음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 전신수영복의 경우 근육을 압박함으로써 선수의 몸을 유선형으로 만들어 물의 저항을 감소시키고 부력을 높여주는 효과를 가진 사례를 제시함. 과학 기술 도입은 선수 안전을 보장해주는 역할과 경기에 집중할 기회를 제공할 수도 있기에 혁신으로 인정해야 한다는 의견을 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 활발한 의사소통과 남녀학생들의 참여도가 열정적이라는 강점이 있지만, 전체적으로 공격과 수비의 전환이 다소 느리다는 점을 인지하여 전술 대형을 미리 배열함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 디스크 이동 경로를 미리 파악하여 이동함으로써 체력을 안배할 수 있는 자신만의 필승 전략을 세움. 넓은 시야를 통해 동료와의 협력 수비에 집중하고, 더 많이 뛰어 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에서 공에 대한 집중력이 우수하여 상대 팀의 어려운 공의 캐치가 가능하고 경기의 흐름을 잘 파악하여 전략적인 경기 운영이 가능함. 팀원이 실수하면 격려와 배려를 실천하며 이끎이 역할을 훌륭히 수행함.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 경영학 진로와 연계하여 기업의 마케팅 전략과 브랜드 이미지가 소비자 행동에 미치는 파급력을 탐구함. 제품의 기능이나 가격 같은 물리적 요소를 넘어 광고, 브랜드 스토리, 시각적 이미지 전략이 소비자의 심리적 기저를 자극하고 고유한 브랜드 가치를 형성하는 메커니즘을 분석함. 이러한 전략적 접근이 차별화된 시장 정체성을 구축하여 기업의 핵심 경쟁력을 제고하는 결정적 요인임을 규명함. 결과적으로 현대 비즈니스 환경에서 시장을 선도하기 위해서는 정교한 마케팅 설계와 소비자 행동 분석이 필수적임을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"친구들의 장난도 웃으며 잘 받아주는 등 친화력이 좋으며 상대방의 미묘한 감정 변화를 세심하게 알아차림. 여기서 그치지 않고 한 단계 더 나아가 상대방의 처지와 감정을 고려하며 사람을 대하기에 교우 관계가 원만함. 겉으로는 무심한 척하지만 재치 있는 입담으로 학업에 지친 학급 친구들에게 활력을 불어 넣어주는 등 알고 보면 마음이 따뜻하고 순수한 모습이 있는 학생임. 여유로워 보이는 태도 속에서도 맡은 역할이나 과제는 끝까지 책임지고 완수하기 위해 노력하고, 몸이 아프거나 하는 부득이한 경우를 제외하고는 지각한 적이 없을 정도로 지켜야 할 것은 책임감 있게 지키는 모습이 인상적임. 다만 흥미가 적은 과목이나 일에는 평소만큼의 열정이 발휘되지 않는 모습이 보이기도 하므로 이러한 교과에 대해서도 인내심을 기르고 진로에 대한 뚜렷한 목표 의식을 갖게 된다면 앞으로 더욱 큰 성취를 이룰 것으로 기대됨."},{"y":2,"b":"밝고 명랑한 성격을 바탕으로 학급 분위기를 활기 있게 만드는 학생으로, 또래 학생들과 자연스럽게 어울리며 원만한 교우 관계를 형성함. 장난기 있는 모습으로 친구들에게 친근하게 다가가는 붙임성을 지니고 있으며, 개방적인 태도를 바탕으로 일상적인 학교생활 속에서 긍정적인 대인 관계를 유지함. 솔직하고 당당한 태도로 자신의 의견을 분명하게 표현하며, 학급 활동이나 소규모 모둠 활동에서도 의견을 적극적으로 제시하여 또래 간 원활한 의사소통을 이끄는 역할을 함. 노래 실력이 뛰어나 학급을 위해 종종 노래를 선보이며 구성원들에게 활력을 전하는 등 지친 상황에서 학급 분위기 조성에 다방면으로 기여하는 모습을 보였으며, 이러한 점에서 공동체 역량을 확인함. 또한 방과후 자기 주도 학습에 자율적으로 참여하여 성실하게 공부하며 자신의 학습 역량 향상을 위해 노력하는 모습을 보여주고, 교육과정 선택을 위해 자신의 진로 및 학업 계획을 구체적으로 작성하여 교사와 공유하고 상담하는 등 신중한 태도를 보인 점에서 자기주도성과 진로 탐색 역량을 확인함."}]},{"name":"정준희","seat":28,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":8,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":4,"u":3,"n":"진로영어","c":"영어"},{"y":1,"s":1,"g":7,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":7,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":6,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":7,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":6,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 공학에 대한 관심사를 바탕으로 '지금은 공학 소녀시대'를 읽고 독서 일지를 작성함. 이를 토대로 한 인터뷰에서 공학과 과학의 차이점이 무엇인지에 대한 깨달음을 페니실린의 사례를 통해 설명함. 페니실린을 발견한 과학과 이를 대량 생산한 공학을 비교하며 습득한 지식을 자신의 말로 재해석해 전달하는 모습에서 지식 정보 처리 역량이 드러남. 고전시가 감상 발표 수업에서 '고인도 날 못 보고'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 작품에 사용된 설의법, 대구법, 연쇄법 등의 표현 방법을 잘 분석하고, 작가인 이황의 사상과 가치관이 작품에 어떻게 반영되었는지 이해하기 쉽게 설명함. 고령의 나이에도 학문에 대한 열의와 수양 의지를 보이는 작가의 모습에 감동 받았음을 밝히는 모습에서 문학적 감수성이","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 내용에 대해 정확하게 이해하였고 이해한 내용을 바탕으로 논술 활동에서 묻는 문제에 정확한 답을 하는 모습을 보여줌. 리그전 활동에서 승패에 승복할 줄 아는 마음을 기를 수 있게 되었음. 랠리 활동에서 협동심을 발휘하여 상대방 학생 노력한 결과 연속으로 20회 이상 랠리하는 모습으로 성장함. 서브 활동에서 수업 시간에 열심히 노력하여 원하는 지역으로 공을 보낼 수 있는 능력을 갖추게 됨.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능이 우수하고 집중력 있게 연습하여 좋은 기록을 보임. 경기 수행 능력이 우수하며 전술 이해도가 높음. 타격에서 배트의 타점을 이해하고 자신이 원하는 방향으로 타격함. 거리별로 정확한 송구를 하여 팀에 기여함. 게","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"공학 분야에 관심이 있는 학생으로 수업 중 다룬 질량 분석기와 관련된 글을 읽고 자발적으로 추가 탐구를 진행함. 지문에서 제시된 4극 질량 필터에 전기장, 주파수, 이온의 동역학 등 공학적 원리가 복합적으로 적용된다는 점에서 흥미를 느꼈다고 말하며 4극 질량 필터의 작동이 실제로 매튜 방정식과 안정도 다이어그램으로 결정된다는 점을 추가로 조사하면서 기술적 이해를 확장시키는 모습을 보임. 또한 환경 센서용 사중극자 질량분석기 초미니화 설계에 대해 추가적으로 탐색하고 싶다는 탐구 계획을 밝힘. 확장적 독서 활동에 참여하여 '거의 모든 물질의 화학(김병민)'의 7장 '염료로 시작해 약을 합성하다'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 이를 바탕으로 교사와 대담하여 자신의 생각을 말로 표현함. 몇몇 기업이 지속 가능함을 좋은 이미지를 위해 사용한다는 글쓴이의 주장에 동의하며, 이를 명확히 판단하기 위해서는 구체적인 데이터나 수치를 확인하는 것, 외부 기관의 인증을 받았는지 확인하는 것, 그리고 기업이 지속 가능함을 실현하기 위해 어느 정도의 손해를 감수했는지를 파악해야 한다고 주장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 걱정이 많고 행복을 잘 모르겠다는 친구의 고민에 대해 '오직 너는(나태주)'을 처방한 뒤 '불안의 숲에서 길을 잃었을 때'라는 제목으로 발표를 진행함. 시 속의 '너 자신을 살아라'라는 구절을 인용하면서 고민자가 특별하고 고유한 존재임을 강조하고 시를 통해 자존감의 상승을 경험하길 바란다는 조언을 전달함.\n소설 서평 쓰기 활동에 참여하여 '관내분실(김초엽)'을 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 작가가 작품을 통해 역지사지의 중요성과 필요성을 강조하려했다고 말하면서 상대방의 입장에서 생각할 필요성이 있다고 언급함. 또한 작품 속 '마인드 업로딩' 기술이 현실세계에서 실현 가능한지에 대해 친구들과 토론해보고, 다양한 연구 결과를 조사하면서 실현가능성이 있는 기술이라고 평가하는 등 다양한 관점에서 작품을 이해하는 모습을 보임. 이를 바탕으로 '소중한 기억'이라는 제목의 서평을 작성함.\n\n수학Ⅰ: 삼각함수 단원에 흥미를 가지고 그래프 실습 활동에 성실히 참여하였으며, 단위원 위의 점을 따라 좌표를 색칠하며 사인함수와 코사인함수의 정의를 실험적으로 탐색함. 사인함수는 단위원의 y좌표, 코사인함수는 x좌표에 해당함을 명확히 설명하고, 그래프의 주기성과 대칭성을 글로 정리하며 함수 개념을 구조적으로 이해하려는 태도를 보여줌. 카드뉴스를 통한 수학 개념 탐구 활동에서는 '일상과 밀접되어 있는 수열, 제대로 공부해야 한다'를 주제로, 등차수열과 등비수열의 기본 개념을 생활 속 수량 변화와 연결해 탐색함. 수열의 일반항 정의, 항의 나열 방식, 공차와 공비의 개념을 중심으로 간단한 사례와 함께 설명하며 수학 개념을 구조적으로 정리함. 카드뉴스에서는 각 수열의 개념 차이를 도표 대신 서술형 정리로 구성하고,","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"평소 수업 시간에 꾸준히 몰입하여 작품을 제작하며, 자신이 구상한 의도가 화면에 잘 드러나도록 끝까지 성실하게 완성하는 태도가 인상적임. 언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 선정하고, 각 단어를 시각적 상징으로 전환하여 초현실적으로 결합함. 자신이 좋아하는 푸른 바다를 작품 배경으로 설정하고 자신을 상징하는 다양한 소재들을 데페이즈망 기법으로 재치 있게 표현함. 그물망을 직접 화면에 부착하여 바다의 윤슬을 재치 있게 표현하는 등 창의 융합 능력을 드러냄. 작품 제작 의도와 배우고 느낀 점을 친구들 앞에서 유창하게 발표함. 또한 타인의 작품을 감상할 때 작품 설명을 진지하게 듣고 공감하는 태도를 보이는 등 다른 사람의 표현을 이해하고 수용하는 모습에서 미술 문화 이해 능력이 잘 드러남. 판화 제작 활동에서 애니메이션 캐릭터를 주제로 지우개 판을 조각함. 아트나이프 사용이 낯설었지만, 조각도의 깊이, 각도, 방향 등을 스스로 조절하며 조각 기술이 눈에 띄게 향상되는 과정에서 자기 주도적 미술 학습 능력이 잘 발휘됨. 캐릭터 형태의 특징을 잘 살려 세밀하고 끈기 있게 조각하고, 여러 차례 프린팅하여 선명한 판화 작품을 완성하는 모습이 바람직함.","c":"첫째항과 공차미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간 중 스포츠 경기에서 과학 기술의 발전이 미치는 영향을 깊이 고민하며, 장비와 도구의 규제 필요성을 주장함. 경제적 어려움으로 인해 좋은 장비를 구비하지 못한 선수들이 불리한 조건에서 경쟁해야 한다는 점을 강조함. 기술이 지나치게 스포츠에 개입할 경우 선수의 노력과 실력보다 장비의 우월성이 평가될 위험이 있으며, 이는 스포츠의 본질을 훼손할 수 있음을 서술함. 이러한 관점에서 장비와 도구의 규제 필요성을 강력히 주장함. 플라잉디스크의 역사와 유래에 대해 깊이 있는 이해를 바탕으로 디스크를 활용한 변형 스포츠를 창의적으로 서술함. 빅발리볼 기술을 배우는 과정에서 침착하게 참여하며 모든 영역에서 수준 이상의 기록을 보임. 기초 기능이 잘 습득되어 리그전 경기에서 자신의 역할을 충실히 수행함. 팀워크와 협동심을 발휘하여 동료들과의 소통을 통해 경기력을 높임. 다양한 전략을 시도하며 경기 중 상황에 맞는 판단력을 발휘함. 이러한 경험을 통해 협동심과 문제 해결 능력을 기르며, 스포츠에 대한 열정을 더욱 발전하는 모습을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화를 시청하고 농구 경기 중 반복되는 점프와 착지 동작이 신발 밑창에 미치는 물리적 하중에 주목하여, 공기 주머니가 삽입된 완충 밑창의 내구성 설계 원리를 재료공학적 관점에서 탐구함. 반복 압축 환경에서 고분자 소재가 높은 강도를 가지는 것뿐만 아니라, 탄성 복원력과 분자 사슬 간 가교 구조 형성이 변형 누적을 억제하고 구조적 안정성을 유지하는 핵심 역할임을 분석함. 또한 반복 하중에 따른 미세 균열의 발생과 성장 과정을 피로 파괴 개념과 연결하여 이해하고, 충격 에너지 분산 메커니즘을 통한 응력 집중 완화 설계의 중요성을 도출함. 분자 구조, 물성, 거시적 성능 간의 상관관계를 탐색하며 단순 기능을 넘어선 공학적 사고를 심화하는 계기가 되었다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"친구들에게 항상 따뜻한 태도를 보이며 배려하는 행동이 일상이 되어 있음. 상대방의 감정을 이해하고 소통하려는 노력을 통해 교우관계가 원만하며, 언제나 다른 친구를 도와주고 배려하는 모습에서 자신만의 천성을 잘 나타내고 있음. 자신의 진로에 대해 깊이 고민하며, 무엇을 할 수 있을지 끊임없이 탐구하고 개선점을 찾기 위해 노력하는 모습이 인상적임. 각종 학교 활동에 참여하고자 하는 의지를 가지고 있으며, 스스로 어떤 역할을 맡을 수 있을지를 모색하면서 다각적인 접근 방법을 설명할 줄 아는 사고력과 성실성을 가지고 있음. 음악을 좋아하는 학생으로 가끔 자신의 노래를 친구들에게 들려주며, 이를 통해 또 다른 매력을 드러냄. 간혹 친구들에게 자신의 곡목이나 흥미로운 이야기를 들려주는 모습을 볼 수 있으며 자신이 좋아하는 분야를 함께 공유함. 앞으로도 계속 적극적으로 취미와 관심사를 탐색하며 꾸준히 나아간다면 반드시 원하는 방향으로 성장할 것이라고 믿어 의심치 않음."},{"y":2,"b":"온화한 성격과 친구들의 장난도 너그럽게 받아들일 수 있는 여유로운 태도를 바탕으로 많은 호감을 얻고 있으며, 학급 구성원 모두와 원만한 교우관계를 유지함. 관계 속에서 상대를 존중하는 말과 행동이 자연스럽게 드러나 학급 내 분위기를 부드럽고 안정적으로 만드는 역할을 함. 학기 초에는 스스로 학교생활에 대해 걱정하는 모습을 보이기도 하였으나, 시간이 지날수록 환경에 잘 적응하며 무엇이든 성실하게 임하는 모습으로 눈에 띄는 성장을 보임. 수업 및 학습 과정에서 어려운 부분이 있을 경우 이를 회피하지 않고 친구들에게 질문하며 해결하고자 하는 적극적인 학습 태도를 지니고 있으며, 학습에 대한"}]},{"name":"정지후","seat":29,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":2,"s":1,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":7,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":9,"u":3,"n":"진로영어","c":"영어"},{"y":1,"s":1,"g":9,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":9,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":9,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":9,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":9,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":9,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":9,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'소녀, 히틀러의 폭탄을 만들다'라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 전쟁으로 인한 아픈 역사를 다시 한번 깨닫고, 가족을 위해 삶을 포기하지 않는 주인공 소녀의 삶의 자세에 깊은 감명을 받아 이를 바탕으로 즉문즉답 활동을 함. 책의 주제와 자신의 삶에 대해 성찰한 내용을 설명하며 자연스럽고 유창하게 표현하는 모습이 돋보임. 시조 '내 언제 무신하여'를 내재적 관점과 외재적 관점에서 종합적으로 감상하고 주체적으로 비평한 후 '그리움'이라는 주제 의식에 대해 고찰하기 위해 '해바라기가 피지 않는 여름'을 읽음. 책을 통해 깨달은 그리움을 극복하는 방법과 자신의 어린 시절 경험을 연결하여 삶을 성찰한 한 편의 진솔한 글을 작성함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"매시간 차분하고 성실하게 활동에 임하여 실력이 꾸준히 성장하는 끈기 있는 모습이 대견한 학생으로서 수업 후 경기장 정리 등의 궂은일에 솔선수범하는 봉사 정신을 보임. 탁구 경기 방법 및 규칙에 대한 이해가 정확하여 탁구 리그전에서 심판으로 활동하며 경기를 원활하게 운영함. 탁구 경기 중 손목의 힘을 잘 이용하여 정확하게 자신이 목표하는 지점에 공을 보낼 수 있고 상대 선수들이 예측하지 못하는 지점으로 공을 보내는 능력을 발휘하여 득점력이 높음. 티볼의 타격 자세가 안정적이며 자신이 원하는 방향으로 공을 보내는 능력이 우수하여 리그전 경기에서 많은 타점을 기록함.","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '공간이 만든 공간(유현준)'을 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 서양과 동양의 대조적인 사고방식이 현대 사회에서 어떻게 조화되어야 하는지에 대해 고찰한 과정을 글에 담음. 서양의 완전함 추구가 수학과 과학의 발전을 이끌었지만 완전함만을 추구할 경우 효율성이 떨어질 수 있음을 지적하며 두 가치의 균형이 필요하다는 논리적인 견해를 제시하면서 독서 내용을 현대적 맥락으로 확장하여 이해하는 태도를 보임. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 동양 문화의 핵심 가치인 '관계'와 '비움'이 개인의 정신 건강과 사회적 효율성에 기여하는 바에 대해 주장한 점이 인상적임. 특히 현대 사회에서 타인과 속마음을 공유하는 관계 맺기가 스트레스 해소와 정신적 건강을 돕는 필수 요소라고 주장함. 동·서양의 관점 차이를 국제 사회의 협력 모델로 연결하여 상호작용 가능성을 제안하는 등 인문 분야의 글을 통해 사회 현상을 이해하고자 하는 역량을 발휘함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '오직 운전하는 이들만이 살아남는다(박서련)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 작품의 주제 의식이 무엇인지에 대해 의견을 나눔. 책대화 내용을 바탕으로 '사방이 벽이면 위로 가자'라는 제목의 서평을 작성함. 좀비가 창궐하는 극한 상황에서 주인공이 고군분투하는 내용을 바탕으로 현대 사회에서 살아남기 위해 애쓰는 현대인의 모습을 그려낸 것 같다는 자신의 의견을 제시함. 남자 아이라는 동료를 만난 주인공처럼 현대인들도 신뢰를 기반으로 한 인간 관계를 형성해야 건강하게 살아갈 수 있다고 주장함. 소설을 꼼꼼히 읽고 내적 맥락을 바탕으로 주제를 해석하고 내면화하고자 노력하는 모습이 인상적임. 시 처방하기 활동에서 소심한 성격으로 고민하는 친구의 편지를 읽고 시 '악몽(박진성)'을 처방해 발표함. 울고 있는 화자의 모습이 고민하는 친구의 모습과 비슷하다고 공감했으며, 자신감을 갖고 살아가라는 응원의 메시지를 전함. 발표를 위한 ppt를 계속 수정하고 더 나은 발표를 위해 노력하는 모습이 기특한 학생임.\n\n수학Ⅰ: 교과 내용과 관련된 수학 기사문을 작성하는 활동을 함. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후, 학습지를 작성함. 함수의 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 진위 판정하는 활동에 참여함. 수업 내용에 꾸준히 집중하고 학습 태도를 개선해 나간다면 수학에 대한 자신감을 키워갈 수 있을 것임.\n\n수학Ⅱ: 침착하고 차분한 태도로 수업에 참여하며 교사의 안내를 경청함. 수업 시간에 흐트러짐 없이 앉아 조용히 학습 과정에 참여하는 모습이 지속적으로 관찰됨. 외적으로 드러나는 표현은 크지 않으나, 내면에서 사고를 정리하고 개념을 연결해 보려는 모습이 특징적임. 타인을 배려하는 태도로 수업 분위기 유지에 기여하며, 학급 전체가 안정적으로 수업에 몰입할 수 있도록 조용한 역할을 수행함. 제시된 문제 상황을 여러 관점에서 바라보며, 성급하게 판단하기보다 시간을 두고 곰곰이 생각하는 신중함을 보임. 수학적 개념의 의미와 활용 가능성에 대해 스스로 탐색하며, 자신의 흥미와 연계 지점을 찾으려는 모습이 긍정적으로 평가됨. 앞으로 다양한 학습 경험을 통해 자신만의 학습 방법을 구체화해 간다면, 사고의 유연성과 자기 주도성이 함께 성장할 것으로 기대됨.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"게임 내 뽑기 시스템을 소재로 확률과 통계 개념을 실생활 소비 문제에 적용하는 탐구를 수행함. 독","c":"확률과 통계"},{"y":2,"t":"세부능력및특기사항","b":"한 학기 동안 수업 도우미로서 수업 준비와 뒷정리를 돕고, 학급 친구들에게 안내사항을 전달하며 수업 운영에 기여함. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 심화 연주기법을 학습함. 새롭게 접한 코드를 숙지하기 위해 노력하고 커팅과 뮤트, 타브 악보 연주 등 다양한 연주법을 익혀 연습함. 주어진 음악의 특징을 파악하고 올바른 주법으로 표현함. 연주한 곡 중 가장 애착이 가는 곡으로 재즈곡을 선정하고, 타브 악보로 선율을 연주하며 재즈 음악 특유의 박자감을 느낄 수 있어 흥미로웠다는 성찰을 남김. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 손과 발의 협응, 더블킥, 필인을 정확히 표현하기 위해 노력하고, 탐탐을 구별하여 연주하기 위해 꾸준히 연습함. 그 결과, 올바른 자세로 악곡의 8비트 리듬과 간단한 필인을 안정적으로 표현하였으며, 킥의 음색을 잘 살림. 수업을 통해 음악을 감상할 때 필인에 집중하여 리듬이 변화함을 잘 느낄 수 있게 되었다는 소감을 드러내며, 연주 경험을 음악 감상 능력으로 확장하는 음악적 감성 역량을 보여줌.","c":"립시행과 기댓음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간 중 과학 기술 발전에 따른 스포츠 장비의 형평성 문제를 깊이 고민함. 스포츠는 개인 역량을 공정하게 평가하는 장이어야 한다는 신념을 바탕으로, 기술 발전이 오히려 평등성을 해칠 수 있음을 주장함. 야구 배트에 코르크를 넣거나 투수가 파인타르를 사용해 공의 회전수를 늘리는 사례를 통해 장비 조작이 경기의 공정성을 저해할 수 있음을 구체적으로 제시함. 기술 혁신에 대한 비판적 시각과 공정성에 대한 강한 가치관을 보여줌. 플라잉디스크 패스와 캐치를 정확히 익혀 꾸준히 연습하며, 목표한 방향에 정확히 보내는 능력을 보여줌. 동료와의 패스를 정확하게 수행하여 팀워크를 발휘함. 빅발리볼 기본 자세를 충실히 하여 언더핸드, 오버핸드 토스를 안정적으로 수행함. 서브를 침착하고 정확하게 하여 경기에서의 자신감을 드러냄. 리그전 경기에서 자신의 역할을 충실히 해내며 팀의 승리에 기여함. 이러한 경험을 통해 협동심과 책임감을 기르고, 스포츠에 대한 열정을 보여줌. 다양한 기술을 익히며 신체 능력을 향상시킴.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 인간의 체공시간 결정 요인과 기능성 농구화의 역학적 역할을 탐구함. 농구화의 기능성이 수직 점프력이나 물리적 체공시간을 비약적으로 상승시키지는 못하더라도, 지면과의 마찰력을 극대화하는 논슬립 기술과 발목 관절의 안정성을 지지하는 구조적 설계를 통해 부상 위험을 현저히 낮춰준다는 점을 규명함. 결과적으로 기능성 스포츠 장비의 본질은 신체 능력을 인위적으로 증폭하는 것이 아니라, 선수가 최대의 폭발적인 힘을 안전하게 발휘할 수 있도록 지지하고 생체 역학적 손상을 예방하는 신체 보호와 안정성에 있음을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"우수한 공동체 역량을 가진 학생임. 1학기에는 건강 도우미로서 반창고 관리와 보건실 출입 학생 확인을 담당하여 학급 내 건강 관리에 힘씀. 2학기에는 에너지 절약 도우미를 맡아 이동 수업 시 전등과 냉·난방기를 끄고 문단속을 철저히 하며 탄소 중립 실천에 기여함. 작은 실천을 통해 환경 보호에 앞장서는 태도가 인상적임. 또한 청소 당번, 주번일 때 알려준 방법대로 청소하고 정리하며 책임감 있는 태도를 보여줌. 학급의 칭찬 릴레이에서 운동을 잘하며 모든 신체 활동에서 뛰어난 기량을 보인다는 평가를 받을 정도로 활발한 모습을 보이며, 체육 활동에 적극적으로 참여해 학급 분위기를 더욱 활기차게 만듦. 자기주도 학습 태도를 갖추고 있으며, 아침 시간을 활용한 학습을 통해 집중력을 높이고 시간을 효과적으로 활용하기 위해 노력함. 목표를 세우고 실천하며 계획적인 생활 습관을 형성하는 태도의 중요성을 파악함. 지필평가 이후 네 번의 문항 분석 중 한 번 참여하여 문제 풀이 과정을 점검하고 학습의 부족한 부분을 보완함. 공동체 생활에서 필요한 성품을 두루 갖춘 학생으로 앞으로 진로 목표를 이루기 위해 꾸준히 노력한다면 더 발전할 것으로 기대됨."},{"y":2,"b":"소란스러운 상황에서도 흔들리지 않고 자신의 학습 주제에 깊이 몰입하는 탁월한 집중력을 지닌 학생임. 반면, 쉬는 시간이 되면 특유의 친화력과 활기찬 에너지로 친구들과 어울리며 학급에 생기를 불어넣음. 상황에 따라 냉철하게 학업에 임하는 태도와 따뜻한 교우 관계를 명확히 구분하는 모습에서 성숙한 자기 관리 능력이 돋보임. 1인 1역으로 '창틀, 사물함 관리'를 맡아 보여준 헌신은 단순한 역할 수행이 아닌, 눈에 잘 띄는 곳뿐만 아니라 평소 관리하기 힘든 창틀 사이의 미세한 먼지까지 찾아내어 닦아내고, 선반 위에 방치된 쓰레기를 주도적으로 정리하는 등 완벽에 가까운 교실 청결을 위해 묵묵히 땀 흘림. 남들이 소홀할 수 있는 부분까지 세심하게 챙기는 꼼꼼함과 솔선수범하는 자세는 학급 구성원들에게 쾌적한 환경을 제공함과 동시에 무언의 귀감이 됨. 진로에 대하여 특정 영역에 섣불리 한정 짓기보다, 폭넓은 가능성을 열어두고 현재 학교에서 경험할 수 있는 모든 교과와 활동에 전력을 다하는 성실함을 갖춤. 현재의 역량에 안주하지 않고 무엇이든 배우고 흡수하려는 진취적인 자세와 매사 최선을 다하는 긍정적인 태도를 겸비하고 있어, 향후 자신의 적성을 찾았을 때 큰 성장을 이룰 잠재력이 큰 학생임."}]},{"name":"조예승","seat":30,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":4,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":6,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":6,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":3,"s":1,"g":3,"u":3,"n":"진로영어","c":"영어"},{"y":1,"s":2,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":4,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":4,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":4,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":3,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"종종 지적 탐구심이 돋보이는 예리한 질문을 통해 친구들의 주의를 환기시켜 긍정적인 학습 분위기 조성에 도움을 주는 학생임. '이토록 공부가 재미있어지는 순간'을 읽으며 본인 스스로 공부에 대한 고정 관념이 있었다는 사실을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. 깨달음을 실천하기 위한 방안으로 '공부를 하지 않는 이유를 환경이나 남의 탓이 아닌, 자신에게 있다고 인식하기'를 제시하여 공감을 얻는 등 내용에 대한 깊이 있는 성찰을 보여줌. 또한 자연스럽고 유창하게 표현하는 모습이 돋보임. '춘향전'을 배우며 원문인 '열녀춘향수절가'를 찾아 읽고 계층에 따른 언어 층위의 차이와 많은 한시의 삽입에도 불구하고 다양한 계층이 향유한 작품이었다는 점에 흥미를 느낌. 이에 작품의 한시 어구 활용 양상과 주제 관련 문헌 자료를 탐색함. 한시 어구가 식자층의 지적 욕구를 채우는 동시에 민중들에게도 의미를 가졌음을 분석하여 보고서를 작성하고 발표함. '사랑가' 사설을 인용해 한시 어구의 언어유희적 활용을 설명하며, 한시가 계층 간 소통의 매개체로 작용했음을 문헌을","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 경기 중 공의 방향에 따라 빠른 풋워크를 구사하여 순발력 있게 공을 수비할 줄 알고 팔과 함께 허리의 회전까지 효율적으로 이용하여 안정되고 강한 타구를 구사할 수 있음. 탁구의 경기 규칙 및 경기 방법을 잘 알고 있어 공정하고 단호한 태도를 가지고 심판 역할도 잘 수행함. 티볼 경기의 모든 순간에 최선을 다하는 자세가 돋보이는 학생으로서 정확한 패스와 상황 판단 능력이 우수하고 투지가 좋아 팀의 분위기를 긍정적으로 이끄는 팀의 활력소 역할을 함. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 따뜻한 성격을 바탕으로 동료들의 실수를 감싸주고 다정 위로의 말을 건네는 유형의 리더가 되고 싶다는 생각을 논리적으로 발표함. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의","c":"통해 타당하운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 아비투스의 개념을 바탕으로 언어 자본이 사회적 계층 형성에 미치는 영향과 소통의 본질에 대해 고찰한 내용을 글에 담음. 언어가 여전히 사회적 지위를 보여주는 중요한 수단이라고 주장하면서 그 근거로 공식적 상황에서 화자의 말투, 어휘, 문법을 바탕으로 품위에 대해 평가하는 것, 방언 화자의 언변이 좋아도 부정적으로 평가받는 사회적 경향을 제시함. 이처럼 책의 내용을 사회의 모습과 연결지어 자신의 의견을 논리적으로 개진하는 역량을 발휘함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 특히 바람직한 소통 방법에 대해 답변한 내용이 인상적임. 책에서 설명하는 한정어, 정밀어의 개념을 활용하여 상대를 존중하는 대화를 하기 위해서는 상황에 따라 적절한 언어를 선택해야 한다고 주장하면서 그 근거로 구체적인 대화 상황을 제시해 타당성을 확보함. 이처럼 독서를 통해 논리적이고 타당한 근거를 들어 소통할 수 있는 독자로 성장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 'trs가 돌보고 있습니다(김혜진)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 trs는 윤리적 판단을 할 수 있는 주체인지에 대해 의견을 나눔. 책대화 내용을 바탕으로 '로봇의 어머니를 죽인 사람의 이야기'라는 제목의 서평을 작성함. 윤리적 판단 기준에 대한 철학자의 견해를 인용하며 trs가 과연 윤리적 판단을 한 것인지에 대해 고찰함. 또한 소설에서 오히려 비인간적으로 보이는 성한의 모습과 인간적으로 보이는 trs의 모습을 대조해 진정한 인간성이란 무엇인지에 대해 고민하게 한다는 의견을 제시함. 소설을 읽고 떠올린 궁금증을 해결하기 위해 다양한 자료를 조사하고 성찰하는 모습이 돋보임. 시 처방하기 활동에서 낮은 성적으로 인해 고민하는 친구의 편지를 읽고 시 '살아갈 이유(나태주)'를 처방해 발표함. 시적 대상을 바라보며 삶의 의지를 다지는 화자의 태도를 설명하며 고민하는 친구에게 따뜻한 응원의 메시지를 전함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"연주 활동에 전반에 흥미를 보이며, 성실하고 주도적인 태도로 참여하는 학생임. 우쿨렐레 연주 활동에서 보사노바, 아르페지오 등의 주법과 타브 악보 읽는 법을 익혀 연주에 참여함. 악기에 따른 올바른 주법으로 음악의 특징을 대체로 안정적으로 표현하고, 발 박자를 세며 박자를 정확히 표현하고자 함. 수업을 통해 여러 가지 리듬을 익히면서 다양한 악곡에 이를 적용해 보고 자신만의 리듬을 창작할 수 있어 좋았다는 소감을 드러냄. 드럼 연주 활동에서 악기를 연주해 본 경험을 바탕으로 안정적인 기량을 발휘함. 연주를 즐기는 모습이 돋보이며, 친구들이 어려워하는 부분을 알려주며 협력적 태도를 보임. 올바른 자세로 스네어 드럼과 킥의 소리를 명확히 표현하며 안정적인 연주를 선보이고, '여유로운 연주태도와 표현력이 돋보인다'라는 긍정적 동료평가를 받음. 필인 창작 활동에서 정확한 박자 감각을 바탕으로 음악에 어울리는 리듬을 만들고자 꾸준히 연습하였으며, 크래쉬 심벌과 스네어, 탐을 이용하여 악곡과 조화로운 필인을 선보임. 수업 후 음악을 감상할 때, 가사에만 집중하지 않고 드럼 리듬과 필인을 고려하게 되었다는 소감을 남겨 연주 경험을 감상 영역까지 확장하는 음악적 감성 역량을 드러냄.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 상어 피부를 모방하여 유체 저항을 최소화한 패스트스킨 등의 첨단 장비가 인간의 신체 능력을 과도하게 보정하여, 과거 선수들의 순수한 노력을 퇴색시키고 기록의 연속성을 훼손함을 비판함. 고가의 스마트 장비가 자본력에 따라 불평등하게 보급되는 현실을 기술 도핑으로 규정하며, 자본이 승패를 결정짓지 않도록 엄격한 장비 규제가 필요하다고 밝힘. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석한 결과 안정성이 높은 패스 연결 플레이를 하는 강점이 있지만, 공격 기회가 생겼을 때 다소 급하게 플레이한다는 점을 인지하여 팀원 간의 의사소통에 더욱 신경을 씀으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 수비를 보완하며 공격권을 빼앗기지 않고 공격 대형을 유지하는 전략을 세움. 신체 기량이 우수하여 최전방에서 공격 속도를 조율하고 득점에 많은 기여를 함으로써 좋은 결과를 가져옴. 빅발리볼 경기 수비 전술에서 이해가 빠르고 공의 움직임에 따라 발 놀림이 민첩하여 뛰어난 수비력을 보임. 특히 순발력과 지구력이 뛰어난 학생으로 밝고 긍정적이며 모든 활동에 적극적으로 참여함.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 유명인의 이미지와 출신지 이미지가 대중심리를 자극하여 브랜드 태도 및 소비자의 행동 의도에 미치는 상관관계를 분석함. 압도적인 인지도를 가진 인물을 전면에 내세우는 스타 마케팅이 대중의 선호도와 신뢰도를 단기간에 끌어올리는 강력한 사회심리학적 기전으로 작용함을 이해했다고 기술함. 하지만 막대한 비용을 투자했음에도 불구하고 기업이 적자를 기록한 실제 비즈니스 사례를 바탕으로, 스타 마케팅이 언제나 흥행과 수익성을 보장하는 만능열쇠는 아님을 지적함. 대중심리를 정밀하게 파악하는 것뿐만 아니라, 기업의 재무 건전성과 제품의 가치가 균형을 이루는 전략적 투자가 필수적이라는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"사교적이고 활발하며 교우 관계가 원만함. 친구의 고민이나 말을 잘 들어주고 리액션이 좋아 타인에게 호감을 주는 학생임. 꼼꼼한 성격으로 분리수거, 칠판 청소, 수능대청소 등 학급 청소 활동에서 게으름 없이 항상 성실히 임하며, 효과적인 청소 방법으로 매우 깨끗하게 마무리해 친구들의 감탄을 자아냄. 수업 시간에는 예리한 질문으로 활기를 불어넣으며, 긍정적인 학습 분위기를 조성하여 교과 선생님들과 친구들에게 깊은 인상을 남김. 모둠 활동에서도 리더 역할이 아니더라도 분위기를 주도하며 친구들이 열정적으로 활동에 참여할 수 있도록 돕는 등 맡은 역할에 대한 책임감과 추진력이 뛰어남. 가끔 즉흥적으로 행동하는 경향이 있으나 솔직한 성격으로 변명하지 않고, 실수를 인정하며 책임을 지는 강단 있는 태도를 보여줌. 예"},{"y":2,"b":"겉보기엔 차분해 보이나 내면은 활달하고 따뜻하여 주변 사람을 편안하게 만드는 매력이 있음. 평소 신체활동도 즐겨 체육 교과 및 배구부 활동에서 두각을 드러내며, 실수한 친구를 비난하지 않고 늘 따뜻하게 격려하고 다독이는 성숙한 배려심으로 급우들에게 깊은 감동을 줌. 학급에서 가장 청소를 잘하는 학생으로 꼽힐 만큼 보이지 않는 구석의 먼지까지 완벽히 제거하는 꼼꼼함을 지녀 믿고 맡길 수 있음. 생활 습관 및 학업 측면에서 교사가 작은 과제를 부여할 때마다 늘 기대 이상으로 성취해내는 모습이 대견스러움. 가령, 2학기 초반 학업 측면에서 번아웃을 겪으며 위기가 있었으나, 교사의 조언을 긍정적으로 수용하고 마음을 다잡아 매일 야간 자율학습에 참여하는 놀라운 끈기를 보여줌. 결국 스스로 학습 공백을 메우고 성적 상승세라는 값진 결과를 일궈낸 기특한 학생임. 경제 애널리스트라는 확고한 진로 목표를 가지고 있으며, 관련 기사와 서적을 꾸준히 탐독하고 교내 탐구 경험을 통해 전문성을 쌓아가고 있음. 냉철한 분석력과 타인을 아우르는 따뜻한 가슴을 동시에 지닌 인재로, 향후 경제 분야에서 큰 성공을 거두기를 진심을 다해 바라고 있음."}]},{"name":"차윤오","seat":31,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":7,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":7,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":3,"s":1,"g":5,"u":3,"n":"진로영어","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":4,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":6,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":7,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":9,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'고전 시가 감상 및 성찰하는 글쓰기' 활동에서 '어와 동량재를~'을 다양한 관점에서 감상하고 발표함. 준비 과정에서 발표 순서가 첫 번째라 부담감을 느끼는 모습을 보였으나, 반복 연습을 하며 부모님 앞에서도 시연하고 조언을 받는 과정을 거치는 등 철저한 준비를 통해 극복하는 모습을 보임. 활동을 통해 첫 순서의 제약점을 인지하고 그럼에도 불구하고 좋은 발표를 하기 위해 발표 방법을 스스로 찾아보고 깨달으며 발표 능력을 함양하는 모습을 보임. 이후 자신이 발표한 시조와 관련 있는 책을 적극적으로 탐색하고 '편견이란 무엇인가'를 선택해 읽음. 상호 텍스트적 관점에서 두 작품의 핵심 가치를 도출해 내어 글로 표현했는데, 핵심 가치를 '편견'으로 분석한 후 편견의 본질, 형성 과정, 영향에 관해 서술함. 이와 관련된 자신의 경험으로 육상 선수 활동 시 키에 따라 달리기 실력을 가늠했던 자신의 편견이 깨진 일화를 진솔하게 제시해 독자의 공감을 이끎. 나아가 편견을 극복하기 위한 방법에 대해 성찰하는 시간을 갖고, 자신이 가진 생각을 비판적으로 점검하는 것에서 시작해 다양한 경험과 정보를 통해 다름을 경험하고 서로의 차이를 이해해야 한다는 자신의 생각을 정리해 글로 제시함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"복소수의 발견과 대수학 발전에 관한 독서 지문을 통해 수학자의 업적과 수학적 개념의 발전 과정을 탐구하며 학문적 흥미를 드러냄. 삼각형의 세 꼭짓점 좌표를 이용해 무게중심의 좌표를 일반화하는 과정에서는 논리적 사고와 수학적 문제 해결 능력을 발휘하여 주어진 문제를 체계적으로 분석하고 해결함.\n수업에 적극적으로 참여하며 2학기 동안 15회의 발표를 통해 학습 내용을 명확히 전달하고 친구들에게 긍정적인 영향을 미침. 명제, 집합, 함수 등 다양한 단원에서 논리적 접근을 시도하며 사고력을 확장하고 문제 해결 능력을 키워가는 모습이 인상적이었음. 발표 이후에도 자신의 학습 과정에 대해 성찰하며 추가적인 발표 기회를 아쉬워하는 등 학습에 대한 열정과 성취감을 바탕으로 꾸준히 도전하려는 태도가 긍정적으로 평가됨.\n수업에 대한 열의와 성실한 태도가 돋보이나 상대적으로 평가 점수가 낮게 나온 부분에서는 심화 학습을 통해 개념을 보다 체계적으로 정리할 필요성이 있음. 이러한 점을 보완하기 위한 노력이 지속된다면, 수학적 잠재력을 더욱 효과적으로 발휘할 수 있을 것으로 기대됨. 꾸준한 발표와 학습 참여를 통해 협력적 태도와 수학적 사고력을 더욱 키워가는 모습이 긍정적으로 평가됨.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"지식품앗이 활동에서 과거 운동선수로서의 경험을 바탕으로 '달리기를 잘하는 방법'을 발표함. 그림과 예시를 활용해 청중의 이해를 도왔고 자신감 있는 태도가 돋보임. 비슷함을 선호하는 인간의 성향, 홈경기의 장점, 효율적으로 진화한 인간의 뇌, 창의성을 발휘하는 최적의 시간 등에 관한 지문을 읽고 주제문, 제목 등을 영어로 작성함. 주장하는 글쓰기 활동에서 '핵무기 개발에 반대한다'는 주제로 핵무기 사용이 지구 전체에 악영향을 끼치며, 인류 멸망의 위험을 초래할 수 있다는 근거를 제시함. 차별을 주제로 한 The Elephant Man과 The Hundred Dresses를 읽고, 주인공과 등장인물들의 변화와 성장을 중심으로 줄거리를 상세히 기록하여 독서 일지를 작성함. 직소 모형을 적용한 거꾸로 수업에서 디딤 영상을 활용해 지문을 반복 분석하고, 수업 목표와 주요 내용을 체계적으로 정리해 가르침. 철저한 준비와 적극적인 태도로 모둠원들로부터 좋은 평가를 받음.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"역사 연구에 꼭 필요한 자료인 '사료'의 중요성을 학습하고 사료수집 후에 사료 비판이 꼭 필요하다는 사실을, 사례를 통해 확인함. 안중근이 이토 히로부미를 암살한 사건을 다룬 영화를 보고, 독립을 위한 그의 결단과 행동에 깊은 인상을 받았다","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 기능적 원리를 통해 탁구 서브, 리그전, 랠리 활동에서 이를 적용하는 모습을 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"기본적인 운동신경이 우수하며 체육 활동에 적극적으로 참여하는 모습을 보임. 티볼 기초 기능을 집중력","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 지구 환경 정치를 바라보는 세 가지 이론적 틀을 비교 분석함. 국익과 갈등을 중시하는 현실주의의 비관적 전망과 달리, 자유주의는 국제기구와 제도를 통한 협력 가능성을 제시한다고 요약함. 환경 문제와 같은 전 지구적 위기 상황에서는 국가 중심의 배타적 사고에서 벗어나, 다자간 협력 기구와 국제적 규범을 통한 해결책 모색이 중요함을 강조하며 미래 지향적인 정책 관점을 보여줌. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 발췌독한 후, 사회 문제에 대한 필자의 생각을 중심으로 자신과 사회의 문제를 해결하는 방법을 모색하는 글을 작성함. 사회적 지위에 따라 사용하는 언어가 달라진다고 한 필자의 견해에 비판적 관점에서 접근하여 인간은 자신의 언어 사용 방식을 조절함으로써 자신의 의도대로 정체성을 드러낼 수 있는 능력을 지니고 있다고 설명하며 사용하는 언어에 따라 개인의 수준과 이미지가 결정될 수 있음을 강조함. 또한 필자가 설명한 '수용 감각'에 대해 진정한 인간 관계를 형성하는 데 있어 방해가 될 수 있음을 지적하며 의사 소통 상황에서 진솔함과 진정성을 보여 주는 태도가 바람직한 관계 형성을 가능하게 한다고 주장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '노찬성과 에반(김애란)'을 읽고 비평 활동을 진행함. '노찬성'과 '에반'의 애착 관계를 보며 인간과 동물의 교감과 생명 존중 의식에 대해 깊게 생각해 보게 되었다는 내용을 독서 일지에 기술함. 상호텍스트적 관점에서 작품을 이해하기 위해 영화 '베일리 어게인'의 내용을 살펴보며 작품에서 얻은 위안과 따뜻함을 확장해 보는 활동을 진행함. 작품 후반부에 '에반'이 죽게 되지만 '에반'의 죽음을 지키지 못한 '노찬성'의 행동을 비난하기보다는 '노찬성'에 대한 '에반'의 애착과 사랑에 초점을 맞추어 작품을 해석해야 한다는 견해를 서평에 기술함. 심미적 문학 체험 활동에서 생활 패턴이 다른 기숙사 룸메이트로 인해 힘들어하는 동료 학습자의 고민편지를 읽고 시 처방전을 작성함. 시 '물새(정호승)'의 시적 화자가 자신이 물새와 다른 존재임을 인식하듯 고민 대상자 역시 롬메이트와 다른 존재임을 인지하기를 바라는 마음을 담아 고민에 답하는 글을 작성함. 문학 작품을 공감적 태도로 감상한 후 이를 확장하여 문학 작품을 통해 세상을 이해하고 타인과 소통하는 활동을 진행한 점에서 문학 감상자로서의 바람직한 태도가 확인됨.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"음악에 대한 관심을 바탕으로 다양한 악곡을 능숙히 소화하고자 노력하는 모습을 보여주는 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익힘. 새롭게 접한 보사노바 리듬을 숙지하기 위해 말로 표현하고 이미지 트레이닝을 하며 꾸준히 연습하였다는 성찰을 남김. 또한, 커팅 주법을 활용한 연주와 타브 악보 연주 활동에서 기존에 기타를 연주했던 경험을 바탕으로 기타와 비교하며 연습하는 음악적 창의･융합 사고 역량을 발휘함. 타브 연주곡에서 올바른 주법으로 악보를 정확하게 읽으며 대체로 안정적인 연주를 선보임. 드럼 연주 활동에서 밴드 연주 참여 경험을 바탕으로 악기에 흥미를 보이며 적극적으로 참여함. 악기의 구조와 8비트 리듬, 필인 연주법 등을 학습하고, 악곡의 엇박 리듬과 필인에 집중하여 꾸준히 연습함. 연습을 바탕으로 음원에 맞춰 악곡의 8비트 리듬을 대체로 안정적으로 표현함. 필인 창작 활동에서 스네어 드럼과 탐을 활용하여 음악에 어울리는 필인을 만들고 정확한 박자로 연주함. 창작 활동 과정에서 악보를 잘 읽지 못하는 친구에게 도움을 주는 등 협력적 태도를 발휘한 점이 인상적임.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 장거리를 달려야 하는 마라톤 선수의 발에 충격 흡수와 반발력에 좋은 특수 소재를 활용하여 빠른 움직임과 안정성을 돕는 신발 사례를 제시함. 스포츠의 본질은 신체 기량과 기술의 우위를 겨루는 것이기 때문에 스포츠 장비에 더 많은 투자를 하는 것을 기술 도핑이라 생각하며 규제해야 한다는 의견을 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 긍정적인 팀 분위기와 경기 기량의 향상도가 있었지만, 전체적으로 대형 유지가 너무 넓거나 몰려있다는 점을 인지하여 팀원 간의 의사소통에 더욱 신경을 씀으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 수비를 보완하며 공격권을 빼앗기지 않고 공격 대형을 유지하는 자신만의 전략을 세움. 주 공격수로서 뛰어난 캐치 능력과 동료와의 매끄러운 패스 연결을 함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능이 우수하고 공에 대한 집중력이 좋으며 경기 상황에서 판단력이 뛰어남. 경기에서 자신의 역할에 대한 책임감을 바탕으로 서로 협력하며 적극적인 참여를 통해 공동의 목표를 성취하도록 최선을 다함.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 진로와 연계하여 프로 스포츠 선수의 전속 계약 구조와 법적 특성을 탐구함. 선수의 독점적 권리 부여와 수익 분배 체계를 분석하고 이것이 일반 근로계약과 어떻게 차별화되는지 법학적으로 규명함. 운동선수 시절부터 가졌던 의문을 법적·구조적 관점에서 명쾌하게 해소하였으며, 스포츠 비즈니스의","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"강한 인상을 지녔으나 내면은 누구보다도 부드럽고 다정함. 타인과 소통하는 것에 익숙해 자신의 마음을 조곤조곤 진솔하게 표현할 줄 알아 상대방이 편안함을 느끼게 하며 더불어 어떤 일에도 크게 낙담하거나 실망하지 않고 다시 해보는 긍정적인 생활 자세가 돋보임. 함께 하는 친구들에 대한 애정이 깊고 함께하는 시간을 통해 안정감과 힘을 얻는 학생이며 그들과의 소속감과 동질감을 중요시 여김. 기본적으로 타고난 신체 능력이 출중하여 학교에서 이루어지는 각종 체육 활동에서 두각을 드러냄. 어릴 적부터 꽤 오랜 시간 육상 선수로서 운동을 해오던 중 진로가 변경되어 학업에 대한 부담감이 매우 클텐데도 자신의 목표를 계속 다짐하며 노력하는 모습을 보여 기특함. 종종 흔들릴 때도 있지만 학생을 아껴주고 지지하는 주변 사람들이 많기에 그들의 격려 속에서 다시 마음을 다잡고 나아가는 태도를 보임. 성장하는 과정이기에 종종 실수하는 모습을 보이기도 하나 진심으로 뉘우치며 자신의 행동을 개선하고 상대방의 기분을 헤아려 예의에 벗어나는 행동을 하지 않으려는 진정성 있는 태도를 지님. 이상과 현실을 함께 고려하며 폭넓게 진로를 계획하고 있기에 다양한 면에서 발전할 잠재력을 갖춘 학생임."},{"y":2,"b":"활동적이고 밝은 성격을 바탕으로 또래 학생들과 원만한 교우 관계를 유지함. 맡은 역할에 책임감을 가지고 임하려는 태도가 두드러지는 학생으로, 1인 1역 활동에서 게시판 관리자 역할을 맡아 학급 게시판 정리와 게시물 관리를 꾸준히 수행함. 게시물이 흐트러지거나 정리가 필요한 경우 스스로 살피고 정돈하는 모습을 보이며, 맡은 역할을 충실하게 이행함. 또한 자신에게 배정된 청소 구역을 성실하고 책임감 있게 관리하여, 시간이 다소 늦어지더라도 꼼꼼하게 쓸고 정리하며 학급 환경을 청결하게 유지하려는 모습을 보임. 운동 신경이 뛰어나고 체육 활동에 대한 흥미가 높아 스포츠 한마당에서 두각을 나타냈으며, 학생회 행사 진행 요원으로 참여하여 행사 전반의 운영을 돕는 역할을 성실히 수행함. 여러 종목에 학급 대표로 적극적으로 참여하여 책임감 있는 태도로 경기에 임하였고, 그 결과 학급이 좋은 성적을 거두는 데 기여함. 학교 행사에도 적극적으로 참여하는 학생으로, 친구들과 함께 밴드부를 구성하여 수개월간 성실하게 연습한 후 학교 축제 무대에 올라 기타"}]},{"name":"최재영","seat":32,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":8,"u":4,"n":"언어와 고자 '한눈에 꿰뚫는 전쟁사 도감'을 선택해 읽고 '한국 전쟁'이라는 역사적 사건을 탐구함으로써 관련된 다양한 배경지식을 얻음. 전쟁이 발발된 시점과 원인에 초점을 두고 고찰하며 양쪽의 입장에서 결정의 타당성을 비판적으로 분석해 보는 모습을 보임. 이를 바탕으로 타인에게 제안을 받을 때 신중히 고찰하고, 거절을 할 때에는 정중한 마음을 담아야 함을 강조하는 글을 씀. 교사의 질문을 받을 때, 면접과 같은 분위기에 긴장을 많이 했지만 수행을 완료하고 나서 자기 만족감을 느끼는 모습을 보임. 활동을 통해 독서와 작문과 관련된 기본 역량을 함양하는 경험을 함과 동시에 면접과 비슷한 연습을 하며 미래에 대한 두려움을 덜게 되는 시간을 가짐.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"명제를 소개하는 수학 카드 뉴스를 제작함. 다양한 예시를 들어 주어진 문장이 명제가 되는지 판별하는 만화를 그리고, 명제가 참이라면 그 부정은 거짓이 되는 이유를 진리집합을 이용하여 정확하게 설명함. 그림을 그려 집합 관련 문제를 쉽게 해결할 수 있음에 가장 큰 흥미를 느껴, '벤 다이어그램'을 주제로 자유 주제 탐구 프로젝트에 참여함. 벤 다이어그램을 이용하여 두 집합이 주어졌을 때의 합집합, 교집합, 차집합, 여집합을 표현하고, 집합이 4개 이상일 때는 하나의 벤 다이어그램에 표현하기 힘들다는 사실을 설명함. 또한, 벤 다이어그램이 오랜 시간 다양한 수학자들을 걸치며 현재와 같이 완성되었음을 알고, 끈기를 가지고 노력하며 학습에 임하는 것이 성적 향상을 위한 가장 좋은 방법임을 깨닫게 되었다는 소감을 밝힘.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"체육시간에 적극적이고 능동적으로 수업에 참여하는 모습이 인상적임. 체육수업에서 배운 내용을 논술 활동에서 전반적으로 활용하려고 한 모습을 보여줌. 리그전 경기를 통해 탁월한 기량을 보여주었으며 페어플레이를 지키면서 경기에 임함. 서브 활동에서 서브된 공을 원하는 코스로 보낼 수 있는 능력을 갖출 수 있게 됨. 랠리 활동에서 협동심을 발휘하여 친구와 연습한 결과 20회 이상 연속으로 랠리를 할 수 있는 능력을 갖추게 됨.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기에서 뛰어난 능력을 발휘하며 흥미롭게 참여하는 모습이 관찰됨. 플라이볼의 다양한 낙하지점을 빠르게 파악하고, 순발력을 발휘하여 실수 없이 잡아내는 능력이 두드러짐. 송구 시 실수를 만회하려는 노력을 통해 정확한 송구를 하는 모습이 인상적임. 경기에 대한 높은 흥미와 긍정적이며 적극적인 태도로 참여하며, 우수한 티볼 경기 능력으로 자신의 역할을 충실히 수행하는 모습이 관찰됨. 스포츠 인성 수업 중 목표를 위해 노력하는 과정에서 장애물을 만났을 때 극복하기 위한 시도의 중요성을 인식하고, 항상 긍정적으로 받아들이며 즐기는 마음의 중요성을 활동지에 작성함. 이러한 경험을 바탕으로 경기 중 발생할 수 있는 다양한 상황에 대한 대처 방안을 모색함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"기타 연주를 잘하며, 악곡을 듣고 어울리는 리듬을 찾아 본인만이 표현할 수 있는 기교를 담아 연주하는 능력을 지닌 학생임. 노래에서 강조하려는 부분을 정확히 알고 있으며 악보를 보고 곡을 이해하는 능력을 갖추고 있음. 친구들과 칼림바를 연주하면서 음정을 구별하는 능력이 향상되었고, 빠르기가 빠른 부분의 리듬이 부정확했지만 손가락의 움직임을 정확하게 하기 위해 엄지손가락의 힘을 기르고, 노래를 부르며 연습하여 곡의 완성도를 높였다고 연습 과정을 자세히 작성함. 칼림바로 두 음 이상을 연주하면서 화음에 관해 관심을 갖게 되었고, 우쿨렐레로 코드를 연주하면서 어울리는 음과 어울리지 않는 음에 대해 알아보게 되었으며, 이를 통해 음의 구조를 심도 있게 탐구하는 기회를 갖게 되었다고 활동지를 작성함. 바로크, 고전파, 낭만파 시대의 음악적인 특징을 조사하고, 낭만파 시대의 작곡가 중 슈베르트의 작품을 감상하며 음악적인 특징과 연관 지어 느낀 점을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"스무 살의 나의 하루를 주제로 그리는 활동에서 사관학교에 입학한 자기 모습을 상상하여 그림으로 표현함. 작품을 제작하는 동안 사관학교에 입학한 자기 모습을 상상하면서 매우 행복했으며 진로에 대한 포부를 작품 소감문에 글로 작성함. 주제에 부합하는 표현 기법과 방법을 탐구하고 자신의 의도를 명확히 전달하기 위해 계획을 세우며 주도적으로 작업을 진행함. 빨대를 활용한 입체 조형물 만들기 활동에서 모둠원과 협력하여 문제를 해결하는 등 다른 사람과의 소통 능력이 뛰어나며 적극적으로 수업에 참여하는 모습이 인상 깊음. 친구들의 작품을 감상할 때, 작품의 특징을 파악하고 동시에 친구들의 이야기를 경청하며 소통하는 능력을 발전시키는 모습을 보임. 분필 조각하는 활동에서 표현 과정을 체계적으로 계획하고 수행하는 등 자기 주도적 미술 학습 능력을 발휘하여 작품을 완성하였으며 분필이 부서지고 조각이 제대로 되지 않아도 포기하지 않고 끈기를 발휘하는 모습이 인상적임. 지승공예 제작하는 활동에서 창의적인 표현력과 완성도 높은 작품을 만들기 위해 노력하는 태도가 돋보임. 자신의 이름에서 아이디어를 얻어 밑그림을 그리고 끈을 만드는 것이 어려웠지만 끝까지 완성하려는 의지를 보임.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 인간의 면역 체계와 관련한 비문학 제재를 골라 다양한 읽기 전략을 활용해 꼼꼼하게 분석함. 문단의 핵심 내용을 간결히 요약하고 내용 구조도를 통해 글의 내용을 시각적으로 잘 나타냄. 또한 글에서 설명하는 자가 면역 질환에 흥미를 느껴 관련 내용을 꼼꼼히 정리한 후 더 알고 싶은 점을 정리하여 독서 과정지를 작성함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 소통 방식의 차이는 사회적 구조가 만든 결과라고 주장하면서 사회적 지위가 높을수록 책임져야 할 것이 많으므로 말을 예의있고 정중하게 해야 한다는 인식이 형성되었다고 추론하여 사회·문화적 맥락이 개인의 소통 방식을 규정한다는 점을 파악함. 이처럼 책의 내용을 사회와 연결지어 이해하고자 노력하는 모습을 발견함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 특히 바람직한 소통 방법에 대해 답변한 내용이 인상적임. 유추를 활용해 상대를 배려하는 소통 방식의 중요성을 조리있게 설명하고 다양한 대화 상황을 제시해 대화할 때 지켜야 할 기준을 설명함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '저건 사람도 아니다(서유미)'를 선택하여 읽고 서평을 작성하는 활동에 참여함. 6차시에 걸쳐 독서일지를 작성하며 책을 읽은 후 모둠원과 함께 책대화를 하며 우리 일을 대체할 수 있는 로봇을 일상에서 활용하는 것이 옳은지에 대해 서로 의견을 나눔. 이 과정에서 자신의 의견을 논리적으로 이야기하며 로봇 기술의 발전 방향에 대해 깊게 통찰해보는 시간을 가짐. 책대화 내용을 담아 '나는 내가 맞을까'를 제목으로 서평을 작성함. 사이보그 시스템을 실제 생활에 적용한 사례를 다양하게 조사하여 서평의 내용을 풍부하게 만들었으며 로봇이 인간을 대체할 때 발생할 수 있는 인간의 정체성 상실 문제를 함께 다룬 글을 씀. 시 처방하기 활동에서 그리운 사람이 자꾸 생각나 고민이라는 친구의 편지를 읽고 시 '나무(용혜원)'를 처방해 발표함. 누군가를 하염없이 기다리는 화자의 모습을 언급하면서 고민하는 친구의 상황에 공감하고 따뜻한 응원의 메시지를 전달함.\n\n수학Ⅰ: 코로나19 확산과 감염병의 전파를 수학적으로 이해하고자 기사문을 작성함. 시간의 흐름에 따라 확진자 수가 기하급수적으로 증가하는 현상을 지수함수 개념으로 설명하고, 감염병 예방과 방역 정책의 수립에 수학이 어떤 역할을 할 수 있는지를 탐색함. 수학을 통해 감염병 확산의 추세를 예측하고 효과적인 대응 방안을 모색할 수 있음을 깨닫고, 일상 속 문제 해결에 수학이 활용될 수 있음을 인식하는 모습을 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후 학습지를 작성함. 정의역, 치역, 점근선, 항상 지나는 점을 수식과 기호를 활용하여 기록하고, 이를 그래프로 표현함. 함수 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 제시한 명제의 진위를 판정하는 활동에 참여함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"외향적인 성격을 지녀 친구들과의 합주 활동을 즐기며 연주에 적극적으로 참여하는 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 타브 연주에서 악곡의 박자 및 리듬을 정확하게 표현하기 위해 꾸준히 연습함. 악기에 대한 숙련도가 높아 올바른 주법으로 악곡의 음악적 특징과 흐름을 안정적으로 표현함. 드럼 연주 활동에 흥미를 보이며 능동적으로 참여하는 모습이 돋보임. 어려운 부분이 나오더라도 성취해 내고자 하는 모습이 인상적이며, 친구에게 도움을 받아 해결해 나가는 등 꾸준한 노력을 보여줌. 그 결과, 올바른 주법으로 타격감 있는 연주를 선보이고 악곡의 특징을 안정적으로 표현함. '박자가 안정적이고 크래쉬, 라이드 심벌의 연주 타이밍이 정확하며 소리가 선명하다'는 긍정적인 동료평가를 받음. 필인 창작 활동에서 음악의 박자와 특징을 파악하고, 이에 어울리는 필인을 구성하여 연주함. 쉼표를 적절히 활용하고 크래쉬 심벌 등을 이용하여 음악의 분위기를 살리고자 하는 모습이 돋보임. 자신의 생각과 느낌을 표현하는 음악적 소통 역량과 동료와 소통하며 문제를 해결해 나가는 협력적 태도가 우수함.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 축구 선수들이 착용하는 전자 퍼포먼스 추적 시스템(EPTS) 조끼가 경량화된 소재로 제작되어 경기력 저하 없이 활동량, 스프린트 횟수 등 정량적 데이터를 제공함을 설명함. 기술 혁신으로 인정하는 이유로는 불법적인 도핑과 합법적인 과학적 훈련 보조 도구는 명확히 구분되어야 한다고 활동지에 기술함. 플라잉 디스크 얼","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 진로와 연계하여 모든 학문과 삶의 영역에서 '소통'이 지니는 핵심 가치를 탐구함. 작중 브랜드 직원이 선수의 가치를 존중하며 진심 어린 설득으로 계약을 성사시킨 과정에서, 상호 이해와 존중을 기반으로 한 소통이 성공적 결과의 본질적 조건임을 분석함. 또한 글쓰기 등 기록 행위 역시 자아 및 타인과의 단단한 소통 방식임을 파악함. 나아가 진로인 군인과 연계하여 아군 간의 무전, 브리핑 등 전술적 소통이 생명과 직결되는 핵심 작전 능력임을 도출함.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"자신감 넘치는 모습으로 학급의 모든 활동에 주체적으로 임하며 간혹 친구들이 장난을 치더라도 너그럽게 이해하고 재치있게 받아주어 따르는 친구들이 많음. 한 학기 동안 급우들이 기피하는 업무 중 하나인 '분리수거 관리자'를 지원하여 책임감을 가지고 수행함. 쉬는시간에도 페트병의 비닐이 벗겨지지 않는 등 분리수거가 제대로 되어 있지 않으면 묵묵히 자신의 역할을 해내고, 올바른 분리수거 방법에 대해 조회시간을 이용하여 급우들에게 안내하는 모습이 인상적임. 프로젝트 활동에서 팀원들이 포스터 제작 결과가 만족스럽지 않아 의욕을 잃었을 때 팀원들의 의견을 경청하며 다시 제작할 수 있도록 독려하여 완수하는 모습에서 탁월한 리더십을 엿볼 수 있음. 모든 수업 시간에 적극적으로 참여하지만 그에 비해 결과가 만족스럽지 않자, 하고 싶은 일은 끝까지 해내지만 하기 싫은 일은 꾸준히 해내지 못한다는 자신의 단점을 스스로 분석함. 이를 극복하기 위해 교사와의 상담을 통해 자신의 학습 습관을 점검하고 방학 동안 매일 도서관에 가서 인증 사진을 찍는 등 조금씩 학습 시간을 늘려가고 있기에 학업 측면에서도 앞으로의 발전이 더욱 기대되는 학생임."},{"y":2,"b":"체육 및 군사학 분야의 꿈을 키워오고 있으며, 꾸준한 체력 단련을 통해 강인한 신체와 정신력을 길러 목표를 향해 나아가는 뚝심을 보여줌. 특유의 밝고 건강한 에너지와 타인을 배려하는 마음으로 교우 관계가 원만하며, 교사를 대하는 태도가 깍듯하고 우호적이어서 교사들의 애정을 받는 학생임. 또한 청소 당번이 결석하거나 청소가 없는 날에도 자발적으로 나서서 쓸고 닦는 봉사 정신이 투철함. 특히 허리 디스크 통증으로 몸을 가누기 힘든 상황에서도 자신의 청소 구역만큼은 끝까지 책임지고 마무리하려는 끈기가 주변에 깊은 감동을 줌. 수업 시간에는 모르는 내용이 있어도 주눅 들지 않고 씩씩하게 대답하며 원활한 수업 분위기를 이끌고 배움의 빈틈을 채워나가는 적극성을 지님. 한 해 동안 학업에 대한 의지를 다잡고 기초부터 다시 시작하려는 결단력을 발휘하여 학습 태도를 개선해 나가는 기특한 학생임. 허리 통증이 심할 때에도 교실 뒤편에 서서 수업을 듣고 자습을 이어가는 등 육체적 한계를 강인한 정신력으로 극복하고 있기에 앞으로 보여줄 발전이 더욱 기대됨. 공동체를 생각하는 희생정신과 구성원을 아우르는 따뜻한 인성을 겸비하고 있어, 꿈을 실현하는 훌륭한 인재로 성장할 것을 확신함."}]},{"name":"최제빈","seat":33,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":5,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":4,"u":3,"n":"진로영어","c":"영어"},{"y":1,"s":1,"g":6,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":6,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":3,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":6,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":3,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"공식적 상황에서 발표하는 것에 어려움을 느끼자 발표 상황을 가정하며 반복적으로 연습하여 극복할 정도로 문제 해결 의지가 돋보이는 학생임. '정승제 선생님이야!'라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 수학은 외워서 푸는게 아니라 시간이 걸려도 자신이 고민하고 생각해서 풀어야 한다는 것을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. 책의 주제와 자신의 삶에 대해 성찰한 내용을 설명함. 또한 자연스럽고 유창하게 표현하는 모습이 돋보임. 현대시 '눈'을 배우며 비판 정신과 문학의 참여적 성격에 대해 관심을 갖게 되어 '풀'을 비롯한 같은 시인의 작품들을 감상하며 지적 호기심을 충족하려는 모습을 보임. 이를 바탕으로 당시 시대 정신에 대한 문학적 형상화에 깊이 감명 받았음을 주제로 한 보고서를 작성함. 이처럼 작품과 현실을 연결하며 배움의 깊이를 확장하고자 하는 태도가 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수학에 대한 열의가 높고 집중력이 뛰어나 수업 참여도가 매우 높음. 여러 가지 방정식을 배우는 수업에서 수학자들의 오차방정식 근의 공식을 찾기 위한 고군분투를 예로 들며 어려운 문제를 풀 때 쉽게 답을 찾으려 하거나 포기하려는 경향이 있었던 자신을 반성한다고 언급함. 이러한 언급은 얼마 후 미지수가 두 개인 연립일차부등식 문제에서 답이 보이지 않아 잠시 당황하는 모습을 보였지만, 끈기 있게 두 미지수의 관계를 이용하여 미지수가 한 개인 연립일차방정식으로 변환하고 논리적으로 해를 구하는 과정으로 이어졌음. 이와 같은 모습은 수학적 문제 해결 역량의 신장으로 이어졌음을 확인함. 수업 중 교사의 발문에 적극적으로 답을 찾으려 하며 발표를 통해 논리적인 사고력을 발휘하고, 학습한 내용을 다른 친구들에게 명확하게 설명하는 능력을 보임. 수업 후에도 이해하지 못한 부분에 대해 질문하며 지적 호기심이 매우 풍부함. 수학적 추리력을 바탕으로 문제를 풀어가며 새로운 풀이 방법을 창의적으로 찾아내는 학습 태도가 인상적임.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"수업 시간에 항상 적극적인 태도로 영어 실력을 향상하기 위해 어휘 학습과 영어 문장 해석을 꾸준히 하는 학생임. 모둠활동에서 이타적인 태도를 보이며 자신이 맡은 역할을 묵묵히 수행하는 모습이 매우 인상적임. 주어진 과제를 해결하기 위해 불평 없이 최선을 다하는 자세가 돋보이며, 다른 친구들과 협력하여 더욱 좋은 결과를 도출해 내려는 노력함. '주장하는 글쓰기 활동'에서 '스마트폰 의존도가 미치는 사고력'을 주제로 쉽게 중독될 수 있는 위험성과 일상생활에서 집중할 수 없게 하는 부작용을 근거로 구체적인 위험 사례와 내용들로 자신의 의견에 근거를 댄 학생임. 적절한 수량 형용사와 정확한 어휘 사용으로 글의 내용을 구성함. '영어 독서록 작성' 시간에 차별 문제에 대한 깊은 통찰력이 돋보이며, 선택한 영어 도서의 주인공을 심도 있게 분석하고 생생하게 표현하였음. 구체적인 묘사와 함께 첫인상을 전달하는 데 능숙하며, 차별에 대응하는 방법에 대해 개인적인 경험과 학교생활을 연관 지어 설명하며 현실적이고 실천할 수 있는 대안을 고민하는 모습이 인상적임.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"전근대 한국사를 배우면서 떠오른 질문들을 호기심 일지에 기록함. 호기심 질문 중 '시무 28조'를 탐구 주","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"수업 초반에는 탁구의 다양한 스트로크를 구사하는 데 어려움을 느꼈으나, 스스로 연습 계획 및 방법을 구상하여 쉬는 시간에도 틈틈이 연습하여 실력이 향상되는 모습을 보임. 체육 수업 시간 진행된 다양한 스포츠의 경기 규칙을 적극적으로 준수하고, 경기 시작 전 상대방에게 악수를 청하는 등 모범적으로 스포츠 정신을 지키는 모습이 돋보임. 티볼 경기에 임하는 자세가 진지하고 열정적인 학생으로 수비 상황에서 상대를 아웃시키기 위해 성실하게 준비하는 자세가 돋보이는 학생임. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 원만한 성격을 바탕으로 팀원들과 적극적으로 소통하며 의견을 경청하여 문제를 해결하며 정한 규칙들을 먼저 솔선수범하는 자세로 지켜나가는 리더가 되고싶다는 자기 생각을 학습지에 작성함. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 도전이란 평소에 하지 않는 것들이나 어렵다고 생각했던 일들을 용기 내서 해보는 것으로써 이 과정을 통해 스스로를 성장시키는 데 의미가 있으며 시행착오가 있더라도 목표를 이루었을 때를 상상하며 노력을 이어가겠다는 포부를 밝히며 친구들의 호응을 얻음.","c":"제로 선택하운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"수업 준비가 철저하며 모든 활동에 열심히 참여함. 생활 속 음악 중 우리나라 대중음악의 장르를 조사하고 가사의 의미를 생각해 보는 활동에 열심히 참여함. 특히, 각 나라와 지역의 민요에서 파생했으나 전통 민요와는 구분이 되며 현대는 어쿠스틱 기타가 중심이 되는 '포크'에 흥미를 갖게 되어 '포크'와 관련된 악곡을 찾아 감상하고 가사의 의미를 느낀 점과 함께 정리하여 활동지를 작성하게 되었다고 발표함. 칼림바로 처음 접하는 다양한 악곡을 연주하는 활동에 흥미를 갖고 참여하는 모습이 돋보이는 학생임. 칼림바를 연주하면서 악보 보는 실력이 향상되었고, 친구들과의 합주가 즐거웠다고 소감문을 작성함. 우쿨렐레를 연주하면서 코드를 보고 운지법을 외우는 부분을 잘했고, 악곡에 어울리는 리듬을 찾아 연주하며 노래 부르는 활동이 즐거웠다고 느낀 점을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"평소 수업에 성실하게 참여하고 필요한 준비물을 꼼꼼하게 챙기며 자기 작품에 대한 애정과 열정을 보여주는 등 좋은 모습을 보임. 분필 조각하는 활동에서 밑그림을 꼼꼼하게 그린 후 깎아 나가기 시작했으며 작품 제작 중에 발생하는 여러 문제를 스스로 해결하는 등 자기 주도적 미술 학습 능력을 발휘하여 작품을 완성함. 우산의 형태를 조각하면서 손잡이 부분이 세밀해서 제작 시 어려움이 있었지만 포기하지 않고 끝까지 작품을 제작하는 끈기를 보여줌. 친구들의 작품을 감상할 때 항상 유연하고 개방적인 태도를 보이며 다른 사람의 작품 설명을 경청하는 등 미술 문화 이해 능력이 우수함. 지승공예로 컵 받침을 제작하는 활동에서 자신의 이름에 있는 자음과 모음으로 문양을 만들어서 작품을 제작하는 독특한 아이디어가 돋보임. 한지를 이용해서 끈으로 만들 때 자꾸 종이가 찢어져서 어려웠지만 포기하지 않고 끝까지 제작하는 과정에서 끈기를 엿볼 수 있었으며 성실한 수업 태도가 바람직함. 작품을 제작할 때 자신이 좋아하는 색 조합을 이용하여 완성도 높은 작품을 제작하는 등 미적 감수성이 우","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 아비투스의 개념을 바탕으로 언어 자본이 사회적 상호작용과 관계 형성에 미치는 영향에 대해 고찰한 내용을 글에 담음. 사회적 지위에 따라 발언권의 차이가 존재하기에 지위가 높은 사람은 여유 있게 자신의 의사를 전달할 수 있지만 그렇지 못한 사람은 조급함을 느끼게 된다고 논리적으로 추론하며 소통 방식의 차이가 사회 구조적인 결과라고 주장한","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"수업의 목표를 달성하기 위해 집중하는 모습과 성실히 연습하는 태도가 인상적인 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 심화 기법을 학습함. 새롭게 접한 코드를 숙지하고 악곡의 박자 및 리듬을 정확하게 표현하기 위해 노력하였으며, 선명한 음색 표현을 위해 꾸준히 연습함. 그 결과, 올바른 자세와 주법으로 악곡의 코드를 정확하게 짚고 특징을 대체로 안정적으로 표현함. 매시간 연습 일지에 자신의 연습 과정과 개선해야 할 점을 성실히 기록하는 자기관리 역량이 엿보임. 드럼 연주 활동에 높은 흥미를 갖고 참여한 학생으로 자신의 역량을 적극 발휘함. 특히 스틱 그립법 등 주법에 신경 쓰며 악기의 음색을 살리기 위해 노력하는 모습을 보임. 그 결과, 올바른 자세와 주법으로 악기의 음색을 명확히 표현하고 안정적인 박자감과 힘 있는 타격을 선보이며 '어려운 필인을 능숙하게 연주하고 음색이 선명하며, 꾸준히 연습한 노력이 엿보인다'라는 긍정적 동료평가를 받음. 필인 창작 활동에서 악보를 꼼꼼히 기보하는 모습이 돋보이며, 스네어와 탐 외에 킥을 규칙적으로 더하여 균형감 있고 완성도 높은 필인을 완성함. 자신의 생각을 연주로 표현하는 소통 역량이 우수함.","c":"점이 인상적음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 맞춤형 축구화에 페백스 같은 신소재의 활용은 안정적 착용감과 움직임의 효율성을 높여줄 수 있다고 설명함. 첨단 장비를 통한 성적 향상을 기술 도핑으로 정의하고, 스포츠 본질은 육체적 한계와 정신적 인내를 경쟁하는 것으로 생각하기에 제도적 규제가 필요하다고 제언함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 빠른 기동력과 위치선정이 탁월하여 원활한 경기 운영 능력에 강점이 있지만, 팀원 간의 의사소통이 다소 부족하다는 점을 인지하여 실수가 있어도 서로 응원하며 끝난 경기에 대해 분석한 정보를 공유함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 팀원의 강점을 살려 작전을 세워 실천할 수 있는 자신만의 필승 전략을 세움. 디스크의 비행궤적을 정확히 이해하고 있어 상대방의 패스를 차단함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에서 코트 내에 바운드 되는 상대 팀의 빠른 공을 안전하게 캐치 할 수 있으며, 변화되는 상황을 정확히 인지하여 수준 높은 수비력을 발휘함으로써 팀 조직력에 크게 기여함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학급에서 맡은 역할에 최선을 다하며 책임감 있게 행동하여 신뢰를 얻음. 조용하지만 긍정적인 성격으로 학급 친구들과 원만한 관계를 유지하며, 상호 존중과 배려의 태도를 보여줌. 주어진 과제와 활동에 성실하게 참여하고, 학급 내 필요한 부분을 찾아 자발적으로 도움을 주는 모습을 보임. 친구들과의 관계에서 따뜻한 말과 행동으로 신뢰를 쌓고, 원활한 소통을 통해 학급 분위기를 밝고 활기차게 만드는 데 기여함. 특히 협력 활동에서 성실히 참여하며 동료들과의 조화를 이루어 학급 활동의 효과를 높이는 데 도움을 줌. 자신의 의견을 차분하고 논리적으로 전달하며, 학급 발전에 필요한 부분에 대한 아이디어를 제공하는 모습이 인상적임. 앞으로도 이러한 태도를 바탕으로 성장과 발전 가능성을 충분히 보임."},{"y":2,"b":"차분하고 온화한 성품을 지녔으며, 특유의 진중함과 겸손함으로 시간이 지날수록 주변 급우들의 깊은 신뢰와 호감을 얻는 학생임. 늘 용의 복장을 바르게 갖추고 단 한 번의 지각 없이 학교 규칙을 준수하며, 항상 공손하게 예의를 갖추는 모습에서 성실함과 바른 인성을 엿볼 수 있음. 또한, 학급 1인 1역할로 휴대폰 가방 관리를 전담하여 일과 종료 후 급우들에게 배"}]},{"name":"홍승현","seat":34,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":2,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":2,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":3,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":2,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":3,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":4,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":5,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":6,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":3,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":2,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":4,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":null,"u":2,"n":"인체구조와기능","c":"기가/제2외","a":"A"},{"y":1,"s":1,"g":4,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":1,"g":2,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":2,"g":3,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":4,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":1,"g":4,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":3,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":2,"g":3,"u":4,"n":"영어II","c":"영어"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 '나의 직업 수의사'를 선정하여 읽고, 독서 일지를 꾸준히 작성함. 독서 일지를 토대로 한 즉문즉답 인터뷰에서 동물 실험을 부정적으로만 여겼지만 동물의 질병을 치료하고 선진 기술을 개발해 나가는 최소한의 연구 과정으로 받아들이게 되었다는 자신의 깨달음을 차분한 태도로 논리정연하게 전달함. 자신의 진로를 윤리적 측면에서 깊이 고민하는 태도가 인상적이며, 자신의 생각을 정돈된 언어로 표현하는 의사소통 역량이 엿보임. 고전시가 감상 발표 수업에서 시조 '반중 조홍감이'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 가독성이 좋은 시각 보조 자료를 잘 활용하고, 작품에 사용된 고사와 작가의 생애를 바탕으로 작품에 대한 해석을 잘 전달함. 효심이라는 주제와 관련한 깨달음을 진솔하게 나누는 모습에서 문학적 감수성이 엿보임. 자신이 발표한 시조에서 '효도'라는 가치를 발견하고 이와 연계한 상호 텍스트로 부모와 자식의 관계를 심리학적으로 분석한 '나이든 부모를 사랑할 수 있습니까'를 선정하여 읽고 감상문을 씀. 부모님과 자신의 독립성을 모두 존중하면서 건강한 관계를 유지할 수 있도록 노력하겠다는 결론에서 따뜻한 심성과 자아 성찰적 태도가 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"차분한 태도로 문제를 해결해 나가는 능력이 있음. 수업 활동에 적극적으로 참여하고 맡은 과제를 성실히 수행함. 삼각형의 무게중심을 찾는 공식을 증명하고 계산에 적용함. 도형을 활용한 문제를 좌표평면 위에 놓고 해결하는 능력이 우수함. 수학 독서 탐구 활동에서 갈루아를 보고 포기하지 않는 끈기를 배웠고 자만하지 않아야 한다는 교훈을 얻음을 밝힘. 근과 계수의 관계를 활용하여 방정식의 해를 구함. 연립이차방정식의 해를 구함. 연립이차부등식을 활용한 실생활 문제를 해결하고, 삼각형의 무게중심 좌표를 찾는 과정을 증명함. 도형의 이동을 주제로 한 카드 뉴스 작성 활동에서 도형의 평행이동과 대칭이동을 설명함. 평행 이동한 도형의 방정식을 구하는 과정을 그래프와 수식 등 적절한 수학적 표현을 사용하여 논리적으로 설명함. 직선운동 하는 물체는 일정한 방향으로 평행이동 하며, 체세포 분열 과정 중 염색분체는 방추사에 의해 대칭을 이루며 양극으로 이동하는 사례를 평행이동과 대칭이동의 예시로 제시함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"'The Elephant Man', 'The Hundred Dresses'를 선택하여 읽고 총 4회의 영어 활동지를 작성함. 메릭은 자신의 상황을 받아들이고 참을성 있게 차별에 대응하며, 그를 지지하는 사람들과 긍정적인 관계를 형성하여 어려움을 극복하고자 하고, 완다와 그녀의 가족은 친구들의 지속적인 괴롭힘과 차별을 견디지 못하고 결국 이사하게 되는 모습을 보인다고 분석함. 완다 역시 메릭처럼 감정적으로 대응하지 않으려 노력했으나 괴롭힘이 계속되어 떠날 수밖에 없는 상황을 분석하며, 차별이 개인에게 미치는 부정적인 영향을 깊이 이해함. 차별과 같은 불공정한 사회문제에 대응하기 위해 캠페인을 조직하고, 차별받는 사람들을 적극적으로 돕는 것이 중요하다는 주장을 펼침. '블랙베리가 망가니즈를 이용하는 특이한 능력'을 주제로 영어 포스터 제작 및 게시를 통해 지식 나눔의 가치를 실현함. 블랙베리가 주변 토양의 망간 농도를 조절하여 다른 식물의 생장을 영향을 미칠 수 있다는 점을 강조하며 환경 과학적 시각을 제공하고 그림을 활용해 내용을 시각적으로 표현함. 직소 협동학습에서 모둠장을 맡아 성실히 준비하고 정확한 설명을 제공하여 활동을 원활히 이끌고 설명도 수준급으로 잘해 큰 도움이 되었다는 동료평가를 받음.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 설명한 내용을 잘 이해하는 모습을 보여주었으며 친구들과 탁구 경기를 활동하며 탁구 공격 전술과 수비 전술을 익힌 모습도 보여줌. 협동심을 바탕으로 한 랠리 활동을 위해 친구들과 호흡을 맞추며 연습하였고 이를 바탕으로 연속으로 20회 이상 주고받을 수 있는 기술을 갖추게 됨. 열심히 참여하는 모습을 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 활동 초기에 어려워했지만 티볼 타격 시 정확한 타점을 맞추기 위한 연습을 꾸준히 하여 원하는 방향으로 공을 보내는 기술적 발전이 관찰됨. 스포츠 인성 수업에서 도전정신에 대해 장애물은 성장의 기회라는 생각과 좌절보다는 문제를 해결할 수 있다는 믿음과 희망의 중요성을 강조함. 이러한 과정에서 얻을 수 있는 배움에 집중하는 것이 진정한 극복의 시작임을 깨달음.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 오페라 아리아가 영화에 사용될 때 내용과 어울리게 선곡하였는지 비평해 보는 활동에 적극적으로 참여함. 영화의 줄거리를 조사하며 극중 인물의 성격을 파악하고, 음악의 선곡이 내용과 어울리는지 알아보면서 오페라 아리아가 영화에서는 화려함 속에 감추어진 주인공의 외로움과 갈등을 잘 표현할 수 있도록 선곡된 것 같다고 의견을 정리하여 활동지를 작성함. 칼림바와 우쿨렐레를 연주할 때 바른 자세를 유지하며 정확한 연주법을 익힌 후 연주하려고 노력하는 모습을 보임. 고전파와 낭만파 시대의 작곡가 중 '하이든'과 '슈베르트'의 작품을 감상한 후 고전파와 낭만파의 특징과 연관 지어 느낀 점을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"나타내고자 하는 아이디어를 신중하게 그리는 모습이 인상적이며, 작품을 완성하기 위해 최선을 다하는 자세가 훌륭함. 분필을 조각하는 활동에서 표현 과정을 체계적으로 계획하고 수행하면서 다양한 문제들을 창의적으로 해결하는 등 자기 주도적 미술 학습 역량을 보임. 분필이 부서지고 조각이 되지 않아도 끈기를 가지고 작품을 완성하는 모습을 보여줌. 스무 살의 나의 하루를 주제로 그리는 활동에서 전공 수업을 듣고 친구들과 저녁을 먹는 따뜻한 일과를 그림으로 표현함. 수의학과에 입학하기 위해 학업에 정진하겠다고 자신의 포부를 자신감 있게 발표함. 친구들의 작품을 감상할 때, 작품의 강점과 특징을 파악하면서도 친구들의 이야기를 경청하고 소통하는 능력을 발휘함. 빨대를 이용한 선재 구성 활동에서 조원들과 의견을 주고받으면서 주제를","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '거의 모든 물질의 화학(김병민)'을 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 특히 '물질에 대한 무지'와 사회 문제에 대한 질문의 답변이 인상적임. DDT가 안전한 살충제로 알려졌지만 사실 환경을 파괴하는 물질이었던 사례를 통해 인간의 무지에 대한 위험을 지적함. 이를 해결하기 위해서는 물질의 본질을 정확하게 알아야 한다고 주장하며 학교 교육, 정부와 기업의 투명한 정보 공개, 개인의 비판적 시각이라는 다층적인 해결 방안을 제시함. 이처럼 사회 문제 해결을 위한 대안을 적극적인 태도로 찾으며 글을 창의적으로 읽어내는 역량을 발휘함. 소통적 독서 활동에서는 3","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 다양한 코드와 여러 가지 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 친구들의 소리를 들으며 박자를 맞추기 위해 노력하는 모습을 보여줌. 코드를 정확히 짚는 것과 박자를 파악하는 것에 어려움을 느꼈으나, 스트로크 없이 코드 운지만 반복 연습하고 수업 외 시간에도 리듬","c":"가음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육 시간에서 첨단 장비와 도구의 발전이 스포츠에 미치는 영향을 깊이 고민하며, 장비 규제의 필요성을 주장함. 경제적 격차로 인한 불공정한 경쟁 상황을 우려하며, 선수들이 동등한 조건에서 경쟁할 수 있도록 규제가 필요하다고 강조함. 과학 기술이 스포츠에 기여하는 바를 인정하되, 기술 발전이 선수의 신체적 능력을 초월해서는 안 된다고 주장함. 공정성과 경기력 향상 사이의 균형을 맞추기 위한 노력이 중요하다는 점을 명확히 함. 플라잉디스크를 목표한 구역에 정확하게 던지려는 노력을 보임. 체육활동에 소극적인 태도를 보이지만 리그전 경기에 참여하는 모습을 보임. 비록 처음에는 소극적이었으나, 점차 자신감을 얻고 적극적으로 참여하려는 의지를 보임. 이러한 변화는 향후 다양한 활동에서도 긍정적인 영향을 미칠 것으로 기대됨. 지속적인 노력과 참여를 통해 성장 가능성이 높음.","c":"을 암기하는 등 연체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 스포츠 마케팅의 이면과 함께, 제품의 핵심이 되는 농구화에 적용된 공학적 기술의 가치를 탐구함. 농구라는 격렬한 스포츠 특성상 선수의 부상을 방지하고 경기력을 극대화하기 위해 다각도의 공학적 설계가 필수적임을 깨달았다고 기술함. 특히 지면과의 마찰을 견디는 아웃솔의 내마모성 배합 기술, 급격한 방향 전환 시 충격을 흡수하는 미드솔의 탄성 및 쿠셔닝 공학을 분석함. 단순한 패션 아이템을 넘어 생체역학적 분석과 신소재공학이 집약된 결과물이라는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"조용하고 차분한 성품을 지녔으며 학생으로서 지켜야 할 복장, 시간 엄수, 언행 등 학교 규칙을 잘 지키는 모범적인 생활 태도를 보이며, 교사의 조언을 긍정적으로 받아들여 자기 발전을 위해 끊임없이 노력하는 학생임. 친구들과 함께 하는 활동에서 의사소통 능력을 보여주었으며, 갈등 상황에서도 타인을 이해하고 양보하는 자세를 보이는 등 남을 배려하고 존중하려는 마음씨를 갖추고 있으며, 어른들을 대할 때 예의 바른 태도를 유지하려고 노력하는 모습을 보임. 어려운 문제를 해결하기 위해 다방면으로 해결 방법을 모색하고 반복적인 학습을 통해 개념을 깊이 있게 이해하는 등 자신만의 공부법을 활용한 자기주도적 학습태도가 잘 갖추어져 있고, 학습 잠재력이 높고 사고가 유연하며 체계적인 시간 관리를 위해 스스로 노력하고 있어 우수한 학업성적을 유지하고 있으며, 앞으로의 발전이 기대되는 학생임. 생명 과학 분야로의 진로를 희망하고 있어 체계적인 계획을 세우고 실천하는 자기관리능력이 뛰어난 학생으로, 다양한 실험 활동에 참여하여 문제해결력을 함양하고 생명 관련 도서를 탐독하는 등 자신이 관심을 두고 있는 분야에 대한 탐구를 게을리하지 않는 모습이 인상적임."},{"y":2,"b":"겉으로 자신을 드러내기보다 자신이 마땅히 해야 할 바를 묵묵하고 성실하게 수행하는 내실 있는 학생임. 어떤 일을 시작할 때 그 일의 필요성과 의미를 먼저 깊이 생각하고 행동에 옮기는 신중함을 갖추었음. 학급 공동체 활동에 매우 협조적이며 특히 교실 바닥 청소 담당으로서 결석한 친구의 몫까지 불평 없이 대신하거나 청소 상태를 자발적으로 점검하는 등 투철한 책임감을 보여줌. 수능 고사장 설치를 할 때에도 자신의 구역을 마친 뒤 도움의 손길이 필요한 곳을 찾아 끝까지 지원하는 모습에서 타인을 배려하는 성숙한 공동체 역량을 확인할 수 있음.\n학업에 있어서도 흔들림 없는 집중력을 보여줌. 쉬는 시간과 같은 자투리 시간조차 허투루 쓰지 않고 학습에 몰입하며 자신에게 최적화된 학습 계획을 수립하여 실천함. 단순히 문제 풀이에 그치지 않고 시험 종료 후에는 반드시 결과 분석지를 작성하여 오답의 원인을 파악하고 자신의 단점을 보완하기 위해 끊임없이 노력함. 이렇듯 남들이 보지 않는 곳에서도 자신을 다스리는 엄격한 자기 관리 능력과 공동체 역량을 두루 갖추고 있어, 향후 어떤 분야에서든 신뢰받는 인재로 성장하리라 기대됨."}]}];

/**
 * 내신 환산점수 계산 엔진 (JavaScript판)
 * ==========================================
 * naesin_engine.py(Python, 검증완료)를 그대로 JS로 옮긴 것.
 * 새로 설계하지 않았고, 같은 입력에 같은 출력이 나오는지 건양대 사례로
 * 교차검증함(아래 사용예시 참고).
 *
 * 클로드 디자인 HTML/JS 화면에 이 파일 내용을 그대로 붙여넣으면 됩니다.
 * 별도 서버 호출 없이 브라우저 안에서 계산이 끝납니다.
 *
 * 사용법:
 *   const result = computeScore(studentSubjects, rule, { A: 1, B: 3, C: 5 });
 *   // result = { 환산등급: 2.5, reliability: 'high', 반영과목수: 8, ... }
 */

// ───────────────────────────────────────────
// 교과군 라벨 정규화 (Python SUBJECT_GROUP_ALIASES 그대로 이식)
// ───────────────────────────────────────────
const SUBJECT_GROUP_ALIASES = {
  '탐구(사/과)': ['사회', '과학'],
  '탐구': ['사회', '과학'],
  '사회·과학': ['사회', '과학'],
  '사회/과학': ['사회', '과학'],
  '사회 또는 과학': ['사회', '과학'],
  '사회(한국사포함)': ['사회', '한국사'],
  '사회(한국사 포함)': ['사회', '한국사'],
  '사회(역사/도덕 포함)': ['사회', '한국사'],
  '사회(역사/도덕)': ['사회', '한국사'],
  '사회(역사/도덕포함)': ['사회', '한국사'],
  '사회및과학': ['사회', '과학'],
  '국어/수학': ['국어', '수학'],
  '국어+수학': ['국어', '수학'],
  '수학/영어(제2외국어포함)': ['수학', '영어'],
  '국어(한문 포함)': ['국어'],
  '국어(한문포함)': ['국어'],
  '영어(제2외국어 포함)': ['영어'],
  '제2외국어': [],
};

function normalizeSubjectGroup(교과군) {
  if (교과군 == null) return null;
  if (typeof 교과군 === 'string') 교과군 = [교과군];
  const expanded = [];
  for (const g of 교과군) {
    if (SUBJECT_GROUP_ALIASES[g]) {
      expanded.push(...SUBJECT_GROUP_ALIASES[g]);
    } else {
      expanded.push(g);
    }
  }
  return [...new Set(expanded)];
}

// ───────────────────────────────────────────
// 원자 연산 1: 과목 필터링
// ───────────────────────────────────────────
function filterSubjects(subjects, { 교과목록 = null, 학년목록 = null, isCareer = null, 제외교과 = null, warnings = null } = {}) {
  const 원본교과목록 = 교과목록;
  교과목록 = normalizeSubjectGroup(교과목록);

  if (교과목록 != null && warnings != null) {
    const known = new Set(subjects.map(s => s.교과));
    const unknown = 교과목록.filter(g => !known.has(g));
    if (unknown.length > 0) {
      warnings.push(
        `교과군 '${JSON.stringify(원본교과목록)}' 중 학생 데이터에 없는 교과 발견: ${JSON.stringify(unknown)} ` +
        `(SUBJECT_GROUP_ALIASES 매핑 누락 가능성 - 결과를 그대로 신뢰하지 말 것)`
      );
    }
  }

  return subjects.filter(s => {
    if (교과목록 != null && !교과목록.includes(s.교과)) return false;
    if (제외교과 != null && 제외교과.includes(s.교과)) return false;
    if (학년목록 != null && !학년목록.includes(s.학년)) return false;
    if (isCareer != null && s.is_career !== isCareer) return false;
    return true;
  });
}

// ───────────────────────────────────────────
// 원자 연산 2: 점수화 + 상위 N 선택
// ───────────────────────────────────────────
function scoreKey(s, achievementMap) {
  if (s.grade != null) return s.grade;
  if (s.achievement != null && achievementMap) {
    return achievementMap[s.achievement] ?? 9;
  }
  return 9;
}

function pickTopN(subjects, n, achievementMap = null, tieBreak = 'unit') {
  if (n == null || n >= subjects.length) return [...subjects];
  const sorted = [...subjects].sort((a, b) => {
    const sa = scoreKey(a, achievementMap), sb = scoreKey(b, achievementMap);
    if (sa !== sb) return sa - sb;
    if (tieBreak === 'unit') return (b.unit || 0) - (a.unit || 0);
    return 0;
  });
  return sorted.slice(0, n);
}

// ───────────────────────────────────────────
// 원자 연산 3: 평균 계산
// ───────────────────────────────────────────
function average(subjects, achievementMap = null, weighted = true) {
  if (!subjects || subjects.length === 0) return null;
  if (weighted) {
    const totalWeight = subjects.reduce((sum, s) => sum + (s.unit || 1), 0);
    if (totalWeight === 0) return null;
    const weightedSum = subjects.reduce((sum, s) => sum + scoreKey(s, achievementMap) * (s.unit || 1), 0);
    return Math.round((weightedSum / totalWeight) * 10000) / 10000;
  } else {
    const scores = subjects.map(s => scoreKey(s, achievementMap));
    return Math.round((scores.reduce((a, b) => a + b, 0) / scores.length) * 10000) / 10000;
  }
}

// ───────────────────────────────────────────
// 규칙 실행기
// ───────────────────────────────────────────
function compute단순상위N(subjects, rule, achievementMap = null) {
  const pickedAll = [];
  const warnings = [];
  for (const r of (rule.규칙 || [])) {
    let 교과군 = r.교과군;
    if (typeof 교과군 === 'string') 교과군 = null;
    const n = r.선택수;
    if (typeof n !== 'number') continue;
    const isCareerFilter = r.진로선택 === '미반영' ? false : null;
    const candidates = filterSubjects(subjects, { 교과목록: 교과군, isCareer: isCareerFilter, warnings });
    const picked = pickTopN(candidates, n, achievementMap);
    pickedAll.push(...picked);
  }
  if (pickedAll.length === 0) {
    return { 환산등급: null, reliability: 'none', note: '자동계산 불가 - 규칙 자유서술형', warnings };
  }
  const result = { 환산등급: average(pickedAll, achievementMap, false), reliability: 'high', 반영과목수: pickedAll.length };
  if (warnings.length > 0) {
    result.reliability = 'low';
    result.warnings = warnings;
  }
  return result;
}

function compute교과군별상위N(subjects, rule, achievementMap = null) {
  return compute단순상위N(subjects, rule, achievementMap);
}

function compute복합공통선택진로선택별도(subjects, rule, achievementMap = null) {
  const pickedAll = [];
  const warnings = [];
  for (const r of (rule.규칙 || [])) {
    let 교과군 = r.교과군;
    let isCareer, 교과목록;
    if (typeof 교과군 === 'string' && 교과군.includes('진로선택')) {
      isCareer = true;
      교과목록 = null;
    } else if (Array.isArray(교과군)) {
      isCareer = false;
      교과목록 = 교과군;
    } else {
      isCareer = null;
      교과목록 = null;
    }
    const n = r.선택수;
    if (typeof n !== 'number') continue;
    const candidates = filterSubjects(subjects, { 교과목록, isCareer, warnings });
    const picked = pickTopN(candidates, n, achievementMap);
    pickedAll.push(...picked);
  }
  if (pickedAll.length === 0) {
    return { 환산등급: null, reliability: 'none', note: '자동계산 불가', warnings };
  }
  const result = { 환산등급: average(pickedAll, achievementMap, false), reliability: 'high', 반영과목수: pickedAll.length };
  if (warnings.length > 0) {
    result.reliability = 'low';
    result.warnings = warnings;
  }
  return result;
}

function compute가산점만상위N(subjects, rule, achievementMap = null) {
  const base = average(filterSubjects(subjects, { isCareer: false }), achievementMap, true);
  const bonusRule = (rule.규칙 && typeof rule.규칙 === 'object' && !Array.isArray(rule.규칙)) ? rule.규칙.가산점 : null;
  return {
    기본환산등급: base,
    가산점_원본설명: bonusRule,
    reliability: 'medium',
    note: '가산점 적용 공식이 대학마다 달라 원문 확인 후 수동 합산 필요',
  };
}

function compute전과목(subjects, rule, achievementMap = null) {
  return { 환산등급: average(subjects, achievementMap, true), reliability: 'high', 반영과목수: subjects.length };
}

function compute불명확(subjects, rule) {
  return { 환산등급: null, reliability: 'none', note: rule.특이사항 || '원문 추가 확인 필요 - 자동계산 불가' };
}
