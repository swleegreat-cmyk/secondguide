<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2027학년도 수시 상담 · 병점고 3-4</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F0E8;
  --card: rgba(255,255,255,0.58);
  --card-solid: #FFFDF8;
  --ink: #1C1B19;
  --sub: #56524B;
  --muted: #9B958A;
  --border: rgba(70,60,48,0.13);
  --teal: #143A40;
  --teal-mid: #1C5A60;
  --teal-light: #E0EEED;
  --copper: #C77B3C;
  --copper-light: #F6ECDF;
  --cream: #EFE9DF;
  --green: #2E7D5B;
  --green-light: #E6F0EA;
  --blue: #15827C;
  --blue-light: #E0EEED;
  --orange: #C77B3C;
  --orange-light: #F6ECDF;
  --red: #B14A36;
  --red-light: #F3E3DE;
  --purple: #5A3D78;
  --purple-light: #EDE5F5;
  --radius: 20px;
  --radius-sm: 13px;
  --glass: rgba(255,255,255,0.58);
  --glass-border: rgba(70,60,48,0.13);
  --shadow: 0 16px 38px -22px rgba(45,33,20,0.42), 0 1px 0 rgba(255,255,255,0.55) inset;
  --shadow-sm: 0 2px 8px rgba(45,33,20,0.08);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.7;
  min-height:100vh;
}
.mono { font-family:'IBM Plex Mono',monospace; }

/* Layout */
.app-layout {
  display:flex;
  min-height:100vh;
}

/* Sidebar */
.sidebar {
  width:260px;
  background:var(--teal);
  color:#fff;
  display:flex;
  flex-direction:column;
  position:fixed;
  top:0; left:0; bottom:0;
  z-index:100;
}
.sidebar-header {
  padding:24px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.sidebar-header .badge {
  display:inline-block;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.15);
  padding:2px 10px;
  border-radius:12px;
  font-size:10px;
  font-weight:600;
  letter-spacing:0.5px;
  text-transform:uppercase;
  margin-bottom:8px;
}
.sidebar-header h1 {
  font-size:18px;
  font-weight:800;
  line-height:1.3;
  margin-bottom:4px;
}
.sidebar-header p {
  font-size:11px;
  color:rgba(255,255,255,0.6);
}
.sidebar-search {
  padding:12px 16px;
}
.sidebar-search input {
  width:100%;
  padding:8px 12px;
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px;
  background:rgba(255,255,255,0.08);
  color:#fff;
  font-family:inherit;
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
.sidebar-search input::placeholder { color:rgba(255,255,255,0.4); }
.sidebar-search input:focus { border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.12); }
.sidebar-count {
  padding:0 20px 8px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.5px;
  color:rgba(255,255,255,0.5);
}
.sidebar-count span { color:var(--muted); font-weight:600; }
.roster {
  flex:1;
  overflow-y:auto;
  padding:0 8px 16px;
}
.roster::-webkit-scrollbar { width:4px; }
.roster::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.2); border-radius:2px; }
.student-btn {
  display:flex;
  align-items:center;
  gap:10px;
  width:100%;
  padding:8px 12px;
  border:none;
  background:transparent;
  color:#fff;
  font-family:inherit;
  font-size:13px;
  cursor:pointer;
  border-radius:10px;
  transition:background .15s;
  text-align:left;
}
.student-btn:hover { background:rgba(255,255,255,0.08); }
.student-btn.active { background:rgba(255,255,255,0.15); }
.student-avatar {
  width:36px; height:36px;
  border-radius:10px;
  background:var(--teal-mid);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:15px;
  flex-shrink:0;
}
.student-btn.active .student-avatar { background:var(--copper); }
.student-meta { min-width:0; }
.student-meta .name { font-weight:600; font-size:13.5px; }
.student-meta .grade-chip {
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;
  font-weight:600;
}

/* Main content */
.main {
  flex:1;
  margin-left:260px;
  padding:24px 28px 60px;
  max-width:calc(100% - 260px);
}

/* Glass card */
.glass {
  background:var(--glass);
  backdrop-filter:blur(22px) saturate(1.3);
  -webkit-backdrop-filter:blur(22px) saturate(1.3);
  border-radius:var(--radius);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow);
  padding:20px 24px;
  margin-bottom:14px;
}
.glass h3 {
  font-size:14px;
  font-weight:700;
  margin-bottom:14px;
  color:var(--ink);
}

/* Student profile header */
.profile-header {
  display:flex;
  align-items:center;
  gap:16px;
  flex-wrap:wrap;
}
.profile-avatar {
  width:52px; height:52px;
  border-radius:var(--radius-sm);
  background:var(--teal-mid);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:22px;
}
.profile-info .pname { font-size:20px; font-weight:800; }
.profile-info .pmeta { font-size:12px; color:var(--sub); }
.profile-chips {
  display:flex;
  gap:6px;
  margin-left:auto;
  flex-wrap:wrap;
}
.chip {
  padding:4px 12px;
  border-radius:8px;
  font-size:11px;
  font-weight:600;
  white-space:nowrap;
}
.chip-teal { background:var(--teal-light); color:var(--teal); }
.chip-copper { background:var(--copper-light); color:var(--copper); }
.chip-green { background:var(--green-light); color:var(--green); }
.chip-red { background:var(--red-light); color:var(--red); }

/* Tabs */
.tab-bar {
  display:flex;
  gap:4px;
  padding:4px;
  background:var(--cream);
  border-radius:14px;
  margin-bottom:16px;
}
.tab-btn {
  flex:1;
  padding:9px 8px;
  border:none;
  background:transparent;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  color:var(--sub);
  border-radius:10px;
  cursor:pointer;
  transition:all .2s;
}
.tab-btn.active {
  background:var(--teal);
  color:#fff;
}

/* Tab panels */
.tab-panel { display:none; }
.tab-panel.active { display:block; }

/* Gauge SVG */
.gauge-wrap {
  display:flex;
  justify-content:center;
  margin:8px 0 12px;
}

/* Grade table */
.g-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.g-table th {
  background:var(--cream);
  padding:7px 10px;
  text-align:left;
  font-weight:600;
  font-size:11px;
  color:var(--muted);
  border-bottom:1px solid var(--border);
  text-transform:uppercase;
  letter-spacing:0.3px;
}
.g-table td {
  padding:7px 10px;
  border-bottom:1px solid var(--border);
}
.g-table tr:last-child td { border-bottom:none; }

/* Grade dot */
.g-dot {
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:28px; height:28px;
  border-radius:50%;
  font-size:13px;
  font-weight:700;
  font-family:'IBM Plex Mono',monospace;
}

/* Subject bar */
.subj-bar {
  display:flex;
  align-items:center;
  margin-bottom:5px;
  font-size:13px;
}
.subj-bar .lbl { width:60px; font-weight:600; font-size:12px; color:var(--sub); }
.subj-bar .bar-bg {
  flex:1; height:20px;
  background:var(--cream);
  border-radius:4px;
  overflow:hidden;
  margin:0 10px;
}
.subj-bar .bar-fg {
  height:100%;
  border-radius:4px;
  transition:width .6s ease;
}
.subj-bar .val {
  width:55px;
  text-align:right;
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:13px;
}

/* Match cards */
.match-row {
  display:flex;
  align-items:center;
  gap:14px;
  padding:14px 16px;
  margin-bottom:8px;
  background:var(--card-solid);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  transition:box-shadow .2s;
}
.match-row:hover { box-shadow:var(--shadow-sm); }
.match-badge {
  padding:5px 12px;
  border-radius:8px;
  font-size:12px;
  font-weight:700;
  min-width:48px;
  text-align:center;
}
.badge-safe { background:var(--green-light); color:var(--green); }
.badge-fit { background:var(--blue-light); color:var(--blue); }
.badge-bold { background:var(--orange-light); color:var(--orange); }
.badge-reach { background:var(--red-light); color:var(--red); }
.match-body { flex:1; min-width:0; }
.match-body .univ { font-weight:700; font-size:15px; }
.match-body .jeon { font-size:11px; color:var(--muted); }
.match-num {
  text-align:right;
}
.match-num .big {
  font-family:'IBM Plex Mono',monospace;
  font-size:22px;
  font-weight:700;
}
.match-num .unit { font-size:10px; color:var(--muted); }

/* Search bar */
.search-bar {
  display:flex;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.search-input {
  flex:1;
  min-width:180px;
  padding:8px 14px;
  border:1px solid var(--border);
  border-radius:10px;
  background:var(--card-solid);
  font-family:inherit;
  font-size:13px;
  outline:none;
}
.search-input:focus { border-color:var(--teal-mid); }
.filter-btn {
  padding:6px 14px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--card-solid);
  font-family:inherit;
  font-size:12px;
  font-weight:500;
  color:var(--sub);
  cursor:pointer;
  transition:all .15s;
}
.filter-btn.active {
  background:var(--teal);
  color:#fff;
  border-color:var(--teal);
}

/* Record item */
.rec-item {
  padding:14px 16px;
  margin-bottom:8px;
  background:var(--card-solid);
  border-radius:var(--radius-sm);
  font-size:13px;
  line-height:1.9;
  border:1px solid var(--border);
}
.rec-tag {
  display:inline-block;
  padding:2px 8px;
  border-radius:6px;
  font-size:10px;
  font-weight:700;
  margin-right:6px;
  margin-bottom:6px;
}

/* Alert */
.alert-item {
  padding:10px 14px;
  margin-bottom:6px;
  border-radius:10px;
  font-size:12px;
  border-left:3px solid var(--orange);
  background:var(--orange-light);
  color:var(--ink);
}

/* Opinion */
.opinion-box {
  padding:16px;
  margin-bottom:10px;
  background:var(--purple-light);
  border-radius:var(--radius-sm);
  font-size:13px;
  line-height:1.9;
  border-left:3px solid var(--purple);
}

/* Summary grid */
.stat-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:10px;
  margin-bottom:16px;
}
.stat-box {
  background:var(--cream);
  border-radius:var(--radius-sm);
  padding:16px;
  text-align:center;
}
.stat-box .num {
  font-family:'IBM Plex Mono',monospace;
  font-size:28px;
  font-weight:800;
}
.stat-box .label {
  font-size:11px;
  color:var(--muted);
  margin-top:2px;
}

/* Empty state */
.empty {
  text-align:center;
  padding:80px 20px;
  color:var(--muted);
}
.empty .icon { font-size:56px; margin-bottom:16px; opacity:.4; }
.empty p { font-size:14px; }
.empty .hint { font-size:12px; margin-top:8px; color:var(--muted); }

/* Fav button */
.fav-btn {
  background:none; border:none; cursor:pointer; font-size:16px; padding:4px;
  opacity:0.4; transition:opacity .2s;
}
.fav-btn:hover, .fav-btn.on { opacity:1; }

/* Combo bars */
.combo-bar {
  display:flex;
  align-items:center;
  margin-bottom:5px;
  font-size:12px;
}
.combo-bar .clbl { width:80px; font-weight:500; color:var(--sub); font-size:11px; }
.combo-bar .cbar {
  flex:1; height:22px;
  background:var(--cream);
  border-radius:5px;
  overflow:hidden;
  margin:0 10px;
  position:relative;
}
.combo-bar .cfill {
  height:100%;
  border-radius:5px;
  transition:width .6s ease;
}
.combo-bar .cval {
  width:50px;
  text-align:right;
  font-family:'IBM Plex Mono',monospace;
  font-weight:700;
  font-size:13px;
}
.combo-bar .cbest {
  font-size:9px;
  font-weight:700;
  color:#fff;
  background:var(--teal-mid);
  padding:1px 6px;
  border-radius:4px;
  margin-left:6px;
}

/* Trend mini chart */
.trend-wrap {
  display:flex;
  align-items:flex-end;
  gap:2px;
  height:60px;
  padding:8px 0;
}
.trend-col {
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.trend-bar-outer {
  width:100%;
  height:44px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
}
.trend-bar-inner {
  width:70%;
  border-radius:4px 4px 0 0;
  transition:height .5s ease;
}
.trend-label {
  font-size:9px;
  color:var(--muted);
  white-space:nowrap;
}
.trend-val {
  font-size:10px;
  font-weight:700;
  font-family:'IBM Plex Mono',monospace;
}

/* Sort controls */
.sort-controls {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}
.sort-btn {
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:6px;
  background:var(--card-solid);
  font-family:inherit;
  font-size:11px;
  color:var(--sub);
  cursor:pointer;
}
.sort-btn.active {
  background:var(--teal);
  color:#fff;
  border-color:var(--teal);
}

/* Filter chips for 판정 */
.band-filter {
  display:inline-flex;
  gap:4px;
  margin-left:12px;
}
.band-chip {
  padding:3px 10px;
  border-radius:6px;
  font-size:10px;
  font-weight:600;
  cursor:pointer;
  border:1px solid transparent;
  transition:all .15s;
}
.band-chip:hover { opacity:.8; }
.band-chip.active { border-color:currentColor; }

/* Analysis card */
.analysis-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}
.analysis-item {
  padding:12px 14px;
  border-radius:10px;
  font-size:12px;
  line-height:1.7;
}
.analysis-item .alabel {
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.3px;
  margin-bottom:4px;
}

/* Scrollable table */
.scroll-table { max-height:500px; overflow-y:auto; }
.scroll-table::-webkit-scrollbar { width:4px; }
.scroll-table::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* Detail toggle */
.detail-box {
  display:none; margin-top:8px; padding:10px;
  background:var(--cream); border-radius:8px; font-size:11px;
}
.detail-box.open { display:block; }
.dtgl {
  background:none; border:none; color:var(--teal-mid);
  font-family:inherit; font-size:11px; cursor:pointer; padding:2px 0;
}

/* Semester toggle */
.sem-detail { display:none; }
.sem-detail.open { display:block; }
.sem-toggle.open .sem-arrow { transform:rotate(90deg) !important; }
.sem-toggle { transition:background .15s; }
.sem-toggle:hover { background:var(--cream) !important; }

/* Privacy footer */
.footer {
  text-align:center;
  padding:16px;
  font-size:10px;
  color:var(--muted);
  margin-top:32px;
}
.footer button {
  background:var(--red-light); color:var(--red); border:none;
  padding:3px 10px; border-radius:6px; font-family:inherit;
  font-size:10px; cursor:pointer; margin-left:8px;
}

/* Mobile */
@media (max-width:768px) {
  .sidebar { width:100%; position:relative; max-height:50vh; }
  .main { margin-left:0; max-width:100%; padding:16px 12px 60px; }
  .app-layout { flex-direction:column; }
  .profile-header { flex-direction:column; align-items:flex-start; }
  .profile-chips { margin-left:0; }
  .match-row { flex-direction:column; align-items:flex-start; }
  .match-num { text-align:left; }
}

/* Print */
@media print {
  .sidebar { display:none; }
  .main { margin-left:0; max-width:100%; }
  .tab-bar { display:none; }
  .tab-panel { display:block !important; page-break-before:always; }
  .tab-panel:first-of-type { page-break-before:avoid; }
  body { background:#fff; }
  .glass { backdrop-filter:none; -webkit-backdrop-filter:none; background:#fff; box-shadow:none; border:1px solid #ddd; }
}
</style>
</head>
<body>
<div class="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="badge">2027 수시</div>
      <h1>수시 상담</h1>
      <p>병점고 3학년 4반 &middot; 34명</p>
    </div>
    <div class="sidebar-search">
      <input type="text" id="rosterSearch" placeholder="학생 검색..." autocomplete="off">
    </div>
    <div class="sidebar-count">상담 학생 <span id="rosterCount">34</span></div>
    <div class="roster" id="roster"></div>
  </aside>

  <!-- Main -->
  <div class="main" id="mainArea">
    <div id="contentArea">
      <div class="empty">
        <div class="icon">&#x1F393;</div>
        <p>좌측에서 학생을 선택하면</p>
        <p>성적 · 수시 탐색 · 생기부가 한 화면으로 이어집니다.</p>
      </div>
    </div>
  </div>

</div>

<script>
