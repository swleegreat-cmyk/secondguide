습득한 지식을 내면화하는 모습에서 정보 처리 역량과 창의적 역량이 엿보임. 고전시가 감상 발표 수업에서 시조 '흥망이 유수하니'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 황폐해진 고려의 궁궐터를 보며 느끼는 감정을 노래한 작품의 내용을 잘 전달하고, 시적 화자가 느꼈을 무상감과 허무함의 정서에 깊이 공감을 표현하는 모습에서 문학적 감수성이 드러남. 자신이 발표한 시조가 거부할 수 없는 역사의 흐름을 노래한 것과 달리 꿈을 통해 자신의 삶을 변화시켜 나가는 내용의 소설 '달러구트 꿈 백화점'을 상호 텍스트로 선정하여 읽고 감상문을 씀. 두 작품을 통해 운명은 정해진 것인가 새롭게 만들어 나갈 수 있는 것인가라는 질문을 던지고 자신의 삶에 대해 고찰해보는 부분에서 자아 성찰 역찰 역량이 엿보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수학 독서 탐구 활동에서 윌리스가 새로운 법칙과 풀이법을 개발한 점을 배우고 싶고, 갈루아가 긴 시간 노력하는 모습에","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"학교에서 배운 규칙 및 방법을 정확하게 이해하고 독서논술 활동에서 제시된 문제에 대한 규칙과 방법을 글로 표현하는 능력을 보여줌. 리그전 경기 활동에서 경쟁을 통해 승패에 승복할 줄 아는 마음을 배웠고, 랠리 활동에서 협동을 통해 연속으로 20회 이상 랠리하는 능력도 갖춤.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능을 꾸준히 연습하여 수행능력을 높임. 송구와 타격의 기술을 꾸준히 연습하여 경기 중에 정확하고 신속한 송구와 강력한 타격을 선보임. 경기 중에도 침착하게 상황을 판단하고 적절한 판단을 내리는 능력을 갖추어 경기를 전략적으로 진행함. 송구와 타격의 기본기를 탄탄히 다지면서도 끊임없이 발전시키는 의지를 보임. 경기 중에도 실수를 두려워하지 않고 도전하는 자세를 보이며, 승패에 연연하지 않고 자신의 플레이에 최선을 다함. 티볼 경기의 승패를 넘어서 자기계발과 성장을 중시하며, 승리보다 과정과 노력을 중요시함. 티볼 경기에서의 경험과 노력을 통해 자신을 객관적으로 평가하고 발전시킬 수 있는 능력을 갖추고 있음. 스포츠 인성 수업 중 리더십에 대해 티볼 경기 중에 주장을 모습을 보고 협동심을 통해 팀이 하나됨의 중요성을 활동지에 작성함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고 가사의 의미를 생각하며 이야기를 만드는 활동에 참여함. 통기타가 특징인 '포크', 사랑을 주제로 한 노래가 많은 '발라드'에 대해 조사하여 알기 쉽게 정리하고, '포크'와 '발라드' 장르의 노래를 찾아 활동지를 작성함. '꿈'과 관련된 노래를 듣고 가사의 의미를 정리한 후 가사의 내용과 어울리게 이야기를 만들어 친구들과 공유하고 소감을 작성함. 칼림바를 연주하면서 빠르기를 맞추지 못해 어려워했지만, 전문가의 음원을 들으며 맞춰가는 과정이 성장을 위한 좋은 기회였다고 연습 과정과 소감을 작성함. 우쿨렐레를 연습할 때 코드 운지법을 숙지하고, 자연스러운 스트로크를 구사하기 위해 노력하여 실력을 향상했으며 이런 과정이 목표를 세워 추진할 때 도움이 되었다고 연습 과정과 느낀","c":"음악"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '콘크리트의 성분과 특성'에 관한 글을 읽고, 골재 조절을 통해 강도를 변화시킬 수 있음을 이해하여 그 내용을 기술함. 콘크리트의 치명적 약점인 인장력을 보완하기 위해 철근 콘크리트와 프리스트레스트 콘크리트가 순차적으로 개발된 과정을 체계적으로 파악하여 제시하였으며, 건축 재료에 대한 공학적 연구와 기술 발전이 건축물의 구조적 완성도를 높이고, 나아가 건축 미학을 발전시키는 토대가 된다는 유기적 상관관계에 대해 설명함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 발췌독한 후, 사회 문제에 대한 필자의 생각을 중심으로 자신과 사회의 문제를 해결하는 방법을 모색하는 글을 작성함. 언어가 개인의 사회적 지위를 나타내는 중요한 표식이라고 필자의 견해를 접한 후, 실제 자신의 주변 상황을 떠올려보며 언어와 사회의 관계에 대해 성찰하는 활동을 진행함. 사회적 구조가 개인의 의사 소통 방식에 지대한 영향을 미친다고 설명하며 건전한 의사 소통 문화를 만들기 위해서는 경직된 사회 구조가 아닌 유연한 사회 구조를 조성해야 함을 강조함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '노찬성과 에반(김애란)'을 읽고 비평 활동을 진행함. 병에 걸린 노견을 안락사하는 것이 온당한 것인가에 대해 의문을 품고 다양한 측면에서 생각해 본 것을 독서 일지에 기술함. 또한 작품에 대해 분석적으로 감상한 비평문을 탐색하여 읽은 후, 사회적 소외, 책임을 중심으로 작품이 주제를 도출하였으며, 모둠 책 대화 활동에 참여하여 마지막 장면에서 '노찬성'의 마음이 어떠했을지에 대해 토의를 진행함. 이를 바탕으로 '선택과 후회'라는 제목의 서평을 작성함. 심미적 문학 체험 활동에서 자신의 성격에 대한 불만과 자조의 감정으로 힘들어하는 동료 학습자의 고민편지를 받고 시 처방전을 작성함. 시 '미지수(이장근)'의 시적 화자가 '나는 나를 푸는 중이다'라고 한 부분을 소개하며 고민 대상자 역시 시적 화자처럼 끊임없이 자신에 대해 의심하며 자신을 풀어가는 과정에 임할 것을 권유하는 내용을 시 처방전에 담음. 문학 작품에서 얻은 삶의 교훈을 타인과 공유하며 소통적 문학 활동을 진행한 점에서 능동적 학습자임이 확인됨. \n\n수학Ⅰ: 삼각함수 그래프 탐구 활동에서 단위원에서 출발한 삼각함수 그래프 그리기 및 색칠 활동을 통해 사인, 코사인, 탄젠트 함수의 주기성과 정의역, 치역을 시각적으로 확인하고 그래프의 주요 특징을 색상으로 구분하여 정리하며, 삼각함수의 핵심 개념과 그 의미를 정리함. 카드뉴스를 통한 수학 개념 탐구 활동에서 '늙어가는 대한민국'이라는 주제를 선정하여, 인구 고령화 문제를 수학적으로 설명함. 카드뉴스를 통해 우리나라의 고령인구 비율이 시간에 따라 어떻게 변화하고 있는지를 그래프와 수식으로 시각화하고, 증가 속도를 지수함수의 개념으로 표현함. 특히 특정 시점 이후부터 고령인구 비율이 급격히 증가하는 현상을 강조하며, 이를 시간에 따른 곡선 형태로 나타낸 점이 눈에 띔. 단순한 수치 제시를 넘어 인구 구조 변화가 사회에 미치는 영향을 수학적 그래프를 통해 직관적으로 표현하고, 고령사회에서 발생할 수 있는 문제에 대한 경각심도 함께 담아냄. 수학적 모델을 기반으로 현실 문제를 해석하고, 자료를 바탕으로 예측하려는 시도가 잘 드러나는 9컷 카드뉴스를 완성함.\n\n수학Ⅱ: 함수의 극한 단원에서 '한없이 가까워진다'는 표현의 의미를 그래프를 통해 확인하며 극한의 개념에 접근함. x의 값이 특정 값에 가까워질 때 함수값의 변화를 그림으로 나타내고, 수렴과 발산의 차이를 예시 함수에 적용하여 살펴봄. 좌극한과 우극한을 구분하여 그래프의 왼쪽과 오른쪽에서의 함수값 변화를 확인하며 극한이 하나의 값으로 정해지는 조건을","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"평소 그림 그리기를 좋아하며 자신의 감정과 생각을 자유롭게 시각화하는 데서 즐거움을 느끼는 학생으로, 예술적 표현력뿐 아니라 창의적 사고와 몰입 능력이 한층 성장함. 갤러리 공간 디자인 활동에서 투시 원근법을 활용하여 '자연 박물관'이라는 전시 공간을 기획함. 사물의 기울기와 원근감을 사실적으로 표현하기 위해 반복적인 수정과 세밀한 관찰을 시도하는 등 자기 주도적 미술 역량이 뛰어남. 자연 전시물을 한 눈에 보기 쉽게 배를 타고 구경하는 전시 형식을 구현한 점이 인상적임. 작품의 완성도를 높이고자 끝까지 세부적인 부분까지 다듬어가는 태도가 바람직함. 과제 수행 중 어려움을 느꼈던 사물의 기울기 표현 부분은 교사의 피드백을 적극 수용하여 해결하는 등 소통 역량이 돋보임. 친구들의 작품을 감상할 때 표현 의도와 특징을 꼼꼼히 살피며, 의견을 주고받는 과정에서 성실히 듣고 자연스럽게 소통하는 태도를 보여줌. 판화 제작 활동에서 애니메이션 캐릭터를 주제로 조각함. 아트나이프 사용이 어색했지만, 반복적인 연습을 통해 조각 기술이 점차 향상됨. 형태를 정확히 살리기 위해 선 굵기와 방향을 섬세히 조절하며 포기하지 않는 모습을 보인 점이 인상적임. 꾸준한 몰입과 성실성이 돋보임.","c":"이해하려는 모미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 배드민턴 라켓 소재가 가진 고질적인 강도 문제를 해결할 수 있었던 사례를 제시함. 선수들의 경기력으로 승부가 결정되는 것이 아니라 과학 기술의 개입으로 선수들의 경기 결과에 영향을 주는 것은 스포츠의 본질에 어긋나기에 기술 도핑으로 판단하고 규제해야 함을 발표함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 규칙에 위반되는 동작을 하지 않고 남녀학생의 단합력이 우수하다는 강점이 있지만, 전체적으로 대형 유지가 너무 넓거나 몰려있다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 팀원의 강점을 살려 작전을 세워 실천할 수 있는 자신만의 필승 전략을 세움. 동료와의 협력 수비에 집중하고, 더 많이 뛰어 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼의 원활한 경기 운영을 위해 기본 준비 자세, 언더 토스, 오버 토스 등의 기초 기능 연습에 높은 집중력을 가지고 임하며 이를 경기 중에 활용하였으며, 경기에서 실수한 팀원에게 격려를 지속적으로 함으로써 페어플레이를 펼침.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 유명 농구 선수의 압도적인 체공시간을 물리학적, 생물학적 관점에서 탐구함. 체공시간이 길어지는 비결은 점프 시 발생하는 수직 높이와 초기 점프 속도, 투사 각도 등 다양한 역학적 요인들이 결합된 결과임을 분석함. 특히 다른 사람들과 차별화되는 유전적으로 뛰어난 점프 능력과 타고난 신체 능력이 긴 체공시간을 만들어내","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"평소 재치 있는 모습과 유머로 학급에 많은 웃음을 선사하며, 친구들과의 소통에서 긍정적인 에너지를 발산하는 모습이 돋보임. 착한 성품을 지니고 있어 친구들의 장난에도 너그럽게 반응하며, 갈등 상황에서도 배려와 이해를 통해 원활한 관계를 유지하는 학생임. 생활체육과 운동 분야에 대한 깊은 관심으로 여러 교내 활동에 적극 참여하며, 자신의 흥미를 바탕으로 열심히 자료조사를 통해 결과물을 만들어 내며, 다양한 경험을 쌓고 있음. 이러한 학교 활동을 통해 자신의 진로와 연결하여 관심 분야와 관련된 내용을 심화하고 배경지식을 쌓기 위해 노력하는 모습을 보임. 학업적인 측면에서도 지속적으로 자기주도 학습을 하며, 자신이 부족하다고 느끼는 부분을 인식하고 개선하려는 열망이 강하게 드러남."},{"y":2,"b":"밝고 명랑한 성격을 바탕으로 또래 학생들과 원만한 교우 관계를 유지하며 친구들과 잘 어울리는 모습을 보임. 교사에게 예의 바르게 행동하고 교칙을 성실히 준수하며 안정적인 학교생활을 유지함. 학업에 대한 흥미를 점차 높여 가며 학습 시간을 늘려 가는 변화가 관찰되었고, 방과후 자기 주도 학습에 자발적으로 참여하여 주어진 시간 동안 학습 계획을 세우고 이를 꾸준히 실행해 나가는 모습을 보임. 이를 통해 자기 관리 역량과 학습에 대한 책임감을 확인함. 정해진 규칙과 약속을 잘 지키는 학생으로, 특히 시간 규칙을 성실히 준수함. 예를 들어 정해진 시간까지 할일을 다 마친 후 잊지 않고 교사에게 해당 사항을 알리러 오는 등 정해진 규칙을 잘 준수하여 학교 생활을 무리없이 함. 스포츠에 대한 흥미와 뛰어난 운동 신경을 바탕으로 스포츠 한마당에 참여하여 여러 종목에 학급 친구들과 함께 적극적으로 임하며 좋은 성과를 거둠. 특히 야구에 대한 관심과 역량이 뛰어나 친구들과 함께 운동을 즐기며 건강한 학교생활을 이어감. 또한 1인 1역 활동에서 교탁 정리 도우미 역할을 맡아 교탁 위 학습지를 정리하고 주변을 청결하게 관리하는 등 맡은 역할을 성실하게 수행함."}]},{"name":"석혜연","seat":11,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":3,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":6,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":4,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":6,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":6,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"자신의 장점을 살려 친구들에게 도움을 줄 수 있다고 생각해 주체적인 선택을 통해 '책 읽어주는 친구'로서 일 년 동안 활동하며 다양한 글을 낭독함. 이를 통해 상황에 맞게 반·비언어적 표현을 조절하는 능력을 더욱 함양하고 꼼꼼하게 작품을 분석하는 능력을 기르는 시간을 가짐. 다양한 활동 중 특히 '고전시가 감상 및 성찰하는 글쓰기' 활동에서 훌륭한 심미적 감성 역량을 드러냄. 문학의 수용 활동을 통해 다양한 사회·문화적 가치를 깊이 있게 이해하고 나아가 주체적인 관점에서 분석하는 태도를 보임. 구체적으로 '간밤에 울던 여울~'을 감상하고 발표함. 준비 과정에서 만족스러운 발표를 위해 반복하여 연습하는 모습이 인상적이며, 노력만큼이나 실제 발표에서도 완성도 있는 모습을 보임. 이후 작품의 핵심 가치를 '절의'로 분석한 후 시조의 화자와 상반된 태도를 보이는 주인공이 등장하는 것에 매력을 느껴 '광장'을 선택해 읽음. 자신의 실제 경험과 주인공의 상황을 비교해 보며 소외와 고립이 존재하는 새로운 환경에서 '최적의 광장은 무엇인가, 자신만의 광장이 살면서 존재했는가'에 대해 진지하게 고찰하는 과정을 글에 담음.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"기울기가 주어졌을 때 원점을 중심으로 하는 원의 접선의 방정식을 구하는 법을 소개하는 수학 카드 뉴스를 제작함. 관련 예제를 풀이하며 기울기가 주어지면 원의 접선의 방정식은 항상 두 개가 나옴을 보이는 만화를 그리고, 판별식을 이용하여 기울기가 주어졌을 때 원점을 중심으로 하는 원의 접선의 방정식을 구하는 공식을 정확하게 설명함. 경우의 수 단원을 학습하며 파스칼의 삼각형과 조합의 관계에 흥미를 느껴, '파스칼의 확률 이론'을 주제로 자유 주제 탐구 프로젝트에 참여함. 파스칼의 삼각형의 다양한 성질을 분석하고, 도박 게임에서 비롯된 확률론의 역사적 배경과 발전 과정을 소개함. 파스칼의 삼각형이 복권 당첨 확률 계산, 보험료 산정 등 다양하게 실생활에서 활용됨을 깨닫고, 이항정리와 확률론의 다양한 정리를 추가로 탐구하겠다는 계획을 세움.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"주장하는 글쓰기 활동에서 '생명공학의 급속한 발전은 인간에게 해를 끼칠 수 있다'는 주제로, 탄저균 포자 폭탄의 사례와 생명공학 기업의 식량 생산 독점 및 집약적 농업의 부작용을 구체적으로 제시하며 논리적으로 주장함. 지식품앗이 활동에서","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"체육 시간에 주어진 연습에 대해 성실하게 참여하고 이탈 행동 없이 수업에 참여하는 모습이 인상적임. 체육 수업에서 배운 경기 규칙과 전략에 대해 정확하게 이해하여 논술 활동에서 제시된 문제에 구체적이고 정확한 글로 표현하는 모습을 보여줌. 리그전 경기에서 페어플레이 정신을 발휘하여 경기에 임하는 모습과 이기기 위해 경기에 몰입하는 모습이 관찰됨. 서브 활동에서 자신이 목표한 구역으로 공을 보낼 수 있는 능력을 갖춤. 랠리 활동에서 짝 학생과 협동심을 발휘하여 연습하는 모습을 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 수업에 임하며 성실한 태도를 보임. 규칙 및 방법을 깊이 이해하고, 빈볼시비에 대한 자신의 생각을 스포츠맨십 관점에서 논리적으로 서술함. 기초 기능 연습을 지속적으로 수행하여 우수한 실력을 발휘함. 송구 시 거리별로 정확히 던져 팀원들과의 협력에서도 안정적인 모습을 보임. 타격할 때는 공을 끝까지 바라보며 집중력을 발휘하여 결과적으로 성공적인 타격을 이끌어냄. 플라이볼의 낙하지점을 신속하게 파악하여 안정적으로 포구하는 모습이 인상적임.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고, 가사의 의미를 생각하며 감상하는 활동에 적극적으로 참여함. 가사의 내용이 현재 상황을 객관적으로 써 내려간 노래를 좋아하며, 생각한 대로 하기 위해서는 그만큼의 노력과 희생이 따른다는","c":"음악"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에 참여하여 '공간이 만든 공간(유현준)'의 3장 '농업이 만든 두 세계'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 교사와의 대담에 참여하여 자신의 생각을 말로 표현함. 물리적 공간에 따라 가치관이 형성된다는 글쓴이의 주장에 대해서 최근 많이 활성화되고 있는 메타버스, 인터넷 등의 디지털 공간의 경우 인간의 가치관에 어떤 영향을 줄 지에 대해 고민한 내용을 구술함. 글에서 제시하는 예시인 동양과 서양의 차이뿐만 아니라, 다른 모든 외부적 차이점이 혼합되어 디지털 공간만의 새로운 가치관이 형성되고 있다는 주장을 펼침. 분석적 독서 활동에 참여하여 다양한 주제로 주어진 글을 읽고 분석함. 주어진 글의 핵심어를 추출하여 이를 중심으로 글을 요약했으며 글의 문단을 구분해 문단별 글 구조도를 작성한 뒤 글에 대한 자신의 생각과 감상을 밝힘.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 친구의 게으름과 관련한 고민을 접하고 '봄맞이 꽃(김승기)'을 처방한 뒤 '병명은 게으름'이라는 제목으로 발표를 진행함. 작품 속에서 제시된 꽃들의 특성을 조사하여 청중의 이해를 도왔으며, 봄맞이꽃은 봄까치꽃보다 개화시기가 한 달정도 늦어 게으름으로 보일 수 있지만, 화자는 봄맞이꽃에게 '환경에 맞춰 천천히 준비해 피어나는 생명력'이라는 가치를 부여한다고 말하며 친구도 자신의 게으름에 나름의 가치를 부여하면 좋겠다고 밝힘.\n소설 서평 쓰기 활동에 참여하여 '관내분실(김초엽)'을 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 작품을 통해 가족으로 대상화했던 인물에 대해 개인의 삶으로 구체화하여 이해할 수 있게 되었다고 말하면서 독서를 통해 자신의 인식을 변화시킴. 이를 바탕으로 '돌아가지 못하는 이들을 위하여'라는 제목의 서평을 작성함. 서평에 개인적 경험, 작품 속 소재와 관련한 외부 자료, 친구들과 나눈 책대화 내용 등을 활용하면서 다양한 관점에서 작품을 해석하는 모습을 보임.\n\n수학Ⅰ: 문제 해결의 다각적 해석 활동에서 지수함수와 로그함수의 대칭성과 교점의 조건을 활용하여 문제를 대수적, 기하적으로 동시에 해석하는 모습을 보임. 한 문제에 대해 여러 방식으로 접근하며 함수의 성질을 유기적으로 연결하고, 각 풀이의 타당성을 논리적으로 설명함으로써 수학적 사고의 깊이를 드러냄. 삼각함수의 정의와 실생활 적용 사례를 연결하고자 '삼각함수로 세상을 바라보다'라는 주제로 수학의 현실 적용 가능성을 설명하는 기사문을 작성함. 이후, 카드뉴스를 통해 삼각함수를 시각적 파형으로 표현하고, 진동, 소리, 진폭 등의 물리 현상을 주기성과 진폭, 위상으로 정량화하는 수학적 모델로 구성함. 특히 사인함수를 소리의 높이와 진폭, 탄젠트함수를 경사각과 거리 측정 등 다양한 물리적 상황에 대응하는 함수로 구체화한 점이 인상적임. 삼각 함수의 정의와 성질을 논술하고 이에 대한 이해를 바탕으로 실제 세계의 대응 관계를 수학적으로 조망하며, 개념의 유용성과 확장성을 추구함. 등차, 등비수열의 일반항과 합 공식을 스스로 유도해보는 과정을 통해 개념을 깊이 이해하고, 풀이의 논리성과 단계적 구조를 중시하는 모습을 보임.\n\n수학Ⅱ: 미분계수의 정의를 활용해 미정계수를 구하는 서술형 문항에서 극한의 꼴을 정확히 파악하여 식을 전개함. 특히 역함수 존재 조건인 일대일 대응과 함수의 연속성을 연결하여 구간별 함수 문제를 해결하려는 논리적 시도가 돋보임. 풀이 과정에서 올바른 수학적 기호를 사용하여 자신의 사고 과정을 명확히 전달하려 노력하는 등 서술 태도가 성실함. 빅데이터와 미적분을 활용한 사회 문제 해결 프로젝트에서 소비자 물가 등락률 데이터를 수집하여 시간 흐름에 따라 물가 상승폭이 가팔라지는 현상을 파악하고, 이를 가장 잘 설명하는 지수함수 모델을 도출함. 미분을 활용해 현재 물가가 매년 약 15.6%의 속도로 가","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 꿈, 여행, 음악, 우주, 별 등으로 선정하고 시각적 상징으로 전환하여 초현실적으로 결합함. 음악을 상징하는 헤드폰을 화면 중앙에 크게 배치하고 양옆으로 하늘과 행성, 우주가 역동적으로 뻗어 나오는 화면 구성을 통해 높은 조형 감각을 드러냄. 자기의 생각과 감정을 화면 위에 시각적으로 드러내고자 다양한 아이디어를 주도적으로 시도함. 갤러리 공간 디자인 활동에서 갤러리가 바닷속 아쿠아리움에 들어와 있는 듯한 전시 공간을 기획함. 1점 투시 원근법을 활용하는 과정에서 어려움이 있었으나, 반복적인 수정과 피드백을 통해 정확한 표현 방법을 터득하는 모습이 바람직함. 벽에 전시한 작품이 위로 열리면서 바닷물이 쏟아져 전시장 바닥으로 흘러내리는 설정을 구상한 점이 인상적이고 독창적임. 대상의 물성 표현이 세밀하여 파도 표현을 사실적으로 구현함. 패키지 디자인 활동에서 차를 재료로 한 과자 상자를 기획함. 재료의 향과 이미지를 상징하는 그래픽 요소를 적절히 활용하여 재료의 특성이 잘 드러나도록 디자인함. 지기 구조를 정확하게 설계하고 상자의 각 면에 상품 패키지에 필요한 정보를 충실히 반영하며 성실하게 제작함.","c":"속화되고 있음미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에 과학 기술의 발전이 스포츠 경기력 향상과 부상 위험 감소에 긍정적 영향을 준다는 점을 논리적으로 분석함. 기술 도핑에 대한 규제 필요성도 인식하며, 공정성 확보를 위한 기준 설정의 중요성을 강조함. 스포츠의 진화와 혁신을 긍정적으로 받아들이는 열린 사고를 보임. 시대 변화에 맞춰 스포츠가 발전해야 한다는 관점을 명확히 제시하며, 균형 잡힌 시각과 비판적 사고력이 돋보임. 플라잉디스크의 역사적 유래와 경기 방법을 깊이 이해하며, 디스크의 역학적 원리를 명확히 설명함. 릴리스 타이밍을 익혀 정확한 패스를 선보이며, 2인 1조 패스에서도 친구가 받기 쉽게 던져 안정적인 수행을 보여줌. 빅발리볼과 배구의 차이점을 이해하고, 경기 규칙 및 서브의 장단점을 구분하여 서술함. 언더핸드와 오버핸드 토스를 꾸준히 연습하여 좋은 기록을 보임. 상위 기술인 콤비네이션리시브, 토스, 스파이크를 안정적으로 수행하며 리그 경기에서 자신의 역할을 충분히 해냄. 스포츠 활동을 통해 신체 능력뿐만 아니라 사회적 역량도 함께 성장함.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 '에어'를 보고 농구화 브랜드가 특정 공동체의 문화적 상징으로 부상한 배경을 비즈니스 및 사회학적 관점에서 탐구함. 압도적인 능력을 바탕으로 인종적 편견을 극복한 선수의 이미지가 공동체에게 성공의 이정표가 되었으며, 해당 제품을 착용하는 행위가 자부심을 표출하는 수단으로 작용했음을 분석함. 또한 1980년대 후반 저항 문화의 중심이었던 힙합 및 거리 문화와 유기적으로 결합하여 독창적인 스타일과 성취의 상징으로 자리 잡았다고 기술함. 특히 문화적 특성을 세련되게 묘사한 광고 마케팅이 소비자로 하여금 브랜드를 내면화하는 계기를 마련했다는 견해를 밝힘. 마지막으로 기득권 체제의 규제에 맞선 ‘저항의 서사’와 희소성 마케팅이 소외감을 느끼던 청년층의 정서와 맞물려 단순한 상품을 넘어 세대를 전수하는 강력한 문화적 유산이자 경제적 성취의 척도가 되었음을 배웠다고 이야기함.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"진로 모둠 활동 시간에 모둠원들과 주제 선정과 실천 과정에서 의견 차이가 발생했지만, 지속적인 대화와 논의를 통해 합의점을 찾아 문제를 해결함. 각자의 의견을 존중하며 공동의 목표를 향해 나아가기 위해 협력함. 의견 충돌을 해결하기 위해서는 경청과 배려가 필요하다는 것을 배웠고, 협력을 통해 더 나은 결과를 만들어갈 수 있다는 것을 경험하였다고 소감을 밝힘. 원활한 소통과 협력을 통해 문제를 해결하며 목표를 달성한 모습이 돋보임. 2학기 동안 1인 1역으로 칠판 관리를 맡"},{"y":2,"b":"언행 전반에서 또래에 비해 성숙함이 느껴지는 학생으로, 상대방과 대화 시 상황에 맞는 언어와 말투를 신중하게 고려하는 태도가 지속적으로 관찰됨. 사제관계는 물론 교우관계에서도 예의와 존중을 바탕으로 소통하며, 감정에 치우치기보다 이성적으로 판단하고 행동하려는 모습이 돋보임. 행동 전후의 책임을 스스로 인식하고 있어 항상 조심스럽고 성실한 태도로 학교생활에 임함. 힘든 일이 발생하더라도 쉽게 흔들리거나 무너지지 않는 안정적인 성품을 지니고 있으며, 긍정적인 사고를 바탕으로 상황을 받아들이는 태도가 인상적임. 스포츠한마당 응원댄스 준비 과정에서는 활동에 어려움을 느끼는 학생들을 따로 모아 처음부터 천천히, 친절하게 지도하는 모습을 보여 주었으며, 타인의 입장에서 생각하고 배려할 줄 아는 선한 인성을 잘 드러냄. 담임교사가 중요한 역할이나 업무도 안심하고 맡길 수 있을 만큼 교사들의 신뢰를 받고 있고, 주변 친구들을 세심하게 챙기며 학급 구성원 간의 관계를 원만하게 하는 데에도 기여함. 이러한 배려심과 책임감 있는 태도는 또래 학생들에게도 귀감이 되며, 전반적으로 성숙한 인성과 안정적인 학교생활을 바탕으로 학급 공동체에 긍정적인 영향을 미치는 학생임."}]},{"name":"손주완","seat":12,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":2,"g":4,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":4,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":3,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":4,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":2,"g":4,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":3,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":3,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":4,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":6,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":6,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":2,"g":6,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 확고한 진로 관심사를 바탕으로 '과학 콘서트'를 선정하여 읽고 독서 일지를 작성함. 이를 바탕으로 한 즉문즉답 인터뷰 활동에서 일상과 과학이 밀접하게 관련되어 있다는 깨달음과 과학에 대한 자신감이 생겼음을 조리 있게 잘 전달함. 독서를 통해 습득한 지식을 자신의 언어로 재구성하여 표현하는 모습에서 창의적 사고력과 지식 정보 처리 역량이 드러남. 고전시가 감상 발표 수업에서 시조 '눈 맞아 휘어진 대를'을 다양한 관점에서 해석하고 자신의 감상을 발표함. 작품의 내용과 표현법, 특징과 주제 등을 매우 유창하게 전달하고, 고려의 유신으로서 조선의 부름을 거부하고 충절을 지키는 작가에 대한 감탄을 진솔하게 나누는 모습에서 주체적 문학 감상 능력과 의사소통 역량이 돋보임. 자신이 발표한 시조에서 '지조와 절개'라는 가치를 발견하고 이에 대한 상호 텍스트로 '남한산성'을 선정하여 읽고 감상문을 씀. 청나라의 침략에 인조는 결국 남한산성에서 굴욕적인 사대를 맺게 되지만, 마음만은 꺾이지 않고 조선에 대한 절개를 끝까지 지킨 신하들과 백성들에게 깊은 감명을 받았음을 밝히고 이러한 가치가 오늘날에도 필요함을 역설하는 부분에서 문학적 감수성이 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수학 독서 탐구 활동에서 가우스에게서 탐구하는 자세를 본받고 싶고, 갈루아를 통해 겸손한 자세를 유지해야 한다는 교훈을 얻음을 밝힘. 근과 계수의 관계를 활용하여 이차방정식의 해를 구함. 삼각형의 무게중심 좌표를 찾는 과정을 증명함. 집합을 주제로 한 카드 뉴스 작성 활동에서 많은 개수의 음식 중 하나를 선택해야 하는 상황을 제시함. 이때, 집합 개념을 활용하면 음식을 종류에 따라 분류하여 편리하게 선택할 수 있음을 언급하여 집합 개념의 유용성을 느낄 수 있었다는 소감을 밝힘. 좌표평면 위의 점을 일정한 거리만큼 옮기는 점의 평행이동으로부터 도형을 평행이동했을 때의 방정식을 올바르게 추측하고 그 과정을 정당화함. 변수를 포함한 문장이나 식이 주어졌을 때 변수에 구체적인 값을 대입해 보는 활동을 통하여 참, 거짓을 판별해 보고 조건의 뜻을 올바르게 추론함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"재치와 유머 감각이 뛰어난 학생으로, 수업 중 가끔 돌발적인 재치를 발휘하여 학급에 즐거움과 웃음을 선사함. 수업에 성실히 임하며 긍정적인 태도를 유지하여 자신이 부족한 영역을 개선하려고 함. '게임의 예술성'이라는 관심 주제를 통해 미학적 요소를 탐구하고 이를 영어로 설명하는 모습이 인상적이었음. 다양한 게임 속에서 나타나는 시각적 요소, 서사 구조, 그리고 음악과 그래픽 디자인 등 예술적인 측면을 구체적인 사례로 체계적으로 정리해 영어 문장과 연계하여 발표함으로써 새로운 즐거","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 활동에서 배운 내용을 바탕으로 논술 활동 중 제시된 내용에 정확하게 답하는 모습을 보여줌. 리그전 활동, 탁구 랠리, 서브 활동을 위해 열심히 노력하는 모습도 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 활동 초기에 어려워했지만 티볼 타격 시 정확한 타점을 맞추기 위한 연습을 꾸준히 하여 원하는 힘과 방향으로 공을 보내는 기술적 발전이 관찰됨. 부족한 기술이어도 포기하지 않고 자신만의 방법으로 해결해나가려는 모습을 보임. 스포츠 인성 수업에서 자신의 성격과 장점을 살릴 수 있는 리더십에 대해 스스로 이끌어나가는 리더보다는 전략과 전술을 짜며 리더를 도와줄 수 있다는 팔로우십의 중요성을 강조함. 이러한 과정에서 얻을 수 있는 배움에 집중하는 것이 협력과 소통임을 깨달음.","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '국제결제은행 자기자본비율과 바젤 협약의 변천사'와 관련된 글을 읽고 자기자본 규제가 강화되어 온 배경과 협약이 비회원국에게도 통용되는 이유에 대해 탐구함. 법적 강제성은 없지만 협약의 내용을 지키는 것이 국제 금융 시장에서 신뢰도를 확보할 수 있는 방법이라는 것을 알게 되어 흥미로웠다고 기술함. 독서 자료에서 제시한 '말랑말랑한 법'","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"매시간 적극적으로 수업에 임하며 아이디어 구상력, 시각적 표현력, 공간 구성 역량을 고루 성장시키는 모습이 인상적임. 갤러리 공간 디자인 활동에서 자신이 좋아하는 사물과 개념을 다양하고 조화롭게 구성하는 전시 공간을 기획함. 초기 구상 단계에서는 떠오르는 생각들이 많아 구체적인 표현에 어려움을 겪었으나, 아이디어를 명확히 정리하며 이미지를 체계적으로 시각화하는 등 자기 주도적 미술 학습 역량을 잘 발휘함. 마치 현실의 전시 공간을 창조하는 듯한 몰입감을 보이며 열정적으로 활동하는 모습이 바람직함. 판화 제작 활동에서 애니메이션 듀오 캐릭터를 주제로 친구와 한 명씩 나누어 조각한 뒤 하나의 합동 작품으로 완성함. 섬세한 조각과 채색을 통해 캐릭터의 특징을 잘 살렸으며, 친구와 함께 구성을 기획하고 완성 후 그림을 맞춰보는 과정을 즐기며 의사소통 능력과 협력 태도를 기름. 패키지 디자인 활동에서 육면체 구조에서 벗어나 카탈로그 형식의 패키지를 기획하며 독창적인 조형 아이디어를 제시함. 특히 중앙에 시중의 원통형 과자 기둥 일부를 접합해 실제 과자를 넣어 완성하는 등 기존 패키지 구조를 재해석하며 새로운 형식을 구현한 점에서 높은 창의 융합 능력이 나타남.","c":"을미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 사이클 경주에서 사용되는 자전거 프레임은 공기역학적으로 설계되어 사이클 선수가 더 빨리 달릴 수 있도록 도움을 준 사례를 제시함. 스포츠 장비를 생산하는 과정에서 기술을 발전시키기 위해 연구하는 것 역시 인정받아야 하며 이를 혁신으로 인정해야 한다는 의견을 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 배려를 통해 서로 응원하는 분위기와 장거리 및 패스 정확성의 강점이 있지만, 공격 기회가 생겼을 때 다소 급하게 플레이한다는 점을 인지하여 팀원 간의 의사소통에 더욱 신경을 씀으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 1대 1 수비 마크를 놓치지 않도록 대형을 유지하는 자신만의 필승 전략을 세움. 중앙구역에서 동료에게 정확하게 패스를 연결하고 수비함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 언더 토스 연습에서 양손을 바르게 잡고 무릎의 굴신 작용을 활용할 수 있었으며, 경기에서 성공적인 공격을 실행할 수 있는 전략을 구상하고 팀원들과 공유하려는 노력을 통해 공동체 의식을 함양함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"책임감이 뛰어나 본인이 맡은 역할에 대해 강한 의식을 가지고 있는 학생임. 학급의 칠판 관리를 책임지고 항상 청결한 상태를 유지함으로써 친구들에게 모범을 보이고, 주변의 극찬을 받고 있음. 분필 관리와 물걸레로 마무리까지 빈틈없이 수행하는 모습에서 책임감을 느낄 수 있으며, 이러한 책임 의식이 학급 분위기에 긍정적인 영향을 끼치고 있음. 업무를 완벽히 처리하면서도 종종 재치 있는 언행으로 친구들을 웃게 하여 학급 내 화합을 이루는 데 기여함. 국어 영역에 대한 뛰어난 이해력과 높은 성취도를 보이고 있으며, 인문학적 소양을 바탕으로 진로와 적성을 탐색하고 있음. 자신의 강점을 극대화하고자 꾸준한 자기주도 학습을 통해 학업 역량을 향상하며, 여러 학교 활동에서 다양한 시사 문제에 대한 자신만의 분석 능력을 갖추고, 여러 사회적 현상을 깊이 있게 표현하는 모습을 보여줌."},{"y":2,"b":"성실하게 학교생활을 하는 학생으로, 자신이 맡은 일은 꾀부리지 않고 책임감을 가지고 수행함. 예를 들어, 수능 고사장을 꾸리기 위해 청소를 하는 시간에 걸레를 빨아 창틀, 사물함, 게시판과 칠판의 위에 쌓인 먼지를 전부 닦아 내는 역할을 맡음. 다른 역할에 비해 시간이 오래 걸리고 힘든 일이었음에도 불구하고 불평하지 않고 혼자서 맡은 구역의 청소를 모두 마무리하였으며, 이후 사용한 걸레를 깨끗하게 세탁하여 정리하는 모습까지 보이는 등 맡은 일에 끝까지 책임을 다하는 태도가 인상적이었음. 또한, 자기 주도적인 학습 능력이 있어 빠짐없이 방과 후 자습 활동에 자발적으로 참여하여 공부하는 모습을 보여줌. 발표자로서 재치있고 재미있는 발표를 구성해서 실행하는 능력도 뛰어남. 학급에서 실시한 발표활동에서 재치있는 발표를 하여 학생들의 집중을 이끌어 내어 또래 학생들로부터 감탄과 칭찬을 받았으며, 교과 선생님들도 학생의 발표 능력을 칭찬함. 학생주도 프로젝트 봉사활동 '에코크래프트'에 참여하여 업사이클링의 필요성을 확인한 후 설문조사를 통해 환경 인식을 분석하고, 페트병과 캔을 활용한 업사이클링 물뿌리개를 설계 및 제작하여 교내 홍보 활동을 진행하는 활동을"}]},{"name":"심은서","seat":13,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":2 이모티콘을 만들 때 너무 예쁘게 만들기보다는 사람들이 좋아하는 캐릭터를 만들어야 한다는 깨달음을 나긋나긋한 어조로 조리 있게 표현하는 모습에서 의사소통 역량과 심미적 감수성이 드러남. 고전시가 감상 발표 수업에서 시조 '한숨아 세한숨아'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 조선 후기 사설 시조의 특징을 잘 전달하고, 다른 친구들의 발표를 바른 자세로 경청하고 상호 평가지를 성실히 작성하는 모습에서 문학적 소통 역량이 엿보임. 자신이 발표한 시조에서 '고난과 시련'이라는 키워드를 도출하고 이에 대한 상호 텍스트로 가난한 부부의 비극적인 삶을 다룬 소설 '화수분'을 선정하여 읽고 감상문을 씀. 가난하고 힘겨운 삶 가운데서도 자식을 위해 최선을 다하는 부모의 모습에 감명받아 자신도 가족을 진심으로 사랑하고 배려하는 부모가 되고 싶다는 다짐을 밝히는 부분에서 따뜻한 심성과 섬세한 문학적 감수성이 돋보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수업 활동에 적극적으로 참여하고 맡은 과제를 성실히 수행함. 수학 독서 탐구 활동에서 복소평면에 대해 알게 되고, 갈루아를 통해 답을 찾지 못해도 포기하지 않고 끝까지 노력해야 한다는 교훈을 얻음을 밝힘. 수학 문제 해결 활동에 참여함. 근과 계수의 관계를 활용하여 이차방정식의 해를 구함. 명제를 주제로 한 카드 뉴스 작성 활동에서 '토끼는 귀엽다.', '곰은 못생겼다.' 와 같은 문장을 예시로 들어 참, 거짓을 명확하게 판별할 수 있는 문장을 명제라고 할 수 있다는 내용을 재치 있게 표현함. 또한 명제 사이의 관계는 가정과 결론으로 구분하여 나타낼 수 있음을 수학적 기호를 활용하여 설명함. 컴퓨터 프로그램을 이용하여 원을 대칭이동하여 그 방정식을 구해보고 이를 비교해보는 활동에 적극적으로 참여함. 주어진 명제의 가정과 결론을 구분할 줄 알고 있으며, 각각의 진리집합을 올바르게 구하여 진리집합 사이의 포함 관계를 나타냄.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"수업 시간에 항상 바른 태도로 참여하며 성실한 모습을 보여주고 있음. 학습에 대한 긍정적인 태도가 돋보이며, 특히 독해 영역에서 어려움을 겪었음에도 차근차근 자신의 단계에 맞춰 학습을 이어 나가고 있는 모습이 인상적임. 이타적인 성격을 지니고 있어 모둠활동에서 큰 갈등 없이 항상 상대방의 의견을 존중하며 소통을 통해 좋은 결과물을 완성하는데 이바지함. '영어 독서록 활동'에서 'The Elephant Man'을 읽고 책과 관련된 내용으로 글을 작성하는 과정에서 일상적 표현과 관련된 영어 표현을 알게 되었다고 소감을 밝히고, 상세한 설명과 예문으로 읽는 사람에게 빠져들게 하는 내용으로 독서록을 잘 구성함. 영어 관심","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"논술 활동을 위해 탁구 규칙과 방법에 대해 이해하려고 노력하는 모습을 보여줌. 이를 통해 논술 활동에서 묻는 문제를 정확하게 글로 표현하려는 모습을 보여줌.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"경기 규칙 및 방법에 대한 정확한 이해를 바탕으로 티볼 경기에서 규칙을 준수하며 차분하게 경기에 임함. 빈볼시비에 대해 스포츠맨십 관점으로 자신의 생각을 논리적으로 서술함. 티볼 타격 연습에 있어서 꾸준한 노력을 보이며, 타격 시 정확한 방향으로 공을 보내기 위해 집중하는 모습이 인상적임. 타격 연습 중에는 올바른 자세와 스윙의 중요성을 인식하고, 이를 지속적으로 개선하기 위해 노력함. 반복적인 연습을 통해 점차 발전하는 모습을 보여주며, 목표 설정과 성취의 기쁨을 체","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 아비투스의 개념을 바탕으로 언어 자본에 대해 고찰한 내용을 글로 작성함. 소통 방식의 차이가 사회적 구조가 만든 결과라고 주장하면서 높은 지위에 있는 사람은 실수를 해도 타격이 적기에 여유롭지만 지위가 낮은 사람은 작은 실수가 주는 타격이 크기 때문에 조급함을 보일 수밖에 없음을 회사의 상사와 직원의 대화 상황을 예시로 들어 논리적으로 제시함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 특히 바람직한 소통 방법에 대해 답변한 내용이 인상적임. '말하지 않아야 할 것'의 기준으로 직접 경험하거나 보지 않은 사실을 타인에게 전달하지 않는다는","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 활동에서 칼립소, 보사노바, 슬로우고고 등 다양한 리듬과 타브 독보법, 커팅 및 뮤트 등 심화 기법을 학습함. 새롭게 접한 코드를 숙지하고 선명한 음색을 구현하기 위해 손가락을 세워 운지하는 등 노력하였으며, 코드 변환의 유연성을 확보하기 위해 반복 연습에 매진함. 연습의 결과, 악곡의 음악적 특징을 이해하고 연주로 표현함. 어려웠던 점으로 빠른 코드 변환과 다양한 코드의 암기를 선정하고, 이를 개선하기 위해 반복적인 연습을 하며 노력을 기울였다는 성찰을 남김. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 손과 발의 협응에 어려움을 느끼고, 손 리듬을 체득한 뒤 킥을 더하는 단계적인 연습 과정을 거침. 또한 필인 구간과 라이드 심벌로 전환하는 부분을 꾸준히 연습함. 연습의 결과, 악곡의 특징과 악기의 구성요소를 이해하여 8비트 기본 리듬과 간단한 필인을 안정적으로 구사함. 어려웠던 점으로 정확한 킥 타이밍의 표현과 박자 유지를 꼽고, 꾸준한 연습으로 해결하며 실력 향상을 느낄 수 있었다는 소감을 드러내며 자기관리 역량을 보여줌.","c":"자신만의 방음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 스포츠 장비의 발전이 선수의 신체 조건과 포지션에 최적화되는 맞춤형 기술이며, 축구화의 포지션별 설계, 사이클의 프레임 및 안장 각도 조절 등 구체적 사례를 근거로 경기력 향상과 부상 예방측면의 장점을 설명함. 기술의 진보를 인정하면서도, 기술 도핑 논란에 대해 스포츠의 공정성을 지키기 위한 적절한 규제가 필요하다는 의견을 제언함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 1 대 1 압박 수비 및 팀원 간의 단합력이 우수하다는 강점이 있지만, 동료가 패스 주기 좋은 위치로 이동하여 디스크를 받는 움직임이 다소 부족하다는 점을 인지하여, 전술 대형을 미리 배열하여 연습함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 일정한 거리를 유지하고 팀원 간의 대형을 유지하며 패스 플레이를 활용할 수 있는 자신만의 필승 전략을 세워 실천하는 모습을 보임. 빅발리볼 기본 기능 연습을 꾸준히 참여하여 경기 수행에 필요한 서브와 리시브의 기능 수행 능력이 향상됨. 공의 회전에 대한 이해가 빨라 서비스를 할 때 다양한 구질의 서비스를 잘 활용하며 경기 상황에서 판단력이 빠름.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"평소 차분한 성격을 가진 학생으로 생활 습관이 잘 형성되어 있어 지각을 하지 않고 규칙적으로 아침 등교 및 여러 학교 활동에 성실하게 참여하며, 모범적인 학교생활을 하고 있음. 모든 활동에서 근면성을 바탕으로 맡은 바 역할에 최선을 다하여 학습 환경을 조성하는 데 기여하고, 동료들에게 긍정적인 영향을 미치는 모습을 보임. 수업 중에는 집중해서 설명을 정확히 이해하고 따라가려고 노력하며, 주어진 과제에 대해서는 충분한 시간을 투자하여 잘 해내려고 노력함. 친구들과의 관계에서는 자신의 의견만 내세우지 않고, 친절하고 배려심 있는 모습을 보여주며 갈등 상황에서도 자신의 이해관계보다는 상대방을 배려하고 상호 간의 원활한 조율을 끌어냄."},{"y":2,"b":"조용하고 차분한 성향을 바탕으로 친한 친구들과 깊은 신뢰 관계를 형성하여 지내는 학생임. 학년 초에는 다소 낯을 가리는 모습도 보였으나, 점차 친구들과 자연스럽게 어울리며 학급에 조화로운 일원으로서 안정감을 보탬. 말수가 적은 편이나 교사와의 상담 시, 자신의 의견을 조리 있게 표현하는 모습을 보여줌. 한 해 동안 학급 내 1인 1역할로 게시물 관리를 담당하여 맡은 역할을 성실히 수행함. 학교생활과 관련된 안내문과 각종 교과 공지사항을 수시로 게시하고 정돈하며 학급 내 원활한 정보 공유가 이루어지도록 기여함. 다소 내향적인 성격으로 운동에 특별한 소질이 있는 편은 아니나, 교내 스포츠 한마당에서 학급을 위해 계주 선수로 참여하는 등 맡은 역할에 최선을 다하는 책임감을 보여줌. 유아교육에 관한 관심을 바탕으로 교내 다양한 활동에서 관련된 탐구를 진행하는 모습이 엿보임. 추후 보다 구체적인 학업 계획을 수립하고 자기주도적인 학습 습관을 공고히 다져나간다면, 더욱 발전할 것으로 기대됨."}]},{"name":"안장호","seat":14,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":7,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":7,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":1,"s":1,"g":7,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":7,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":7,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":7,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":7,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":6,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":6,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'어느 소방관의 기도'라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 최악의 상황에서도 생명을 포기하지 않는 다양한 일화를 통해 소방관의 희생과 사명감에 대해 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '당신은 실낱같은 희망에 기대어 구조를 할 것입니까?'를 질문해 친구들이 깊은 사고를 할 수 있도록 유도하는 등 독서의 가치를 체득한 모습을 보임. '춘향전' 수업을 통해 신분 차별과 그 극복 과정에 큰 흥미를 갖고 공통점이 있는 '홍길동전'이라는 책을 통해 해당 주제 의식에 대해 추가 탐구함. 이를 바탕으로 사회적 평등과 개인의 자유에 대한 갈망이 과거에도 있었지만 현재에도 유효하다는 점을 발견하여 앞으로 사회적 약자를 위한 봉사 활동에 참여해보고 싶다는 포부를 밝힌 보고서를 작성함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수학 학습에 대한 흥미가 다소 부족한 경향이 있으나, 수업 중 기본 개념을 이해하려는 의지를 보이며, 질문을 통해 문제를 해결하려는 모습을 보임. 독서 지문을 활용한 수업에서는 복소수와 대수학의 역사적 발전에 대해 흥미를 느끼며, '수학의 쓰임과 가치'에 대해 소감을 발표하며 주제에 대한 성찰을 시도한 점이 인상적이었음. 삼각형의 세 꼭짓점 좌표를 통해 무게중심 좌표를 구하는 일반화 수업에서는 과제를 완수하는 데 집중하며 노력하는 모습이 확인됨.\n학습 과정에서 주도적으로 참여하기보다는 교사의 안내에 따라 활동을 진행하는 경우가 많으나, 과제 수행 과정에서는 꾸준히 과제를 완성하며 책임감을 보여줌. 복잡한 문제에 대한 접근이 다소 소극적일 때도 있으나, 기초 개념에 대한 이해를 바탕으로 문제를 해결하려는 노력을 보임. 과제를 통해 자기 생각을 논리적으로 정리하고 발표하는 과정에서 점진적인 발전이 엿보임. 삼각형 무게중심 좌표 일반화 과제에서 결과를 도출한 후 교사의 지도를 받아 문제 해결 과정을 수정하고 보완하는 모습에서 성실함이 느껴졌음. 특히, 친구들과의 대화를 통해 학습한 내용을 확인하고 확장하려는 태도가 긍정적으로 평가됨.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"영어 학습에서 꾸준한 노력과 성실한 태도를 보이며, 어려운 부분을 극복하기 위해 지속해서 학습에 힘쓰고 있음. '영어 독서록 작성 활동'에서 'The Elephant Man'을 읽고, 외모로 인해 차별과 괴롭힘을 당하는 등장인물의 상황을 통해 사회적 약자를 돕기 위한 방법에 대해 고민하게 되었다는 소감을 글로 작성함. 단순한 독해를 넘어 사회 문제에 대한 인식을 넓히고, 이를 바탕으로 자기 생각을 발전시키는 모습을 보여줌. 영어 독해에서 어려움을 느끼던 부분을 개선하기 위해 문법과 어휘 학습을 꾸준히 이어가며 성장하는 모습을 보이고 있음. '휴대전화 사용 규제'를 주제로 학생들의 장시간 휴대전화 사용의 위험성과 통제의 필요성을 강조하며, 규제를 찬성하는 입장을 논리적인 구성과 적절한 어휘로 표현함.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"전근대사를 학습하며 신라 말 풍수지리설의 유행 배경, 고려에서 음서를 시행한 이유 등을 묻는 호기심 일지를 작성함. 호기심 질문 중 '고려의 신분제'를 탐구 주제로 선택하여, 고려는 신분에 따라 사회적 지위가 결정되는 엄격한 신분제 사회였으며, 귀족, 중류층, 평민, 천민의 4가지 신분으로 구성되어 있었다고 정리함. 신분별 역할을 구체적으로 파악하면서 과거에 신분제가 필요했던 이유를 고민해 봄. 노래 '독도는 우리 땅'을 소재로 독도의 역사를 학습한 후 처음 노래가 발표되었을 때 가사와 최근 가사를 비교하여 바뀐 부분을 표시함. 현재 대마도를 일본이 통치하고 있기 때문에 최근 가사의 대마도를 '조선 땅'으로 표현한 가사는 수정이 필요하다고 주장함. 현대사 사진전 활동에서 대한민국 역사에 큰 영향을 끼친 사건으로 남한 단독 선거를 선정함. 이 선거는 대한민국 정부 수립의 첫걸음이라는 점에서 의미가 있으나, 한반도의 분단을 초래한 결정적 계기","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"신체 활동에 대한 높은 흥미를 가지고 열정적으로 수업에 참여하여 긍정적인 에너지를 주변 친구들에게 전달하는 학생으로서 긍정적 수업 분위기 조성에 기여함. 수업 시간에 참여한 탁구 및 티볼 경기 규칙을 숙지하고 있어 리그전 경기가 원활히 진행될 수 있도록 심판 역할을 정확히 수행하였으며 열정을 가지고 활동에 참여하며 꾸준한 연습으로 실력을 발전시킨 의지와 끈기를 보여줌. 탁구 경기 중 손목의 힘을 잘 이용하여 정확하게 자신이 목표하는 지점에 공을 보낼 수 있고 상대 선수들이 예측하지 못하는 지점으로 공을 보내는 능력을 발휘하여 득점력이 높음. 티볼의 타격 자세가 안정적이며 자신이 원하는 방향","c":"라는 점에서운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '지구 환경 정치'에 관한 글을 읽고 지구 환경 정치를 바라보는 세 가지 핵심 이론의 논리 구조를 명확히 파악하여 정리함. 이론적 학습에 그치지 않고 '파리기후협약'의 성립 과정을 조사하여 이론이 현실에 적용되는 양상을 확인함. 후속 탐구 주제를 선정하는 활동에서 '가상 국제 환경 협의체 시뮬레이션'이라는 아이디어를 제시함. 서로 다른 이해관계를 가진 행위자들의 입장을 모델링하고, 다양한 변수를 고려하여 협력을 이끌어낼 수 있는 최적의 시나리오를 모색해야 한다고 강조함. 확장적 독서 활동에서 '떨림과 울림(김상욱)'을 발췌독한 후, 사회 문제에 대한 필자의 생각을 중심으로 자신과 사회의 문제를 해결하는 방법을 모색함. 뉴턴 역학과 양자 역학의 차이점에 대해 설명한 필자의 견해를 접하며 불확실성의 시대에서 우리의 선택과 자유의지가 지니는 의미에 대해 고민해 본 후 비평하는 글을 작성함. 불확실한 상황 속에서 신중하게 고민하며 선택하는 과정을 거치는 것이 불확실함에서 오는 변수를 줄이는 방법이라고 제시하며 거듭된 선택과 실패가 있을 때 인간의 자유의지가 더욱 커지게 될 것이라고 설명함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '관내분실(김초엽)'을 읽고 비평 활동을 진행함. 작품을 구성하고 있는 핵심 서사에 대해 잃어버린 소중한 것을 다시 찾는 이야기라고 설명하며 작품 속 등장인물의 행동과 말을 분석하여 독서 일지에 기술함. 작품 속 '마인드'가 서사 구조에서 어떤 역할을 하는지에 대해 고민한 후, 이를 토대로 모둠 책 대화에 참여하여 '마인드'를 인격체와 같은 존재로 보아야 할 것인가에 대해 토의를 진행함. 심미적 문학 체험 활동에서 반려동물과의 영원한 이별을 두려워하는 동료 학습자의 고민편지를 읽고 시 처방전을 작성함. 시 '분홍지우개(안도현)'에 나타난 그리움과 사랑의 정서를 소개하며 반려동물에 대한 고민 대상자의 애절한 마음에 공감하는 메시지를 전달한 후, 이별로 언젠가 슬픔이 오더라도 지금의 애절한 사랑을 기억하며 견뎌낼 것을 권유하는 내용으로 글을 마무리함. 문학 작품에서 받은 정서적 고양을 다른 사람과 공유하며 더 큰 의미로 확장해 나아가려는 모습을 보임.\n\n수학Ⅰ: 바이러스 확산 과정을 수학적으로 분석하고자, 감염병 전파 양상을 지수함수 및 로그함수 모델로 표현하여 '바이러스의 확산, 수학으로 예측하다'를 제목으로 한 수학 기사문을 작성함. 확진자 수의 증가가 초기에는 지수적으로 증가하","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 평화, 도전, 행복, 나 홀로 여행, 바다, 상상, 우주 등으로 선정하고 각 단어를 시각적 상징으로 전환하여 초현실적으로 결합함. 단순한 자화상 표현에서 벗어나 자신을 상징하는 색채나 사물, 구조적 배치를 활용해 자아를 표현하며 창의 융합 능력을 잘 발휘함. 마카와 색연필을 여러 번 덧칠해 화면의 밀도감을 높이고, 검은색 하늘과 자줏빛 은하수 이미지를 콜라주하여 풍부한 색감을 성실히 만들어 낸 부분에서 미적 감수성과 성실성이 잘 드러남. 작품 제작 의도와 배우고 느낀 점을 친구들 앞에서 유창하게 발표함. 갤러리 공간 디자인 활동에서 벽면을 클라이밍 홀드로 구성해 클라이밍 공간을 연상시키는 전시를 기획함. 산악구조대라는 자신의 꿈을 상징하는 산 이미지로 전시를 구성하며 자신의 관심사를 적극 드러냄. 1점 투시를 정확히 적용하고 바닥의 격자무늬 패턴을 정교하게 구현하는 등 공간 설계 능력이 돋보임. 자신의 계획대로 결과물이 구현되는 창작의 과정을 진심으로 즐기고, 노력의 과정을 통해 높은 성취감을 얻는 모습이 인상적임. 친구들과 적극적으로 의견을 교류하고 교사의 피드백을 긍정적으로 수용하는 모습이 바람직함.","c":"다가 방역 조미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육 활동을 통해 과학 기술의 발전이 스포츠 경기에 미치는 영향을 깊이 있게 탐구함. 장비의 성능이 경기 결과에 미치는 영향을 기술 도핑으로 간주하며, 이를 불공정하다고 인식함. 이러한 문제 해결을 위해 성능이 비슷한 규정복의 필요성을 제시함. 스포츠의 공정성을 높이기 위한 창의적인 아이디어를 제안하며, 과학적 사고와 비판적 분석 능력을 발휘함. 체육과 과학의 융합적 사고를 통해 새로운 관점을 제시하는 능력이 뛰어남. 플라잉디스크의 과학적 원리를 정확히 이해하고 실제로 정확하게 던짐. 패스와 캐치를 능숙하게 수행하여 동료와의 신뢰를 쌓음. 빅발리볼과 배구의 차이점을 명확히 인식하며 심판의 수신호와 코트 구분에 대한 설명을 적극적으로 수용함. 빅발리볼 기술 습득 과정에서 침착하게 참여하며 기본 기능을 재도전하여 우수한 기록을 달성함. 동작의 정확성이 뛰어나 실수가 적고, 리그전 경기에서 차분하고 침착한 경기 운영 능력을 보임. 협동심과 집중력이 뛰어나 팀워크 향상에 크게 기여함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"매우 우수한 공동체 역량을 가진 학생임. 1학기에는 급식 알림이로 활동하며 식단표를 게시하고 칠판에 식단을 기재하는 임무를 수행하여 급우들에게 필요한 정보를 제공함. 2학기에는 생일파티 준비 위원으로서 친구들과 협력하여 분기별 생일파티를 기획하고 진행하며 즐거운 학급 분위기 조성에 기여함. 또한, 대학수학능력시험 고사장 준비 과정에서 무거운 물건을 교실 밖으로 옮기는 작업을 도우며 학급을 위해 적극적으로 힘씀. 학급의 칭찬 릴레이에서 운동을 잘한다는 평가를 받을 정도로 신체 활동에서 두각을 나타내고, 스포츠 한마당 피지컬 릴레이 종목에서 팔굽혀펴기하며 활약함. 조회 전 아침 시간에는 음악을 들으며 잠을 깨운 뒤 영어 단어 암기와 한국사 복습을 실천하며 자기주도 학습 역량을 보여줌. 점심시간에는 집중이 필요한 수학 문제를 해결하며 학습 효율을 높임. 학습 플래너를 활용하여 계획을 수립하고, 중요한 일정도 기록하여 체계적인 자기 관리를 실천함. 지필평가 이후 네 번의 문항 분석 중 세 번 참여하여 평가 때 문제 풀이 과정을 점검하고 학습 전략을 보완함. 다양한 교내 활동에 참여하여 경험의 폭을 넓히려 노력하고 있기에 앞으로 더 발전할 것으로 기대함."},{"y":2,"b":"타고난 성품이 착하고 순하며, 누구에게나 모난 데 없이 다가가는 온화한 성품의 소유자임. 교우 관계가 매우 원만하여 쉬는 시간마다 친구들과 삼삼오오 모여 활발하게 소통하며 즐거운 에너지를 나누는 모습이 자주 목격됨. 자신의 진로와 미래에 대해 진지하게 고민하는 과정에서, 꿈을 이루기 위해서는 무엇보다 강인한 체력이 뒷받침되어야 함을 깨닫고 체력 단련을 위해 스스로 운동 계획을 세워 꾸준히 실천에 옮기는 자기 관리 능력을 지님. 평소 꾸준한 단련을 통해 다진 탄탄한 기초 체력과 탁월한 운동 신경을 바탕으로, 교내 스포츠 한마당에서 학급을 대표하는 계주 선수로 선발되어 활약을 펼침. 승"}]},{"name":"오연서","seat":15,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":4,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":5,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":1,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":1,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":2,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":null,"u":2,"n":"지구과학실험","c":"과학","a":"A"},{"y":1,"s":1,"g":3,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":3,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":3,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":2,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":4,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":1,"g":4,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":2,"g":4,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":3,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":1,"g":4,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":1,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":1,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":2,"g":4,"u":4,"n":"영어II","c":"영어"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 기상 연구원이라는 직업에 대한 관심을 바탕으로 '날씨를 마음대로, 기상 조절'을 읽고 독서 일지를 작성함. 독서 일지를 토대로 한 즉문즉답 인터뷰 활동에서 '기상 조절을 하는 것은 옳은 일일까'라는 질문을 던지고, 기상 조절은 많은 비용을 요구하며 생태계에도 큰 영향을 미치는 모험적인 기술이지만 성공적인 기상 조절은 기후 변화를 늦출 수도 있으므로 의미가 있다는 생각을 논리정연하게 표현함. 고전시가 감상 발표 수업에서 시조 '전원에 남은 흥을'을 다양한 관점에서 해석하고 자신의 감상을 발표함. 작품에 대한 깊은 이해를 바탕으로 대본을 보지 않고 유창하게 발표하는 모습이 인상적이며, 유유자적하게 자연을 거니는 화자의 모습에서 느낀 부러움을 진솔하게 나누는 모습에서 주체적 문학 감상 능력이 돋보임. 자신이 발표한 시조에서 '자연과 삶의 의미'라는 가치를 발견하고 이러한 가치를 더욱 깊이 탐구하고자 '처음 읽는 월든'을 선정하여 읽고 감상문을 씀. 작가가 인적 없는 호숫가에 살며 자연 속에서 느낀 삶의 의미를 자신의 말로 정리하고, 자신도 나만의 삶의 의미를 발견하기 위해 노력하겠다는 다짐을 드러내는 부분에서 창의적 사고력과 심미적 감수성이 엿보임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수업 활동에 적극적으로 참여하고 맡은 과제를 성실히 수행함. 수학 실력 증진을 위해 다른 과목에 비해 많은 시간을 투자하였고 그 결과 성취도가 향상함을 체감했다고 밝힘. 수학 독서 탐구 활동에서 갈루아를 보고 답을 찾지 못해도 시도하는 경험을 얻을 수 있다는 교훈을 얻고, 베셀을 통해 끈기와 열정으로 문제를 해결하는 점을 배우고 싶다고 밝힘. 연립이차방정식의 근을 구하고, 사차방정식의 근을 조립제법을 활용해 구함. 근과 계수의 관계를 활용하여 방정식의 근을 구함. 연립이차부등식을 활용한 실생활 문제를 해결함. 집합을 주제로 한 카드 뉴스 작성 활동에서 '키가 큰 사람의 모임'이 집합이 될 수 없는 이유를 만화 형식으로 재치 있게 표현함. 집합을 표현하는 방법인 원소나열법, 조건제시법, 벤 다이어그램을 적절한 예시를 활용하여 올바르게 설명함. 벤 다이어그램을 이용하여 두 집합의 교집합과 합집합, 여집합, 차집합을 알기 쉽게 표현한 점이 인상적임. 쾨니히스베르크의 다리 문제와 그래프 이론에 관심이 생겨 관련 탐구를 진행함. 그래프이론은 현상을 점과 선으로 단순화하여 분석하는 이론으로 최단 거리 문제나 지하철 노선도 등에 활용되고 있다는 내용을 발표함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"꾸준한 성실함과 열정으로 수업에 임하며, 학습 내용을 깊이 있게 이해하고 실천하려는 모습을 보임. '기후 변화'를 주제로 포스터를 제작하고 영어로 발표하여 지식 나눔의 가치를 실현함. 엘니뇨와 라니냐 현상의 정의, 원인, 그리고 이들의 대기 순환 및 극단적인 날씨 현상에 미치는 영향을 시각적으로 설명함. 기후 변화의 주요 현상에 대한 이해를 높이고, 환경 문제에","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 경기 규칙과 전략을 통해 논술 활동에서 묻는 문제에 대해 정확한 글로 표현하는 모습을 보여줌. 리그전 경기에서 상대방과 경기에서 월등한 기량을 보여주는 동시에 상대방을 배려하는 모습을 보여줌. 서브 활동 시 끈기 있게 연습하여 자신이 원하는 코스로 공을 보낼 수 있는 능력을 터득하게 됨.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 송구에서 거리별로 정확하게 던지려는 노력을 통해 좋은 수행능력을 보임. 타격에서 뛰어난 실력을 보이며, 방향성 뿐만 아니라 정확한 타점에 맞추는 모습을 보임. 연습에 대한 성실함과 꾸준한 노력이 돋보이며 기술적 능력은 팀워크와 경기력 향상에 크게 기여함. 스포츠 인성 수업에서 도전정신을 주제로 한 자기성찰의 결과를 잘 정리하여 제출함. 두려워하지 않는 마음가짐을 바탕으로 체육시간 뿐만 아니라 학교생활을 후회없이 잘하려는 내용을 작성함. 이러한 마음가짐은 그 자체로도 긍정적인 영향을 미치며, 동료들에게도 좋은 영향을 끼쳐 함께 성장할 수 있는 기회를 마련함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"칼림바를 연주하면서 건반의 위치를 파악하는 연습을 먼저 한 후 곡을 연주할 때 실수를 줄일 수 있었고, 곡 전체의 흐름을 파악하며 빠르기를 유지하는 부분이 조금 부족했지만 노래를 부르며 빠르기를 맞추려는 노력과 발로 박자를 세며 연주하는 방법으로 곡의 완성도를 높였다고 연습 과정을 작성함. 우쿨렐레를 연주할 때 손가락 움직임이 어려웠지만 머릿속으로 연상하며 코드의 움직임을 연습하고, 연주하기 전 음원을 듣고 멜로디를 익숙하게 하여 노래를 부르며 연주하는 데 성공했다고 연습 과정을 작성함. 모차르트의 '교향곡 41번'을 감상하고, 기악곡의 종류, 교향곡의 특징, 고전파 시대의 음악적인 특징을 조사하여 느낀 점을 작성함. 학년말 학급 작은 음악회를 준비하면서 악곡에 어울리는 리듬을 만들고, 음악회에 어울리는 분위기를 조성하기 위해 노력하는 모습을 보임.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"예술의 정의에 관해서 토론하는 활동에서 다른 사람들의 의견을 경청하고 이를 이해한 뒤, 서로의 의견을 존중하고 포용하는 태도로 소통함. 예술이란 예술가가 작품을 통해 자신의 느낌이나 생각을 표현하는 것이라고 자기 생각을 발표함. 인공지능을 이용한 미술작품도 예술가가 인공지능을 기술로 이용만 했을 뿐 예술가의 행위가 들어갔기 때문에 예술에 포함된다고 주장함. 마르셀 뒤샹의 '샘'처럼 작가가 직접 손으로 그리거나 만들지 않아도 예술품이 될 수 있다고 글로 논리정연하게 작성함. 카프라를 이용한 창조의 기둥 만들기 조별 활동에서 조선의 성곽을 제작하기 위해 조원들과 토의하여 무너지지 않게 쌓는 방법을 연구하는 문제해결 능력을 보임. 성곽의 구조를 이해하는 등 미술 활동 과정에서 타 분야의 지식, 기술, 경험을 연계는 창의·융합 능력을 발휘하여 독창적으로 작품을 완성함. 새로운 재료를 활용하여 미술 작품을 만들 때 호기심을 가지고, 친구들과 함께 협동 작품을 만들어 상호 의견을 듣고 공감하는 활동을 즐김. 다른 친구들의 작품을 감상할 때 친구들의 창의성을 존중하고 소통하는 능력을 발휘하며 작품의 가치를 함께 발견하고 나누는 성숙한 모습을 보임.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '바이오 연료와 미세조류'에 관한 글을 읽고 탐구 활동을 진행함. 바이오매스가 재생 에너지로 분류되는 이유를 재성장 속도의 관점에서 논리적으로 설명하였으며, 추가로 자료를 탐색하여 셀룰로오스 계열의 화학적 특성을 바탕으로 폐의류가 단순한 쓰레기가 아니라 에너지 잠재력을 가진 탄소 화합물임을 규명함. 후속 탐구 주제를 선정하기 위해 포도당 단위체의 사슬 구조인 셀룰로오스가 분해 과정을 거쳐 바이오 연료로 전환되는 메커니즘을 조사한 후, '패스트 패션'으로 인한 폐기물 문제를 화학 공학적 관점에서 해결하려는 계획을 수립함. 확장적 독서 활동에서 '떨림과 울림(김상욱)'을 발췌독한 후, 과학적 탐구의 본질과 과학 현상을 분석하는 관점에 대한 자신의 생각을 비평문에 제시함. 과학적 탐구 과정에서의 '모르는 것'이 지니는 가치에 주목하여, 과학이 모든 것을 안다고 가정할 때 발생할 수 있는 독선을 경계해야 하며 '모르는 것'을 인정하는 것이 지식 확장의 출발점이라는 견해를 피력함. 문제 해결 과정에서 기존의 지식이 틀렸음을 발견하거나, 비록 답을 찾지 못하더라도 그 과정에서 새로운 지식이 파생되는 것 자체가 과학의 진보임을 강조함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 'TRS가 돌보고 있습니다(김혜진)'를 읽고 비평 활동을 진행함. 작품을 통해 작가가 전하고 싶은 메시지에 대해 생각해 본 후, 로봇과 공존하는 시대를 맞이하는 우리의 자세를 주제 의식으로 제시함. 로봇이 감정을 가질 수 있는지에 대해 고민해 본 후, 작품 속 'TRS'가 성한의 어머니를 죽인 행동이 감정에 의한 것이었는지, 데이터 수치에 의한 것이었는지에 대한 질문을 생성하여 독서 일지에 기술함. 이를 확장하여 모둠 책 대화에서 인간의 생사를 결정할 때 로봇에 맡기는 것이 온당한지에 대해 모둠원들과 의견을 교환하여 로봇이 인간의 존엄성을 판단하는 것에 대해 우려의 목소리를 드러냄. 심미적 문학 체험 활동에서 열심히 노력했지만 원하는 성적을 얻지 못해 힘들어하는 동료 학습자의 고민편지를 받고 시 처방전을 작성함. 시 '장독대에서(이해인)'의 시적 화자가 건네는 따뜻한 말에 고민 대상자가 위로와 안정을 얻을 수 있을 것이라고 설명하며 고민 대상자를 응원하는 메시지를 덧붙임. 문학 작품을 통해 얻은 깨달음을 적극 수용하여 타인에게 전달하려는 노력을 기울이고 있는 모습에서 적극적인 문학 학습자의 면모를 확인함.  \n\n수학Ⅰ: ‘함수가 모두 같은 것이 아니다’라는 주제로 지수함수와 삼각함수를 비교 분석한 수학 기사문을 작성함. 지수함수의 급격한 증가와 삼각함수의 반복적 변화 특성을 인구성장, 파동운동과 같은 실생활 예와 연결하며 수학 개념을 실제 현상에 적용하려는 시도가 돋보임. 첫째 항이 성립함을 보이고 귀납적 과정을 통해 다음 항이 성립함을 정교하게 완성해가는 과정에서 수학적 추론력과 논리적 사고력이 돋보임.\n자유주제 탐구하기 활동에서 지진해일 발생확률에 대해 탐구함. 대기 과학 분야에 대한 관심을 바탕으로 지수함수와","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"타교에 개설된 공동교육과정(지구과학 실험)을 이수함. 도형 및 그래프를 작성하고 수치를 계산할 수 있는 웹 상의 프로그램을 활용하는 능력이 뛰어남. 수업 중 직접 찍은 달 사진을 일정한 크기로 자르고 세 점을 이용해 원을 그린 후 달의 겉보기 크기를 측정하는 활동에서 적극적인 수업 참여 태도로 빠르게 결과물을 완성해냄. 수업을 통해 누적된 자료를 분석하여 다양한 정보를 얻는 방법의 실험을 경험하며 시뮬레이션을 통한 다른 방식의 실험에도 관심을 보임. 대기과학 분야의 연구에서 이런 가상실험이 효율적일 수 있을 것이란 생각에 천체의 대규모 충돌이 대기에 미치는 영향에 대해 탐구하였고, 운석 충돌 과정에서 생긴 작은 크기의 규산염 먼지가 대기 중에 머물면서 지구 표면 온도를 냉각시키는 상황을 예를 들어 설명함. 또한 달의 표면에 크레이터가 많은 까닭 역시 많은 소행성들의 충돌에 의한 것임을 소개하며 영국의 어느 대학의 연구팀의 가상 실험 결과 행성체의 중력과 충돌체의 크기, 충돌 속도 및 구성에 따라 대기 손실의 정도가 다름을 알아냈다고 설명함. 탐구를 진행하며 대기과학 분야의 가상 실험에 대한 관심을 보이며 훗날 직접 실현해보고 싶다는 의지를 밝힘.","c":"회귀 분석지구과학 실험"},{"y":2,"t":"세부능력및특기사항","b":"미술 수업에서 새로운 아이디어를 적극 제시하며, 작품을 완성하는 과정에서 꾸준히 노력함. 재료와 도구의 특성을 잘 파악해 적절히 활용하고, 자기의 생각과 감정을 자연스럽게 녹여내며 다양한 방식의 표현을 시도하는 태도가 인상적임.","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 케블라 섬유의 고강도 특성을 복싱 및 모터스포츠의 안전 장구와 연결하고, 나노소재를 통한 테니스 라켓의 경량화 사례를 제시함. 기술을 규제하기보다 발전된 장비에 맞춘 경기 규칙을 대안으로 제시함. 스포츠의 본질을 인정하면서 기술과의 공존을 통해 종목의 영역을 확장하려는 견해를 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 활발한 의사소통과 수비 압박 및 공격 전환에서 빠르다는 강점이 있지만, 패스 연결이 다소 불안하다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 득점에 성공했을 경우와 실수한 상황이라도 서로 응원할 수 있는 팀 문화를 만들며 자신만의 필","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 화학·환경 진로와 연계하여 운동화에 사용되는 합성 소재인 폴리우레탄의 환경적 영향과 한계를 탐구함. 석유 원료의 화학 공정에서 발생하는 대량의 탄소 배출 문제를 지적하고, 대부분 열경화성 고분자로 이루어진 폴리우레탄의 재활용 및 자연 분해 불가능성을 분석함. 매립 시 장기간 분해되지 않고 미세 플라스틱을 잔류시켜 생태계를 오염시키며, 소각 시 치명적인 유해가스를 방출하는 환경적 부하를 규명함. 결과적으로 첨단 스포츠 장비의 혁신 이면에 존재하는 고분자 소재의 환경 파괴 실태를 파악하고, 지속 가능한 친환경 신소재 개발의 필요성을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"생동감이 넘치고 구김살 없는 행동으로 교우관계가 원만하며, 학교생활에 적극적이고 열성적인 학생으로서 학급에서 발생하는 문제를 해결하기 위해 다양한 의견을 제시하고 협조하는 모습을 보임. 학교생활에서 항상 예의 바른 모습을 보여주며, 규칙을 잘 준수하고 바른 생활 태도를 갖추고 있는 모범적인 학생임. 학급에서 나온 쓰레기를 분리수거하는 역할에 자발적으로 참여하여 책임감을 가지고 성실하게 학급의 쓰레기를 분리수거하는 등 봉사 정신이 뛰어난 학생임. 친구와 함께 교과 내용을 가르치고 배우며 더불어 성장하는 즐거움을 경험하였고, 자신의 관심 분야에 대해 신문 형식으로 정리하여 친구들에게 소개하는 지식 품앗이 활동에 적극적으로 참여함. 수업 태도가 좋고 과제를 성실하게 수행하고, 이해하지 못한 개념은 포기하지 않고 연습을 통해 완전히 이해하고자 노력하는 등 학업에 대한 성취동기가 높고 공부에 대한 자신감도 향상되고 있으므로 긍정적 발전이 기대됨. 자신의 적성과 흥미를 잘 알고 있으며 지구과학과 관련한 진로희망을 뚜렷하게 세워 대학의 관련 전공을 탐색하고, 문제해결력, 분석 능력 등 필요한 역량을 함양하기 위해 꾸준히 노력하는 모습을 보임."},{"y":2,"b":"꼼꼼하고 계획성이 있으며 책임감이 강하여 정해진 원칙과 계획에 따라 자료를 체계적으로 정리하고 조직하는 일을 잘하는 학생임. 스스로 세운 목표를 향해 열심히 노력하는 모습이 기특함. 일찍 등교해서 조용히 공부하는 모습이나 쉬는시간과 점심시간은 물론이고 틈나는 시간마다 집중하여 공부하는 모습이 한결같음. 천체동아리를 스스로 조직하여 운영하는 등 관심있는 분야에서 적극적인 면이 많고, 수업 내 소모둠부터 동아리 활동까지 어떤 모임에서든 리더의 역할을 맡는 학생임. 연말 분위기를 내기 위해 학급 친구들과 함께 점멸등과 반짝이 장식으로 교실을 꾸미며 즐거워하는 귀여운 모습부터 리더십 가득한 모습까지 장점이 많은 학생이라 다방면으로 발전 가능성이 기대됨.\n아침 독서 프로그램에 참여하여 '2도가 오르기 전에(남성현)'를 읽고 지구온난화의 원인과 지구시스템의 변화를 탐구한 뒤, '기후미식(이의철)'을 통해 생활 속 기후 실천 방안에 대한 이해를 확장하고 식습관이 기후에 미치는 영향, 지방 함량을 줄이거나 가공을 최소화하여 에너지를 절약하는 조리법 등 실천 사례를 탐구하며 과학적 이해와 생활 속 실천의 연결 중요성을 깨닫고, 친환경 식문화 확산과 정책적 지원의 필요성을 성찰함."}]},{"name":"오지우","seat":16,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":8,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":7,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":8,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":2,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":7,"u":3,"n":"세계지리","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"세계지리","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":9,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":7,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":9,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":7,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":7,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"C"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":2,"g":7,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'네가 마지막으로 남긴 노래'를 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 병을 앓고 있어도 포기하지 않고 노력한다면 음악을 할 수 있다는 사실을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '작가는 왜 병을","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"체육 수업 시간에 활동한 다양한 스포츠의 경기 규칙을 적극적으로 준수하고, 경기 시작 전 상대방에게 악수를 청하는 등 모범적으로 스포츠 정신을 지키는 모습이 돋보임. 탁구라켓에 대한 그립법과 기본자세를 반복적으로 학습하고 포핸드 및 백핸드 스트로크를 꾸준히 연습하여 올바른 자세로 랠리를 지속할 수 있음. 티볼 경기 중 상대방의 공격 방향을 빠르게 파악하여 정확한 위치에서 수비하는 능력이 뛰어나고 항상 팀원들과 상대 팀을 배려하며 경기 예절을 지키는 모습이 돋보임. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 사고가 유연하고 친구들의 이야기를 듣는 걸 좋아하는 자신의 장점을 발휘하여 적극적으로 팀원들과 의사소통하는 소통하는 리더가 되고싶다는 포부를 밝힘. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 도전하는 과정에서 결과가 마음에 들지 않더라도 노력하는 과정에서 자신이 성장했다는 것만으로도 충분히 가치가 있으며 자기 잠재력을 믿는 자세가 중요하다는 생각을 학습지에 충실히 작성함.","c":"주제로 스토운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고 좋아하는 곡의 가사를 생각하며 감상하는 활동에 적극적으로 참여함. '포크', '발라드', '힙합'에 대해 조사한 후 이 장르를 대표할 수 있는 곡목과 가수를 조사하여 목록을 만들어 친구들과 공유함. 교과서에 수록된 악곡을 감상하며 가사에 쓰인 '나비'가 목표를 향해 나아가는 친구와 같이 느껴졌다고 소감문을 작성함. 우쿨렐레를 연주하기 전 스트로크를 먼저 연습하고 기본 리듬부터 연습한 후 칼립소, 슬로우 고고, 슬로우 고고 변형 리듬을 연주하여 스트로크가 어렵게 느껴지지 않았다고 활동지를 작성함. 노래에 어울리는 리듬을 찾아 자유자재로 스트로크하며 연주하여 친구들에게 좋은 반응을 얻음.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"아이디어 스케치를 할 때 마인드맵을 사용하여 자기 생각을 마음속 지도를 그리듯 잘 표현함. 빨대를 이용한 선재 구성 활동에서 미술 재료에 대한 유연한 사고로 처음 사용해 보는 재료에도 적응하며 여러 아이디어를 구상하여 입체 조형물을 제작함. 친구들과 함께 작품을 만들 때도 조원들의 의견에 경청하고 조율하는 모습이 훌륭하였으며 학급 전체 앞에서 자신감 있게 작품 발표를 하여 미적 감수성을 인정받음. 스무 살의 나의 하루를 주제로 그리는 활동에서 대학생이 되어 학교에 핀 벚꽃 구경을 하며 친구들과 즐겁게 지내는 일과를 그림으로 성실하게 표현함. 작품을 제작할 때 주제에 부합하는 표현 기법과 방법을 탐구하고 자신의 의도를 명확히 전달하기 위해 계획을 세우며 주도적으로 작업을 진행함. 친구들의 작품을 감상할 때, 작품의 특징을 이해하고 이야기를 경청하며 소통하는 능력을 발휘함. 오일파스텔을 활용한 작품 제작하기 활동에서 재료의 특징을 살려 차일드 하삼의 '마운틴 홈' 작품을 훌륭히 모작해 냄. 작품에 애정을 가지고 최선을 다하여 완성하는 모습이 훌륭함.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 특히 '수용 감각'과 진정한 관계에 대한 질문의 답변이 뛰어남. 상대에 맞게 자신의 모습을 조절하는 수용 감각이 진솔한 관계 형성에 방해가 된다고 비판적인 입장을 취하며 자신을 꽁꽁 숨기기만 하는 것은 진정한 수용 감각이 아니라고 분석함. 오히려 자신의 솔직한 모습을 보여주는 것이 진정으로 상대를 위한 것이며 솔직함이 없으면 신뢰를 무너뜨릴 수 있다고 주장함. 이 과정을 통해 책의 내용을 바탕으로 삶의 태도에 대해 성찰하는 역량을 발휘함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 그 중에서 바람직한 소통 방법에 대해 답변한 내용이 훌륭함. 대화 상황에서 지켜야 할 기준으로 상대방을 배려하여 말하는 것을 제시하며 자신만의 구체적인 방법을 상세히 이야기하면서 대화의 기준이 필요한 이유를 논리적으로 설명함. 또한 상대방의 기분을 파악하면서 대화하는 것이 가장 효율적이며 조금은 단호하더라도 상대방의 기분이 나쁘지 않도록 돌려서 말하는 태도가 중요하다는 의견을 펼침.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '노찬성과 에반(김애란)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 작품에 드러나지 않은 인물의 심리와 주제 의식에 대해 서로 의견을 나눔. 책대화 내용을 바탕으로 '기억 한 켠에 남은 짧은 만남'이라는 제목의 서평을 작성함. 찬성이 반려견 에반을 생각하는 애틋한 마음에 공감하고, 안락사를 시킬 수 밖에 없는 이유에 대해 알아보기 위해 다양한 참고 자료를 조사함. 안락사와 관련한 동물보호법, 안락사의 절차, 반려견을 키우는 사람의 인터뷰 등을 폭넓게 조사하면서 등장 인물의 삶에 공감하는 모습을 보임. 문학 작품을 공감적, 창의적으로 수용하고 작품 속 인물을 통해 타자의 삶을 이해할 수 있는 역량을 성장시킴. 시 처방하기 활동에서 성적 문제로 힘들어하는 친구의 고민 편지를 읽고 시 '담쟁이(도종환)'를 처방해 발표함. 꾸준히 노력하여 마침내 담을 넘어서는 담쟁이의 모습을 언급하면서 고민하는 친구에게 진심어린 응원의 메시지를 전달함. 시 속에서 삶의 가치를 발견하고 이를 바탕으로 타인과 따뜻한 문학적 소통을 할 수 있는 학생임을 발견함.\n\n수학Ⅰ: 기타 소리 속에 숨겨진 수열의 수학적 구조를 주제로 기사문을 작성함. 기타 프렛 간격이 일정한 비율로 줄어드는 원리를 탐구하며, 음계의 수학적 원리를 등비수열 개념과 연결 지어 이해함. 각 음의 배열은 등차수열 구조를 이루며, 아르페지오, 패달 포인트, 옥타브 패턴 등에서도 수열적 규칙성을 발견함. 일부 작곡에서는 피보나치수열이나 황금비가 적용된 사례를 소개함. 음악 속에 있는 수학적 원리를 주도적으로 탐구한 점이 인상적임. 지수함수와 로그함수의 개념 및 성질을 토대","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"악기 연주에 능숙한 학생으로, 우쿨렐레 연주 활동에서 연주 점검 도우미로 참여하여 친구들의 연주를 듣고 보완점을 친절히 알려줌. 칼립소, 보사노바, 스윙 등 다양한 리듬을 학습하고 리듬의 악센트를 표현하기 위해 노력하였으며, 타브 연주에서 명확한 음색과 정확한 리듬 표현을 위해 꾸준히 연습함. 그 결과, 올바른 자세와 주법으로 악곡의 음악적 특징을 능숙하게 표현하며 음악의 흐름을 자연스럽게 살림. 어려웠던 점으로 보사노바 리듬 특유의 느낌 표현을 선정하고, 손 모양을 다각도로 변경하고 소리의 질감에 집중하며 반복적으로 연습하였다는 깊이 있는 성찰을 남김. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 학습함. 악보 읽는 방법을 숙지하기 위해 노력하고, 일정한 박자 유지와 정확한 킥을 표현하기 위해 연습함. 자기평가에서 악기 소리가 약함을 인지하고 이를 개선하고자 하는 의지를 드러냄. 연습의 결과, 악보를 정확하게 숙지하여 8비트 리듬과 필인을 안정적으로 표현함. 드럼 각 구성요소의 위치를 암기하기 위해 다양한 악보를 분석하며 노력했다는 자기주도적 연습 과정을 서술하며, 미흡한 점을 객관적으로 파악하고 해결해 나가는 자기관리 역량을 보임.","c":"로 문제를 구음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 특수한 섬유 재질과 인체공학적 디자인을 활용한 스포츠 의류와 장비는 신체의 효율성을 높여 운동 능력을 유지하는 데 도움이 되는 사례를 제시함. 스포츠와 과학 발전의 상생을 위해 스포츠에 활용되는 과학 기술을 허용해야 한다는 견해를 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 배려를 통해 서로 응원하는 분위기와 안정성이 높은 패스 연결 플레이를 하는 강점이 있지만, 공격 기회가","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"조용하고 과묵한 성격으로 학습 활동에서 차분하게 임하며, 동료들과 원활하게 융합되어 협력하는 모습이 돋보임. 진로에 대한 꾸준한 탐색을 통해 자신의 적성과 관심 분야를 명확히 하고, 필요한 역량을 키우기 위해 노력함. 학습 활동에서는 책임감 있는 태도로 참여하며, 맡은 역할을 충실히 수행하고, 깊이 있는 사고와 논리적인 접근으로 성과를 높임. 모둠 과제나 팀 프로젝트에서도 동료들과 협력하여 조화롭게 문제를 해결하고 목표를 달성하는 데 기여함. 진지한 태도로 학습에 임하며, 스스로 계획을 세우고 이를 실천하는 태도를 보여줌. 학급 생활에 꾸준히 노력하며, 주변 학생들과 조화롭게 어우러져 학급 분위기를 긍정적으로 이끄는 데 기여함."},{"y":2,"b":"타인에게 기분 좋은 에너지를 전하는 애교 넘치는 성격과 웃음을 잃지 않는 살가움으로 교우관계가 원만하며,교사와 복도에서 마주칠 때마다 밝게 인사하는 모습을 보임. 겉으로는 마냥 해맑아 보이나, 맡은 일에 있어서는 놀라운 끈기와 책임감을"}]},{"name":"윤예준","seat":17,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":3,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":5,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":5,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":3,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":5,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":4,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":2,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":2,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":4,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":3,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":5,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"중세 국어 문법을 배우며 내용 해석에 어려움을 느끼자 단편 지식을 암기하기보다는 하나의 원문 텍스트를 스스로 반복, 분석함으로써 어려움을 극복하는 모습을 보임. '청소년이 꼭 알아야 할 4차 산업혁명 새로운 직업 이야기'를 읽고 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 산업 구조와 기술 변화에 따른 유연성과 적응력이 중요함을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '변화하는 사회에서 일자리 감소에 대한 우려가 커지고 있다. 이때 사회적 공정성과 포용성은 어떻게 보장될 수 있을까?'를 질문해 친구들이 깊은 사고를 할 수 있도록 유도하는 등 독서의 가치를 체득한 모습을 보임. '원가회계'와 관련된 독서 지문을 배우며 회계 활동에 대한 지적 호기심을 바탕으로 '회계사가 말하는 회계사'를 읽으며 호기심을 충족시키려는 모습을 보임. 이처럼 자기주도적 독서를 통해 자신의 관심사를 확장시켜 나가는 태도가 인상적임.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"원의 접선의 방정식을 소개하는 수학 카드 뉴스를 제작함. 자동차의 바퀴와 지면이 마치 원과 접선처럼 보여 이를 수학적으로 원과 접선의 방정식을 이용해 표현하는 과정을 만화로 그리고, 원 위의 한 점의 좌표가 주어졌을 때 원의 접선의 방정식을 구하는 공식을 중심이 원점일 때와 원점이 아닐 때로 나누어 정확하게 유도함. 물 속에서 느껴지는 저항력을 최소화하고 추진력을 높이는 법을 수학적으로 분석하기 위해, '수영에 적용된 역학'을 주제로 자유 주제 탐구 프로젝트에 참여함. 수영 속도에 따른 항력과 추진력 공식을 소개하고, 수영자의 속도에 따른 값을 각각 계산하여 이를 그래프로 표현함. 이를 통해 수영 속도와 추진력의 관계는 무리함수, 항력과의 관계는 이차함수와 유사한 개형을 가짐을 발견함. 속도가 증가함에 따라 항력이 증가하고 압력차가 발생하여 추진력이 증가한다는 결론을 바탕으로 효율적인 수영 속도를 추론해냄. 다른 요인들을 추가로 고려하였을 때의 그래프 개형이 자신이 유추한 그래프 개형과 같은지 확인하여 효율적인 수영법에 대해 탐구하겠다는 계획을 세움.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"주장하는 글쓰기 활동에서 스마트폰은 우리의 깊은 사고 능력과 집중력을 앗아간다고 주장하며 과도한 스마트폰 사용으로 인한 도파민 중독과 수면 부족이 뇌에 미치는 영향을 다양한 연구 자료와 기사를 인용해 글을 완성함. 지식품앗이 활동에서 감정이 기억과 학업에 미치는 신경화학적 영향을 주제로 발표하며 철저한 준비성과 폭넓은 배경지식이 돋보임. 자율주행 자동차 기술, 코딩 기반 천문교육, 딥페이크 기술, 도파민 중독 등에 관한 지문을 선택해 주제문, 제목 등을 영어로 작성함. 차별을 주제로 실화 기반의 The Elephant Man과 Night를 읽고, 인상 깊은 장면과 그 이유, 제목 분석, 주인공의 변화 과정을 중심으로 독서 일지를 작성함. 인종과 외모 때문에 비인간적인 대우를 받은 주인공을 통해 차별과 배제를 비판하며, 더 나은","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기에서 다양한 기술을 연습하여 이를 경기에 적용하는 모습을 보이고, 팀원들과의 협력과 창의적인 전략을 통해 경기를 유리하게 이끄는 모습을 보임. 탁구라켓에 대한 그립법과 기본자세를 반복적으로 학습하고 포핸드 및 백핸드 스트로크를 꾸준히 연습하여 올바른 자세로 랠리를 지속할 수 있음. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 조직의 목표를 정확히 설정하여 지속해서 독려하며, 어려운 일에 솔선수범하는 자세를 갖춘 지도자가 되고 싶다는 다짐을 활동지에 충실히 작성함. 도전정신을 주제로 진행한 스포츠 인성 수업에 참여하여 자신의 의견을 개진함. 도전하는 과정에서 만나는 어려움에 대해서 자신을 성장시키는 과정으로 여기는 긍정적인 사고를 통해 시야를 넓히는 계기로 삼으며 극복을 위해 노력하겠다는 다짐을 발표하여 공감을 얻음.","c":"사회를 위해운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르와 가사의 의미를 생각하고 개사하는 활동에 열심히 참여함. 좋아하는 악곡의 가사 중 '힘든 시련을 이겨내고 다시 날아올라'를 '어둠 속 시련을 뚫고 빛을 찾아 날아올라'로 개사하여 포기하지 않고 극복하자는 메시지를 전달하고 싶었다고 활동지에 표현함. 칼림바를 처음 접했을 때는 건반을 소리 내는 것조차 어려웠지만 할 수 있다는 자신감을 가지고 천천히 연습하는 시간을 통해 실력이 향상됨을 느꼈고, 연주에 대한 즐거움이 생겼다고 소감문을 작성함. 칼림바를 연주할 때 리듬에 대한 이해가 부족해 선율의 흐름이 자연스럽지 못했지만, 음원을 감상하고 친구들과 합주하면서 곡에 대한 이해와 완성도가 높아졌다고 활동지를 작성함. 우쿨렐레를 연주할 때 슬로우 고고와 변형 리듬 연주를 잘하여 이 리듬에 어울리는 악곡의 연주가 돋보임.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"지승공예로 컵 받침을 제작하는 활동에서 자신의 이름에 있는 자음과 모음을 이용하여 대칭을 이룰 수 있게 디자인하여 제작함. 평상시 미술이 어려운 과목이라고 생각했는데 종이를 이용해서 끈으로 만든 후 작품을 제작하는 활동을 통해서 누구나 연습하면 결과물을 만들 수 있어서 의미가 있는 활동이었다고 자신의 소감을 글로 성실히 작성함. 처음에는 종이 끈이 잘 만들어지지 않았지만 열심히 반복하다 보니 어느 순간 잘 만들어져서 매우 뿌듯했고 전통공예에 대한 인식이 바뀌었다고 발표함. 오일파스텔을 활용한 작품 제작하기 활동에서 재료의 특징을 살려 인상주의 화풍을 모방한 작품을 제작하며, 자기 창작물에 대한 사랑을 가지고 최선을 다하는 모습이 돋보임. 미술 작품을 제작하면서 모작한 작품의 의미를 분석하고 미술 문화에 대한 깊은 이해를 보여줌. 스무 살의 나의 하루를 주제로 그리는 활동에서 어른이 되면 자유롭게 여행을 가고 싶어서 이를 상상하여 그림으로 표현함. 자유로움을 표현하기 위해 다양한 색상을 사용했으며 여행 가고 싶은 장소들을 여러 곳 그려서 주제를 강조하여 자신의 미적 감수성을 나타냄.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '떨림과 울림(김상욱)'을 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 책에서 설명하는 과학 이론과 주제 의식을 이해하고자 노력했으며 이를 바탕으로 인간 삶의 의미에 대해 고찰한 과정을 글에 담음. 특히 '미래를 아는 삶의 의미'에 대한 질문의 답변이 인상적임. 미래가 예견되어 삶이 확실해진다면 인간의 도전정신과 결단력이 사라지고 기계화된 존재에 불과하게 될 것이라고 주장함. 결과론적 관점에 매몰되어 노력이 무의미해지는 상황을 경계하며 불확실성이야말로 삶을 가치 있게 만드는 필수 요소임을 주장하면서 책의 내용을 인간의 삶과 연결하여 해석하는 역량을 발휘함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 특히 카오스 이론의 '복잡한 세상의 예측' 원리를 사회 현상에 적용하여 답변한 점이 돋보임. 개별적인 분자의 운동은 예측할 수 없으나 통계적으로 경향성을 파악할 수 있음을 이해하고, 이를 사회 문제에 대입하여 다수결의 원칙이나 여론 조사 등을 통해 복잡한 사회의 흐름을 파악하고 해결책을 모색할 수 있다는 창의적인 통찰을 보여줌.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '관내분실(김초엽)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 소설의 주제 의식에 대해 다양한 의견을 나눔. 책대화 내용을 바탕으로 '사라지지 않는 자아, 의식'이라는 제목의 서평을 작성함. 엄마를 이해하지 못했던 딸이 분실된 엄마의 마인드를 찾는 과정에서 진정한 소통과 이해에 이르게 되며 이를 통해 가족 관계의 중요성과 진정한 나 자신의 정체성에 대해 말하는 소설이라고 분석함. 또한 '마인드 업로딩' 기술이 가질 수 있는 한계점과 윤리적 문제를 언급하며 미래 기술에 대한 비판적 시선을 드러냄. 시 처방하기 활동에서 짝사랑의 감정으로 힘들어하는 친구의 고민 편지를 읽고 시 '저 흰 빛은 다 어디로 가나(이덕규)'를 처방해 발표함. 이별과 사랑의 고통을 노래한 시를 분위기있게 낭송하며 고민하는 친구의 상황에 공감하고 위로의 메시지를 전함. 이 활동을 통해 낯선 현대시를 삶과 연결시켜 해석하고 상징적 의미를 잘 읽어낼 수 있는 문학적 감수성을 갖춘 학생임을 확인함.\n\n수학Ⅰ: 교통체증 완화와 버스 배차 간격의 관계를 등차수열과 지수함수 개념으로 분석하여 '도시 교통 문제에 활용된 수학'이라는 제목의 수학 기사문을 작성함. 버스 배차 간격을 일정 시간마다 일정 간격으로 줄이는 상황을 등차수열로 모델링하고, 이에 따른 승객 대기 시간 및 혼잡도 변화를 분석함. 또한, 승객 증가율이나 교통량 증가가 특정 시점부터 급격히 늘어나는 현상을 지수함수로 표현하여 교통체증 심화 과정을 수학적으로 해석함. 다양한 수학적 모델을 실생활 문제에 적용하는 융합적 사고력과 체계적인 문제 해결 능력이 인상적임. 등비수열의 핵심 개념인 항 사이의 일정한 곱 관계를 바탕으로 식을 세우고, 이를 활용해 항이나 합을 구하는 문제를 체계적으로 해결함. 여러가지 조건이 제시된 수열 문제를 풀이하면서 스스로 공식을 유도하거나 변형하여 풀이하는 모습을 보이며 친구들에게도 논리적으로 설명해 주는 등 수학적 사고력과 표현력이 우수함. 매 시간 학습 활동지에 개념 요약과 문제 풀이 과정을 꼼꼼하게 기록하고 계산뿐만 아니라 개념의 적용 의의를 파악하려고 노력하는 모습에서 자기주도적 학습 태도와 탐구심이 엿보임.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"지속적인 노력을 통해 연주 실력을 개선하고 향상해 나가는 모습이 돋보이며, 모르는 부분은 교사나 동료에게 질문하여 적극적으로 해결하는 성실한 학생임. 우쿨렐레 연주 활동에서 코드를 자연스럽게 변환하기 위해 노력하고, 아르페지오 주법을 익히기 위해 꾸준히 연습함. 타브 악보로 재즈곡을 연주하며 악보의 해석이 중요함을 인식하고, 음악 기호를 정확히 파악하고자 노력하는 모습을 보임. 그 결과, 올바른 자세와 주법으로 안정적인 리듬감을 선보이며 악곡의 흐름을 충실히 표현함. 실력이 연주의 자신감과 직결됨을 깨닫고 연습의 중요성을 성찰문에 기록하는 등 자기성찰적 태도가 엿보임. 드럼 연주 활동에서 더블킥 주법과 악기의 구성요소를 숙지하기 위해 노력하고, 필인을 소화하기 위해 꾸준히 연습함.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 맞춤형 축구화가 발의 압력 분포 분석을 통해 접지력을 극대화하는 원리와 농구화의 반발력이 부상 방지 및 점프 안정성에 기여하는 과정을 사례를 근거로 제시함. 기술적 진보가 기록 경신의 혁신임을 인정하며, 스포츠의 본질인 공정한 경쟁을 위해 기술 발전의 수용과 국제적 규제 기준 마련 사이의 균형이 필요함을 강조함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 활발한 의사소통과 빠른 기동력의 강점이 있지만, 전체적으로 대형 유지가 너무 넓다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 1 대 1 수비 마크를 놓치지 않도록 대형을 유지하는 전략을 세움. 디스크를 소유할 수 있는 시간을 최대한 활용하여 공격 성공률을 향상함으로써 팀의 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 리시브 연습을 통해 세터에게 공을 정확하게 보내기 위해 자세를 낮추고 몸을 아끼지 않는 플레이를 하면서 자신을 낮추는 겸손을 배움. 경기에서 팀 수비에 적극적으로 참여하여 팀원들의 신뢰를 받았으며 협동에 대한 중요성을 배우게 됨.","c":"어려운 부분은 친체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"말수가 적고 초반에 낯가림이 있지만, 차분하고 침착하게 행동하는 안정감 있는 학생임. 언행이 일치하고 예의 바르며 공동체에 도움을 주거나 기여하려는 태도가 배어 있어 인상 깊음. 책임감이 강해 1인 1역, 청소 구역, 모둠 활동 등 학급에서 맡은 일을 항상 최선을 다해 완수해 냄. 학업 면에 있어서는 자신의 장단점을 깊이 성찰해 보고 학습 계획을 세운 후, 자투리 시간에도 묵묵히 자기주도학습을 실천하며 학습량을 완성해 가는 스타일임. 특히 시험이 끝난 직후나 학기말과 같이 다른 친구들이 해이해질 때도 스스로를 다잡으며 자기주도학습에 임하기 위해 노력하는 등 학업에 대한 의지가 강함. 우주과학, 경제, 법 등 다양한 분야에 흥미가 높으며, 진학 문제에 있어서도 적성과 흥미를 탐색하며 자신에게 맞는 분야를 찾아가고 있음. 주변 사람과의 관계에서 진정성을 인정받으며 신뢰를 형성하는 학생이기에 어느 조직 사회에서 활동하든지 주변 사람들에게 믿음을 주면서 자신의 역할을 충실히 해내는 인재가 될 것으로 기대됨."},{"y":2,"b":"차분하고 신중한 성향을 지닌 학생으로, 선한 인품을 바탕으로 주변 친구들과 원만한 관계를 유지함. 말수가 적고 조용해 보이나 열정적인 태도를 지녔으며, 교내 다양한 활동에 자발적으로 참여하고 학업 향상을 위해 꾸준히 정진하는 등 진로에 대한 의지가 매우 확고함. 학급 1인 1역할로 환경 도우미를 맡아 분리수거를 책임감 있게 수행하고, 교내 배식 도우미 활동에도 성실히 임함. 특히 배식 도우미가 구해지지 않아 난감한 상황에서, 이미 맡은 역할이 있음에도 추가 지원하는 등 공동체를 위한 헌신과 봉사 정신을 보여줌. 내향적인 성향이나 학급의 일에 적극적으로 임하며, 교내 스포츠 한마당 계주 선수로 나서거나 학급 단합 행사에 주도적으로 참여하는 등 반전 있는 모습을 보여줌. 방과후 자기주도학습에 꾸준히 참여하여 올바른 학업 습관을 구축하였으며, 친구에게 수행평가 관련하여 친절히 알려주는 모습이 관찰됨. 우주 과학에 관한 관심을 바탕으로 진로 계획을 수립하는 주도성이 인상적이며, '우주를 알아가는 천체관측'을 주제로 한 프로젝트 봉사활동에 참여하여 학문적 호기심을 확장하고 전문적 소양을 쌓음. 탄탄한 내면과 성실함을 갖추었기에, 희망분야의 통찰력 있는 인재로 성장하리라 기대됨."}]},{"name":"윤지수","seat":18,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":3,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":4,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":3,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":5,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":4,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":4,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":4,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":3,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":4,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":3,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":3,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":4,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":2,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":3,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":4,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 '과학, 죽음을 죽이다'를 선정하여 읽고 독서 일지를 성실히 작성함. 이를 토대로 한 즉문즉답 인터뷰에서 '인간에게 영생이 주어진다면 행복할 것인가'라는 질문을 스스로에게 던지고 인간만의 고유한 열정과 근면의 가치가 퇴색하고 시간을 허비하는 사람이 늘어나 사회적으로 부정적인 결과를 낳을 것이라는 결론을 내리는 모습에서 창의적 사고력과 사회적 통찰력이 드러남. 고전시가 감상 발표 수업에서 시조 '까마귀 눈비 맞아'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 깔끔한 시각 보조 자료를 활용하여 작품에 대한 반영론적, 표현론적 해석을 유창하게 전달하고, 단종에 충성을 다했던 사육신인 작가에 감정이입하여 자신의 감상을 진솔하게 나누는 모습에서 우수한 발표력과 뛰어난 문학적 소통 역량이 돋보임. 자신이 발표한 시조에서 '일편단심'이라는 키워드를 도출하고 이에 대한 상호 텍스트로 소설 '국화꽃 향기'를 선정하여 읽고 감상","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"체육 시간에 밝은 에너지를 갖고 있으며 반에서 긍정적인 분위기를 만드는 데 기여함. 탁구 이론 수업에서 배운 경기 규칙과 방법을 정확하게 이해하여 논술 활동에서 제시된 문제에 대해 정확하고 구체적인 글로 표현하는 능력을 보여줌. 탁구 리그전 경기에서 탁월한 기량을 보여주었고 상대방을 배려하며 경기에 임하는 모습도 보여줌. 서브 활동 시 정해진 구역으로 정확하게 공을 보낼 수 있는 능력을 갖추고 있으며, 랠리 활동 시 상대방과의 호흡을 중요하게 생각하며 연습에 임함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기에서 규칙과 방법에 대한 정확한 이해를 바탕으로 실전에 능숙하게 적용함. 경기 중 빈볼시비에 대한 개인적인 생각을 스포츠맨십의 관점에서 성찰하며, 팀워크와 공정한 플레이의 중요성을 강조함. 거리별로 송구 연습을 통해 뛰어난 정확성을 보여주며, 이러한 연습은 경기에서의 성과로 이어짐. 타격 연습에서는 정확한 타점을 파악하여 공을 원하는 방향으로 보내는 기술을 발전시킴. 플라이볼의 낙하지점을 정확히 파악함으로써 필드에서의 위치 선정 능력이 뛰어나며, 이는 경기 중 중요한 순간에 큰 기여를 함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 게임 음악의 역할과 음악 산업에 관련된 직업을 조사하는 활동에 참여함. 게임 음악은 게임 진행에 도움을 주며, 게임을 하는 사람들이 게임의 분위기를 설정하여 몰입할 수 있도록 도와주는 역할을 한다고 의견을 정리하여 활동지를 작성함. '게임 음향 기술자', '사운드 디자이너', '오디오 감독'의 역할을 조사하여 정리함. 오페라 '투란도트' 중 파바로티가 부르는 아리아를 감상하고 테너의 음역에 대해 조사하면서 세계적으로 유명한 3대 테너 가수와 성악곡을 정리하여 활동지를 작성함. 칼림바를 연주하면서 건반의 위치를 파악하고 악기가 지닌 음색을 잘 드러내기 위해 노력하는 모습이 돋보이는 학생임. 미흡한 부분이 있으면 포기하지 않고 연습하여 곡의 완성도를 높이려는 자세를 보임. 우쿨렐레를 연주할 때 친구들과 노래를 부르며 악곡에 어울리는 리듬을 찾아 연주하는 시간이 즐거웠다고 느낀 점을 작성함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"미래의 명함 만들기 수업에서 유전 공학연구원이 하는 일과 관련학과를 조사하여 보고서를 성실히 작성함. 유전자를 재조합하여 인류에게 유익한 의약 물질, 기능성 물질을 생산하고 싶다고 친구들 앞에서 자신의 꿈을 향한 열정을 전달함. 미래의 명함을 표현할 때 DNA 이중나선 구조를 그려서 직업의 특징을 잘 나타냄. 예술의 정의에 관해서 토론하는 활동에서 서로 다른 시각을 가진 사람들의 의견을 수용하고 이를 존중하며 서로의 의견을 교환함. 예술이란 미적 요소가 존재하고 감상하는 이에게 감동과 긍정적인 영향을 주는 것이라고 발표함. 인공지능이 만든 작품일지라도 색채와 형태가 정교하고 감상하는 사람의 마음을","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"독서 과목에 흥미를 지니고 적극적으로 수업에 참여하는 학생으로 수업 중 이해가 안 가는 내용을 정리해 질문하는 등 열정적인 수업 태도를 보임. 평소 환경 분야에 관심이 많아 식물의 광수용체 관련 글을 읽고 흥미를 느껴 자발적으로 추가 탐구를 진행함. 식물이 빛을 감지하는 원리를 활용하여 훼손된 산림을 복구하거나 어린 나무의 생존률을 높일 수 있을 것이라고 말하면서 자신의 관심사와 글을 연관지어 이해함. 또한 글에서 제시된 파이토크롬 단백질의 다양한 형태를 조사하고 각각의 형태가 지는 특징에 대해 탐구함. 확장적 독서 활동에 참여하여 '거의 모든 물질의 화학(김병민)'의 7장 '염료로 시작해 약을 합성하다'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 교사와 대담함. 기술 발전의 양면성을 이해하고 장점과 단점의 사례를 말로 설명한 뒤, 인류는 기술 발전에 중립적인 태도를 지녀야 한다고 주장함. 또한 기술을 개발하는 과학자나 기술자는 유용한 기술을 개발하는 것도 중요하지만 그로 인해 생기는 환경 문제 또한 꼭 고려하는 직업 윤리 의식을 지녀야 한다고 덧붙임. 평소 환경 문제에 무관심한 사람들이 이 책을 읽고 그 심각성을 인지하기를 바란다고 말하면서 책을 추천함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 친구의 무기력에 대한 고민을 접하고 '나선형의 시간(안소연)'을 처방한 뒤 '앞으로 나아가자'라는 제목으로 발표를 진행함. 작품 속 구절을 인용하여 '머무르는 밤'을 '머무름을 밀어내는 밤'으로 만들어 나가는 것이 고민의 해결책이 될 수 있을 것이라고 말하며 활기찬 삶을 회복하기를 기원하는 내용을 발표를 통해 전달함.\n소설 서평 쓰기 활동에 참여하여 '관내분실(김초엽)'을 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 작품 속 가족간의 관계에 대해 깊이 공감하면서 자신의 사고와 삶을 돌아보는 모습을 보임. 이를 바탕으로 '엄마와 딸 사이의 연결고리'라는 제목의 서평을 작성함. 서평을 쓰면서 사자성어를 인용하거나 개인적 경험을 덧붙이는 등의 방식을 통해 흥미롭게 글을 전개함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 여행, 가을, 바다, 환경, 생명 등으로 선정하고 각 단어를 시각적 상징으로 전환하여 결합함. 붉게 물든 가로수로 가을을 상징하며 나무 윗부분을 친구들의 옆모습으로 표현하고, 자신이 밟고 있는 하늘로 향하는 길의 끝을 생명의 상징인 새로 표현한 점에서 창의 융합 능력이 잘 나타남. 인간과 자연의 관계를 상징적으로 풀어낸 점이 인상적임. 갤러리 공간 디자인 활동에서 내면을 들여다보는 감각적 공간을 주제로 '내 마음 속의 전시'를 기획함. 좋아하는 풍경 사진, 앨범 표지, 고흐의 작품들을 전시하여 개인의 취향과 감정을 시각적으로 구성함. 전시 작품을 선정하는 과정에서 자신이 무엇을 좋아하고 표현하고 싶은지 깊이 성찰하는 모습이 바람직함. 처음에는 투시도법을 표현하는 데 어려움을 느꼈으나 다양한 예시를 참고하며 작업하는 과정에서 자기 주도적 미술 학습 능력이 잘 발휘됨. 판화 제작 활동에서 이모티콘 캐릭터를 주제로 지우개 판을 조각함. 처음에는 아트나이프 사용이 어려웠으나 반복적인 시도와 집중을 통해 선을 점차 또렷하게 다듬어 나감. 노력의 과정이 결과로 드러나는 경험에 큰 성취감을 느끼는 등 꾸준함과 몰입도가 돋보임.","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에 과학 기술의 발전이 스포츠 경기력 향상에 긍정적 영향을 미친다는 점을 논리적으로 주장함. 선수의 기본 실력과 노력이 뒷받침되어야 기술의 효과가 극대화된다는 점을 강조함. 장비 발전이 선수 부상 예방과 기량 유지에 기여함을 근거로 들었으며 사고력과 통찰력이 뛰어남. 체육시간에 긍정적이고 성실한 자세로 임하며, 플라잉디스크를 정확하게 던지기 위한 릴리스 타이밍을 습득함. 원하는 방향으로 정확하게 던지며 동료와의 패스와 캐치 기술을 발전시킴. 이동 수비에서 디스크의 비행 궤적을 파악하여 성공적으로 수비함. 빅발리볼 기초 기능인 언더핸드와 오버핸드 토스를 침착한 태도로 정확하게 수행함. 나아가 상위 기술인 콤비네이션 동작도 우수하게 해냄. 리그전에서 자신의 역할을 충실히 수행하려는 노력을 꾸준히 보임. 협동심과 집중력을 바탕으로 팀워크 향상에 기여함. 기본 동작에 대한 협응성을 바탕으로 여러 기술을 충실히 해내는 모습을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 운동화 쿠셔닝 시스템의 발전 과정을 환경공학적 및 재료공학적 관점에서 탐구함. 과거 충격 흡수용으로 사용된 육불화황 가스의 높은 지구온난화 지수 문제를 인지하고, 이를 친환경적인 질소 가스로 대체하는 과정에서 발생한 기체 투과성 문제를 '그레이엄의 확산 법칙'을 적용하여 물리적으로 분석함.질소 분자의 빠른 확산과 유출을 억제하기 위해 도입된 '다층 구조 TPU 막'이 이종 밀도 고분자의 적층을 통해 분자의 투과 경로를 미시적으로 차단하는 원리임을 규명함.이를 통해 기업이 제품의 성능 구현이라는 공학적 목표와 환경 보호라는 윤리적 책임 사이에서, 소재의 물리적 특성을 정밀하게 제어함으로써 두 가치를 동시에 확보한 공학적 최적화 과정을 깊이 있게 이해했다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"항상 성실하게 자신의 역할을 다하며 학교생활에 임하는 모습이 돋보임. 높은 잠재력을 가진 학생으로, 지금처럼 스스로 자신감을 가지고 노력한다면 언젠가는 그 장점들을 발견하는 날이 올 것이라 믿어 의심치 않음. 바른 자세로 수업 시간에 참여하며, 학급의 여러 활동과 그룹 프로젝트에 언제든지 열정적으로 참여하는 태도가 인상적임. 본인이 속한 그룹에 많은 공헌을 하려고 노력하며, 팀워크를 중시하는 모습이 매우 긍정적임. 또한, 친구들에게 싫은 소리를 잘 하지 않고 잘 지내기 위해 노력하는 친화적인 모습으로 친구들 사이에서 신뢰를 쌓으며, 서로를 배려하고 존중하는 마음가짐을 가지고 있음. 여"},{"y":2,"b":"밝고 명랑한 성격을 지닌 학생으로, 다양한 표현 활동에서 재능과 끼를 드러낼 수 있는 역량을 갖추고 있으나 이를 과시하거나 내세우기보다는 항상 겸손한 태도로 학교생활에 임함. 자신의 장점을 드러내기보다 주변과 조화를 이루려는 자세가 돋보이며, 이러한 태도가 또래 친구들로부터 신뢰와 호감을 얻는 데 기여함. 학업 면에서도 자기주도학습을 성실히 참여하며 수업에 집중하고, 스스로 학습 계획을 세워 꾸준히 실천하는 모습을 통해 학업에 대한 책임감을 보임. 학급에서는 맡은 역할에 형식적으로 임하지 않고 끝까지 최선을 다하며, 보이지 않는 자리에서도 성실하게 행동하는 모습이 인상적임. 학급자치회 회장 선거에 자발적으로 출마하여 많은 득표를 얻었으나 아쉽게 낙선하였음에도 결과에 실망하거나 물러서지 않고, 서기로 봉사하며 학급을 위해 지속적으로 기여하고자 하는 성숙한 태도를 보임. 늘 따뜻한 마음으로 학급 구성원들을 대하며 배려와 존중의 언행을 실천하여 교우 관계가 원만하고, 교사들로부터도 신뢰를 받는 학생임. 특히 학기 후반으로 갈수록 더욱 밝고 긍정적인 모습을 보이며 학급의 분위기 형성과 단합에 크게 기여하였고, 구성원 간의 관계를 자연스럽게 이어 주는 역할을 수행함."}]},{"name":"이다현","seat":19,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":7,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":6,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":5,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":7,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":8,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'독서 즉문즉답' 활동에서 독서를 통해 얻은 통찰을 작문일지에 체계적으로 기록하며, 이를 바탕으로 교사의 질문에 깊이 있는 답변을 제시함. 어릴 적부터 '배구'를 좋아했기에 배구의 역사, 특성 등이 담긴 '배구'를 선택해 읽음. '협력'의 중요성을 깨닫고, 협력해서 안 되는 일이 없다고 생각하는 만큼 어떤 상황에서도 사람들과 함께할 수 있는 협동력을 기르겠다는 포부를 밝힘. 책과 관련해 '협력해도 안 되는 일이 생긴다면 어떻게 할 것인가?'라는 질문을 던지고 자신의 신념에서 벗어나는 예기치 못한 문제가 발생했을 때 어떻게 대처할 것인지 고찰해 보는 과정에서 학생의 문제해결 능력이 엿보임. 활동을 통해 독서를 즐기는 태도를 갖고 진로를 탐색해 보는 계기가 되었다고 소감문을 통해 밝힘.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"이차방정식의 판별식을 이용하여 이차방정식의 실근의 개수를 구하는 법을 학습한 후 멘토의 도움을 받으며 간단한 예제를 해결함. 친구들이 관련 기출문제를 해결하는 것을 경청하며 자신의 문제 해결 역량을 신장시킴. '피타고라스'를 주제로 자유 주제 탐구 프로젝트에 참여함. 음의 높낮이를 수학적으로 분석하여 음악 기초를 세우고, 모든 자연 현상이 수로 설명된다는 철학적 관점을 제시하는 등 다양한 업적을 세웠음에 흥미로워함. 피타고라스 정리의 다양한 증명 방법과 건축, 측량, 스포츠에서의 활용 사례를 조사하고, 수학이 단순한 계산이 아니라 세상을 이해하는 중요한 도구임을 깨달았다는 소감을 남김.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"주장하는 글쓰기 활동에서 '체육 수업을 의무화해야 한다'는 주제로 청소년의 신체 건강 증진, 교육 기회 확대, 사회성 발달 등을 근거로 논리적으로 주장을 전개함. 지식품앗이 활동에서는 고양이가 상자에 집착하는 이유를 본능적 안전감, 스트레스 감소, 체온 유지, 놀이 욕구 등으로 설명하고 시각 자료를 활용해 청중의 이해를 높임. 옷차림의 의미, 생물다양성의 중요성, 과학 자료의 가치 등에 대한 지문을 읽고 주제문, 제목 등을 영어로 작성함. 차별을 주제로 한 The Elephant Man과 The Hundred Dresses를 읽고 차별받는 주인공들의 고통에 공감하며 성찰하는 과정을 기록한 독서 일지를 작성함. 차별이 현대에도 여전히 존재함을 지적하며 이를 극복하기 위해 모두의 노력이 필요하다는 주장을 영어 에세이에 담음. 직소 모형 수업에서 디딤 영상을 반복 시청하며 어휘와 문장을 세밀히 분석하고 체계적으로 수업을 운영함. 책임감 있고 철저히 준비하는 태도로 점차 발전하는 모습을 보여 모둠원들로부터 좋은 평가를 받음.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"전근대 한국사를 학습하는 과정에서 생긴 궁금증을 모아 호기심 일지를 작성하고, 그중 고려 여성의 지위와 신분 제도의 유동성에 대해 조사하여 정리함. 노래 '독도는 우리 땅'을 소재로 독도의 역사를 학습하면서, 독도 문제와 센카쿠 열도를 둘러싼 중·일 갈등을 비교하여 각국의 입장을 조사하여 정리함. 독도가 우리 영토임을 뒷받침하는 사료들을 찾아보고 현재 대한민국이 실효적 지배를 하고 있는 상황에서 일본의 주장은 타당하지 않다고 비판하는 글을 씀. 광복부터 대한민국 정부 수립까지 발생한 여러 사건들 중 역사적으로 의미 있다고 생각하는 것으로 미·소 공동 위원회 개최를 선택함. 임시 민주 정부 수립을 협의하는 데 참여할 정당·사회단체를 선정하는 문제로 미국과 소련이 대립한 결과 무기한 휴회되었고, 이후 한반도 문제가 유엔으로 넘어가며 단독 정부 수립까지 이어졌기 때문에 한국사의 중요한 갈림길 중 하나라고 생각한다고 기술함.","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"체육 수업에서 긍정적인 분위기를 형성하는데 기여함. 체육 수업에서 배운 경기 규칙과 방법에 대해 정확하게 이해함. 이를 바탕으로 논술 활동에서 제시된 문제를 구체적인 글로 표현하는 능력을 갖춤. 리그전 경기에서 상대방을 배려하며 경기를 활동하려 노력함. 서브 활동에서 목표된 지역으로 공을 보내는 능력을 보여줌. 랠리 활동 시 짝 학생과 협동심을 발휘하여 연습하는 모습을 관찰함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"티볼 활동을 통해 경기 규칙 및 방법에 대한 깊은 이해를 보임. 빈볼 시비와 같은 윤리적 문제에 대해 자신의 생각을 서술하며 스포츠의 도덕적 측면을 인식하고 탐구함. 타격 시 강도보다는 정확한 타점을 맞추는 데 집중하며, 일정하게 공을 쳐내는 모습이 인상적임. 릴리즈 타이밍을 적절히 파악해 송구를 일정하게 던지는 능력을 보이며, 팀 내에서 중요한 역할을 수행함. 팀원들과의 원활한 소통을 통해 협동심을 발휘하며 스포츠맨십과 팀워크의 중요성을 몸소 실천함.","c":"운동과 건강"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고, 해당 악곡을 찾아 감상하며 서로의 의견을 공유하는 활동에 열심히 참여함. 평소 즐겨듣는 악곡 중 한 곡을 선정하여 가사의 의미를 생각하며 개사하는 활동에 참여하여 현재 느끼는 입시에 대한 두려움과 도전을 시작할 때 희망을 줄 수 있는 가사를 만들어 친구들과 불러보며 서로 위로하는 시간이 되어 뿌듯했다고 소감을 작성함. 칼림바를 연주하면서 처음 접하는 악기였지만 연주 방법이 간단해서 어렵지 않게 다가갈 수 있다는 점과, 소리가 맑고 악기가 작아 휴대하기 좋다는 장점을 지니고 있어 좋았다고 악기를 소개함. 칼림바를 조율하면서 음을 듣고 구별하는 능력을 기르게 되었고 우쿨렐레를 조율할 때 많은 도움이 되었다고 활동지를 작성함. 우쿨렐레를 연주하면서 음악의 즐거움을 알게 되었고, 꾸준한 연습을 통해 인내와 자신감을 얻어 공부할 때 큰 원동력이 되었으며, 합주를 통해 소통과 관계의 소중함을 배웠다고 소감을 발표함. 학년말 학급 작은 음악회에서 합주에 맞춰 노래를 불러 좋은 호응을 얻음.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"나타내고자 하는 아이디어를 신중하게 그리는 모습이 인상적이며, 작품을 완성하기 위해 최선을 다하는 자세가 훌륭함.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '콘크리트의 특징'에 관한 글을 읽고 콘크리트 사용 방식에 따라 도시 미관이 달라질 수 있음을 이해하여 정리함. 독서 후 콘크리트 산업의 탄소 배출 문제에 관심을 가져 이를 개선하기 위한 저탄소 및 재활용 콘크리트 기술의 현황에 대해 조사해 봄. 후속 탐구 주제 선정 활동에서 콘크리트의 구조적 특성에 디지털 센서 기술을 융합하는 방안을 모색함. 건물 내외부의 환경 데이터를 수집해 스스로 실내 환경을 최적화하는 '콘크리트 기반의 스마트 공간 디자인'을 미래 건축의 대안으로 제시함. 확장적 독서 활동으로 '아비투스(도리스 메르틴)'를 발췌독한 후, 인간관계에서 타인을 배려하는 것과 자신을 지키는 것 사이의 균형을 탐구한 것을 비평문으로 작성함. 타인에게 맞춰주는 '수용 감각'이 관계 형성에 필수적임을 인정하면서도, 그 정도가 지나칠 경우 자신의 색깔과 주관을 잃어버릴 수 있다고 설명하며 '수용 감각'을 발휘할 때에 신중을 기해야 한다고 설명함. 상대방을 존중하되 자신의 의견을 명확히 표현하며 적당한 선을 지키는 것이 건강한 관계의 핵심이라고 강조하며 인간 관계에서 의사 소통의 양보보다는 상호 존중을 바탕으로 한 대등한 소통을 지향해야 한다고 역설함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '저건 사람도 아니다(서유미)'를 읽고 비평 활동을 진행함. 로봇 기술이 발전하여 '트윈 사이보그'가 상용화된 사회를 그리고 있어 흥미로웠다고 설명하며, 최첨단 기술의 시대에 인간이 인간다움을 잃지 않을 방법을 모색해야 함을 강조하는 작품이라고 소개함. 모둠 책 대화에서 로봇 도우미가 대체할 수 있는 사람의 일이 어디까지 허용되어야 하는지를 중심으로 모둠원들과 의견을 교환한 후, 인간의 고유성을 훼손하지 않는 범위에서만 인간을 대체해야 한다는 견해를 제시함. 심미적 문학 체험 활동에서 다른 사람의 시선을 지나치게 의식하는 자신의 성격에 대해 고민하는 동료 학습자를 시로 위로하는 활동을 진행함. 시 '또 하나의 별(곽재구)'을 통해 얻었던 정서적 위안을 고민 대상자도 얻기를 바라는 마음에서 시를 선정했다고 밝히며, 고민 대상자가 자신의 내면에 집중하기를 바란다는 메시지를 전함. 문학 작품을 공감적으로 수용하여 타인과 공유하려는 모습을 보인 점에서 문학의 수용과 창작에 적극적으로 참여하려는 학습자의 면모가 확인됨.\n\n수학Ⅰ: 삼각함수 그래프 실습활동에서 사인, 코사인, 탄젠트 함수의 그래프를 단위원의 회전을 바탕으로 구성하고, 정의역, 치역, 주기성, 대칭성 등의 개념을 시각적으로 확인하며 개념을 정리함. 함수의 증가 감소 구간과 주기적 변화 양상을 직접 그래프로 표현하고, 오차를 줄이기 위해 수치를 정확히 계산하며 반복 작성하는 과정을 통해 함수 그래프의 구조를 구체화함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"다양한 연주 활동을 즐기며 수업의 전 과정에 적극적으로 참여하는 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 아르페지오 주법과 보사노바 리듬을 익히기 위해 노력하고, 타브 악보 연주에서 리듬을 정확하게 표현하기 위해 꾸준히 연습함. 그 결과, 바른 자세와 주법으로 악곡의 특징을 대체로 정확하게 표현함. 드럼 연주 활동에서 악기의 구조와 8비트 리듬, 필인 연주법 등을 체계적으로 학습함. 손과 발의 협응을 자연스럽게 하기 위해 노력하고, 수업 시간 외에도 음악실에 찾아와 연습하는 등 실력 향상을 위해 꾸준히 연습하는 모습을 보여줌. 연습의 결과 바른 자세로 8비트 기본 리듬과 응용 리듬, 악곡의 필인을 정확하게 표현하였으며, '필인이 안정적이고 연습의 흔적이 엿보인다'라는 긍정적인 동료평가를 받음. 어려웠던 점으로 악보 읽는 것을 꼽고, 이를 개선하기 위해 한 곡을 세세히 분석하고 연주하며 악보의 구성 요소를 익혔다는 성찰을 작성함. 연주를 보완하기 위해 단계적 전략을 수립하여 실천하는 자기관리 역량이 엿보임.","c":"정의음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 센서를 내장한 웨어러블 기기들이 운동하는 동안 발생하는 정보를 수집하고 분석하여 운동 성과를 최대화하고 부상 위험을 줄일 수 있는 전략을 개발하는 사례를 제시함. 선수들의 경기력으로 승부가 결정되는 것이 아니라 과학 기술의 개입으로 선수들의 경기 결과에 영향을 주는 것은 스포츠의 본질에 어긋난다는 의견을 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 규칙에 위반되는 동작을 하지 않고 남녀학생의 단합력이 우수하다는 강점이 있지만, 전체적으로 대형 유지가 너무 넓거나 몰려있다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 팀원의 강점을 살려 작전을 세워 실천할 수 있는 자신만의 필승 전략을 세움. 팀원들의 위치를 확인한 후 디스크를 패스하여 실수를 줄임으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능 연습을 꾸준히 참여하여 경기 수행에 필요한 서브와 리시브의 기능 수행 능력이 우수하며, 특히 순발력이 뛰어나 공의 낙하지점을 예측하고 빠르게 움직여 우수한 수비 능력을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 특정 농구화 브랜드가 단순한 스포츠 용품을 넘어 특정 공동체의 문화와 정체성을 대변하는 아이콘으로 발전한 과정을 탐구함. 1980년대 뛰어난 실력과 강한 영향력을 보여 준 선수의 활약을 바탕으로 젊은 세대 사이에서 큰 인기를 얻은 배경을 분석함. 특히 농구 문화가 힙합, 스트리트 패션과 유기적으로 결합하면서 청소년들이 자신의 개성과 자부심을 표현하는 상징적인 아이템이 되었음을 이해했다고 기술함. 결과적으로 제품이 하나의 라이프스타일을 나타내는 상징으로 자리 잡게 되었으며, 소외되었던 대중의 정체성을 대변하는 강력한 문화적 상징물로 진화하는 과정을 통해 스포츠 제품이 지닌 사회문화적 파급력을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학교 축제에서 공연을 준비하며 춤을 잘 못 추는 친구들을 도와주고 연습을 주도적으로 이끎. 춤을 잘 추는 친구들과 함께 단계별로 나누어 가르치며 모두가 자신감을 가질 수 있도록 격려함. 연습 중 친구들이 지칠 때마다 응원하고 함께 어려움을 극복하며 결국 성공적으로 공연을 마무리함. 책임감 있게 맡은 역할을 끝까지 완수하려고 노력하는 모습이 인상적임. 서로의 부족한 부분을 채워주고 돕는 과정에서 팀워크의 힘을 경험했다고 소감을 밝힘. 또한, 친구들을 이끌고 협력하며 문제를 해결하는 리더십을 발휘하고, 이를 통해 소통 능력도 향상됨. 점심시간에 혼자 있는 친구에게 먼저 다가가 함께 점심을 먹자고 제안하며 자연스럽게 대화를 시작함. 처음에는 어색했지만 시간이 지나면서 편안하게 이야기를 나누게 되었고, 친구도 점차 자신감을 얻어 다른 친구들과 어울리기 시작함. 작은 관심과 배려가 누군가에게는 큰 힘이 될 수 있다는 것을 깨닫고, 친구에게 먼저 다가가서 그의 어려움을 이해하려는 노력이 결국 긍정적인 변화를 만들어내는 모습을 보임. 배려와 나눔을 통해 친구와의 관계를 개선한 모습이 돋보임. 평소에도 항상 밝은 모습과 긍정적인 태도로 학교 생활을 하는 학생임."},{"y":2,"b":"밝고 명랑한 성격을 바탕으로 또래 학생들과 자연스럽게 어울리며 원만한 교우 관계를 형성하고, 친구들과 긍정적인 관계 속에서 학교생활을 이어가는 학생임. 책임감이 있는 학생으로, 1인 1역 활동에서 스마트폰 관리자 역할을 맡아 한 해 동안 학생들이 스마트폰을 제때 제출했는지를 확인하고 모두 수거하여 교무실로 운반하는 역할을 성실히 수행함. 스마트폰 가방이 무겁고 하루에 두 차례씩 반복되는 업무였음에도 불구하고, 불평하거나 소홀히 하는 모습 없이 묵묵히 자신의 역할을 이어 가는 태도가 인상적임. 또한 학교 행사에도 적극적으로 참여하는 학생으로, 스포츠 한마당에 참여하여 자신이 참여할 수 있는 종목에 성실히 임하며 학급 구성원들과 협력하는 모습을 보임. 더불어 친구들과 함께 댄스팀을 구성하여 학교 축제에 참가하기 위해 수개월간 꾸준히 연습하는 성실성을 보여주었으며 그 결과 노력의 과정이 충분히 드러나는 무대를 선보여 관중으로부터 큰 박수와 호응을 받음. 또한, 공동체 역량도 높아 다른 친구들이 모두 꺼려하는 체육관 청소를 맡아 일년동안 체육관 청소를 열심히 하는 모습을 보임. 전반적으로 밝은 성격과 책임감을 바탕으로 학급과 학교 공동체의 원활한 운영에 꾸준히 기여함."}]},{"name":"이동겸","seat":20,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":5,"u":4,"n":"국어","c":"국어"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":7,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":5,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":3,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3
