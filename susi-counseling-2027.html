    html += '<div style="margin-top:12px;padding:10px;background:var(--blue-light);border-radius:8px">';
    html += '<div style="font-size:12px;font-weight:700;color:var(--blue);margin-bottom:6px">상세 전형 정보</div>';
    Object.entries(admInfo).forEach(([jeonName, info]) => {
      html += `<div style="margin-bottom:6px;padding:8px;background:var(--card);border-radius:6px;border:1px solid var(--border)">`;
      html += `<div style="font-size:13px;font-weight:700;margin-bottom:4px">${esc(jeonName)}</div>`;
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">';
      if (info.cut85) html += `<div>등급컷(85%): <span class="mono" style="font-weight:700;color:${gradeColor(info.cut85)}">${info.cut85}</span></div>`;
      if (info.reflect) html += `<div>반영교과: <span style="font-weight:600">${esc(info.reflect)}</span> <span style="color:var(--muted)">(${esc(info.reflect_source || '')})</span></div>`;
      if (info.경쟁률) html += `<div>경쟁률: <span style="font-weight:600">${esc(info.경쟁률)}</span></div>`;
      if (info.min) html += `<div>수능최저: <span style="font-weight:600;color:var(--red)">${esc(info.min)}</span></div>`;
      else html += `<div>수능최저: <span style="color:var(--green);font-weight:600">없음</span></div>`;
      html += '</div></div>';
    });
    html += '</div>';
  }
  html += '</div>';

  // Composite score calculation
  const comp = calcCompositeScore(result, student, analysis);
  const pColor = comp.probability >= 70 ? 'var(--green)' : comp.probability >= 45 ? 'var(--blue)' : comp.probability >= 30 ? 'var(--orange)' : 'var(--red)';

  // Student's converted score
  html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
  html += `<h3>${esc(student.name)} 학생의 환산 결과</h3>`;
  html += `<div class="stat-grid">`;
  html += `<div class="stat-box"><div class="num" style="color:${gradeColor(result.score)}">${result.score.toFixed(2)}</div><div class="label">환산등급</div></div>`;
  html += `<div class="stat-box"><div class="num" style="color:${pColor};font-size:28px">${comp.probability}%</div><div class="label">종합 합격 확률</div></div>`;
  html += `<div class="stat-box"><div class="num">${result.count}</div><div class="label">반영과목수</div></div>`;

  if (result.cutline) {
    const b = result.band;
    html += `<div class="stat-box"><div class="num" style="color:${b.color}">${b.label}</div><div class="label">합격 판정</div></div>`;
  }
  html += '</div>';

  // Combo-matched score
  if (comp.comboUsed) {
    const comboRef = comp.comboAvgRef;
    const comboColor = comboRef != null ? gradeColor(comboRef) : gradeColor(comp.comboScore);
    html += `<div style="padding:12px;background:var(--blue-light);border-radius:10px;font-size:13px;margin-top:8px">
      <strong>반영 교과 조합:</strong> <span style="font-weight:700;color:var(--blue)">${esc(comp.comboUsed)}</span> →
      <strong>환산등급:</strong> <span class="mono" style="font-weight:700;color:${gradeColor(comp.comboScore)}">${comp.comboScore.toFixed(2)}</span>
      ${comboRef != null ? ` · <strong>조합 평균:</strong> <span class="mono" style="font-weight:700;color:${comboColor}">${comboRef.toFixed(2)}</span>` : ''}
      ${comboRef != null && Math.abs(comboRef - comp.comboScore) > 0.3 ? ` <span style="font-size:11px;color:var(--muted)">(${comboRef < comp.comboScore ? '반영교과 유리' : '반영교과 불리'})</span>` : ''}
    </div>`;
  }

  // Cutline comparison
  if (result.cutline) {
    html += `<div style="padding:12px;background:var(--cream);border-radius:10px;font-size:13px;margin-top:8px">
      <strong>등급컷:</strong> ${result.cutline.cut}등급 (${esc(result.cutline.source)}) ·
      <strong>차이:</strong> ${result.diff > 0 ? '+' : ''}${result.diff.toFixed(2)}등급
      ${result.cutline.min ? ' · <strong>수능최저:</strong> ' + esc(result.cutline.min) : ''}
      ${result.cutline.ratio ? ' · <strong>경쟁률:</strong> ' + esc(result.cutline.ratio) : ''}
    </div>`;
  }

  // Probability breakdown
  html += '<div style="margin-top:10px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px">';
  const jeonLabel = comp.is종합 ? '종합전형' : comp.is논술 ? '논술전형' : '교과전형';
  html += `<div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--sub)">합격 확률 산출 근거 <span style="padding:2px 6px;background:${comp.is종합?'var(--purple-light)':'var(--teal-light)'};border-radius:4px;font-size:10px;color:${comp.is종합?'var(--purple)':'var(--teal)'}">${jeonLabel} 모델</span></div>`;
  const tierNames = {1:'최상위', 2:'상위', 3:'중상위', 4:'중위'};
  const baseVal = comp.probability - comp.trendBonus - comp.ratioAdj - comp.minAdj - comp.fitBonus - (comp.reliabilityAdj||0) - (comp.countAdj||0) - (comp.comboBonus||0);
  const factors = [
    {label:'내신 환산 기반', val: baseVal, note: result.cutline ? `컷라인 비교 (${jeonLabel})` : `절대등급 기준 (${tierNames[comp.tier]||'중위'}권)`},
  ];
  if (comp.trendBonus !== 0) factors.push({label:'성적 추세', val:comp.trendBonus, note: comp.trendBonus>0?'상승세 (최근 학기 가중)':'하락세 (최근 학기 가중)'});
  if (comp.ratioAdj !== 0) factors.push({label:'경쟁률 보정', val:comp.ratioAdj, note: comp.ratioAdj>0?'낮은 경쟁':'높은 경쟁'});
  if (comp.minAdj !== 0) factors.push({label:'수능최저 감점', val:comp.minAdj, note:'수능최저 충족 필요'});
  if (comp.reliabilityAdj) factors.push({label:'환산 신뢰도', val:comp.reliabilityAdj, note:'환산 정확도 낮음'});
  if (comp.countAdj) factors.push({label:'반영과목 부족', val:comp.countAdj, note:'과목 수 부족'});
  if (comp.comboBonus) factors.push({label:'반영교과 보정', val:comp.comboBonus, note: comp.comboBonus>0?'반영교과 유리':'반영교과 불리'});
  if (comp.fitBonus !== 0) factors.push({label: comp.is종합 ? '전공적합성(종합전형)' : comp.is논술 ? '전공적합성(논술전형)' : '전공적합성(교과전형)', val:comp.fitBonus});
  factors.forEach(f => {
    const sign = f.val > 0 ? '+' : '';
    const fc = f.val > 0 ? 'var(--green)' : f.val < 0 ? 'var(--red)' : 'var(--sub)';
    html += `<div style="display:flex;justify-content:space-between;font-size:12px;padding:2px 0">
      <span>${esc(f.label)}${f.note ? ' <span style="color:var(--muted)">(' + esc(f.note) + ')</span>' : ''}</span>
      <span style="color:${fc};font-weight:600">${typeof f.val === 'number' && f.label !== '내신 환산 기반' ? sign + f.val + '%p' : f.val + '%p'}</span>
    </div>`;
  });
  html += `<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;margin-top:4px;border-top:1px solid var(--border);font-weight:700">
    <span>종합 합격 확률</span><span style="color:${pColor}">${comp.probability}%</span>
  </div>`;
  html += '</div>';

  // Warnings
  if (result.warnings && result.warnings.length > 0) {
    html += '<div style="margin-top:8px">';
    result.warnings.forEach(w => {
      html += `<div class="alert-item">${esc(w)}</div>`;
    });
    html += '</div>';
  }
  html += '</div>';

  // 전공적합성 vs 학업역량 analysis
  html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
  const character = getUnivCharacter(univName, result.ruleType);
  const recordAnalysis = analyzeRecord(student, analysis);

  if (comp.is종합) {
    html += '<h3>전공적합성 분석 (종합전형)</h3>';
    html += `<p style="font-size:11px;color:var(--muted);margin-bottom:10px">이 대학은 서류/면접 전형으로, 전공적합성이 합격에 큰 영향을 미칩니다.</p>`;

    // Fit score visualization
    const fitData = comp.fitData;
    html += `<div style="text-align:center;margin:12px 0">
      <div style="display:inline-block;position:relative;width:100px;height:100px">
        <svg viewBox="0 0 100 100" style="transform:rotate(-90deg);width:100px;height:100px">
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="8"/>
          <circle cx="50" cy="50" r="42" fill="none" stroke="${fitData.score >= 70 ? 'var(--green)' : fitData.score >= 40 ? 'var(--blue)' : 'var(--orange)'}" stroke-width="8" stroke-dasharray="${fitData.score * 2.64} 264" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:22px;font-weight:800;color:${fitData.score >= 70 ? 'var(--green)' : fitData.score >= 40 ? 'var(--blue)' : 'var(--orange)'}">${fitData.score}</div>
      </div>
      <div style="font-size:12px;color:var(--sub);margin-top:4px">전공적합성 점수 (100점 만점)</div>
    </div>`;

    fitData.factors.forEach(f => {
      const barW = Math.max(5, f.val / (f.label.includes('일관성') ? 25 : 20) * 100);
      const fc = f.val >= 15 ? 'var(--green)' : f.val >= 8 ? 'var(--blue)' : 'var(--orange)';
      html += `<div style="margin:4px 0;font-size:12px">
        <div style="display:flex;justify-content:space-between"><span>${esc(f.label)}</span><span style="color:var(--muted)">${esc(f.note || '')}</span></div>
        <div style="height:6px;background:var(--border);border-radius:3px;margin-top:2px"><div style="height:100%;width:${barW}%;background:${fc};border-radius:3px"></div></div>
      </div>`;
    });
  } else {
    html += '<h3>학업역량 분석 (교과전형)</h3>';
    if (character.includes('전과목')) {
      html += `<div class="insight-item">이 대학은 <strong>전과목을 반영</strong>하므로 학업역량(전체 성적)이 중요합니다.
        ${student.name} 학생의 전교과 평균은 ${calcWeightedAvg(student).toFixed(2)}등급입니다.</div>`;
    } else if (character.includes('선택형')) {
      html += `<div class="insight-item">이 대학은 <strong>유리한 과목을 선택</strong>하여 반영하므로, 강점 교과가 명확한 학생에게 유리합니다.
        ${analysis.str ? esc(student.name) + ' 학생의 강점: ' + esc(analysis.str.join(', ')) : ''}</div>`;
    }
  }

  // Student advantage/disadvantage bullets
  html += '<h4 style="margin-top:12px;font-size:13px;font-weight:700">유리·불리 분석</h4>';
  const advantages = [], disadvantages = [];
  if (result.cutline) {
    if (result.diff <= -0.5) advantages.push(`등급컷 대비 ${Math.abs(result.diff).toFixed(2)}등급 우위 — 안정적 합격 가능`);
    else if (result.diff > 0.5) disadvantages.push(`등급컷 대비 ${result.diff.toFixed(2)}등급 부족 — 성적 보완 필요`);
  }
  if (comp.trendBonus > 0) advantages.push('성적 상승 추세 — 잠재력 어필 가능');
  else if (comp.trendBonus < 0) disadvantages.push('성적 하락 추세 — 면접에서 변명 준비 필요');
  if (analysis.str && analysis.str.length >= 2) advantages.push('강점 교과 ' + analysis.str.length + '개 — 교과 세특에서 전문성 어필 가능');
  if (analysis.wk && analysis.wk.length >= 2) disadvantages.push('약점 교과 ' + analysis.wk.length + '개 — 약점 보완 노력 설명 준비 필요');
  if (recordAnalysis.concept) advantages.push(`진로 분야 '${recordAnalysis.concept}' 명확 — 학과 선택 근거 확보`);
  if (result.cutline && result.cutline.min) disadvantages.push('수능최저 충족 필요 — 수능 대비도 병행해야 함');
  if (comp.is종합 && comp.fitData.score >= 60) advantages.push(`전공적합성 ${comp.fitData.score}점 — 서류 경쟁력 양호`);
  else if (comp.is종합 && comp.fitData.score < 40) disadvantages.push(`전공적합성 ${comp.fitData.score}점 — 서류 보완 필요`);

  if (advantages.length) {
    advantages.forEach(a => {
      html += `<div style="padding:6px 12px;margin:4px 0;background:var(--green-light);border-radius:6px;font-size:12px;color:var(--green)">▲ ${esc(a)}</div>`;
    });
  }
  if (disadvantages.length) {
    disadvantages.forEach(d => {
      html += `<div style="padding:6px 12px;margin:4px 0;background:var(--red-light);border-radius:6px;font-size:12px;color:var(--red)">▼ ${esc(d)}</div>`;
    });
  }
  if (!advantages.length && !disadvantages.length) {
    html += '<div style="font-size:12px;color:var(--muted)">추가 분석 데이터가 부족합니다.</div>';
  }

  if (recordAnalysis.concept) {
    html += `<div class="insight-item" style="margin-top:8px">학생의 주요 관심 분야: <strong>${esc(recordAnalysis.concept)}</strong>
      ${recordAnalysis.themes.length > 1 ? ' (부차: ' + recordAnalysis.themes.slice(1).map(t => esc(t)).join(', ') + ')' : ''}</div>`;
  }
  html += '</div>';

  // Rule details
  if (rule && rule.규칙) {
    html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
    html += '<h3>환산 규칙 상세</h3>';
    const rules = Array.isArray(rule.규칙) ? rule.규칙 : [rule.규칙];
    html += '<table class="g-table" style="font-size:12px"><thead><tr><th>교과군</th><th>선택수</th><th>비고</th></tr></thead><tbody>';
    rules.forEach(r => {
      const group = Array.isArray(r.교과군) ? r.교과군.join(', ') : (r.교과군 || '-');
      const n = r.선택수 != null ? r.선택수 + '과목' : '전과목';
      const note = r.비고 || r.진로선택 || '';
      html += `<tr><td>${esc(group)}</td><td>${esc(String(n))}</td><td style="font-size:11px;color:var(--muted)">${esc(String(note))}</td></tr>`;
    });
    html += '</tbody></table>';
    if (rule.비고) html += `<div style="margin-top:8px;font-size:12px;color:var(--sub)">${esc(rule.비고)}</div>`;
    if (rule.특이사항) html += `<div class="alert-item" style="margin-top:8px">${esc(rule.특이사항)}</div>`;
    html += '</div>';
  }

  // Interview questions from bank
  const univQuestions = INTERVIEW_BANK[univName] || [];
  if (univQuestions.length > 0) {
    html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
    html += `<h3>면접 예시 문항 (${univQuestions.length}개)</h3>`;
    // Show up to 10 questions, prioritize those matching student's concept
    let prioritized = [...univQuestions];
    if (recordAnalysis.concept) {
      const conceptWords = {
        '과학': ['과학','실험','탐구','연구'],
        '수학': ['수학','통계','논리'],
        '인문': ['독서','문학','역사','사회'],
        '교육': ['교사','교육','수업'],
        '공학': ['공학','기술','프로그래밍'],
        '의료': ['의학','간호','보건'],
        '체육': ['체육','스포츠','운동']
      };
      const words = conceptWords[recordAnalysis.concept] || [];
      prioritized.sort((a, b) => {
        const aMatch = words.some(w => a.q.includes(w)) ? 0 : 1;
        const bMatch = words.some(w => b.q.includes(w)) ? 0 : 1;
        return aMatch - bMatch;
      });
    }

    prioritized.slice(0, 10).forEach(q => {
      html += `<div class="interview-card">
        <div class="q-area">${esc(q.area)}</div>
        <div>${esc(q.q)}</div>
      </div>`;
    });
    if (univQuestions.length > 10) {
      html += `<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px">외 ${univQuestions.length - 10}개 문항</div>`;
    }
    html += '</div>';
  }

  // Student-specific predicted interview questions (from 생기부 analysis)
  if (recordAnalysis.interviewPredictions.length > 0 && comp.is종합) {
    html += '<div class="glass" style="box-shadow:none;margin-bottom:12px">';
    html += `<h3>${esc(student.name)} 맞춤 예상 면접 질문</h3>`;
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:8px">학생의 생기부 내용을 분석하여 생성한 맞춤형 예상 질문입니다.</p>';
    recordAnalysis.interviewPredictions.slice(0, 8).forEach(p => {
      html += `<div class="interview-card" style="border-left:3px solid var(--purple)">
        <div class="q-area" style="background:var(--purple-light);color:var(--purple)">${esc(p.type)} · ${esc(p.source)}</div>
        <div>${esc(p.q)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Favorite toggle
  const favKey = `fav_${student.seat}`;
  const isFav = (favorites[favKey] || []).includes(univName);
  html += `<div style="text-align:center;margin-top:16px">
    <button class="fav-btn ${isFav ? 'on' : ''}" style="font-size:24px;opacity:1"
      onclick="toggleFav('${esc(univName)}')">
      ${isFav ? '★' : '☆'} 즐겨찾기
    </button>
  </div>`;

  content.innerHTML = html;
  modal.classList.add('open');
}

function closeUnivModal() {
  document.getElementById('univModal').classList.remove('open');
}

// Student comparison
let compareMode = false;
let compareList = [];
function toggleCompareMode() {
  compareMode = !compareMode;
  const sel = document.getElementById('compareSel');
  const btn = document.getElementById('compareBtn');
  if (compareMode) {
    sel.style.display = '';
    btn.textContent = '비교 취소';
    btn.style.background = 'var(--red-light)';
    btn.style.color = 'var(--red)';
    compareList = [];
    updateCompareCount();
    document.querySelectorAll('.dash-student').forEach(el => {
      el.style.cursor = 'pointer';
      el.onclick = (e) => { e.stopPropagation(); toggleCompareStudent(parseInt(el.dataset.idx)); };
    });
  } else {
    sel.style.display = 'none';
    btn.textContent = '비교 모드';
    btn.style.background = 'var(--card)';
    btn.style.color = 'var(--teal)';
    compareList = [];
    document.querySelectorAll('.dash-student').forEach(el => {
      el.style.outline = '';
      el.onclick = () => selectStudent(parseInt(el.dataset.idx));
    });
  }
}
function toggleCompareStudent(idx) {
  const i = compareList.indexOf(idx);
  if (i >= 0) { compareList.splice(i, 1); }
  else if (compareList.length < 3) { compareList.push(idx); }
  document.querySelectorAll('.dash-student').forEach(el => {
    const elIdx = parseInt(el.dataset.idx);
    el.style.outline = compareList.includes(elIdx) ? '2px solid var(--teal)' : '';
  });
  updateCompareCount();
}
function updateCompareCount() {
  const el = document.getElementById('compareCount');
  if (el) el.textContent = compareList.length;
}
function runCompare() {
  if (compareList.length < 2) { alert('2명 이상 선택해 주세요.'); return; }
  const students = compareList.map(i => STUDENTS[i]);
  const modal = document.getElementById('compareModal');
  const content = document.getElementById('compareModalContent');
  let html = `<button class="modal-close" onclick="document.getElementById('compareModal').classList.remove('open')">&times;</button>`;
  html += '<h2>학생 비교</h2>';

  // Summary comparison table
  html += '<div class="scroll-table"><table class="g-table" style="font-size:12px"><thead><tr><th>항목</th>';
  students.forEach(s => html += `<th style="text-align:center">${esc(s.name)}</th>`);
  html += '</tr></thead><tbody>';

  // Average grade
  html += '<tr><td style="font-weight:600">전체 평균</td>';
  students.forEach(s => {
    const avg = calcWeightedAvg(s);
    html += `<td style="text-align:center;color:${gradeColor(avg)};font-weight:700" class="mono">${avg.toFixed(2)}</td>`;
  });
  html += '</tr>';

  // Best combo
  html += '<tr><td style="font-weight:600">최적 조합</td>';
  students.forEach(s => {
    const combos = calcComboScores(s);
    let best = null, bestScore = 99;
    COMBO_ORDER.forEach(c => { if (combos[c] && combos[c].avg < bestScore) { bestScore = combos[c].avg; best = c; } });
    html += `<td style="text-align:center;font-size:11px">${best ? esc(best) + ' ' + bestScore.toFixed(2) : '-'}</td>`;
  });
  html += '</tr>';

  // Trend
  html += '<tr><td style="font-weight:600">성적 추세</td>';
  students.forEach(s => {
    const trend = calcYearlyTrend(s);
    if (trend.length >= 2) {
      const diff = trend[trend.length-1].avg - trend[0].avg;
      const dir = diff < -0.3 ? '↑상승' : diff > 0.3 ? '↓하락' : '→유지';
      const c = diff < -0.3 ? 'var(--green)' : diff > 0.3 ? 'var(--red)' : 'var(--muted)';
      html += `<td style="text-align:center;color:${c};font-weight:600">${dir} (${Math.abs(diff).toFixed(1)})</td>`;
    } else html += '<td style="text-align:center">-</td>';
  });
  html += '</tr>';

  // Concept
  html += '<tr><td style="font-weight:600">진로 분야</td>';
  students.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    const ra = analyzeRecord(s, a);
    html += `<td style="text-align:center">${ra.concept ? esc(ra.concept) : '<span style="color:var(--muted)">미설정</span>'}</td>`;
  });
  html += '</tr>';

  // Fit score
  html += '<tr><td style="font-weight:600">전공적합성</td>';
  students.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    const fit = calcFitScore(s, a, null);
    const c = fit.score >= 60 ? 'var(--green)' : fit.score >= 35 ? 'var(--blue)' : 'var(--orange)';
    html += `<td style="text-align:center;color:${c};font-weight:700">${fit.score}점</td>`;
  });
  html += '</tr>';

  // Strengths
  html += '<tr><td style="font-weight:600">강점 교과</td>';
  students.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    html += `<td style="text-align:center;font-size:11px">${a.str ? esc(a.str.join(', ')) : '-'}</td>`;
  });
  html += '</tr>';

  // Weaknesses
  html += '<tr><td style="font-weight:600">약점 교과</td>';
  students.forEach(s => {
    const a = ANALYSIS[s.seat] || {};
    html += `<td style="text-align:center;font-size:11px">${a.wk ? esc(a.wk.join(', ')) : '-'}</td>`;
  });
  html += '</tr>';

  // Subject count
  html += '<tr><td style="font-weight:600">반영 과목 수</td>';
  students.forEach(s => {
    const graded = s.subjects.filter(sub => sub.g != null && sub.g >= 1 && sub.g <= 9);
    html += `<td style="text-align:center">${graded.length}</td>`;
  });
  html += '</tr>';

  html += '</tbody></table></div>';

  // Per-subject comparison
  html += '<h3 style="margin-top:16px">교과별 비교</h3>';
  const allSubjects = new Set();
  students.forEach(s => calcSubjectAvgs(s).forEach(sa => allSubjects.add(sa.name)));
  html += '<div class="scroll-table"><table class="g-table" style="font-size:12px"><thead><tr><th>교과</th>';
  students.forEach(s => html += `<th style="text-align:center">${esc(s.name)}</th>`);
  html += '</tr></thead><tbody>';
  [...allSubjects].forEach(subj => {
    html += `<tr><td>${esc(subj)}</td>`;
    students.forEach(s => {
      const sa = calcSubjectAvgs(s).find(a => a.name === subj);
      if (sa) {
        html += `<td style="text-align:center;color:${gradeColor(sa.avg)};font-weight:600" class="mono">${sa.avg.toFixed(2)}</td>`;
      } else html += '<td style="text-align:center;color:var(--muted)">-</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  // Top 5 university comparison
  html += '<h3 style="margin-top:16px">상위 대학 합격 확률 비교</h3>';
  const topUnivs = new Set();
  students.forEach(s => {
    const results = runAllUniversities(s);
    results.slice(0, 10).forEach(r => topUnivs.add(r.univ));
  });
  html += '<div class="scroll-table"><table class="g-table" style="font-size:12px"><thead><tr><th>대학</th>';
  students.forEach(s => html += `<th style="text-align:center">${esc(s.name)}</th>`);
  html += '</tr></thead><tbody>';
  [...topUnivs].slice(0, 10).forEach(univ => {
    html += `<tr><td style="font-size:11px">${esc(univ)}</td>`;
    students.forEach(s => {
      const results = runAllUniversities(s);
      const r = results.find(x => x.univ === univ);
      if (r) {
        const a = ANALYSIS[s.seat] || {};
        const comp = calcCompositeScore(r, s, a);
        const c = comp.probability >= 50 ? 'var(--green)' : comp.probability >= 30 ? 'var(--orange)' : 'var(--red)';
        html += `<td style="text-align:center;color:${c};font-weight:700">${comp.probability}%</td>`;
      } else html += '<td style="text-align:center;color:var(--muted)">-</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';

  content.innerHTML = html;
  modal.classList.add('open');
  toggleCompareMode();
}

function toggleFav(univName) {
  if (selectedIdx == null) return;
  const student = STUDENTS[selectedIdx];
  const favKey = `fav_${student.seat}`;
  if (!favorites[favKey]) favorites[favKey] = [];
  const idx = favorites[favKey].indexOf(univName);
  if (idx >= 0) favorites[favKey].splice(idx, 1);
  else favorites[favKey].push(univName);
  localStorage.setItem('susi27_favs', JSON.stringify(favorites));
  showUnivDetail(univName);
}

// ═══════════════════════════════════════════════
// TAB 3: 생기부 ANALYSIS
// ═══════════════════════════════════════════════
function renderRecordTab(student, analysis) {
  const el = document.getElementById('panel-record');
  const ra = analyzeRecord(student, analysis);

  let html = '';

  // Student concept & theme
  html += '<div class="glass"><h3>학생 컨셉 분석</h3>';
  if (ra.concept) {
    const hasCareerFlow = analysis && analysis.career_flow && analysis.career_flow.length > 0;
    const sourceLabel = hasCareerFlow ? '진로 희망 기반' : '생기부 기록 분석';
    html += `<div style="text-align:center;margin:12px 0">
      <span class="concept-badge">${esc(ra.concept)}</span>
      ${ra.themes.slice(1).map(t => `<span class="concept-badge" style="background:var(--copper-light);color:var(--copper)">${esc(t)}</span>`).join('')}
    </div>`;
    html += `<div style="font-size:13px;text-align:center;color:var(--sub)">
      ${sourceLabel}으로 도출된 학생의 핵심 관심 영역입니다.
    </div>`;

    // 3-year narrative coherence assessment
    const yearRecords = {};
    student.records.forEach(r => {
      if (r.t !== '세부능력및특기사항' || !r.b) return;
      if (!yearRecords[r.y]) yearRecords[r.y] = [];
      yearRecords[r.y].push(r.b);
    });
    const years = Object.keys(yearRecords).sort();
    if (years.length >= 2) {
      const conceptKw = {
        '과학': ['과학','실험','탐구','연구','분석','가설','변인','데이터','관찰'],
        '수학': ['수학','함수','통계','확률','증명','논리','수열','미적분'],
        '인문': ['독서','문학','역사','사회','비평','분석','토론','논술'],
        '교육': ['교육','교사','수업','학습','멘토','지도','학생'],
        '공학': ['프로그래밍','코딩','소프트웨어','알고리즘','AI','로봇','회로'],
        '의료': ['의학','생명','건강','보건','해부','질병','약리'],
        '경영': ['경영','경제','시장','마케팅','회계','기업','창업'],
        '체육': ['운동','체육','스포츠','트레이닝','경기','선수'],
        '예술': ['미술','음악','디자인','창작','연주','작품'],
        '법률': ['법','인권','헌법','정의','사회정의','판례']
      };
      const cWords = conceptKw[ra.concept] || [];
      if (cWords.length > 0) {
        const yearScores = years.map(y => {
          const text = yearRecords[y].join(' ');
          let hits = 0;
          cWords.forEach(w => { hits += (text.split(w).length - 1); });
          return { year: y, hits, total: yearRecords[y].length };
        });
        const increasing = yearScores.length >= 2 && yearScores[yearScores.length-1].hits >= yearScores[0].hits;
        const totalHits = yearScores.reduce((s,y) => s + y.hits, 0);
        let narrative = '';
        if (totalHits >= 20 && increasing) narrative = '3년간 관련 활동이 꾸준히 심화되어 강력한 스토리라인을 형성하고 있습니다.';
        else if (totalHits >= 10) narrative = '관련 활동이 기록되어 있으나, 심화 과정의 연결을 더 강조할 수 있습니다.';
        else if (totalHits >= 3) narrative = '관련 키워드가 산발적으로 등장합니다. 면접에서 연결 스토리 준비가 필요합니다.';
        else narrative = '생기부에서 이 분야 관련 기록이 부족합니다. 다른 분야 강점을 어필하는 전략이 필요합니다.';

        html += `<div style="margin-top:12px;padding:10px 14px;background:var(--cream);border-radius:10px;font-size:12px">
          <div style="font-weight:600;margin-bottom:4px">📖 3년 스토리 평가</div>
          <div style="display:flex;gap:12px;margin:6px 0">
            ${yearScores.map(ys => `<div style="flex:1;text-align:center;padding:6px;background:var(--card);border-radius:6px">
              <div style="font-size:11px;color:var(--muted)">${ys.year}학년</div>
              <div style="font-size:16px;font-weight:700;color:${ys.hits >= 5 ? 'var(--green)' : ys.hits >= 2 ? 'var(--blue)' : 'var(--orange)'}">${ys.hits}</div>
              <div style="font-size:10px;color:var(--muted)">관련 키워드</div>
            </div>`).join('')}
          </div>
          <div style="margin-top:4px;color:var(--sub)">${narrative}</div>
        </div>`;
      }
    }
  } else {
    html += '<div style="font-size:13px;color:var(--muted)">진로 희망 및 생기부 기록이 부족하여 컨셉을 도출하기 어렵습니다.</div>';
  }

  // Career flow
  if (ra.storyArc.length > 0) {
    html += '<h3 style="margin-top:16px">진로 희망 변화 (3년 스토리)</h3>';
    html += '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:8px 0">';
    ra.storyArc.forEach((s, i) => {
      if (i > 0) html += '<span style="color:var(--muted);font-size:16px">→</span>';
      html += `<span style="padding:6px 14px;background:var(--teal-light);border-radius:20px;font-size:13px;font-weight:600">
        ${s.year}학년: ${esc(s.career)}
      </span>`;
    });
    html += '</div>';

    // Career-subject alignment
    if (analysis.career_data && analysis.career_data.length > 0) {
      html += '<div style="margin-top:12px">';
      analysis.career_data.forEach(cd => {
        const gap = cd['전체평균대비'];
        const color = gap <= 0 ? 'var(--green)' : gap <= 1 ? 'var(--orange)' : 'var(--red)';
        const label = gap <= 0 ? '양호' : gap <= 1 ? '주의' : '경고';
        html += `<div style="display:flex;justify-content:space-between;padding:6px 12px;margin-bottom:4px;background:var(--cream);border-radius:6px;font-size:12px">
          <span>${cd['학년']}학년 '${esc(cd['진로희망'])}' → ${esc(cd['관련교과추정'])} ${cd['해당교과평균등급']}등급</span>
          <span style="font-weight:700;color:${color}">${label} (평균 대비 ${gap > 0 ? '+' : ''}${gap.toFixed(2)})</span>
        </div>`;
      });
      html += '</div>';
    }
  }

  // Matched departments with university matching
  if (ra.deptMatch.length > 0) {
    html += '<h3 style="margin-top:16px">추천 학과</h3>';
    html += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:8px 0">';
    ra.deptMatch.forEach(d => {
      html += `<span style="padding:4px 12px;background:var(--blue-light);border-radius:8px;font-size:12px;font-weight:500;color:var(--blue)">${esc(d)}</span>`;
    });
    html += '</div>';

    // Match recommended departments to universities with good scores
    const goodUnivs = univResults.filter(r => r.reliability === 'high' && r.score <= 4.0).slice(0, 8);
    if (goodUnivs.length > 0) {
      html += '<div style="margin-top:8px;padding:10px 14px;background:var(--cream);border-radius:10px;font-size:12px">';
      html += '<div style="font-weight:600;margin-bottom:6px">관련 학과가 있을 수 있는 환산등급 상위 대학</div>';
      goodUnivs.forEach(u => {
        const c = gradeColor(u.score);
        html += `<span style="display:inline-block;padding:3px 10px;margin:2px 4px 2px 0;background:var(--card);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px" onclick="showUnivDetail('${esc(u.univ)}')">
          ${esc(u.univ)} <span class="mono" style="color:${c};font-weight:700">${u.score.toFixed(1)}</span>
        </span>`;
      });
      html += '</div>';
    }
  }
  html += '</div>';

  // 생기부 기록 밀도 분석
  const density = calcRecordDensity(student);
  html += '<div class="glass"><h3>생기부 기록 밀도 분석</h3>';
  html += `<p style="font-size:11px;color:var(--muted);margin-bottom:10px">세부능력특기사항 기록의 분량과 분포를 분석합니다. 총 ${density.total.toLocaleString()}자 · 평균 ${Math.round(density.avgPerRecord)}자/기록</p>`;

  if (density.bySubject.length > 0) {
    const maxChars = density.bySubject[0].chars;
    density.bySubject.forEach(d => {
      const pct = Math.max(5, (d.chars / maxChars) * 100);
      const richLabel = d.chars >= 500 ? '풍부' : d.chars >= 200 ? '보통' : '부족';
      const richColor = d.chars >= 500 ? 'var(--green)' : d.chars >= 200 ? 'var(--blue)' : 'var(--orange)';
      html += `<div style="margin:4px 0">
        <div style="display:flex;justify-content:space-between;font-size:12px">
          <span style="font-weight:600">${esc(d.subject)}</span>
          <span style="color:var(--muted)">${d.count}건 · ${d.chars.toLocaleString()}자 · <span style="color:${richColor};font-weight:600">${richLabel}</span></span>
        </div>
        <div style="height:8px;background:var(--border);border-radius:4px;margin-top:3px">
          <div style="height:100%;width:${pct}%;background:${richColor};border-radius:4px;transition:width .3s"></div>
        </div>
      </div>`;
    });
  }

  // Record type composition
  const typeCount = { '세부능력및특기사항': 0, '창의적체험활동상황': 0 };
  student.records.forEach(r => { if (typeCount[r.t] !== undefined) typeCount[r.t]++; else typeCount[r.t] = (typeCount[r.t] || 0) + 1; });
  const totalRecs = Object.values(typeCount).reduce((s,v)=>s+v, 0);
  if (totalRecs > 0) {
    html += '<div style="display:flex;gap:8px;margin-top:12px">';
    for (const [type, count] of Object.entries(typeCount)) {
      if (count === 0) continue;
      const shortType = type === '세부능력및특기사항' ? '세특' : type === '창의적체험활동상황' ? '창체' : type;
      const tc = type === '세부능력및특기사항' ? 'var(--teal)' : 'var(--purple)';
      html += `<div style="flex:${count};padding:8px 12px;background:${tc}10;border-radius:6px;text-align:center;font-size:11px;font-weight:600;color:${tc}">
        ${esc(shortType)} ${count}건 (${Math.round(count/totalRecs*100)}%)
      </div>`;
    }
    html += '</div>';
  }

  // Fit score summary in record tab
  const fitData = calcFitScore(student, analysis, ra.concept);
  html += `<div style="margin-top:12px;padding:12px;background:var(--teal-light);border-radius:10px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--teal)">전공적합성 종합 점수</div>
        <div style="font-size:11px;color:var(--sub)">진로일관성 + 기록충실도 + 강점교과 + 활동다양성 + 행특기록</div>
      </div>
      <div style="font-size:28px;font-weight:800;color:${fitData.score >= 60 ? 'var(--green)' : fitData.score >= 35 ? 'var(--blue)' : 'var(--orange)'}">${fitData.score}<span style="font-size:14px;font-weight:600">/100</span></div>
    </div>
  </div>`;
  html += '</div>';

  // 생기부 품질 점수 & 개선 팁
  const qualityFactors = [];
  let qualityScore = 0;

  // Factor 1: Record density (0-20 points)
  const densityScore = Math.min(20, Math.round(density.total / 500));
  qualityFactors.push({ name: '기록 분량', score: densityScore, max: 20,
    tip: densityScore < 10 ? '세특 기록 분량이 부족합니다. 교과별 구체적 탐구 활동을 추가하세요.' : null });
  qualityScore += densityScore;

  // Factor 2: Subject diversity (0-15 points)
  const diverseSubjs = density.bySubject.filter(d => d.chars >= 100).length;
  const divScore = Math.min(15, diverseSubjs * 2);
  qualityFactors.push({ name: '교과 다양성', score: divScore, max: 15,
    tip: divScore < 8 ? '기록된 교과가 편중되어 있습니다. 다양한 교과에서 활동 기록을 확보하세요.' : null });
  qualityScore += divScore;

  // Factor 3: 3-year consistency (0-20 points)
  const recYears = new Set(student.records.filter(r => r.t === '세부능력및특기사항' && r.b).map(r => r.y));
  const yearCoverage = recYears.size;
  const consScore = yearCoverage >= 3 ? 20 : yearCoverage === 2 ? 12 : 5;
  qualityFactors.push({ name: '학년별 분포', score: consScore, max: 20,
    tip: consScore < 15 ? `${3 - yearCoverage}개 학년의 기록이 부족합니다.` : null });
  qualityScore += consScore;

  // Factor 4: Concept clarity (0-20 points)
  const conceptScore = ra.concept ? (ra.themes.length >= 2 ? 20 : 14) : 5;
  qualityFactors.push({ name: '진로 일관성', score: conceptScore, max: 20,
    tip: conceptScore < 14 ? '명확한 진로 키워드가 부족합니다. 관심 분야를 일관되게 드러내세요.' : null });
  qualityScore += conceptScore;

  // Factor 5: Depth indicators - books, research, debate (0-15 points)
  const allText = student.records.map(r => r.b || '').join(' ');
  const bookCount = (allText.match(/['「《][^'」》]{2,30}['」》]/g) || []).length;
  const researchCount = (allText.match(/탐구|연구|실험|조사|분석/g) || []).length;
  const debateCount = (allText.match(/토론|발표|토의|논의/g) || []).length;
  const depthRaw = Math.min(15, bookCount * 2 + Math.min(5, researchCount) + Math.min(3, debateCount));
  qualityFactors.push({ name: '심화 활동', score: depthRaw, max: 15,
    tip: depthRaw < 8 ? '도서, 탐구, 토론 등 심화 활동 언급이 부족합니다.' : null });
  qualityScore += depthRaw;

  // Factor 6: Behavioral records (0-10 points)
  const opinionLen = student.opinions.reduce((s, o) => s + (o.b || '').length, 0);
  const behScore = Math.min(10, Math.round(opinionLen / 200));
  qualityFactors.push({ name: '행특 기록', score: behScore, max: 10,
    tip: behScore < 5 ? '행동특성종합의견 기록이 부족합니다.' : null });
  qualityScore += behScore;

  const qColor = qualityScore >= 75 ? 'var(--green)' : qualityScore >= 50 ? 'var(--blue)' : qualityScore >= 30 ? 'var(--orange)' : 'var(--red)';
  const qLabel = qualityScore >= 75 ? '우수' : qualityScore >= 50 ? '양호' : qualityScore >= 30 ? '보완 필요' : '부족';
  html += `<div style="margin-top:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:700">생기부 품질 점수</div>
      <div style="font-size:24px;font-weight:800;color:${qColor}">${qualityScore}<span style="font-size:12px;font-weight:600;color:var(--muted)">/100 (${qLabel})</span></div>
    </div>`;
  qualityFactors.forEach(f => {
    const pct = (f.score / f.max) * 100;
    const fColor = pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--blue)' : 'var(--orange)';
    html += `<div style="margin:4px 0">
      <div style="display:flex;justify-content:space-between;font-size:11px">
        <span>${f.name}</span><span style="color:${fColor};font-weight:600">${f.score}/${f.max}</span>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;margin-top:2px">
        <div style="height:100%;width:${pct}%;background:${fColor};border-radius:3px"></div>
      </div>
    </div>`;
  });

  const tips = qualityFactors.filter(f => f.tip).map(f => f.tip);
  if (tips.length > 0) {
    html += '<div style="margin-top:10px;padding:8px 12px;background:var(--orange-light);border-radius:8px;font-size:11px;line-height:1.6">';
    html += '<div style="font-weight:700;color:var(--orange);margin-bottom:4px">개선 포인트</div>';
    tips.forEach(t => { html += `<div>· ${t}</div>`; });
    html += '</div>';
  }
  html += '</div>';
  html += '</div>';

  // Career insights from 행특
  if (ra.careerInsights.length > 0) {
    html += '<div class="glass"><h3>행동특성 종합의견 중 진로 관련 발췌</h3>';
    ra.careerInsights.forEach(ci => {
      ci.excerpts.forEach(ex => {
        html += `<div style="padding:8px 14px;margin:6px 0;border-left:3px solid var(--purple);background:var(--cream);border-radius:0 8px 8px 0;font-size:12px;line-height:1.7">
          <span style="font-weight:600;color:var(--purple)">${ci.year}학년:</span> ${esc(ex)}
        </div>`;
      });
    });
    html += '</div>';
  }

  // Counseling points
  if (ra.counselingPoints.length > 0) {
    html += '<div class="glass" style="border-left:4px solid var(--orange)"><h3>상담 포인트</h3>';
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:8px">진로-교과 불일치, 성적 변화 등 상담 시 확인이 필요한 사항입니다.</p>';
    const unique = [...new Set(ra.counselingPoints)];
    unique.forEach(p => {
      html += `<div class="alert-item">${esc(p)}</div>`;
    });
    html += '</div>';
  }

  // Strengths & Weaknesses
  html += '<div class="glass"><h3>생기부 강점·약점 평가</h3>';
  if (analysis.str && analysis.str.length) {
    html += '<div class="analysis-grid">';
    html += `<div class="analysis-item" style="background:var(--green-light)">
      <div class="alabel" style="color:var(--green)">강점 교과</div>
      <div>${analysis.str.map(s => esc(s)).join(', ')}</div>
    </div>`;
    if (analysis.wk && analysis.wk.length) {
      html += `<div class="analysis-item" style="background:var(--red-light)">
        <div class="alabel" style="color:var(--red)">약점 교과</div>
        <div>${analysis.wk.map(s => esc(s)).join(', ')}</div>
      </div>`;
    }
    html += '</div>';
  }

  // Grade summary
  if (analysis.grade_summary) {
    html += `<div style="margin-top:12px;padding:10px 14px;background:var(--cream);border-radius:8px;font-size:12px">
      <strong>전체 등급:</strong> ${esc(analysis.grade_summary)}
    </div>`;
  }
  html += '</div>';

  // Predicted interview questions
  if (ra.interviewPredictions.length > 0) {
    html += '<div class="glass"><h3>예상 면접 질문 (생기부 기반)</h3>';
    html += '<p style="font-size:11px;color:var(--muted);margin-bottom:10px">세부능력특기사항 기록을 분석하여 예상되는 면접 질문입니다.</p>';
    ra.interviewPredictions.forEach(p => {
      html += `<div class="interview-card">
        <div class="q-area">${esc(p.type)} · ${esc(p.source)}</div>
        <div>${esc(p.q)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // Records by year (세부능력특기사항)
  const byYear = {};
  student.records.forEach(r => {
    if (!byYear[r.y]) byYear[r.y] = [];
    byYear[r.y].push(r);
  });

  for (const year of Object.keys(byYear).sort()) {
    html += `<div class="glass"><h3>${year}학년 세부능력특기사항</h3>`;
    byYear[year].forEach(r => {
      if (r.t === '창의적체험활동상황' && r.b.length < 20) return;
      const tagColor = r.t === '세부능력및특기사항' ? 'var(--teal)' : 'var(--purple)';
      const tagBg = r.t === '세부능력및특기사항' ? 'var(--teal-light)' : 'var(--purple-light)';
      html += `<div class="rec-item">
        <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
          ${r.c ? `<span class="rec-tag" style="background:var(--blue-light);color:var(--blue)">${esc(r.c)}</span>` : ''}
          <span class="rec-tag" style="background:${tagBg};color:${tagColor}">${esc(r.t)}</span>
          ${r.sem ? `<span class="rec-tag" style="background:var(--cream);color:var(--muted)">${esc(r.sem)}</span>` : ''}
        </div>
        <div style="font-size:13px;line-height:1.9">${esc(r.b)}</div>
      </div>`;
    });
    html += '</div>';
  }

  // 행동특성및종합의견
  if (student.opinions.length > 0) {
    html += '<div class="glass"><h3>행동특성 및 종합의견</h3>';
    student.opinions.forEach(o => {
      html += `<div class="opinion-box">
        <div style="font-weight:600;margin-bottom:6px;color:var(--purple)">${o.y}학년</div>
        ${esc(o.b)}
      </div>`;
    });
    html += '</div>';
  }


  el.innerHTML = html;
}

// ═══════════════════════════════════════════════
// TAB 4: COUNSELING MEMO
// ═══════════════════════════════════════════════
function renderMemoTab(student) {
  const el = document.getElementById('panel-memo');
  const memoKey = `memo_${student.seat}`;
  const studentMemos = memos[memoKey] || [];

  let html = '<div class="glass"><h3>상담 메모</h3>';
  html += '<p style="font-size:11px;color:var(--muted);margin-bottom:12px">이 학생에 대한 상담 메모를 기록하세요. 데이터는 브라우저에만 저장됩니다.</p>';
  html += `<textarea class="memo-input" id="memoInput" placeholder="상담 내용을 입력하세요..."></textarea>`;
  html += `<button class="memo-save" onclick="saveMemo()">메모 저장</button>`;
  html += '</div>';

  if (studentMemos.length > 0) {
    html += '<div class="glass"><h3>저장된 메모</h3>';
    studentMemos.forEach((m, i) => {
      html += `<div class="memo-item">
        <div class="memo-time">${esc(m.time)}</div>
        <div style="margin-top:4px">${esc(m.text)}</div>
        <button class="memo-del" onclick="deleteMemo(${i})">×</button>
      </div>`;
    });
    html += '</div>';
  }

  // Quick summary card
  const analysis = ANALYSIS[student.seat] || {};
  const avg = calcWeightedAvg(student);
  html += '<div class="glass"><h3>상담 요약 카드</h3>';
  html += '<div style="font-size:13px;line-height:2">';
  html += `<div><strong>학생:</strong> ${student.seat}번 ${esc(student.name)}</div>`;
  html += `<div><strong>전체 평균등급:</strong> ${avg.toFixed(2)}</div>`;
  if (analysis.str) html += `<div><strong>강점:</strong> ${esc(analysis.str.join(', '))}</div>`;
  if (analysis.wk) html += `<div><strong>약점:</strong> ${esc(analysis.wk.join(', '))}</div>`;
  if (analysis.career_flow && analysis.career_flow.length) {
    html += `<div><strong>진로:</strong> ${analysis.career_flow.map(([y,c]) => `${y}학년:${c}`).join(' → ')}</div>`;
  }

  // Top 5 university matches
  const top5 = univResults.filter(r => r.reliability === 'high').slice(0, 5);
  if (top5.length > 0) {
    html += '<div style="margin-top:12px"><strong>상위 5개 대학 매칭:</strong></div>';
    top5.forEach(r => {
      const comp = calcCompositeScore(r, student, analysis);
      html += `<div style="padding:4px 0">· ${esc(r.univ)} — ${r.score.toFixed(2)}등급${r.band ? ' (' + r.band.label + ')' : ''} · <strong>${comp.probability}%</strong></div>`;
    });
  }
  // Fit score for print
  const printFit = calcFitScore(student, analysis, null);
  html += `<div style="margin-top:8px"><strong>전공적합성:</strong> ${printFit.score}점/100점</div>`;
  html += '</div>';
  html += `<div style="margin-top:12px;display:flex;gap:8px">
    <button onclick="window.print()" style="padding:8px 20px;border:none;border-radius:8px;background:var(--teal);color:#fff;font-family:inherit;font-size:13px;cursor:pointer">현재 화면 인쇄</button>
    <button onclick="exportReport()" style="padding:8px 20px;border:none;border-radius:8px;background:var(--copper);color:#fff;font-family:inherit;font-size:13px;cursor:pointer">상담 보고서 출력</button>
  </div>`;
  html += '</div>';

  el.innerHTML = html;
}

function saveMemo() {
  if (selectedIdx == null) return;
  const student = STUDENTS[selectedIdx];
  const memoKey = `memo_${student.seat}`;
  const text = document.getElementById('memoInput').value.trim();
  if (!text) return;
  if (!memos[memoKey]) memos[memoKey] = [];
  memos[memoKey].unshift({
    text,
    time: new Date().toLocaleString('ko-KR')
  });
  localStorage.setItem('susi27_memos', JSON.stringify(memos));
  renderMemoTab(student);
}

function deleteMemo(idx) {
  if (selectedIdx == null) return;
  const student = STUDENTS[selectedIdx];
  const memoKey = `memo_${student.seat}`;
  if (memos[memoKey]) {
    memos[memoKey].splice(idx, 1);
    localStorage.setItem('susi27_memos', JSON.stringify(memos));
    renderMemoTab(student);
  }
}

// COUNSELING REPORT EXPORT
// ═══════════════════════════════════════════════
function exportReport() {
  if (selectedIdx == null) return;
  const student = STUDENTS[selectedIdx];
  const analysis = ANALYSIS[student.seat] || {};
  const avg = calcWeightedAvg(student);
  const ra = analyzeRecord(student, analysis);
  const fitData = calcFitScore(student, analysis, ra.concept);
  const trend = calcYearlyTrend(student);
  const density = calcRecordDensity(student);
  const combos = calcComboScores(student);

  const allComps = univResults.map(r => {
    const comp = calcCompositeScore(r, student, analysis);
    return { ...r, prob: comp.probability, comp };
  }).sort((a, b) => b.prob - a.prob);

  const safeCount = allComps.filter(r => r.prob >= 65).length;
  const fitCount = allComps.filter(r => r.prob >= 40 && r.prob < 65).length;
  const reachCount = allComps.filter(r => r.prob >= 15 && r.prob < 40).length;

  let report = `
<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>${student.name} 수시 상담 보고서</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;font-size:12px;line-height:1.6;color:#333;padding:20px;max-width:800px;margin:0 auto}
h1{font-size:18px;border-bottom:2px solid #143A40;padding-bottom:6px;margin-bottom:12px;color:#143A40}
h2{font-size:14px;color:#1C5A60;margin:14px 0 6px;border-left:3px solid #C77B3C;padding-left:8px}
table{width:100%;border-collapse:collapse;margin:6px 0 12px;font-size:11px}
th,td{border:1px solid #ddd;padding:4px 8px;text-align:left}
th{background:#f5f5f0;font-weight:700}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.box{padding:8px 12px;background:#f9f7f2;border-radius:6px;font-size:11px}
.safe{color:#2E7D4A;font-weight:700}.fit{color:#3C6E71;font-weight:700}.reach{color:#C77B3C;font-weight:700}
.footer{margin-top:20px;padding-top:8px;border-top:1px solid #ddd;font-size:10px;color:#999;text-align:center}
@media print{body{padding:10px}h1{font-size:16px}}
</style></head><body>
<h1>${student.seat}번 ${esc(student.name)} — 2027학년도 수시 상담 보고서</h1>
<div style="font-size:11px;color:#666;margin-bottom:12px">병점고등학교 3학년 4반 · 작성일: ${new Date().toLocaleDateString('ko-KR')} · 학생 데이터는 브라우저 내에서만 처리되며 외부로 전송되지 않습니다</div>

<h2>1. 학생 기본 정보</h2>
<div class="grid2">
<div class="box"><strong>전체 평균등급:</strong> ${avg.toFixed(2)}등급</div>
<div class="box"><strong>전공적합성:</strong> ${fitData.score}점/100점 (${fitData.score >= 60 ? '우수' : fitData.score >= 35 ? '양호' : '보완필요'})</div>
<div class="box"><strong>진로 키워드:</strong> ${ra.concept || '미설정'}</div>
<div class="box"><strong>강점 교과:</strong> ${(analysis.str || []).join(', ') || '-'}</div>
</div>`;

  // Grade trend
  if (trend.length >= 2) {
    report += '<h2>2. 학기별 성적 추이</h2><table><tr><th>학기</th>';
    trend.forEach(t => { const [y,s] = t.key.split('-'); report += `<th>${y}학년 ${s}학기</th>`; });
    report += '</tr><tr><td>평균등급</td>';
    trend.forEach(t => report += `<td style="font-weight:700">${t.avg.toFixed(2)}</td>`);
    report += '</tr></table>';
    const first = trend[0].avg, last = trend[trend.length-1].avg;
    const diff = last - first;
    report += `<div class="box">추세: ${diff < -0.3 ? '상승세 (' + Math.abs(diff).toFixed(1) + '등급 향상)' : diff > 0.3 ? '하락세 (' + diff.toFixed(1) + '등급 하락)' : '안정적'}</div>`;
  }

  // Combo scores
  report += '<h2>3. 교과 조합별 성적</h2><table><tr><th>조합</th><th>평균등급</th></tr>';
  COMBO_ORDER.forEach(combo => {
    if (combos[combo]) report += `<tr><td>${esc(combo)}</td><td>${combos[combo].avg.toFixed(2)}</td></tr>`;
  });
  report += '</table>';

  // University matching
  report += `<h2>4. 대학 매칭 결과 (${allComps.length}개 대학)</h2>`;
  report += `<div class="grid2" style="margin-bottom:8px">
    <div class="box"><span class="safe">안정권 (65%+):</span> ${safeCount}교</div>
    <div class="box"><span class="fit">적정 (40~64%):</span> ${fitCount}교</div>
    <div class="box"><span class="reach">소신 (15~39%):</span> ${reachCount}교</div>
    <div class="box"><strong>도전 (15%↓):</strong> ${allComps.length - safeCount - fitCount - reachCount}교</div>
  </div>`;

  // Optimal 6-university portfolio
  if (allComps.length >= 6) {
    const optPort = calcOptimalPortfolio(allComps, 6);
    report += '<div style="padding:10px;background:#e8f5f0;border-radius:6px;margin-bottom:8px;border:1px solid #c8e0d8">';
    report += `<div style="font-weight:700;margin-bottom:4px">AI 최적 6지원 포트폴리오 (최소 1개 합격 확률: ${optPort.atLeastOne}%)</div>`;
    report += '<table><tr><th>순위</th><th>대학명</th><th>전형</th><th>합격확률</th><th>분류</th></tr>';
    optPort.picks.forEach((r, i) => {
      const cls = r.prob >= 65 ? 'safe' : r.prob >= 40 ? 'fit' : r.prob >= 15 ? 'reach' : '';
      const label = r.prob >= 65 ? '안정' : r.prob >= 40 ? '적정' : r.prob >= 15 ? '소신' : '도전';
      report += `<tr><td>${i+1}</td><td>${esc(r.univ)}</td><td style="font-size:10px">${esc(r.jeonType)}</td><td class="${cls}">${r.prob}%</td><td>${label}</td></tr>`;
    });
    report += '</table></div>';
  }

  report += '<table><tr><th>순위</th><th>대학명</th><th>전형</th><th>환산등급</th><th>합격확률</th><th>모델</th><th>티어</th></tr>';
  const tierLabel = {1:'최상위',2:'상위',3:'중상위',4:'중위'};
  allComps.slice(0, 20).forEach((r, i) => {
    const cls = r.prob >= 65 ? 'safe' : r.prob >= 40 ? 'fit' : r.prob >= 15 ? 'reach' : '';
    const modelLabel = r.comp.is종합 ? '종합' : r.comp.is논술 ? '논술' : '교과';
    report += `<tr><td>${i+1}</td><td>${esc(r.univ)}</td><td style="font-size:10px">${esc(r.jeonType)}</td><td>${r.score.toFixed(2)}</td><td class="${cls}">${r.prob}%</td><td style="font-size:10px">${modelLabel}</td><td style="font-size:10px">${tierLabel[r.comp.tier]||'중위'}</td></tr>`;
  });
  report += '</table>';

  // 생기부 요약
  report += '<h2>5. 생기부 분석 요약</h2>';
  report += `<div class="grid2">
    <div class="box"><strong>기록 총 분량:</strong> ${density.total.toLocaleString()}자</div>
    <div class="box"><strong>추천 학과:</strong> ${ra.deptMatch.slice(0, 5).join(', ') || '-'}</div>
  </div>`;
  if (ra.storyArc.length > 0) {
    report += `<div class="box" style="margin-top:4px"><strong>진로 변화:</strong> ${ra.storyArc.map(s => s.year + '학년:' + s.career).join(' → ')}</div>`;
  }

  // Admission strategy analysis
  const reportStrat = calcAdmissionStrategy(student, analysis);
  report += '<h2>6. 전형 전략 분석</h2>';
  report += '<div class="grid2" style="margin-bottom:6px">';
  reportStrat.sorted.forEach(([type, score]) => {
    const isBest = type === reportStrat.sorted[0][0];
    report += `<div class="box" style="${isBest ? 'border-left:3px solid #143A40;font-weight:700' : ''}">${type}전형: ${score}점${isBest ? ' ★' : ''}</div>`;
  });
  report += '</div>';
  report += `<div class="box" style="border-left:3px solid #143A40"><strong>${esc(reportStrat.strategy)}:</strong> ${esc(reportStrat.detail)}</div>`;

  // Counseling points
  if (ra.counselingPoints.length > 0) {
    report += '<h2>7. 상담 포인트</h2>';
    const unique = [...new Set(ra.counselingPoints)];
    unique.forEach(p => report += `<div class="box" style="margin-bottom:4px;border-left:3px solid #C77B3C">· ${esc(p)}</div>`);
  }

  // Interview predictions
  if (ra.interviewPredictions.length > 0) {
    report += '<h2>8. 예상 면접 질문 (상위 5개)</h2>';
    ra.interviewPredictions.slice(0, 5).forEach((p, i) => {
      report += `<div class="box" style="margin-bottom:4px"><strong>Q${i+1}.</strong> ${esc(p.q)} <span style="color:#999">(${esc(p.source)})</span></div>`;
    });
  }

  // Saved memos
  const memoKey = `memo_${student.seat}`;
  const studentMemos = memos[memoKey] || [];
  if (studentMemos.length > 0) {
    report += '<h2>9. 상담 메모</h2>';
    studentMemos.forEach(m => {
      report += `<div class="box" style="margin-bottom:4px"><span style="color:#999">${esc(m.time)}</span> · ${esc(m.text)}</div>`;
    });
  }

  report += `<div class="footer">2027학년도 수시 상담 프로그램 · 병점고등학교 3학년 4반 · 학생 데이터는 브라우저 내에서만 처리되며 외부로 전송되지 않습니다</div>
</body></html>`;

  const w = window.open('', '_blank');
  w.document.write(report);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 500);
}

// EVENT HANDLERS

// Sidebar student click
document.getElementById('roster').addEventListener('click', e => {
  const btn = e.target.closest('.student-btn');
  if (!btn) return;
  selectStudent(parseInt(btn.dataset.idx));
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  filterRoster(e.target.value);
});

// Tab switching
document.getElementById('tabBar').addEventListener('click', e => {
  if (!e.target.classList.contains('tab-btn')) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('panel-' + e.target.dataset.tab).classList.add('active');
  currentTab = e.target.dataset.tab;
});

// Home button
document.getElementById('homeBtn').addEventListener('click', () => {
  renderDashboard();
  renderRoster();
});

// Mobile menu
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
});
document.getElementById('sidebarOverlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
});

// Modal close on overlay click
document.getElementById('univModal').addEventListener('click', e => {
  if (e.target === document.getElementById('univModal')) closeUnivModal();
});
document.getElementById('compareModal').addEventListener('click', e => {
  if (e.target === document.getElementById('compareModal')) document.getElementById('compareModal').classList.remove('open');
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeUnivModal(); document.getElementById('compareModal').classList.remove('open'); }
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const dir = e.key === 'ArrowDown' ? 1 : -1;
    const next = (selectedIdx ?? -1) + dir;
    if (next >= 0 && next < STUDENTS.length) selectStudent(next);
  }
});

// ═══════════════════════════════════════════════
renderRoster();

const savedIdx = localStorage.getItem('susi27_last');
if (savedIdx != null && STUDENTS[savedIdx]) {
  selectStudent(parseInt(savedIdx));
} else {
  renderDashboard();
}
