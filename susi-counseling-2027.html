작품 속 구절을 인용하여 '머무르는 밤'을 '머무름을 밀어내는 밤'으로 만들어 나가는 것이 고민의 해결책이 될 수 있을 것이라고 말하며 활기찬 삶을 회복하기를 기원하는 내용을 발표를 통해 전달함.\n소설 서평 쓰기 활동에 참여하여 '관내분실(김초엽)'을 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 작품 속 가족간의 관계에 대해 깊이 공감하면서 자신의 사고와 삶을 돌아보는 모습을 보임. 이를 바탕으로 '엄마와 딸 사이의 연결고리'라는 제목의 서평을 작성함. 서평을 쓰면서 사자성어를 인용하거나 개인적 경험을 덧붙이는 등의 방식을 통해 흥미롭게 글을 전개함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 여행, 가을, 바다, 환경, 생명 등으로 선정하고 각 단어를 시각적 상징으로 전환하여 결합함. 붉게 물든 가로수로 가을을 상징하며 나무 윗부분을 친구들의 옆모습으로 표현하고, 자신이 밟고 있는 하늘로 향하는 길의 끝을 생명의 상징인 새로 표현한 점에서 창의 융합 능력이 잘 나타남. 인간과 자연의 관계를 상징적으로 풀어낸 점이 인상적임. 갤러리 공간 디자인 활동에서 내면을 들여다보는 감각적 공간을 주제로 '내 마음 속의 전시'를 기획함. 좋아하는 풍경 사진, 앨범 표지, 고흐의 작품들을 전시하여 개인의 취향과 감정을 시각적으로 구성함. 전시 작품을 선정하는 과정에서 자신이 무엇을 좋아하고 표현하고 싶은지 깊이 성찰하는 모습이 바람직함. 처음에는 투시도법을 표현하는 데 어려움을 느꼈으나 다양한 예시를 참고하며 작업하는 과정에서 자기 주도적 미술 학습 능력이 잘 발휘됨. 판화 제작 활동에서 이모티콘 캐릭터를 주제로 지우개 판을 조각함. 처음에는 아트나이프 사용이 어려웠으나 반복적인 시도와 집중을 통해 선을 점차 또렷하게 다듬어 나감. 노력의 과정이 결과로 드러나는 경험에 큰 성취감을 느끼는 등 꾸준함과 몰입도가 돋보임.","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에 과학 기술의 발전이 스포츠 경기력 향상에 긍정적 영향을 미친다는 점을 논리적으로 주장함. 선수의 기본 실력과 노력이 뒷받침되어야 기술의 효과가 극대화된다는 점을 강조함. 장비 발전이 선수 부상 예방과 기량 유지에 기여함을 근거로 들었으며 사고력과 통찰력이 뛰어남. 체육시간에 긍정적이고 성실한 자세로 임하며, 플라잉디스크를 정확하게 던지기 위한 릴리스 타이밍을 습득함. 원하는 방향으로 정확하게 던지며 동료와의 패스와 캐치 기술을 발전시킴. 이동 수비에서 디스크의 비행 궤적을 파악하여 성공적으로 수비함. 빅발리볼 기초 기능인 언더핸드와 오버핸드 토스를 침착한 태도로 정확하게 수행함. 나아가 상위 기술인 콤비네이션 동작도 우수하게 해냄. 리그전에서 자신의 역할을 충실히 수행하려는 노력을 꾸준히 보임. 협동심과 집중력을 바탕으로 팀워크 향상에 기여함. 기본 동작에 대한 협응성을 바탕으로 여러 기술을 충실히 해내는 모습을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 운동화 쿠셔닝 시스템의 발전 과정을 환경공학적 및 재료공학적 관점에서 탐구함. 과거 충격 흡수용으로 사용된 육불화황 가스의 높은 지구온난화 지수 문제를 인지하고, 이를 친환경적인 질소 가스로 대체하는 과정에서 발생한 기체 투과성 문제를 '그레이엄의 확산 법칙'을 적용하여 물리적으로 분석함.질소 분자의 빠른 확산과 유출을 억제하기 위해 도입된 '다층 구조 TPU 막'이 이종 밀도 고분자의 적층을 통해 분자의 투과 경로를 미시적으로 차단하는 원리임을 규명함.이를 통해 기업이 제품의 성능 구현이라는 공학적 목표와 환경 보호라는 윤리적 책임 사이에서, 소재의 물리적 특성을 정밀하게 제어함으로써 두 가치를 동시에 확보한 공학적 최적화 과정을 깊이 있게 이해했다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"항상 성실하게 자신의 역할을 다하며 학교생활에 임하는 모습이 돋보임. 높은 잠재력을 가진 학생으로, 지금처럼 스스로 자신감을 가지고 노력한다면 언젠가는 그 장점들을 발견하는 날이 올 것이라 믿어 의심치 않음. 바른 자세로 수업 시간에 참여하며, 학급의 여러 활동과 그룹 프로젝트에 언제든지 열정적으로 참여하는 태도가 인상적임. 본인이 속한 그룹에 많은 공헌을 하려고 노력하며, 팀워크를 중시하는 모습이 매우 긍정적임. 또한, 친구들에게 싫은 소리를 잘 하지 않고 잘 지내기 위해 노력하는 친화적인 모습으로 친구들 사이에서 신뢰를 쌓으며, 서로를 배려하고 존중하는 마음가짐을 가지고 있음. 여"},{"y":2,"b":"밝고 명랑한 성격을 지닌 학생으로, 다양한 표현 활동에서 재능과 끼를 드러낼 수 있는 역량을 갖추고 있으나 이를 과시하거나 내세우기보다는 항상 겸손한 태도로 학교생활에 임함. 자신의 장점을 드러내기보다 주변과 조화를 이루려는 자세가 돋보이며, 이러한 태도가 또래 친구들로부터 신뢰와 호감을 얻는 데 기여함. 학업 면에서도 자기주도학습을 성실히 참여하며 수업에 집중하고, 스스로 학습 계획을 세워 꾸준히 실천하는 모습을 통해 학업에 대한 책임감을 보임. 학급에서는 맡은 역할에 형식적으로 임하지 않고 끝까지 최선을 다하며, 보이지 않는 자리에서도 성실하게 행동하는 모습이 인상적임. 학급자치회 회장 선거에 자발적으로 출마하여 많은 득표를 얻었으나 아쉽게 낙선하였음에도 결과에 실망하거나 물러서지 않고, 서기로 봉사하며 학급을 위해 지속적으로 기여하고자 하는 성숙한 태도를 보임. 늘 따뜻한 마음으로 학급 구성원들을 대하며 배려와 존중의 언행을 실천하여 교우 관계가 원만하고, 교사들로부터도 신뢰를 받는 학생임. 특히 학기 후반으로 갈수록 더욱 밝고 긍정적인 모습을 보이며 학급의 분위기 형성과 단합에 크게 기여하였고, 구성원 간의 관계를 자연스럽게 이어 주는 역할을 수행함."}]},{"name":"이다현","seat":19,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":7,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":6,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"세계사","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"세계사","c":"사회"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":5,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":7,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":8,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'독서 즉문즉답' 활동에서 독서를 통해 얻은 통찰을 작문일지에 체계적으로 기록하며, 이를 바탕으로 교사의 질문에 깊이 있는 답변을 제시함. 어릴 적부터 '배구'를 좋아했기에 배구의 역사, 특성 등이 담긴 '배구'를 선택해 읽음. '협력'의 중요성을 깨닫고, 협력해서 안 되는 일이 없다고 생각하는 만큼 어떤 상황에서도 사람들과 함께할 수 있는 협동력을 기르겠다는 포부를 밝힘. 책과 관련해 '협력해도 안 되는 일이 생긴다면 어떻게 할 것인가?'라는 질문을 던지고 자신의 신념에서 벗어나는 예기치 못한 문제가 발생했을 때 어떻게 대처할 것인지 고찰해 보는 과정에서 학생의 문제해결 능력이 엿보임. 활동을 통해 독서를 즐기는 태도를 갖고 진로를 탐색해 보는 계기가 되었다고 소감문을 통해 밝힘.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"이차방정식의 판별식을 이용하여 이차방정식의 실근의 개수를 구하는 법을 학습한 후 멘토의 도움을 받으며 간단한 예제를 해결함. 친구들이 관련 기출문제를 해결하는 것을 경청하며 자신의 문제 해결 역량을 신장시킴. '피타고라스'를 주제로 자유 주제 탐구 프로젝트에 참여함. 음의 높낮이를 수학적으로 분석하여 음악 기초를 세우고, 모든 자연 현상이 수로 설명된다는 철학적 관점을 제시하는 등 다양한 업적을 세웠음에 흥미로워함. 피타고라스 정리의 다양한 증명 방법과 건축, 측량, 스포츠에서의 활용 사례를 조사하고, 수학이 단순한 계산이 아니라 세상을 이해하는 중요한 도구임을 깨달았다는 소감을 남김.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"주장하는 글쓰기 활동에서 '체육 수업을 의무화해야 한다'는 주제로 청소년의 신체 건강 증진, 교육 기회 확대, 사회성 발달 등을 근거로 논리적으로 주장을 전개함. 지식품앗이 활동에서는 고양이가 상자에 집착하는 이유를 본능적 안전감, 스트레스 감소, 체온 유지, 놀이 욕구 등으로 설명하고 시각 자료를 활용해 청중의 이해를 높임. 옷차림의 의미, 생물다양성의 중요성, 과학 자료의 가치 등에 대한 지문을 읽고 주제문, 제목 등을 영어로 작성함. 차별을 주제로 한 The Elephant Man과 The Hundred Dresses를 읽고 차별받는 주인공들의 고통에 공감하며 성찰하는 과정을 기록한 독서 일지를 작성함. 차별이 현대에도 여전히 존재함을 지적하며 이를 극복하기 위해 모두의 노력이 필요하다는 주장을 영어 에세이에 담음. 직소 모형 수업에서 디딤 영상을 반복 시청하며 어휘와 문장을 세밀히 분석하고 체계적으로 수업을 운영함. 책임감 있고 철저히 준비하는 태도로 점차 발전하는 모습을 보여 모둠원들로부터 좋은 평가를 받음.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"전근대 한국사를 학습하는 과정에서 생긴 궁금증을 모아 호기심 일지를 작성하고, 그중 고려 여성의 지위와 신분 제도의 유동성에 대해 조사하여 정리함. 노래 '독도는 우리 땅'을 소재로 독도의 역사를 학습하면서, 독도 문제와 센카쿠 열도를 둘러싼 중·일 갈등을 비교하여 각국의 입장을 조사하여 정리함. 독도가 우리 영토임을 뒷받침하는 사료들을 찾아보고 현재 대한민국이 실효적 지배를 하고 있는 상황에서 일본의 주장은 타당하지 않다고 비판하는 글을 씀. 광복부터 대한민국 정부 수립까지 발생한 여러 사건들 중 역사적으로 의미 있다고 생각하는 것으로 미·소 공동 위원회 개최를 선택함. 임시 민주 정부 수립을 협의하는 데 참여할 정당·사회단체를 선정하는 문제로 미국과 소련이 대립한 결과 무기한 휴회되었고, 이후 한반도 문제가 유엔으로 넘어가며 단독 정부 수립까지 이어졌기 때문에 한국사의 중요한 갈림길 중 하나라고 생각한다고 기술함.","c":"한국사"},{"y":1,"t":"세부능력및특기사항","b":"체육 수업에서 긍정적인 분위기를 형성하는데 기여함. 체육 수업에서 배운 경기 규칙과 방법에 대해 정확하게 이해함. 이를 바탕으로 논술 활동에서 제시된 문제를 구체적인 글로 표현하는 능력을 갖춤. 리그전 경기에서 상대방을 배려하며 경기를 활동하려 노력함. 서브 활동에서 목표된 지역으로 공을 보내는 능력을 보여줌. 랠리 활동 시 짝 학생과 협동심을 발휘하여 연습하는 모습을 관찰함.","c":"운동과 건강","sem":"1학기"},{"y":1,"t":"세부능력및특기사항","b":"티볼 활동을 통해 경기 규칙 및 방법에 대한 깊은 이해를 보임. 빈볼 시비와 같은 윤리적 문제에 대해 자신의 생각을 서술하며 스포츠의 도덕적 측면을 인식하고 탐구함. 타격 시 강도보다는 정확한 타점을 맞추는 데 집중하며, 일정하게 공을 쳐내는 모습이 인상적임. 릴리즈 타이밍을 적절히 파악해 송구를 일정하게 던지는 능력을 보이며, 팀 내에서 중요한 역할을 수행함. 팀원들과의 원활한 소통을 통해 협동심을 발휘하며 스포츠맨십과 팀워크의 중요성을 몸소 실천함.","c":"운동과 건강","sem":"2학기"},{"y":1,"t":"세부능력및특기사항","b":"생활 속 음악 중 우리나라 대중음악의 장르를 조사하고, 해당 악곡을 찾아 감상하며 서로의 의견을 공유하는 활동에 열심히 참여함. 평소 즐겨듣는 악곡 중 한 곡을 선정하여 가사의 의미를 생각하며 개사하는 활동에 참여하여 현재 느끼는 입시에 대한 두려움과 도전을 시작할 때 희망을 줄 수 있는 가사를 만들어 친구들과 불러보며 서로 위로하는 시간이 되어 뿌듯했다고 소감을 작성함. 칼림바를 연주하면서 처음 접하는 악기였지만 연주 방법이 간단해서 어렵지 않게 다가갈 수 있다는 점과, 소리가 맑고 악기가 작아 휴대하기 좋다는 장점을 지니고 있어 좋았다고 악기를 소개함. 칼림바를 조율하면서 음을 듣고 구별하는 능력을 기르게 되었고 우쿨렐레를 조율할 때 많은 도움이 되었다고 활동지를 작성함. 우쿨렐레를 연주하면서 음악의 즐거움을 알게 되었고, 꾸준한 연습을 통해 인내와 자신감을 얻어 공부할 때 큰 원동력이 되었으며, 합주를 통해 소통과 관계의 소중함을 배웠다고 소감을 발표함. 학년말 학급 작은 음악회에서 합주에 맞춰 노래를 불러 좋은 호응을 얻음.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"나타내고자 하는 아이디어를 신중하게 그리는 모습이 인상적이며, 작품을 완성하기 위해 최선을 다하는 자세가 훌륭함.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '콘크리트의 특징'에 관한 글을 읽고 콘크리트 사용 방식에 따라 도시 미관이 달라질 수 있음을 이해하여 정리함. 독서 후 콘크리트 산업의 탄소 배출 문제에 관심을 가져 이를 개선하기 위한 저탄소 및 재활용 콘크리트 기술의 현황에 대해 조사해 봄. 후속 탐구 주제 선정 활동에서 콘크리트의 구조적 특성에 디지털 센서 기술을 융합하는 방안을 모색함. 건물 내외부의 환경 데이터를 수집해 스스로 실내 환경을 최적화하는 '콘크리트 기반의 스마트 공간 디자인'을 미래 건축의 대안으로 제시함. 확장적 독서 활동으로 '아비투스(도리스 메르틴)'를 발췌독한 후, 인간관계에서 타인을 배려하는 것과 자신을 지키는 것 사이의 균형을 탐구한 것을 비평문으로 작성함. 타인에게 맞춰주는 '수용 감각'이 관계 형성에 필수적임을 인정하면서도, 그 정도가 지나칠 경우 자신의 색깔과 주관을 잃어버릴 수 있다고 설명하며 '수용 감각'을 발휘할 때에 신중을 기해야 한다고 설명함. 상대방을 존중하되 자신의 의견을 명확히 표현하며 적당한 선을 지키는 것이 건강한 관계의 핵심이라고 강조하며 인간 관계에서 의사 소통의 양보보다는 상호 존중을 바탕으로 한 대등한 소통을 지향해야 한다고 역설함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '저건 사람도 아니다(서유미)'를 읽고 비평 활동을 진행함. 로봇 기술이 발전하여 '트윈 사이보그'가 상용화된 사회를 그리고 있어 흥미로웠다고 설명하며, 최첨단 기술의 시대에 인간이 인간다움을 잃지 않을 방법을 모색해야 함을 강조하는 작품이라고 소개함. 모둠 책 대화에서 로봇 도우미가 대체할 수 있는 사람의 일이 어디까지 허용되어야 하는지를 중심으로 모둠원들과 의견을 교환한 후, 인간의 고유성을 훼손하지 않는 범위에서만 인간을 대체해야 한다는 견해를 제시함. 심미적 문학 체험 활동에서 다른 사람의 시선을 지나치게 의식하는 자신의 성격에 대해 고민하는 동료 학습자를 시로 위로하는 활동을 진행함. 시 '또 하나의 별(곽재구)'을 통해 얻었던 정서적 위안을 고민 대상자도 얻기를 바라는 마음에서 시를 선정했다고 밝히며, 고민 대상자가 자신의 내면에 집중하기를 바란다는 메시지를 전함. 문학 작품을 공감적으로 수용하여 타인과 공유하려는 모습을 보인 점에서 문학의 수용과 창작에 적극적으로 참여하려는 학습자의 면모가 확인됨.\n\n수학Ⅰ: 삼각함수 그래프 실습활동에서 사인, 코사인, 탄젠트 함수의 그래프를 단위원의 회전을 바탕으로 구성하고, 정의역, 치역, 주기성, 대칭성 등의 개념을 시각적으로 확인하며 개념을 정리함. 함수의 증가 감소 구간과 주기적 변화 양상을 직접 그래프로 표현하고, 오차를 줄이기 위해 수치를 정확히 계산하며 반복 작성하는 과정을 통해 함수 그래프의 구조를 구체화함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"다양한 연주 활동을 즐기며 수업의 전 과정에 적극적으로 참여하는 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 아르페지오 주법과 보사노바 리듬을 익히기 위해 노력하고, 타브 악보 연주에서 리듬을 정확하게 표현하기 위해 꾸준히 연습함. 그 결과, 바른 자세와 주법으로 악곡의 특징을 대체로 정확하게 표현함. 드럼 연주 활동에서 악기의 구조와 8비트 리듬, 필인 연주법 등을 체계적으로 학습함. 손과 발의 협응을 자연스럽게 하기 위해 노력하고, 수업 시간 외에도 음악실에 찾아와 연습하는 등 실력 향상을 위해 꾸준히 연습하는 모습을 보여줌. 연습의 결과 바른 자세로 8비트 기본 리듬과 응용 리듬, 악곡의 필인을 정확하게 표현하였으며, '필인이 안정적이고 연습의 흔적이 엿보인다'라는 긍정적인 동료평가를 받음. 어려웠던 점으로 악보 읽는 것을 꼽고, 이를 개선하기 위해 한 곡을 세세히 분석하고 연주하며 악보의 구성 요소를 익혔다는 성찰을 작성함. 연주를 보완하기 위해 단계적 전략을 수립하여 실천하는 자기관리 역량이 엿보임.","c":"정의음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 센서를 내장한 웨어러블 기기들이 운동하는 동안 발생하는 정보를 수집하고 분석하여 운동 성과를 최대화하고 부상 위험을 줄일 수 있는 전략을 개발하는 사례를 제시함. 선수들의 경기력으로 승부가 결정되는 것이 아니라 과학 기술의 개입으로 선수들의 경기 결과에 영향을 주는 것은 스포츠의 본질에 어긋난다는 의견을 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 규칙에 위반되는 동작을 하지 않고 남녀학생의 단합력이 우수하다는 강점이 있지만, 전체적으로 대형 유지가 너무 넓거나 몰려있다는 점을 인지하여 패스 거리를 짧게 하여 연결하는 연습을 함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 팀원의 강점을 살려 작전을 세워 실천할 수 있는 자신만의 필승 전략을 세움. 팀원들의 위치를 확인한 후 디스크를 패스하여 실수를 줄임으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능 연습을 꾸준히 참여하여 경기 수행에 필요한 서브와 리시브의 기능 수행 능력이 우수하며, 특히 순발력이 뛰어나 공의 낙하지점을 예측하고 빠르게 움직여 우수한 수비 능력을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 특정 농구화 브랜드가 단순한 스포츠 용품을 넘어 특정 공동체의 문화와 정체성을 대변하는 아이콘으로 발전한 과정을 탐구함. 1980년대 뛰어난 실력과 강한 영향력을 보여 준 선수의 활약을 바탕으로 젊은 세대 사이에서 큰 인기를 얻은 배경을 분석함. 특히 농구 문화가 힙합, 스트리트 패션과 유기적으로 결합하면서 청소년들이 자신의 개성과 자부심을 표현하는 상징적인 아이템이 되었음을 이해했다고 기술함. 결과적으로 제품이 하나의 라이프스타일을 나타내는 상징으로 자리 잡게 되었으며, 소외되었던 대중의 정체성을 대변하는 강력한 문화적 상징물로 진화하는 과정을 통해 스포츠 제품이 지닌 사회문화적 파급력을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학교 축제에서 공연을 준비하며 춤을 잘 못 추는 친구들을 도와주고 연습을 주도적으로 이끎. 춤을 잘 추는 친구들과 함께 단계별로 나누어 가르치며 모두가 자신감을 가질 수 있도록 격려함. 연습 중 친구들이 지칠 때마다 응원하고 함께 어려움을 극복하며 결국 성공적으로 공연을 마무리함. 책임감 있게 맡은 역할을 끝까지 완수하려고 노력하는 모습이 인상적임. 서로의 부족한 부분을 채워주고 돕는 과정에서 팀워크의 힘을 경험했다고 소감을 밝힘. 또한, 친구들을 이끌고 협력하며 문제를 해결하는 리더십을 발휘하고, 이를 통해 소통 능력도 향상됨. 점심시간에 혼자 있는 친구에게 먼저 다가가 함께 점심을 먹자고 제안하며 자연스럽게 대화를 시작함. 처음에는 어색했지만 시간이 지나면서 편안하게 이야기를 나누게 되었고, 친구도 점차 자신감을 얻어 다른 친구들과 어울리기 시작함. 작은 관심과 배려가 누군가에게는 큰 힘이 될 수 있다는 것을 깨닫고, 친구에게 먼저 다가가서 그의 어려움을 이해하려는 노력이 결국 긍정적인 변화를 만들어내는 모습을 보임. 배려와 나눔을 통해 친구와의 관계를 개선한 모습이 돋보임. 평소에도 항상 밝은 모습과 긍정적인 태도로 학교 생활을 하는 학생임."},{"y":2,"b":"밝고 명랑한 성격을 바탕으로 또래 학생들과 자연스럽게 어울리며 원만한 교우 관계를 형성하고, 친구들과 긍정적인 관계 속에서 학교생활을 이어가는 학생임. 책임감이 있는 학생으로, 1인 1역 활동에서 스마트폰 관리자 역할을 맡아 한 해 동안 학생들이 스마트폰을 제때 제출했는지를 확인하고 모두 수거하여 교무실로 운반하는 역할을 성실히 수행함. 스마트폰 가방이 무겁고 하루에 두 차례씩 반복되는 업무였음에도 불구하고, 불평하거나 소홀히 하는 모습 없이 묵묵히 자신의 역할을 이어 가는 태도가 인상적임. 또한 학교 행사에도 적극적으로 참여하는 학생으로, 스포츠 한마당에 참여하여 자신이 참여할 수 있는 종목에 성실히 임하며 학급 구성원들과 협력하는 모습을 보임. 더불어 친구들과 함께 댄스팀을 구성하여 학교 축제에 참가하기 위해 수개월간 꾸준히 연습하는 성실성을 보여주었으며 그 결과 노력의 과정이 충분히 드러나는 무대를 선보여 관중으로부터 큰 박수와 호응을 받음. 또한, 공동체 역량도 높아 다른 친구들이 모두 꺼려하는 체육관 청소를 맡아 일년동안 체육관 청소를 열심히 하는 모습을 보임. 전반적으로 밝은 성격과 책임감을 바탕으로 학급과 학교 공동체의 원활한 운영에 꾸준히 기여함."}]},{"name":"이동겸","seat":20,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":5,"u":4,"n":"국어","c":"국어"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":7,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":5,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":5,"u":4,"n":"문학","c":"국어"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":3,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":5,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":5,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":4,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":6,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":3,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":6,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"진로 관련 독서 활동에서 '하늘을 날고 싶다면 파일럿'을 읽고 독서 일지를 작성함. 이를 토대로 한 즉문즉답 인터뷰에서 항공우주산업은 항공기는 물론 로켓 미사일, 인공위성까지 포함하는 광대한 산업이라는 지식을 얻었음을 밝히고, 무인 항공기가 상용화되더라도 다양한 변수에 대한 판단의 측면에서 파일럿의 중요성은 유효할 것이라는 자신의 생각을 논리정연하게 표현함. 이 과정에서 자기 주도적 진로 역량과 지식 정보 처리 역량이 돋보임. 고전시가 감상 발표 수업에서 시조 '풍상에 섯거친 날에'를 다양한 관점에서 해석하고 자신의 감상을 발표함. 차분한 어조로 전달력 있게 발표하고, 작품의 주제인 임금에 대한 충성을 '자신이 옳다고 여기는 가치에 몰두하는 자세'로 재해석하여 고전문학의 현대적 의미를 고찰하는 모습에서 뛰어난 문학적 소통 역량과 통찰력이 돋보임. 자신이 발표한 시조에서 '지조와 절개'를 핵심 가치로 도출하고 이에 대한 상호 텍스트로 '사육신 묘 이야기'를 선정하여 읽고 감상문을 씀. 책을 읽고 '자신의 안위보다 공공의 가치를 위해 목숨을 걸 수 있는가'라는 질문을 스스로에게 던지며 올바른 가치에 대해 고찰하는 부분에서 탁월한 자아 성찰 역량과 가치 지향적 태도가 드러남.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"수업 활동에 적극적으로 참여하고 맡은 과제를 성실히 수행함. 수학 독서 탐구 활동에서 아르강처럼 창의적인 사고를 하고 싶다고 생각하고, 갈루아를 통해 다양한 시각으로 문제를 바라보고 해결할 수 있도록 노력하겠다는 다짐을 밝힘. 문제를 풀 때 다양한 시각으로 접근하면서 문제해결력을 향상함을 밝힘. 근과 계수의 관계를 활용하여 이차방정식을 구하고 방정식의 해를 구함. 연립이차방정식의 해를 구하고, 사차방정식의 해를 조립제법을 활용하여 구함. 이차부등식을 활용한 실생활 문제를 해결하고, 삼각형의 무게중심 좌표를 찾는 과정을 증명함. 절대부등식을 주제로 한 카드 뉴스 작성 활동에서 밑변의 둘레 길이가 최대인 사각기둥 구조물을 만드는 문제 상황을 제시하고, 이를 해결하는 과정을 그림으로 표현함. 문제를 해결하기 위해 코시 슈바르츠 부등식을 정당화하고, 이를 활용하여 최댓값을 올바르게 찾아내는 논리적 사고력을 발휘함.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"수업에 임하는 태도가 매우 성실하고 바람직하여 가장 수업 태도가 좋은 학생 중 한 명임. 독해 영역에서 부족한 부분을 개선하기 위해 지속적으로 틀리는 문제를 점검하며 어휘 학습과 독해 연습을 통해 끊임없이 노력하였음. 영어 관심 주제로 '환경 파괴로 인한 코로나19 이상의 바이러스 출현 가능성'을 주제로 선정하여 발생할 수 있는 여러 가지 문제점들을 영어 문장으로 명확하게 제시하여 독자들이 이해하기 쉽게 설명하였고, 환경 오염이 초래할 재앙의 심각성을 생생하게 전달하는 능력을 발휘함. 영어 표현력이 탁월하여 다양한 어휘와 구문을 적절히 활용하며 긴 문장이 흐름 있게 이어짐. 불필요한 반복 없이 요점을 분명히 함으로써 복잡한 내용을 간결하고 명료하게 정리하며, 수식어나 연결 어구를 효과적으로 사용하여 뜻이 잘 전달됨. '영어 독서록 작성 활동'에서 'The Elephant Man'을 통해 인물의 특징에 대한 깊은 통찰력을 보여주었음. 주인공을 자신이 속한 주변 사회의 분위기와 연결 짓는 방식이 매우 독창적이고 짜임새 있음. 특히, 등장인물이 겪는 고난과 그로 인해 형성된 정체성을 생생하게 묘사하면서 다른 사람들과의 관계 속에서 나타나는 갈등과 이해 과정을 적절히 풀어냄.","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 경기 규칙과 방법을 통해 논술 활동에서 묻는 문제에 정확하게 답하려 노력함. 리그전 경기를 진행하며 경기 방법에 대한 이해력을 높임. 서브 활동을 통해 생각한 코스로 공을 보내는 능력을 터득함. 랠리 활동하며 상대방과 연속적인 랠리를 성공시킴.","c":"운동과 건강","sem":"1학기"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기에서 적극적으로 참여하며 팀워크의 중요성을 체험함. 플라이볼의 낙하지점을 파악하고 올바른 포구 방법으로 잡아내는 과정에서 집중력과 판단력을 기르는 기회를 가짐. 티볼 송구에서 부족한 부분을 끊임없이 노력하여 좋은 성과를 보이면서 지속적인 연습의 중요성을 깨달음. 경기 규칙과 방법에 대해 이해하며 빈볼시비에 대한 생각을 스포츠맨십 관점에서 논리적으로 서술하는 과정에서 스포츠의 윤리적 측면에 대한 인식을 높임. 스포츠 인성 수업 중 자신의 성격을 살릴 수 있는 리더십에 대해 혼자의 능력만이 아닌 서로를 믿고 격려하는 팀의 중요성을 학습지에 작성함. 이를 통해 팀의 가치를 실감함. 이러한 경험을 바탕으로 팀원들과 함께 경기 전략을 세우고, 서로 소통하여 팀의 성과를 극대화하는 방법을 탐구함.","c":"운동과 건강","sem":"2학기"},{"y":1,"t":"세부능력및특기사항","b":"수업에 참여하는 자세가 바르고 모든 활동에 최선을 다하는 모습이 돋보이는 학생임. 생활 속 음악 중 영화 속 음악이 내용에 어울리게 선곡되었는지 비평해 보는 활동에 참여함. 영화 속 주인공이 아픔을 승화시키는 부분을 오페라 '리날도'에 나오는 아리아를 부르며 강렬하게 표현하여 관객들의 감정을 극대화한 것 같다고 의견을 정리하여 활동지를 작성함. 랩 음악 중 '디스'에 대한 찬성 혹은 반대의 입장을 정해 토론하는 활동에서 '디스'에 찬성하는 입장으로 '디스'도 랩이라는 장르의 요소로 여기고 타인을 향한 불편한 단어를 조심한다면 창의적인 음악 발전에 좋은 영향을 줄 수 있을 거라고 의견을 발표함. 수업 시간에","c":"음악"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '에디슨의 축음기와 아날로그 기록 방식'에 관한 글을 읽고 핵심 내용을 정리함. 축음기가 소리를 기계적 진동으로 변환하여 기록하는 원리를 정리하여 제시하였으며, 수중 음향 탐지기인 '소나'에 대한 정보를 추가로 탐색해 매질은 다르지만 파동을 물리적 신호로 해석한다는 공통점을 도출하여 기술함. 독서 후 전자 장비 사용이 어려운 극한 환경에서의 데이터 보존 문제를 해결하기 위해 축음기의 원리를 응용한 '기계적 신호 저장 방식'을 대안으로 제시함. 또한 미세 진동을 제어하는 나노 기술을 접목하여 물리적 변형을 기반으로 한 고신뢰성 데이터 저장 장치의 개발 가능성을 기술하며","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"수업 전반에 적극적으로 참여하며, 연주의 완성도를 높이기 위해 세심하게 분석하고 연습하는 태도가 돋보이는 학생임. 우쿨렐레 연주 활동에서 보사노바 리듬을 음악과 조화롭게 구현하기 위해 노력하고, 다운과 업 스트로크의 리듬 길이를 조절하는 섬세함을 보여줌. 또한 아르페지오 주법과 커팅, 뮤트 등 음악을 풍성하게 하는 심화 기법을 익히는 데 매진함. 특히 어려움을 느꼈던 아르페지오 주법을 소화하기 위해 현과 프렛의 위치에 따른 원리를 분석하고 반복 연습하였으며, 그 결과 부드러운 음색과 안정적인 흐름이 돋보이는 연주를 선보임. 드럼 연주 활동에서도 높은 흥미를 바탕으로 열정적으로 임하며 안정적인 기량을 발휘함. 손과 발의 협응력을 높여 일정한 박자를 유지하는 데 집중하고, 필인 구간에서 다음 마디로의 연결을 자연스럽게 표현하기 위해 꾸준히 연습함. 이러한 노력 끝에 올바른 자세와 주법으로 음악의 전체적인 흐름을 안정적으로 살렸으며, 스네어 드럼의 타격점을 정확히 짚어 명확한 음색을 구현하는 점이 돋보임. 동료들로부터 '박자와 리듬이 안정적이며, 연주에 연습의 흔적이 드러난다'라는 긍정적인 평가를 받음. 연주 기법을 이해하고 연습을 통해 체득하는 자기관리 역량이 우수함.","c":"후속 탐구의음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육 활동을 통해 첨단소재 그래핀의 스포츠 기술 적용과 그 영향에 대해 깊이 있게 탐구함. 그래핀을 활용한 골프공 기술 발전이 경기력 향상과 기록 경신에 미치는 긍정적·부정적 측면을 균형 있게 분석함. 스포츠 기록의 역사성과 첨단기술 발전 간의 갈등을 인식하며, 기술 발전이 스포츠 본연의 즐거움을 해치지 않는 범위 내에서 이루어져야 한다는 윤리적 견해를 제시함. 기술과 스포츠의 조화로운 발전에 대한 비판적 사고와 자기 주도적 의견 제시 능력이 뛰어남. 플라잉디스크를 원하는 방향으로 정확하게 던지며 동료와의 패스와 캐치를 실수 없이 수행함. 이동 수비에서 디스크의 비행 궤적을 파악하여 성공적으로 수비함. 팀워크를 통해 경기의 흐름을 이해하고, 동료와의 협력을 통해 전략적으로 플레이함. 빅발리볼의 낙하지점을 정확히 파악하여 올바른 자세로 리시브함. 리그전에서 자신의 역할을 충실히 수행하며 팀의 승리에 기여함. 경기 중 발생하는 다양한 상황에 적응하며, 빠른 판단력과 반응 속도를 발휘함. 이러한 경험을 통해 스포츠에 대한 이해도가 높아지고, 협동심과 집중력이 향상됨. 적극적인 태도로 연습에 임하며, 지속적인 자기 발전을 위해 노력함.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"항상 묵묵한 모습으로 자신의 역할을 다하는 교과서적인 학생임. 친구들의 장난을 넓은 포용력으로 받아주며 착한 심성을 보이는 모습이 인상적임. 매번 학급에 일손이 필요한 일이 있을 때마다 교사가 신뢰하며 부탁할 수 있는 학생으로, 항상 적극적으로 먼저 지원하는 태도를 보여줌. 학습적인 측면에서도 자기 개선의 의지가 상당하여, 매 수업 시간에 열중하여 수업에 참여하며, 쉬는 시간이 되어도 공부를 멈추지 않고 자기 주도적으로 학습에 임함. 자신의 진로에 대해서도 많이 고민하며, 이러한 고민을 해결하기 위해 모든 학교 활동과 진로 상담에 성실하게 임하는 모습이 인상적임. 조언을 받은 부분을 즉시 실행하기 위해 적극적인 태도를 보이며, 교사가 추천하는 다양한 활동들을 직접 실행하는 추진력이 돋보임. 다양한 경험을 통해 자기 적성의 발견과 학교 여러 활동에 흥미를 보이기 때문에 지속적으로 발전할 가능성이 높으며, 학업과 인성 모두에서 더욱 성장할 학생임."},{"y":2,"b":"평소 과묵하고 차분한 인상이지만, 자연스럽게 주변 사람들에게 따뜻한 말을 건넬 줄 아는 속 깊은 정을 지닌 학생임. 어른을 공경하는 태도가 습관화 되어 있어 하교 전 항상 담임 교사에게 깍듯이 인사를 하는 예의 바른 모습이 인상적임. 친구들과 소통할 때 상황에 따라 진중함과 유쾌함을 적절히 조절하는 탁월한 완급 조절 능력을 발휘하여 대화를 주도하고 분위기를 편안하게 이끎. 교사를 대할 때에는 예의를 지키면서도 적절한 위트를 가미하여 항상 대화를 기분 좋은 분위기로 마무리 지음. 학업에 대한 열의가 높아 쉬는 시간이나 자습 시간 등 자투리 시간을 알차게 활용하는 모습이 1년 내내 꾸준히 목격됨. 주변 환경에 쉽게 휩쓸리지 않는 굳고 단단한 심지를 지니고 있어, 요령을 피우기보다 우직하고 성실하게 자신의 공부를 해 나가는 모습으로 학급 전체의 면학 분위기를 조성하는 데 기여함. 자신의 성향과 현행 입시 상황을 객관적으로 분석하여 최적의 전략을 수립하는 과정을 거친 후, 스스로 내린 판단과 계획에 대한 확신을 가지고 흔들림 없이 목표를 향해 몰입하고 있는 바, 지금과 같은 모습을 유지한다면 자신이 원하는 바를 이루어낼 수 있을 것이라고 판단됨."}]},{"name":"이수하","seat":21,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":5,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":5,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":4,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":5,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":1,"g":4,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":null,"u":2,"n":"화학실험","c":"과학","a":"A"},{"y":1,"s":2,"g":5,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":2,"g":5,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":6,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":6,"u":4,"n":"영어","c":"영어"},{"y":2,"s":1,"g":6,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":5,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":1,"g":5,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"교과부장으로서 학생들의 적극적인 참여를 유도하는 리더십을 보임. 수업 시간에 다룬 내용을 주도적으로 심화하여 탐구하는 태도를 보임. 한 예로, 자연을 다룬 다양한 작품을 공부하며 추가적인 작품을 살펴보고 싶다는 마음이 들어 탐구하고 '자연과 인간의 관계를 통한 현대시와 고전시 비교'를 주제로 발표함. 각 특성을 제시하고 이를 다시 '자연과 인간의 관계, 자연의 상징성, 사회적 맥락'을 기준으로 대조해 요약 설명함. 문학 감상에 있어 매우 중요한 논점을 인지한 것에서 학생의 문학 감수성과 통찰력이 크게 돋보임. 다양한 활동 중 '고전시가 감상 및 성찰하는 글쓰기' 활동에서 훌륭한 심미적 감성 역량을 드러냄. 삶의 문제에 대한 다양한 해결 방안을 능동적으로 찾으면서 창의적으로 읽고 그 내용을 한편의 글로 작성함. 구체적으로 '가노라 삼각산아~'를 감상하고 '사회가 개인의 삶에 미치는 영향'에 대해 고찰하면서 '우리는 어떻게 괴물이 되어가는가'를 선택해 읽음. '신자유주의'가 사람들을 경쟁 속에서 개인의 이익만을 추구하는 이기적인 존재로 만드는 것에 대한 비판의식을 드러내며, 이를 극복하기 위해 학교와 같은 작은 사회에서 공동체 의식을 높이는 프로그램을 진행해 연대감을 함양하자고 주장함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"1학기 수학학습지원단으로서 우리반 해설지 만들기 활동에 적극적으로 참여함. 한 문제의 해결 방법으로 다양하고 창의적인 아이디어를 제시하고, 자신의 풀이에 오류가 없는지 다른 친구들과 점검하고, 협의한 내용을 깔끔하게 정리함. 두 집합의 합집합과 교집합을 소개하는 수학 카드 뉴스를 제작함. 체험학습 희망 장소를 집합으로, 각 장소 별 희망 학생의 이름을 원소로 표현한 만화를 그리고, 벤 다이어그램과 조건제시법으로 두 집합의 합집합과 교집합을 정의하고 만화 속 문제 상황을 해결하는 과정을 정확하게 설명함. '시간에 따른 약물 농도 변화 예측과 약물 독성 예방하기'를 주제로 자유 주제 탐구 프로젝트에 참여함. 이차함수를 활용하여 혈중 약물 농도 변화를 수학적으로 모델링하고, 최적 치료 시점 및 약효 지속 시간을 분석함. 약물이 최대 농도에 도달하는 시점과 치료 효과가 지속되는 기간을 계산하고, 이를 그래프로 시각화하여 설명해 급우들의 이해를 도움. 실제 약물 배설 과정은 지수함수의 식과 더 유사하다는 사실을 알고, 관련 내용을 학습한 뒤 심화하여 탐구하겠다는 계획을 세움.","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"법의학과 의학에 관심을 가지고 지식품앗이 활동에서 유골로부터 추출한 DNA로 흑사병의 역사 조사와 폼페이 희생자의 유전정보 복원 사례를 소개하며 유골의 정보를 활용한 의학적, 역사적 가치를 설명함. 풍부한 내용과 안정된 발표 태도가 돋보임. 주장하는 글쓰기 활동에서 '인공지능이 인간 의사를 대체하지 못한다'는 주제로, 편향된 데이터로 인한 오류와 의료 현장에서의 예외적이고 비정형적 사례 처리 한계를 근거로 내용을 논리적으로 전개함. 후천적 환경의 중요성, 사고방식의 연령별 차이, 생체 시계 재설정 등에 대한 지문을 선택해 제목과 주제문 등을 영어로 작성함. 차별을 주제로 한 The Elephant Man과 The Hundre","c":"영어"},{"y":1,"t":"세부능력및특기사항","b":"체육 수업에서 이탈 행동 없이 연습에 성실하게 참여하는 모습이 인상적임. 체육 수업에서 배운 탁구 경기 규칙과 방법, 기능에 대해 정확하게 이해하여 논술 활동에서 제시된 문제에 대해 구체적으로 답할 수 있는 능력을 보여줌. 리그전 경기 활동에서 상대방과 경기를 진행하며 페어플레이 정신을 발휘하여 경기에 임함. 서브 활동 시 자신이 원하는 목표 구역으로 공을 보낼 수 있도록 인내심을 갖고 연습함. 랠리 활동 시 짝 학생과 협동심을 발휘하여 20회 이상 연속으로 랠리를 성공시킴.","c":"운동과 건강","sem":"1학기"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능을 집중력 있게 연습하여 좋은 기록을 보임. 경기 수행 능력이 우수하며 전술 이해도가 높음. 타격에서 배트의 타점을 이해하고 자신이 원하는 방향으로 타격함. 거리별로 정확한 송구를 하여 팀에 기여함. 게임 상황에서 침착하게 판단하고, 자신의 역할을 해냄. 연습 중에도 적극적인 자세로 임하며, 자신의 약점을 보완하기 위해 끊임없이 노력","c":"운동과 건강","sem":"2학기"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에 참여하여 '거의 모든 물질의 화학(김병민)'의 7장 '염료로 시작해 약을 합성하다'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 이를 바탕으로 교사와 대담하여 자신의 생각을 말로 표현함. 작품 속 가장 인상깊은 부분으로 '페스트 패션으로 인한 환경파괴'를 제시하면서 복장의 유행 주기가 빠르게 바뀌고 이러한 유행에 민감하게 반응하는 현대 사회의 모습과 자신의 모습을 비판적으로 볼 수 있었다는 감상을 밝힘. 또한 기업이 지속 가능함을 이미지를 위해 활용한다는 글쓴이의 비판에 동의하며 탄소 배출량 등에 대한 기업 조사가 진행되어야 하고 소비자 또한 이런 기업 조사의 내용에 민감하게 반응하여 진정한 지속가능함을 유지하는 기업을 지지해야한다고 주장함. 10주간 진행된 분석적 독서 활동에 빠짐없이 성실히 참여하여 다양한 주제로 주어진 글을 꼼꼼하게 읽고 분석함. 은행의 자기자본비율에 대한 글을 읽고 글의 내용을 핵심어를 중심으로 요약한 뒤, 자신이 알고 있는 내용, 새롭게 알게 된 내용, 더 알고 싶은 내용으로 구분하여 정리함. 바젤 기준으로 인해 긍정적인 변화 사례가 있는지에 대해 추가 조사하고 싶다는 탐구 계획을 밝힘.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 현장체험학습에서 어떤 옷을 입을지 고민하는 친구에게 '헐렁한 옷(이선영)'을 처방하고 '그냥 나답게'라는 제목으로 발표를 진행함. 시에서 헐렁함이라는 개념이 불완전, 정돈되지 않은 상태로 묘사됨에도 불구하고 화자는 헐렁한 옷을 선택했다고 말하며, 친구 또한 완전함보다는 편안함을 추구하기를 바란다는 조언을 제시함. 또한 화자의 자유로운 삶의 태도가 자신의 마음에 큰 감동을 주었다고 말하며 자신도 일상 속에서 편안함과 자유로움을 찾고자 노력하겠다는 다짐을 밝힘.\n소설 서평 쓰기 활동에서 'TRS가 돌보고 있습니다(김혜진)'를 선택하여 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 함께 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 독서 과정에서 인간과 같은 감정을 학습한 로봇을 존엄한 존재로 볼 수 있을지, 병원에서 간호의 영역이 로봇을 대체될 가능성은 있는지, 이러한 상황들이 도래한다면 윤리의식은 어떻게 변화해야하는지에 대해 다방면으로 고찰함. 또한 실제 간호로봇의 활용 사례를 찾아보는 등 지식을 확장하는 모습을 보임. 일련의 독서활동을 바탕으로 '곧 다가올지도 모르는 우리의 일들'이라는 제목으로 서평을 작성함.\n\n수학Ⅰ: 지수함수 단원 학습에서 절댓값 그래프와 지수함수의 교점 해석 문제를 선정하여, 함수의 대소 관계를 비교하고 그래프를 활용하여 함수 간 변화를 해석하는 수학세미나를 진행함. 교점 조건을 바탕으로 절댓값 함수의 정의역을 구간별로 나누고, 지수함수의 증가 성질과 비교하며 개념을 구조적으로 이해하는 모습을 보임. 좌표 해석을 바탕으로 삼각형 넓이 조건을 도입해 대수적 계산을 수행하고, 좌표 추론을 통해 해를 도출하는 과정에서 논리적 사고력이 드러남. 함수식에 좌표를 대입해 타당성을 점검하고, 해석의 정확도를 높이고자 노력함. '지수함수와 삼각함수, 생명과학의 조용한 영웅'이라는 주제로 생명현상의 수치적 이해를 시도하며, 지수적 증가와 주기적 변화를 수학적으로 해석함. 카드뉴스에서는 생체리듬, 심장박동, 신경자극 등을 대응하는 함수 형태로 표현하고, 심박수는 사인함수의 진폭, 주기, 위상 조절로, 신경자극은 지수함수로 모델링함. 각 카드에는 함수식, 그래프, 실제 이미지를 함께 제시하여 수학과 생명과학의 연결성을 시각화함. 마지막 카드에 생리학 연구에서 주기함수와 지수함수의 실제 활용을 요약하며, 수학이 생명현상 분석의 도구임을 강조함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"본교에 개설된 공동교육과정(화학 실험)을 이수함. '혼합물의 분리 실험'을 주도적으로 설계하여 단순 증류와 분별 증류를 비교 탐구하고, 각 방법의 효율성과 특징을 분석함. 실험 과정에서 발생한 문제를 해결하며 조원들과 협의하였고, 탐구 내용을 발표 자료로 제작하여 결과를 체계적으로 전달하는 능력을 보임. '아스코르브산의 함량 측정'에 참여하여 주실험자로서 실험 과정 전반을 주도하며 정확한 절차 수행과 변수 통제를 통해 과학적 탐구 능력을 발휘함. 오차율 계산과 오차 원인을 분석하기 위해 조원들과 토의하고 의견을 조율하는 의사소통 능력을 보임. '아보가드로 수 결정'을 주제로 스테아르산을 이용해 아보가드로 수를 결정하는 탐구 활동에 참여함. 보조실험자로서 도구 준비와 실험 보조 역할을 성실히 수행하며 실험 환경 관리와 협업에 기여하는 모습을 보임. 제시된 실험 과정을 수정 보완하여 추가로 탐구하는 주도적인 모습이 인상적임. '아스피린 합성 실험'을 통해 에스터화 반응을 이해하고 수득률을 계산해보는 탐구 활동에 참여함. 인산의 역할, 아세트산 무수물 사용 이유 등을 추가로 조사하고 오차가 발생한 이유에 대해 과학적 근거를 제시하는 모습이 인상적임.","c":"화학 실험"},{"y":2,"t":"세부능력및특기사항","b":"갤러리 공간 디자인 활동에서 밤하늘을 보는 경험을 담고자 '나만의 밤하늘'을 주제로 전시 공간을 기획함. 관람자가 밤하늘을 바라보는 듯한 분위기를 느낄 수 있도록 밤하늘에 관련된 작품을 전시하고, 천장에 별자리와 별을 표현해 주제를 잘 드러냄. 공간을 처음부터 끝까지 직접 구상하며 공간 디자인이라는 새로운 영역에 도전하였고, 그 과정에서 성취감을 느끼는 모습이 긍정적으로 나타남. 자신이 좋아하는 요소를 전시로 풀어내며 자기 성찰의 기회를 가지는 모습이 인상적임. 소마트로프 만들기 활동에서 움직임을 활용한 시각적 전달 방식을 탐구하며, 자신의 진로인 보건의료 분야와","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에 과학 기술의 발전이 스포츠에 미치는 영향을 깊이 있게 탐구함. 기술과 장비의 혁신이 선수의 경기력 향상과 부상 방지에 긍정적임을 논리적으로 설명함. 스포츠의 본질과 공정성, 기술 발전의 균형에 대해 비판적으로 사고함. 기술 도핑과 혁신의 차이를 명확히 구분하며, 공정한 기준 마련의 필요성을 강조함. 스포츠 발전을 장려하는 방향으로 창의적이고 균형 잡힌 의견을 제시함. 체육시간에 긍정적인 태도로 참여함. 플라잉디스크의 과학적 원리를 이해하고 릴리스 타이밍 방법을 익힘. 플라잉디스크를 활용한 변형 스포츠를 창의적으로 개발하여 작성함. 빅발리볼과 배구의 차이점을 인식하고 심판의 수신호 및 코트 구분에 대한 설명을 들음. 빅발리볼의 기초 기능인 언더토스와 오버토스를 정확하게 수행하여 리시브, 토스, 스파이크의 콤비네이션 동작을 정확하게 함. 리그전 경기에 항상 즐겁게 참여하며 팀워크와 협동심을 발휘함. 긍정적 마인드로 연습을 임하며 실력 향상의 효과가 눈에 띄는 모습을 보임.","c":"연계해 건강 교육체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 의공학 진로와 연계하여 발바닥 지방 패드의 구조를 모방한 충격 흡수 시스템을 탐구함. 지방 소엽과 섬유성 격막 구조가 충격을 완화하고 압력을 분산하는 생체역학적 원리에 주목함. 이러한 구조가 기능성 신발, 의료용 인솔, 인공 발 설계의 생체모방기술로 응용되는 양상을 분석함. 특히 다층 탄성 소재와 격자 구조를 활용해 충격 흡수와 응력 분산 기능을 공학적으로 구현하는 메커니즘을 규명함. 인체 구조에 대한 의학적 이해가 의료 보조기기 설계의 혁신을 이끄는 핵심 원천임을 파악하고 융합적 사고의 중요성을 깨달음.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"학교 동아리 활동과 봉사활동 프로젝트를 진행하며 리더십을 발휘함. 프로젝트 초기 단계에서 팀원들과의 대화를 통해 의견을 나누고 문제 해결을 위한 방향을 제시함. 의견이 분분할 때는 중재자의 역할을 맡아 모든 팀원이 참여할 수 있도록 분위기를 조성하며, 다양한 아이디어를 수용해 최선의 결과를 도출할 수 있도록 이끎. 의견 충돌이 발생할 때 중재자의 역할을 수행하며 문제를 해결하는 과정에서 신뢰를 쌓음. 리더로서 팀을 이끌고 목표를 달성한 경험을 통해 성장한 모습이 돋보임. 학교 프로젝트나 활동에서 팀원들과 함께 발표를 준비하며 각 팀원의 역할을 나누고 맡은 일을 효과적으로 수행할 수 있도록 돕는 역할을 맡음. 팀원들이 어려움을 겪을 때 먼저 다가가 문제를 함께 해결하며 원활한 진행이 가능하도록 조율함. 팀원들과의 소통을 통해 서로의 의견을 존중하고 아이디어를 모아 문제를 해결하면서 협력의 중요성을 보여줌. 1학기부터 2학기까지 조회와 종례 후 휴대폰 가방을 꾸준히 교무실로 가져다 놓는 역할을 맡아 수행함. 수업 시간이 끝난 후에도 휴대폰 가방이 필요할 때마다 잊지 않고 교무실에 전달하며 맡은 임무를 책임감 있게 완수함. 성실함을 바탕으로 꾸준히 역할을 수행함."},{"y":2,"b":"어떠한 상황이나 환경에 놓이더라도 불평하기보다 주어진 것에 감사하며 학교생활에 임하는 성숙한 성품을 지닌 학생임. 유순하고 온화한 성격으로 또래 친구들로부터 신뢰를 받아 자연스럽게 따르게 되며, 특정 관계에 치우치지 않고 다양한 친구들과 두루 원만한 교우관계를 형성함. 교우관계에서 갈등이 발생하는 모습을 찾아보기 어려울 만큼 배려와 존중을 바탕으로"}]},{"name":"이예진","seat":22,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"생명과학I","c":"과학"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":1,"g":7,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":2,"g":7,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":6,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":7,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":9,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'선량한 차별주의자'라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 어떤 차별은 보이지 않으며 심지어는 공정함으로 포장되기도 한다는 점을 깨닫고 이를 바탕으로 즉문즉답 활동을 함. '차별은 왜 생기게 되었을까?'를 질문해 친구들이 깊은 사고를 할 수 있도록 유도하는 등 독서의 가치를 체득한 모습을 보임. 또한 자연스럽게 표현하는 모습이 돋보임. 시조 '간밤에 우던 여흘'을 내재적 관점과 외재적 관점에서 종합적으로 감상하고 주체적으로 비평한 후 '충성심'이라는 가치에 대해 고찰하기 위해 '오직 충성으로 받는 구원'을 읽음. 이를 통해 종교의 의미와 불안한 현대 사회의 문제점을 지적하며 자신의 삶을 성찰한 한 편의 진솔한 글을 작성함.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"복소수의 발견과 대수학에 관한 여러 연구와 수학자들의 업적을 다룬 독서 수업에 참여하며 수학의 역사적 흐름에 관심을 보임. 복소수를 근으로 하는 이차방정식 풀이 과정에서 다양한 풀이 방법을 탐구하며 각각의 장단점을 분석하는 모습을 통해 문제 해결 능력과 논리적 사고를 기르려는 의지가 돋보임. 삼각형의 꼭짓점 좌표를 활용한 무게중심의 일반화 문제에서는 기본 개념을 차분히 적용하며 과제를 해결하는 성실함을 보임.\n수업 중 교사의 발문에 성실히 답하려 노력하고, 이해가 부족한 부분은 수업 후에도 질문을 통해 보완하며 지적 호","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"기초체력이 뛰어나 남들보다 뛰어난 활동량을 보여주며 활동 간 열정적이고 적극적인 모습을 통해 티볼 활동에서 두각을 나타냄. 티볼의 타격 자세가 안정적이며 자신이 원하는 방향으로 공을 보내는 능력이 우수하여 리그전 경기에서 많은 타점을 기록함. 티볼의 기본 기술 연습을 성실하게 수행하여 포구 및 송구의 연결이 매우 자연스러우며 티볼 경기에서 헌신적인","c":"기심이 풍부운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 면역 반응에 대한 비문학 제재를 골라 다양한 읽기 전략을 활용해 사실적 읽기를 수행함. 또한 글에서 설명하는 과민면역반응에 흥미를 느껴 관련 내용을 정리하여 독서 과정지를 작성함. 확장적 독서 활동에서 '공간이 만든 공간(유현준)'을 읽고 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 건축적 배경에서 비롯된 사고방식 차이를 현대 사회와 연결하여 통찰한 내용을 글에 담음. 특히 '완전함과 관계의 조화'에 대한 질문의 답변이 인상적임. 동서양의 사고방식 차이가 서로 다른 환경에서 비롯된 것이므로 우열을 가릴 수 없다고 표현함. 이러한 차이가 갈등을 만들 수도 있지만 동시에 서로 본받을 점을 발견하는 조화의 계기가 될 수 있다고 논리적으로 주장함. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. '과거의 흔적과 현재'에 대해 묻는 질문에 답한 내용이 돋보임. 과거 벼농사 중심의 공동체 문화가 현대 사회의 협동 정신으로 이어진 긍정적 사례와 타인의 시선을 지나치게 의식하는 부정적 관습을 대조하여 분석해 답변의 타당성을 확보함. 활동을 통해 책의 핵심 개념을 현대 사회와 연결하여 해석할 수 있는 역량을 발휘함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 'trs가 돌보고 있습니다(김혜진)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 자신이 trs라면 소설 속 상황에서 살인을 저질렀을지에 대해 의견을 나눔. 책대화 내용을 바탕으로 '로봇은 웃는다'라는 제목의 서평을 작성함. 로봇이라는 소재를 다룬 영화와 내용을 비교하며 감정을 지닌 로봇이 인간에게 어떤 영향을 끼칠지에 대한 자신의 의견을 제시함. 로봇이 감정을 지녔다고 하더라도 데이터로 판단하는 한계로 인해 윤리적이지 못한 선택을 할 수 있음을 지적함. 소설을 상호텍스트적으로 감상하고 소설의 주제에 대해 자신만의 해석을 할 수 있는 역량을 발휘함. 시 처방하기 활동에서 공부를 왜 해야하는지 모르겠다는 친구의 고민 편지를 읽고 시 '어머니 말씀(이윤학)'을 처방해 발표함. 화자가 어머니처럼 독자들에게 조언을 하는 것을 설명하며 고민하는 친구에게 자신의 성장과 미래 준비를 위해 공부를 해야 한다는 응원의 메시지를 전함. 시의 상징적 의미를 잘 읽어내고 문학적 소통을 할 수 있는 학생임을 확인함.\n\n수학Ⅰ: 건축과 토목 분야에서 삼각함수가 어떻게 활용되는지를 탐구하며 수학 기사문을 작성함. 건축물의 각도 계산, 경사면 설계, 구조물의 안정성 분석 등에서 사인, 코사인, 탄젠트 함수가 실질적으로 적용되는 사례를 구체적으로 제시하고, 삼각함수의 원리를 활용한 문제 해결 과정을 체계적으로 설명함. 다양한 실제 사례와 도식, 수식을 통해 복잡한 수학 개념을 현실에 적용하는 능력이 돋보이며 수학과 공학기술의 융합적 관계를 이해하는 통찰력을 보여줌. 로그단원을 학습할 때 계산 과정에서 로그의 성질을 정확히 사용하였고 틈틈이 풀이과정을 확인하며 실수를 줄이기 위해 노력하는 모습을 보임. 지수법칙의 각 성질을 개념적으로 이해하고, 문제에 따라 어떤 법칙을 적용할지 바르게 판단하는 모습을 보임. 거듭제곱 형태의 식을 간단히 정리할 때 풀이 순서를 잘 구성하는 모습에서 체계적인 사고가 엿보임.\n\n수학Ⅱ: 연속함수의 성질을 학습한 후 함수의 연속성을 그래프와 식을 통해 종합적으로 판단함. 특히 그래프를 활용해 연속 여부와 함수의 변화를 능숙하게 해석하는 모습이 관찰됨. 수업 중 제시되는 개념을 차분히 따라가며 성실하게 학습에 임하고, 반복 학습을 통해 이해를 확장하기 위해 노력하는 모습이 확인됨.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"다양한 악기를 다뤄본 경험을 바탕으로 안정적인 연주 실력을 선보이며, 수업 활동에 성실히 참여하는 학생임. 우쿨렐레 연주 활동에서 아르페지오 주법을 숙지하기 위해 노력하고, 피크 없이 손으로 스트로크 주법을 구현하기 위해 꾸준히 연습함. 타브 악보 연주에서는 재즈곡 특유의 리듬을 능숙하게 표현하기 위해 집중함. 그 결과, 코드 연주곡과 타브 연주곡 모두 올바른 주법으로 코드 변환, 리듬 표현, 선율 흐름 등을 완성도 있게 구사함. 드럼 연주 활동에서 악기의 구조와 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 킥이 연속적으로 나오는 부분과 스몰탐과 미들탐의 연결, 어려운 필인 구간을 집중적으로 연습함. 그 결과, 악곡의 특징적인 8비트 리듬과 필인을 안정적으로 표현하였으며, 특히 스네어 드럼 음색을 명확하게 구현함. 어려웠던 점으로 하이햇과 스네어를 동시에 연주할 때 스틱이 부딪히는 점을 언급하며, 안정적인 자세를 찾고자 스틱 그립법을 바꿔가며 연습했다는 성찰을 남김. 필인 창작 활동에서 음악에 어울리는 리듬을 창작하여 정확히 표현하고, 쉼표와 양손 동시 타격을 적절히 활용해 음악의 분위기를 효과적으로 살리며 음악적 소통 역량을 보여줌.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 스포츠 운동화의 특수 소재와 기술의 발전이 경기력을 향상하여 좋은 결과를 보여준 사례를 제시함. 약물과 같이 인위적으로 신체를 변화시켜 성적을 조작하는 행위는 지양해야 하지만, 선수 최대의 경기력을 돕는 장비의 활용은 규제의 대상이 아니며, 기술 혁신으로 인정해야 한다고 제언함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 1 대 1 압박 수비 및 팀원 간의 단합력이 우수하지만, 동료가 패스 주기 좋은 위치로 이동하여 디스크를 받는 움직임이 다소 부족하다는 점을 인지하여, 전술 대형을 미리 배열하여 연습함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 일정한 거리를 유지하고 팀원 간의 대형을 유지하며 패스 플레이를 활용할 수 있는 전략을 세움. 공격과 수비가 전환되는 상황에서 패스 연결을 할 수 있는 공간에 위치함으로써 팀의 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기 수행에서 처음에 잘 맞지 않았던 공격패턴이 연습을 통해 실제 경기 상황에서 성공 경험을 함으로써 성취감을 느꼈으며, 이를 통해 최선을 다하는 과정을 보여주는 긍정적인 학생임.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"긍정적인 태도로 친구들과 원만한 관계를 유지하며, 상호 존중과 배려를 바탕으로 한 소통 능력이 돋보임. 교우 관계에서 신뢰를 쌓아 학급 내 긍정적인 분위기 형성에 기여함. 진로에 대해 꾸준히 탐색하며 다양한 분야에 관심을 가지고 이를 심도 있게 조사하는 모습을 보임. 진로와 관련된 자료를 스스로 찾아 학습하며 구체적인 목표 설정과 계획을 세우는 데 노력함. 생활습관이 바르고 성실하며, 규칙적인 생활을 통해 학습과 활동을 조화롭게 병행함. 학습 태도가 성실하여 꾸준한 노력으로 학업과 다양한 활동에서 균형을 이루는 모습을 보여줌. 친구들과의 관계와 학습, 진로 탐색에 대한 태도를 바탕으로 앞으로도 성장 가능성을 충분히 발휘할 것으로 기대됨."},{"y":2,"b":"낙천적이고 온순한 성향을 지닌 학생으로 주변 친구들과 원만한 관계를 유지하여 학급 공동체에 조화롭게 어울림. 한 해 동안 단 한번의 지각 없이 매일 아침 일찍 등교하는 부지런함이 돋보임. 또한 학급의 1인 1역할로 특별실 청소를 담당하여 자신이 맡은 역할을 묵묵하고 성실히 수행함. 대학수학능력시험 고사장으로 사용되었던 교실을 자발적으로 나서서 원상태로 깔끔하게 복구하는 등 공동체를 위하는 봉사 정신을 실천하는 모습이 인상적임. 평소 말수가 많지는 않으나, 꾸밈 없이 솔직한 태도가 인상적인 학생으로 교사와의 상담에서도 자신의 생각을 진솔하게 전달함. 자신의 관심분야를 명확히 설정하기 위해 다양한 진로탐색을 진행하고 있으며, 특히 음악에 대한 관심을 바탕으로 악기 연주를 꾸준히 배우는 등 노력을 기울이는 모습이 돋보임. 자신의 관심사에 대해 보여준 꾸준한 열정과 노력을 바탕으로 학업적 역량을 다져나간다면, 향후 다양한 분야에서 자신의 잠재력을 발휘하리라 생각됨."}]},{"name":"이하은","seat":23,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":2,"s":2,"g":9,"u":4,"n":"독서","c":"국어"},{"y":3,"s":1,"g":6,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":9,"u":4,"n":"문학","c":"국어"},{"y":3,"s":1,"g":5,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":6,"u":3,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":7,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":8,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":2,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":3,"n":"세계지리","c":"사회"},{"y":2,"s":2,"g":9,"u":3,"n":"세계지리","c":"사회"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":9,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":8,"u":3,"n":"정치와법","c":"사회"},{"y":2,"s":2,"g":8,"u":3,"n":"정치와법","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":9,"u":3,"n":"수학","c":"수학"},{"y":2,"s":1,"g":9,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":9,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"C"},{"y":2,"s":1,"g":9,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":1,"n":"스포츠생활","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":1,"n":"스포츠생활","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":9,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"B"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"음운 변동의 원리와 규칙을 알고 올바르게 발음하는 할 수 있으며 한글 맞춤법의 원리를 이해하고 정확한 언어생활을 하는 모습이 관찰됨. '낙태를 합법화 해야 한다.'는 주제로 주장하는 말하기를 수행함. 낙태를 합법화 해야 하는 이유를 명확히 제시하고, 여성의 권리와 건강을 중요하게 생각하여 사회적 문제로서의 중요성을 강조함. 다양한 문학 갈래를 배우고","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"줄넘기 동작 수행에 어려움을 느낌. 동작을 수행하기 위해 노력함. 학생건강체력평가를 통해 체력 요소별 측정 방법을 명확히 이해하고, 자신의 부족한 체력 요소를 개선하기 위해 다양한 운동에 적극적으로 참여함. 영상의 내용과 테니스 규칙에 관해 쓰고 영상 속 선수의 행동에 대한 자신의 생각과 느낀 점을 작성함. 농구의 기본 동작인 드리블을 활용하여 정확한 방향 전환으로 과제를 수행하는 연습을 진행함. 동작을 신속하게 익히고 목표 달성을 위해 힘쓰는 모습이 돋보임. 농구 슛의 원리를 정확하게 이해하고 이를 과제 수행에 적용할 줄 앎. 급박한 상황에서도 침착함을 유지하며 정확한 슛 자세를 보여줘 높은 슛 성공률을 보여줌. 불법 스포츠 도박과 합법적인 스포츠 도박의 차이를 이해하고, 이와 관련된 문제점 및 해결 방안을 탐구함.","c":"고유한 특스포츠 생활"},{"y":1,"t":"세부능력및특기사항","b":"악보의 음과 리듬을 정확히 파악하고 칼림바 연주에서 음악적 표현력을 발휘함. 이중주 활동에서 의사소통 역량을 발휘해 상대 연주자와 호흡을 맞춤. 악곡을 연주한 후 바흐의 생애, 바로크 시대의 음악적 배경에 대한 내용을 추가적으로 조사하고 음악 작품의 특징인 박자, 사용된 리듬, 형식을 분석함. 전자 드럼의 구조와 특징, 연주 방법과 간단한 리듬 꼴을 이해하여 음의 길고 짧음이 나타난 악곡을 자연스럽게 연주할 수 있음. 연주 초반에는 어려움을 느꼈으나 지속적인 노력과 연습을 통해 점차 실력을 향상시킴.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"기초 드로잉 표현에서 조형 예술 표현의 기본적인 요소들, 직선과 수직선을 이용한 심도 있는 공간, 곡선을 이루는 형태와 직선, 명확한 윤곽선을 이루며 화면을 나누고 있는 근경, 중경, 원경을 밝음과 어두움의 대조를 이루며 성실히, 우수하게 창의적으로 표현함. 자화상 그리기 활동에서 자신의 내면, 즉 마음속에 자리하고 있는 다양한 생각이나 감정을 연필 소묘 표현 형식을 이용하여, 장차 미래의 희망 찬 건강한 모습의 시각 언어로 표현하고 친구들과 즐겁게 소통하는 모습을 보여줌. 다양한 미적 감정과 시선, 공간에 대하여 호기심을 보이며 즐겁게 자화상을 제작 하였으며, 캐릭터 제작 활동에 열심히 참여하여 노력하는 모습을 보임.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 10차시에 걸쳐 다양한 비문학 제재를 바탕으로 요약하기, 내용 구조도 정리하기 등의 읽기 전략을 활용해 사실적 독해를 수행하고자 노력함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현하는 활동에 참여함. 소통적 독서 활동에서는 그중 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 사회적 지위에 따라 소통 방식이 어떻게 달라지는지 타당한 근거를 들어 설명한 점이 훌륭함. 또한 자신의 언어 생활을 성찰하여 바람직한 소통의 방법, 대화에서 지켜야 할 기준, 기준이 필요한 이유에 대해 자신의 경험을 사례로 들며 진솔하게 이야기함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품의 수용 결과를 자신의 관점에서 비판적, 창의적으로 재구성함으로써 주체적인 문학 활동 능력을 보임. 소설 서평 쓰기 활동에서 '노찬성과 에반(김애란)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 등장 인물인 '찬성'이 피가 묻은 자루를 열어보지 않은 이유에 대해 추론하여 서로의 의견을 나눔. 에반을 향한 죄책감과 괴로움으로 인해 자루를 열어보지 못했을 것이라고 의견을 밝히며 작품에 드러나지 않은 인물의 심리와 마음을 적절히 추론해내는 모습을 보임.\n\n수학Ⅰ: 수업 중 졸지 않고 자신의 부족한 점을 파악하여 이를 개선하기 위해 열심히 노력하는 모습을 보임. 교과 내용과 관련된 수학 기사문을 작성함. 학습에 대한 내적 동기를 키워 간다면 충분한 가능성을 발현할 수 있을 것으로 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후 학습지를 작성함. 함수의 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 제시한 명제의 진위 판정을 하는 활동에 참여함.\n\n수학Ⅱ: 교실 내 규칙과 질서를 인지하고 이를 수용하는 태도를 보이며, 수업 중 주변 학습 분위기를 해치지 않으려는 모습이 지속적으로 관찰됨. 교사의 안내가 제시되면 즉각 반응하여 요구 사항을 따르는 편으로, 타인의 학습 흐름을 방해하지 않으려는 태도가 비교적 안정적으로 유지됨. 읽기 자료를 활용한 활동에 참여하여 읽기 활동이 원활히 진행되는 데 기여함. 전반적으로 학습 참여가 적극적으로 드러나지는 않으나, 수업 상황에 따라서 자기 행동을 조절하며 기본적인 수업 질서를 유지하려는 모습에서 향후 태도 변화의 가능성이 느껴짐.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"수업 내용을 조용히 따라가며 기본 개념을 이해하려는 모습을 간헐적으로 보였고, 교과서 예제나 단순 계산 문제 위주로 접근하는 경향이 있었음. 순열과 조합, 확률의 기초 개념에 대한 이해가 아직은 제한적이지만, 반복 학습과 간단한 문제 풀이를 통해 개념 적용의 기초를 다지려는 시도가 관찰됨. 수업 참여도는 높지 않았으나, 과제나 평가를 통해 부족한 부분을 확인하고 보완하는 학습 자세를 갖춘다면 점진적인 향상이 가능할 것으로 기대됨.\n\n영어Ⅰ: 영어 원서 'Wonder(R.J.Palacio)'를 4회에 걸쳐 읽고 내용 요약, 인상깊은 장면과 그 이유, 등장인물에 이","c":"확률과 통계"},{"y":2,"t":"세부능력및특기사항","b":"영어권 문화의 식사예절에 관한 글을 읽고 호주의 음식을 소개하는 프로젝트에 참여하여 자료를 조사함.","c":"입하기 항목영어권 문화"},{"y":2,"t":"세부능력및특기사항","b":"전학으로 인해 우쿨렐레를 처음 접하는 환경에서도, 교사의 조언과 친구의 도움을 수용하며 학","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 다양한 스포츠 장비의 과학적 발전 상황을 이해했으며, 과학 기술의 개입이 선수들의 경기 능력에 큰 영향을 주는 것은 스포츠 문화의 본질에 맞지 않는다고 생각하여 스포츠 장비의 과학 기술 발전은 기술 도핑이며 도입에 반대한다는 견해를 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 배려를 통해 서로 응원하는 분위기와 패스 정확성의 강점이 있지만, 공격 기회가 생겼을 때 다소 급하게 플레이하며, 위치선정에 약점을 인지하여 전술 대형을 미리 배열함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 팀원의 강점을 살려 공격, 중앙, 수비 대형을 유지하는 자신만의 필승 전략을 세움. 패스 캐치에 집중하여 디스크를 놓치는 실수를 줄임으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에 참여하면서 팀원들과 함께 다양한 전략을 구성하여 팀의 승리를 위해 최선을 다하였으며, 경기 중 친구들의 활동에 칭찬과 격려를 보내며 선수로서 페어플레이를 실천함.","c":"습에 임하는 유연한체육"},{"y":2,"t":"세부능력및특기사항","b":"배드민턴 경기 규칙의 정확한 이해를 바탕으로 심판 역할을 수행할 수 있음. 배드민턴 서브에서 백핸드 서브의 정확한 그립을 파지하고 섬세한 힘 조절과 방향 조절 능력으로 원하는 위치에 정확히 서브를 수행함. 동료들과 협력하여 배드민턴 경기 전술을 논의하고, 실전 게임에서도 서브를 활용한 득점 기회를 만들어냄.","c":"운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"연극은 드라마, 영화와 달리 현장성이 있어 관객들과 소통을 하며 감정을 표현하는 종합예술임을 알게 됨. 즉흥극 모둠 활동 시간에 '지하철'이라는 상황을 표현하기 위해 승객들에게 피해를 주는 인물을 등장시켜 극의 재미를 더하고 조원들과 소통하여 문제를 해결하기 위해 노력함.","c":"연극"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 마케팅 및 스포츠 비즈니스 진로와 연계하여 스타 선수의 브랜딩과 문화적 자산화 과정을 탐구함. 마이클 조던이라는 당대 최고 선수의 독보적인 정체성과 나이키의 독창적인 디자인 기술, 그리고 스토리텔링 기반의 마케팅 전략이 결합하여 창출한 시너지 효과를 분석함. 특정 스포츠 장비가 선수의 이미지와 결합되어 단순한 소모품을 넘어 시대를 관통하는 하나의 문화적 상징이자 스트릿 패션의 클래식으로 자리 잡게 된 메커니즘을 규명함.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"솔직 담백한 성격이며 친구의 일을 자기 일처럼 나서서 위로해 주고 상담해 주는 의리가 있는 학생임. 자신의 주장을 잘 표현하고 학교생활에서 교우 관계를 중요하게 생각하는 학생임. 학년 합창제에서 모둠의 리더로서 긍정적인 분위기 속에서 협력을 이끌어내는 뛰어난 리더십을 발휘하였으며, 친구들의 인정과 지지를 받음. 학습적인 면에서도 의욕을 가지고 참여한다면 앞으로 많은 발전이 기대되는 학생임. 멘토·멘티 활동에 참여하며, 효율적으로 학습을 진행했으며, 친구들과의 활발한 의견 교환을 통해 문제 해결 능력을 키움. 다만 아직 학업과 관련된 부분에서 자신의 역량을 충분히 발휘하지 못하고 있지만 자신의 시간 관리 능력을 향상하기 위해 꾸준히 노력하고 있으며, 다양한 활동을 통해 스스로 동기를 찾고자 하는 노력을 하고 있기에 많은 발전이 기대되는 학생임."},{"y":2,"b":"온화한 미소와 부드러운 성품의 소유자로, 학기 도중 전학을 왔음에도 불구하고 특유의 친화력으로 학급 친구들은 물론 타 학급 학생들과도 두루 어울리며 뛰어난 적응력을 보여줌. 교사를 대할 때 항상 공손한 태도로 예의를 갖추며, 교사의 지도"}]},{"name":"장우혁","seat":24,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":4,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":7,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":5,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":4,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":7,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":5,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":6,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":5,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":6,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":6,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":6,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":4,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":7,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":5,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":6,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":5,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":5,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":5,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":4,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":6,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":5,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":5,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"미술창작","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"교사와 지속적인 눈 맞춤을 통해 수업 중 소통하고 언제나 밝은 표정과 웃음으로 경청하여 쾌활하고 긍정적인 수업 분위기를 조성하는 데에 큰 역할을 함. 또한 학습 중 의문점에 대해 문제 의식을 가지고 학생 자신의 생각을 발표한 뒤에 다른 사람의 의견도 수용할 줄 아는 개방적 태도를 가지고 있음. '고전시가 감상 및 성찰하는 글쓰기' 활동에서 삶의 문제에 대한 다양한 해결 방안이나 필자의 생각을 보완할 수 있는 대안을 능동적으로 찾으면서 창의적으로 읽고 그 내용을 한편의 글로 작성함. 구체적으로 '풍상을 섞어 친 날에~'를 다양한 관점에서 감상하고 핵심 가치를 '지조와 절개'로 분석한 후 상호텍스트성을 지닌 '목민심서'를 선택해 읽음. 책의 교훈을 전하며 책과 관련된 사회 현상으로 공직 부패와 비리의 문제를 제시하면서 '사회지도층들의 윤리성 함양'에 대한 자신의 생각을 드러냄. 또한 핵심 가치를 자신의 삶과도 연결 지어 성찰하는 모습이 인상 깊은데 누구나 겪을 수 있는 휴대폰으로 인한 집중력 저하 문제를 반성하며 자신 역시 어려운 상황 속에서도 신념을 지키며 행동하겠다는 의지를 밝힘.","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"집합의 뜻과 여집합을 소개하는 수학 카드 뉴스를 제작함. 점심시간 축구를 하기 위해 팀을 나눌 때 어떤 기준을 제시하는 것이 좋을지 토의하는 상황을 만화로 그리고, 반별로 팀을 나누면 명확하게 대상을 구분할 수 있으므로 집합으로 표현이 가능하며, 이 때 자신이 속한 팀의 집합을 A라 하면 상대팀은 A의 여집합으로 표현할 수 있음을 벤 다이어그램을 이용하여 정확하게 설명함. 이차함수를 활용하여 실생활 문제를 해결할 수 있는지 확인하기 위해, '이차함수의 그래프를 이용하여 일상 경영 해석하기'를 주제로 자유 주제 탐구 프로젝트에 참여함. 한 가게의 영업시간대 별 매출 금액에 대한 자료를 임의로 가정하여 이를 이차함수 그래프로 표현함. 영업을 시작하는 시간과 끝나는 시간은 매출이 없으므로 그래프와 x축이 서로 다른 두 점에서 만나고, 영업 시간 내에서만 그래프가 그려져야 함을 이용하여 정의역을 구함. 또한, 최고 매출 금액과 그 시간이 이차함수의 꼭짓점을 의미함을 이용하여 정확한 이차함수 식을 도출함. 이차함수와 경영 문제를 연결하여 해결할 수 있음에 흥미로워하며, 앞으","c":"수학"},{"y":1,"t":"세부능력및특기사항","b":"수업을 통해 탁구에 대한 전반적인 지식을 이해하려고 노력함. 리그전을 통해 친구들과 경기를 진행하며 탁월한 기량을 보여줌. 서브 활동에서 자신이 원하는 코스로 보낼 수 있게 됨. 랠리 활동에서 친구와 20회 이상 주고받을 수 있","c":"운동과 건강","sem":"1학기"},{"y":2,"t":"세부능력및특기사항","b":"독서 학습에 열정을 지니고 꾸준히 수업에 참여하며 실력을 향상시키는 모습을 보임. 확장적 독서 활동에 참여하여 '떨림과 울림(김상욱)'의 2부 '시간을 산다는 것,","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"세계를 해석하는 일에 관하여'에 관한 글을 읽고 교사가 제시한 질문에 대한 답변을 작성한 뒤 이를 바탕으로 교사와 대담하여 자신의 생각을 말로 표현함. 뉴턴 역학의 확실성과 양자 역학, 카오스 이론의 불확실성에 대한 내용을 읽고, 우리의 자유의지와 선택에 대해 생각해 보게 되었다고 말하며 자신의 인생을 되돌아볼 때, 선택과 자유의지는 불확실성에 가깝다고 말하며 카오스 이론에 대해 더 알아보고 싶다고 말함. 또한 과학이 모르는 것을 인정하는 것에 대해 새로운 개발을 유발하기 때문에 가치있는 행위라고 말하면서 모르는 것을 인정하는 것이 중요하다고 주장함. 10주간 진행된 분석적 독서 활동에 빠짐없이 참여하여 다양한 주제로 주어진 글을 읽고 분석함. 글의 핵심어를 추출하여 이를 중심으로 글을 요약했으며 글의 문단을 구분해 문단별 글 구조도를 작성한 뒤 글에 대한 자신의 생각과 감상을 밝힘. 신채호의 역사관에 대한 글을 읽고 요약하였으며, 글에서 제시된 신채호의 저서에 대해 추가 탐구하고 싶다는 계획을 밝힘.","c":"공간을 본다는 것"},{"y":2,"t":"세부능력및특기사항","b":"시 처방하기 수행평가에 참여하여 자신의 단점을 고치기 위해 노력하지만 잘 고쳐지지 않아 속상하다는 친구의 고민을 듣고 '흔들리며 피는 꽃(도종환)'을 처방한 뒤 '흔들리며 피는 너'라는 제목의 발표를 진행함. 작품 속의 '흔들림'이라는 어구를 친구의 단점에 빗대어 표현하면서 자신의 부족함을 받아들이고 극복하면 꽃을 피울 수 있을 것이라는 위로를 전달함. 청중과의 질의응답을 통해 적극적으로 소통하고 주변의 소음에 따라 성량을 조절하는 등 우수한 말하기 능력을 보인 점이 인상깊음.\n소설 서평 쓰기 활동에 참여하여 '관내분실(김초엽)'을 읽고 서평을 작성함. 6차시에 걸쳐 독서일지를 작성하고 모둠원과 책대화를 하며 질문을 만들고 작품에 대한 감상을 나눔. 디지털 사후세계에 대해 이해하기 위해 영화, 도서, 다큐멘터리 등을 탐색해 보았으며, 이를 바탕으로 '알수 없는 곳에 숨겨진 정보를 찾기 위해'라는 제목으로 서평을 작성함. 서평의 개요를 치밀하게 작성하고 주요 내용마다 소제목을 달아 완성도 높은 글을 작성함.\n한국 시가의 흐름에 대해 학습하고 평시조와 사설시조의 형식상의 특징을 비교한 뒤 직접 평시조를 창작하는 활동에 참여하여 친구를 주제로 한 시조를 형식에 맞게 작성함.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"언어에서 이미지로 전환하기 활동에서 자기와 관련된 키워드를 축구, 학교, 친구, 음악 등으로 선정하고 각 단어를 시각적 상징으로 전환하여 초현실적으로 결합함. 자신의 일상에 중요한 부분을 차지하는 축구를 시각적으로 표현하기 위해 축구장 이미지를 화면 전체에 크게 배치하고 그 안에 자기와 관련된 시각적 상징을 데페이즈망 기법으로 배치함. 애니메이션 캐릭터 스티커를 활용해 친숙한 이미지와 시각적 상징을 조화롭게 결합함. 자신이 느끼는 감정과 일상의 휴식을 작품에 담아내며 미적 감수성을 드러냄. 갤러리 공간 디자인 활동에서 1점 투시법을 활용해 입체적 구도를 설계함. 작품의 벽면에는 생명과학의 막전위 그래프, 염색체, 화학의 주기율표와 원자 구조를 함께 배치해 과학적 지식과 시각 예술을 융합적으로 표현함. 학문 간 경계를 넘나들며 미술을 통해 자신의 진로인 과학 분야를 재해석하려는 사고가 돋보임. 판화 제작 활동에서 애니메이션 캐릭터를 주제로 조각함. 아트나이프 사용이 낯설어 어려움을 겪었으나 끝까지 포기하지 않고 작업을 이어가며 조각을 완성함. 선명한 이미지를 얻기 위해 여러 차례 프린팅을 시도하고 채색을 추가하여 작품의 완성도를 높임.","c":"미술 창작"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간에 과학 기술의 발전이 스포츠 경기에서 미치는 영향을 깊이 고민하며, 장비와 도구의 규제 필요성을 주장함. 특정 브랜드의 기술력이 경기 결과에 미치는 불공평함을 강조하며, 기술 도핑의 문제를 인식하고 규제의 필요성을 역설함. 이러한 관점은 공정한 경쟁을 위한 중요한 요소라고 서술함. 스포츠의 본질을 지키기 위한 지속적인 고민과 성찰이 돋보임. 기본적인 운동신경이 뛰어나고 민첩성, 순발력, 협응력이 우수하여 새로운 종목도 빠르게 습득함. 플라잉디스크의 다양한 던지기 기술을 능숙하게 수행하며, 특히 오버핸드 던지기를 통해 장거리 패스를 성공시키는 뛰어난 기술력을 보임. 빅발리볼에서는 리시브, 토스, 스파이크의 일련의 콤비네이션 과정을 매끄럽게 수행함. 이를 바탕으로 리그 경기에서 탁월한 경기 능력을 발휘하며 팀워크와 전략적 사고도 뛰어남. 운동에 대한 열정과 집중력이 높아 꾸준한 자기계발과 실력 향상을 위해 노력함. 다양한 운동 기술을 빠르게 습득하고 경기 상황에 맞게 유연하게 대처하는 능력이 뛰어나 체육시간 뿐만 아니라 학교생활에서도 잘 적응하는 모습을 보임.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 스포츠 공학 및 지식재산권 진로와 연계하여 나이키의 핵심 공학 기술인 에어 기술의 메커니즘과 타 기업의 기술적 대응 전략을 탐구함. 압축 공기를 충전한 쿠셔닝 시스템이 지면 충격력을 흡수하고, 이를 다시 팽창하는 탄성에너지로 전환하여 폭발적인 추진력을 발생시키는 생체역학적 순기능을 분석함. 결과적으로 독창적인 기술 혁신과 특허를 통한 지식재산권 확보가 브랜드의 시장 지배력을 결정짓는 핵심 동력임을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"평소에는 온순하지만 정당하지 못한 일이 있을 때에는 다른 사람의 일이더라도 자신의 의견을 표출하며 돕는 모습에서 타인을 배려하는 마음이 깊음을 알 수 있음. 한 학기 동안 '행사 이끎이'로 활동하며 스포츠 한마당에 입을 반티를 정하고, 급우들에게 좋은 추억을 만들어 주고자 계절별로 테마를 정해 학급 단체 사진 이벤트를 기획하고 운영함. 반티를 정하는 과정에서 친구들 사이에 갈등이 있을 때 모두의 입장을 존중하면서 의견을 조율한 점이 돋보임. 학년 초 상담에서 주변 요인에 영향을 많이 받는 편이라 학업에 지장이 생기는 경우가 종종 있다고 하였으나, 이를 개선하기 위해 스스로 스마트폰에 제한 시간을 설정하여 사용하고, 할 일의 우선순위를 정하고 이를 잊지 않도록 메모하여 중요한 과제를 놓치지 않도록 하는 모습에서 자신을 통제하는 능력이 향상됨을 확인할 수 있음. 만족스러운 결과를 얻지 못하더라도 포기하지 않고 꾸준히 도전하고, 항상 최선을 다해 남들보다 시간과 노력을 더 들여서라도 결국 좋은 성과를 거두는 모습에서 앞으로 더 큰 발전이 있을 것으로 기대됨."},{"y":2,"b":"밝고 활기찬 성격을 지닌 학생으로, 다양한 친구들과 두루 원만한 관계를 형성함. 친화력이 뛰어나 친구들뿐만 아니라 교사들에게도 먼저 다가가 친근하게 소통하여 학교 구성원들로부터 호감을 얻고 있음. 혹시라도 자신의 말이나 행동으로 상대에게 불편함을 주었다고 느낄 경우 스스로를 돌아보고 먼저 다가가 사과할 줄 아는 성숙한 성품을 지니고 있어, 이러한 태도는 교사 입장에서도 본받을 만한 점으로 평가됨. 평소에는 유쾌한 모습이 두드러지지만, 중요한 역할이나 과제를 수행할 때에는 분위기를 전환하여 진지하게 임하는 책임감 있는 모습을 보임. 수업 시간에는 교사의 발문에 자신 있게 답변하며 학습 흐름을 주도적으로 이끌어 수업 분위기 형성에 긍정적인 영향을 주고 있으며, 이에 교사들 또한 수업 진행에 있어 많은 도움을 받고 있음. 자기 관리 또한 철저하여 평소 운동을 꾸준히 실천하며 체력이 우수하고, 스포츠클럽 활동과 반대항 계주 등 체육 활동에서 좋은 성과를 거두는 데 기여함. 이러한 성과에도 불구하고 겸손한 태도를 유지하는 점이 인상적임. 진로에 대해서는 끊임없이 고민하며 자신의 적성과 흥미를 탐색하고, 구체적인 계획을 세워 차분히 준비해 나가는 모습이 돋보이는 학생임."}]},{"name":"정민교","seat":25,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":8,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":8,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":8,"u":3,"n":"미적분","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":1,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":9,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":9,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":7,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":9,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":2,"s":2,"g":6,"u":3,"n":"중국어I","c":"기가/제2외"},{"y":1,"s":1,"g":7,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":8,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":6,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":6,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":9,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":8,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"C"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'독서 즉문즉답' 활동에서 교사의 질문에 대해 자신이 고찰한 내용을 바탕으로 자신의 의견을 반·비언어적 표현을 활용하여 효과적으로 전달함. 구체적으로 '군인'에 관심이 있는 학생이기에 이에 대해 자세히 다루고 있는 '바우트 원'을 선택해 읽음. 책을 통해 한국 군인들의 모습을 간접적으로 접하며 의지의 중요성을 재인식하고, 앞으로의 삶 속에서 소소한 역할이라도 책임감을 하며 살아가겠다는 다짐을 표현함. 또한 '어쨌든 날아오르라! 활주로만 벗어나면 그다음은 어떤 기류를 만날 지는 모","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"탁구 수업에서 배운 기능적 원리를 통해 탁구 서브, 리그전, 랠리 활동에서 이를 적용하는 모습을 보여줌.","c":"운동과 건강","sem":"1학기"},{"y":1,"t":"세부능력및특기사항","b":"티볼 기초 기능을 집중력 있게 연습하여 좋은 기록을 보임. 경기 수행 능력이 우수하며 전술 이해도가 높음. 타격에서 배트의 타점을 이해하고 자신이 원하는 방향으로 타격함. 플라이볼의 낙하지점을 파악하여 실수하지 않고 포구하는 노력을 보여주며, 경기 상황에서도 뛰어난 포구능력을 보임. 경기 중 자신의 역할을 충실히 수행하려는 노력을 통해 팀워크의 중요성을 깨닫는 모습이 관찰됨. 스포츠 인성 수업 중 도전정신에 대해 목표를 이루기 위한 과정의 통해 포기하지 말고 자신의 목표를 다시 한번 생각하는 계기를 활동지에 작성함.","c":"운동과 건강","sem":"2학기"},{"y":1,"t":"세부능력및특기사항","b":"좋은 소리로 칼림바를 연주하기 위해 여러 가지 방법을 시도하며 찾아낸 연주 기법을 친구들과 공유하고 정리하여 활동지를 작성함. 우쿨렐레를 연주할 때 쉬운 노래를 선택하여 반복하며 연습하고, 노래를 부르며 곡의 분위기를 살려 연주하려는 모습을 보임. 고전파 시대, 낭만파 시대의 음악적인 특징을 조사하여 정리함.","c":"음악"},{"y":1,"t":"세부능력및특기사항","b":"우리나라 전통공예인 지승공예 제작 활동에서 작품 기획할 때 밑그림을 열심히 그리고 자신의 이름에 있는 획으로 사람의 얼굴을 그려서 표현함. 자음과 모음을 활용하여 자신의 이름을 디자인하며 한글의 아름다움에 대한 인식을 확장하게 되었다고 활동지를 작성함. 종이를 끈으로 제작하는 과정이 처음에는 서툴렀지만, 끝까지 완성하는 모습을 보임. 예술의 정의에 관해서 토론하는 활동에서 예술이란 작가가 작품에 뜻을 담아 제작하거나 사람들이 작품을 보고 조금의 관심이라도 갖게 한다면 그것은 예술이며 사람이 아닌 인공지능이 제작한 작품 또한 감상자가 아름답다고 느꼈다면 예술이 될 수 있다고 자기 생각을 글로 작성함.","c":"미술"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 10차시에 걸쳐 다양한 비문학 제재를 바탕으로 요약하기, 내용 구조도 정리하기 등의 읽기 전략을 활용해 사실적 독해를 수행하고자 노력함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 현대 사회에서도 소통 방식의 차이가 사회적 구조에 의해 만들어졌다고 주장하면서 상류층과 하류층의 언어 사용이 그들의 삶과 더불어 어떻게 형성되는지 타당한 근거를 바탕으로 제시함. 또한 바람직한 소통 방법에 대해 답변한 내용이 인상적임. 상대에 맞춰 자신의 말과 태도를 조절하는 '수용 감각'은 진정한 관계 형성에 도움이 된다고 주장함. 실제 자신의 대화 상황을 사례로 들며 상대방의 상황에 맞게 대화의 수준, 내용을 조절하는 것이 얼마나 중요한지에 대해 표현함. 이 과정을 통해 책의 내용을 바탕으로 자신의 의견을 논리적으로 개진하는 독서 역량을 발휘함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '노찬성과 에반(김애란)'을 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 작성하며 책을 읽은 후 모둠 책대화를 통해 작품의 주제 의식에 대해 의견을 나눔. 시 처방하기 활동에서 짝사랑하는 상대에게 어떻게 다가가야할지 몰라 고민이라는 친구의 편지를 읽고 시 '그리움만 남아있어도(용혜원)'를 처방해 발표함. 사랑의 의미에 대해 이야기하는 시를 낭송하며 고민하는 친구에게 용기를 가지라는 응원의 메시지를 전함.\n\n수학Ⅰ: 지수함수가 감염병 확산, 금융 이자 계산 등 실생활에서 다양하게 활용된다는 점에 주목하여 수학 기사문을 작성함. 현실 문제를 수학적으로 해석하며 수학 개념의 실용성과 사회적 중요성을 인식하려는 태도를 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후 학습지를 작성함. 함수 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 최대 최소, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 제시한 명제가 참인지 거짓인지 판정하는 활동을 함.\n\n수학Ⅱ: 수업 전반에서 교실 규칙을 인식하고 이를 수용하며 조용히 학습 환경을 유지하려는 태도가 관찰됨. 교사의 지시에 대해 즉각 반응하며 요구 사항을 따르는 모습이 반복적으로 나타남. 읽기 자료를 활용한 수업 장면에서는 비교적 적극적인 모습을 보여, 자료를 큰 목소리로 또박또박 읽으며 반 전체가 내용을 인지할 수 있도록 도움을 줌. 발음이 정확하고 전달력이 있어 읽기 활동의 흐름을 안정적으로 이끎. 수업 중 자기 행동을 상황에 맞게 조절하며 공동체 내 질서를 유지하려는 모습이 지속적으로 관찰되어, 학습 태도의 변화 가능성은 열려 있다고 느껴짐.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"평가 과제나 프린트 학습 등 최소한의 활동을 통해 기본 개념을 확인하고, 쉬운 예제를 반복하며 기초적인 계산 과정을 따라가려는 모습은 부분적으로 관찰됨. 수학적 개념에 대한 관심은 뚜렷하지 않았으나, 실생활과 연관된 주제에서 흥미를 가질 가능성이 있으며, 향후 스스로의 학습 방식에 대한 점검과 동기 유발이 병행된다면 점진적 성장이 기대됨.\n\n영어Ⅰ: 지필고사에서 자신이 풀 수 있는 문제는 풀고자 노력하며 정답을 맞혔을 때 성취감을 느끼는 모습으로 보아, 영어 교과에 대한 적절한 공부 전략 및 노력이 수반된다면 큰 성장을 기대해 볼 수 있는 학생임. 'Wonder(R.J.Palacio)'를 4","c":"확률과 통계"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 커팅, 뮤트 등 심화 기법을 익혀 연주에 참여함. 새롭게 접한 코드를 숙지하기 위해 연습함. 어려웠던 점으로 코드 암기와 코드 변환을 선정하고, 이를 극복하기 위해 반복적으로 연습했다는 성찰문을 작성하며 자기주도적인 연습과정을 보여줌. 드럼 연주 활동에서","c":"회에 걸쳐 읽음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 운동 분석 소프트웨어가 골프 스윙의 궤적, 배구 서브의 타점, 축구 킥의 임팩트 각도 등을 정밀 분석하여 선수의 기량 향상에 기여하는 과정을 조사함. 모든 선수가 동등한 조건에서 과학기술이 적용된 도구나 장비를 사용한다면 공정한 경쟁을 도울 수 있다고 판단하여 기술 혁신을 찬성한다고 활동지에 기술함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 빠른 기동력과 위치선정이 탁월하여 원활한 경기 운영 능력에 강점이 있지만, 안정적인 패스가 엔드존 이전까지는 연결되나 최종에서 패스 실수가 발생하여 득점 기회를 놓치는 점을 인지하여 패스 캐치 집중력을 유지하고 움직임으로써 팀 조직력이 향상됨. 주 공격수로서 뛰어난 캐치 능력과 동료와의 매끄러운 패스 연결을 함으로써 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 기본 기능 연습을 꾸준히 참여하여 경기 수행에 필요한 서브와 리시브의 기능 수행 능력이 우수함. 리그전 수행과정에서 경기력 향상을 위해 창의적 전략을 제시하고 팀원과 협력하여 다양한 전술연습을 실시하여 팀의 승리에 기여함.","c":"악기의 구조와 연주체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 운동생리학 및 스포츠 과학 진로와 연계하여 폭발적인 퍼포먼스의 원천인 속근(빠른 근육 섬유)의 특성과 발달 메커니즘을 탐구함. 스포츠 경기에서 폭발적인 움직임을 구현하고 운동 능력을 극대화하기 위해서는 속근의 발달이 필수적이며, 이는 단순한 근육량 증가를 넘어 신경근계의 반응 속도와 파워를 향상시키는 핵심 요소임을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"복도에서 마주치면 인사를 빠트리지 않으며 교사의 조언에 귀 기울이려 노력하는 학생임. 또한 마음이 통하는 친구들과 끈끈한 우정을 지니고 있으며 교사가 무거운 것을 들고 갈 때 멀리서도 다가와 대신 들어주는 등 자발적으로 협력하는 태도를 보임. 이처럼 타인과의 의리를 중요하게 여기며 기본 예의를 갖춰 늘 주변에는 많은 사람들이 있음. 기본적인 신체 능력이 출중해 축구 등 다양한 체육 분야에서 두각을 드러냄. 교과 성적은 다소 취약하나 학년 초 수업 시간에 보인 열의와 반짝거"},{"y":2,"b":"조용하고 차분한 성격이지만 친한 친구들과 함께면 밝고 활달한 모습을 보이며, 대화를 나누다보면 순수한 내면을 지녔음을 알 수 있음. 교사를 마주치면 멀리서도 웃으며 인사할 만큼 기본 예절이 바르고, 소수의 친구들과 깊고 진실된 우정을 나누며 주변 사람을 챙길 줄 아는 따뜻한 마음씨를 지님. 잦은 건강상의 문제로 등교에 어려움이 있었으나, 포기하지 않고 한 시간이라도 더 수업에 참여하여 학교생활을 이어가려는 의지와 노력을 보여주어 대견함. 자신이 맡은 청소 구역은 책상과 의자 밑 등 눈에 잘 띄지 않는 곳까지 묵묵히 쓸고 닦는 등 보이지 않는 곳에서 성실함을 발휘함. 평소 체육 활동에서 두각을 나타내고, 스포츠 한마당 행사에서 학급의 핵심 전력으로 활약하는 등 뛰어난 신체 능력을 보여줌. 학업 외적인 분야에서 자신의 길을 모색 중이며 진로 상담을 통해 자신의 적성을 치열하게 고민하고 있어, 이러한 고민의 나날들이 훗날 성장의 밑거름이 될 것임. 자신이 선호하는 활동에는 열정을 가지고 임하는 집중도를 보이므로, 향후 명확한 목표 의식을 가지고 정진해나간다면 더 훌륭히 성장할 가능성이 있음."}]},{"name":"정우철","seat":26,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":9,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":8,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":7,"u":3,"n":"지구과학I","c":"과학"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":9,"u":4,"n":"국어","c":"국어"},{"y":2,"s":1,"g":9,"u":3,"n":"화학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"화학I","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":4,"n":"독서","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":8,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":8,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":9,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":8,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":8,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"B"},{"y":2,"s":1,"g":8,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":2,"s":2,"g":9,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":6,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"A"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"발표하는 것에 어려움을 느끼자 꾸준히 연습하며 실수해도 괜찮다는 긍정적인 생각을 통해 자신감을 향상하고 두려움을 극복할 줄 아는 학생임. '호오포노포노 실천법'이라는 책을 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 좋은 습관과 좋은 생각을 형성할 수 있는 방법과 실천의 중요성을 깨달았다고 밝힘. 이를 바탕으로 즉문즉답 활동을 하며 책의 주제와 자신의 삶에 대해 성찰한 내용을 설명함. 시조 '강산 죠흔 경을'을 내재적 관점과 외재적 관점에서 종합적으","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"티볼 경기의 모든 순간에 최선을 다하는 자세가 돋보이는 학생으로서 정확한 패스와 상황 판단 능력이 우수하고 투지가 좋아 팀의 분위기를 긍정적으로 이끄는 팀의 활력소 역할을 함. 티볼 경기 규칙에 대한 이해가 정확하고 경기에서 공격 상황에 대한 빠른 판단력을 바탕으로 주루 플레이를 긴밀하게 수행하여 득점으로 연결하는 능력이 탁월함. 탁구를 좋아하고 탁구의 규칙과 용어를 잘 알고 있으며 경기를 전체적으로 조율할 수 있는 능력이 뛰어나고 기초체력이 뛰어나 연습 시간 내내 쉬지 않고 경기에 임하는 적극성이 돋보임. 자신의 성격과 장점을 살릴 수 있는 리더십을 주제로 진행한 발표 수업에 참여함. 긍","c":"로 감상하고운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 읽고 6가지 핵심 질문에 대한 자신의 생각을 논리적으로 표현함. 언어가 개인의 삶의 태도와 수준을 투영하여 사회적 지위를 나타내는 중요한 표식이 된다는 주장을 글에 담음. 어휘력이 부족하거나 거친 언어를 사용하는 것이 개인의 가치를 떨어뜨린다고 분석하고, 침착하게 말하는 습관이 인생의 가치를 높이는 핵심 자산임을 주장함. 특히 자신의 대화 방식을 반성하며 현재는 상대에 대한 존중을 바탕으로 친밀도에 따라 대화의 기준을 유연하게 조율하는 신중한 소통 태도를 정립했다고 밝힘. 소통적 독서 활동에서는 3가지 질문을 골라 자신의 생각을 정돈하여 논리적으로 구술함. 책에서 설명하는 '수용 감각' 개념을 활용해 바람직한 소통 방법을 제시한 점이 인상적임. 상대에게 자신을 맞추는 '수용 감각'을 배려의 도구로 인정하고, 자신의 강점과 진솔함을 잃지 않는 균형 잡힌 소통이 성공의 진정한 조건임을 역설함. 가족과의 갈등 상황에서 감정을 섞지 않고 존중하는 마음을 담아 '친절하면서도 단호한 언어'를 사용해 의견을 관철했던 실제 경험을 근거로 이성적 판단과 상호 배려가 조화로운 대화를 이끄는 열쇠임을 주장함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"소설 서평 쓰기 활동에서 '오직 운전하는 이들만이 살아남는다(박서련)'를 선택하여 읽고 서평을 쓰는 활동에 참여함. 6차시 동안 독서 일지를 꾸준히 작성하며 책을 읽은 후 모둠 책대화를 통해 작품의 주제 의식이 무엇인지에 대해 의견을 나눔. 책대화 내용을 바탕으로 '자신을 위한 거리 의식'이라는 제목의 서평을 작성함. 좀비가 창궐하는 극한 상황에서 주인공이 고군분투하는 내용을 바탕으로 인간과 인간 사이 신뢰의 중요성을 주제로 드러낸다는 자신의 의견을 제시함. 또한 좀비를 소재로 하는 다른 영화와 비교하면서 작품에 따라 주제가 어떻게 달라지는지 상세히 설명한 점이 인상적임. 시 처방하기 활동에서 자신의 진로 방향에 대해 부모님과 생각이 달라 고민이라는 친구의 편지를 읽고 시 '네가 있어(나태주)'를 처방해 발표함. 네가 있어 행복하다고 말하는 화자의 말을 언급하며 시를 통해 고민하는 친구에게 응원과 격려의 메시지를 전함. 적절한 보조 자료를 활용해 낯선 시를 친구들이 이해하기 쉽게 설명한 점이 돋보임.\n\n수학Ⅰ: 인공지능과 빅데이터 시대의 가속화 속에서 수학의 역할과 중요성에 주목하며 수학 기사문을 작성함. 수학이 인공지능 모델의 내부 구조를 설명하고 검증하는 핵심 도구로 활용되며, 수학적 알고리즘과 모델링이 데이터 처리 및 의사결정 과정에 필수적임을 설명함. 수학을 왜 배우는가에 대한 근본적인 질문에서 출발하여, 첨단 기술 사회에서 수학이 수행하는 실제적 역할을 탐색하며 수학 학습의 필요성과 가치를 스스로 성찰하는 모습을 보임. 지수함수와 로그함수의 개념 및 성질을 토대로 문제를 구성하는 활동을 한 후, 학습지를 작성함. 함수의 그래프의 평행이동과 대칭이동, 지수함수와 로그함수의 관계를 이용한 명제를 만들고, 진위 판정하는 활동에 참여함.\n\n수학Ⅱ: 수업 시간에 차분하고 온화한 태도로 임하며 친구들과의 관계도 원만하게 유지함. 수업 중 불필요한 소음을 내거나 분위기를 흐리는 행동 없이 교실 공동체의 학습 환경을 존중하는 모습이 지속적으로 관찰됨. 자신의 진로를 중심으로 학습의 우선순위를 설정하는 성향이 뚜렷하며, 특정 분야에 흥미를 느끼면 깊이 있게 탐구하고, 관련 자료를 찾아 읽고 정리하는 과정에서 높은 집중력과 자기 주도성을 보임. 상담을 통해 적절한 맥락이 제공되면 학습 동기가 높아질 수 있음을 확인함. 앞으로 진로 탐색과 교과 학습을 연계한 개별 맞춤형 활동을 제공한다면 수업 내용에 대한 이해와 참여도가 점차 향상될 것으로 기대됨. 자신의 장점인 몰입 능력을 수학 학습에도 확장해 나갈 필요가 있음.","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"우쿨렐레 연주 활동에서 다양한 코드와 리듬을 학습하고, 타브 악보 읽는 법과 심화 연주기법을 익혀 연주에 참여함. 아르페지오 주법과 보사노바 리듬을 숙지하기 위해 노력하고, 타브 악보 연주에서 선율을 정확한 리듬으로 표현하기 위해 꾸준히 연습함. 연습의 결과, 악곡의 음악적 특징을 이해하고 코드와 선율 흐름 등을 대체로 안정적으로 표현함. 우쿨렐레는 다양한 느낌을 표현할 수 있는 악기임을 깨달았다는 소감을 드러내며, 악기에 대한 이해도를 확장하는 모습을 보여줌. 드럼 연주 활동에서 악기의 구조와 연주 자세, 8비트 리듬, 필인 연주법 등을 배우고 연주에 참여함. 악기 각 구성 요소의 위치와 악보를 정확히 숙지하기 위해 노력하고, 박자를 일정하게 표현하기 위해 연습함. 그 결과, 악곡의 특징을 파악하고, 음악에 맞춰 8비트 기본 리듬과 응용 리듬을 표현함. 모르는 부분은 친구들에게 조언을 구하며 연습하였다는 성찰을 남기며 협력하며 연습하는 소통 역량을 보여줌.","c":"음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"생각하는 체육시간 중 과학 기술의 발전이 스포츠에 미치는 영향에 대해 비판적으로 사고하며, 기술 도입에 따른 긍정적·부정적 측면을 균형 있게 탐구함. 기술 도핑 논란에 대한 사회적 이슈를 인식하고, 공정성과 스포츠의 본질을 지키기 위한 규제의 필요성을 논리적으로 제시함. 신기록 경신, 독점 문제 등 다양한 관점에서 문제를 분석하며, 기술 발전과 스포츠의 조화로운 발전 방향을 고민함. 체육시간에 긍정적인 태도로 참여하며, 플라잉디스크의 과학적 원리를 이해하고 역학적 힘을 구분함. 플라잉디스크를 활용한 변형스포츠를 창의적으로 개발하여 작성함. 기본적인 운동신경이 뛰어나고 민첩성, 순발력, 협응력이 우수하여 새로운 종목도 빠르게 습득함. 빅발리볼에서는 리시브, 토스, 스파이크의 일련의 콤비네이션 과정을 매끄럽게 수행함. 학급 리그 경기에서 탁월한 경기 능력을 발휘하며 팀워크와 전략적 사고도 뛰어남. 이러한 능력을 바탕으로 리그 경기에서 뛰어난 경기 능력을 보여줌. 공격과 수비 양면에서 리더십을 발휘하며 팀원들을 이끌어감. 다양한 종목에서의 경험을 통해 협동심과 책임감을 기르며, 체육 활동에 대한 열정을 지속적으로 보여줌.","c":"체육"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"우수한 공동체 역량을 가진 학생임. 1학기에는 비품 관리 도우미로 활동하며 학급 공용 물품을 정리하고 정돈된 학습 환경을 조성함. 2학기에는 환기 도우미를 맡아 창문을 열어 교실 공기 순환을 돕고, 쾌적한 교실 환경을 유지하는 데 힘씀. 또한 청소 당번, 주번일 때 학기 초에 알려준 방법대로 청소하며 성실함과 책임감 있는 태도를 보여줌. 학급의 칭찬 릴레이에서 운동을 잘하고 유머러스하다는 평가를 받을 정도로 활발하고 긍정적인 성격을 지니며, 원만한 교우관계를 형성함. 특히 칭찬 릴레이에 참여하여 급우들의 장점을 하나하나 꼼꼼하게 기록하는 모습을 통해 따뜻한 마음씨와 뛰어난 관찰력을 확인함. 자기관리 역량을 갖추고 있어 지필평가 전에는 계획적으로 학습 방향을 설정하며 컨디션을 조절하고, 독서를 통해 한국사와 통합사회 과목을 학습함. 지필평가 이후 네 번의 문항 분석 중 한 번 참여하여 준비 과정을 점검하고, 부족한 점을 보완하며 자기주도 학습 역량을 기르려고 노력함. 학업적·인격적인 면에서 점차 성장하는 모습이 보이는 학생으로, 긍정적인 경험의 폭을 넓히고 자기 잠재력을 실현하기 위해 노력한다면 더 큰 발전이 있을 것으로 기대됨."},{"y":2,"b":"소란스러운 상황에서도 평정심을 잃지 않는 차분함과 타인을 먼저 배려하는 온화한 성품을 가짐. 쉬는 시간이나 점심시간 등 자투리 시간을 활용하여 꾸준히 독서를 실천하는 습관이 몸에 배어 있음. 다양한 분야의 독서를 통해 문학적 감수성과 언어적 소양을 깊이 있게 함양하고 있으며, 책을 통해 얻은 폭넓은 간접 경험을 바탕으로 타인의 감정을 세밀하게 파악하고 공감하는 능력이 탁월함. 이러한 깊이 있는 공감 능력을 바탕으로 학급 내뿐만 아니라 다른 반 친구들과도 격의 없이 소통하며 폭넓고 원만한 교우 관계를 형성하고 있음. 자신의 주장을 앞세우기보다 친구들의 이야기를 진심으로 경청하는 태도가 돋보여, 교우들에게 편안함을 주는 친구로 깊은 신뢰를 얻고 있음. 정적인 독서 활동과는 대조적으로, 방과 후에는 복싱을 취미로 하여 자기 단련에 힘쓰는 반전 매력을 지님. 격렬한 운동을 통해 학업 스트레스를 건강하게 해소하는 것은 물론, 해당 과정에서 기른 강인한 체력과 쉽게 포기하지 않는 끈기는 학업으로도 이어져 점차 발전해 나갈 것으로 기대됨. 지적 탐"}]},{"name":"정종인","seat":27,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"C"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"B"},{"y":2,"s":1,"g":9,"u":3,"n":"생명과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"생명과학I","c":"과학"},{"y":3,"s":1,"g":6,"u":4,"n":"화법과작문","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":8,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":8,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":8,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":9,"u":3,"n":"윤리와사상","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"국어","c":"국어"},{"y":1,"s":2,"g":8,"u":4,"n":"국어","c":"국어"},{"y":2,"s":2,"g":9,"u":4,"n":"독서","c":"국어"},{"y":1,"s":2,"g":7,"u":3,"n":"기술가정","c":"기가/제2외"},{"y":2,"s":1,"g":9,"u":4,"n":"문학","c":"국어"},{"y":1,"s":1,"g":9,"u":3,"n":"정보","c":"기가/제2외"},{"y":2,"s":1,"g":9,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":2,"s":2,"g":8,"u":3,"n":"스페인어I","c":"기가/제2외"},{"y":1,"s":1,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":1,"s":2,"g":8,"u":3,"n":"통합사회","c":"사회"},{"y":2,"s":1,"g":8,"u":3,"n":"생활과윤리","c":"사회"},{"y":2,"s":2,"g":7,"u":3,"n":"생활과윤리","c":"사회"},{"y":1,"s":1,"g":8,"u":4,"n":"수학","c":"수학"},{"y":1,"s":2,"g":7,"u":4,"n":"수학","c":"수학"},{"y":2,"s":1,"g":7,"u":4,"n":"수학I","c":"수학"},{"y":1,"s":1,"g":7,"u":4,"n":"영어","c":"영어"},{"y":1,"s":2,"g":7,"u":4,"n":"영어","c":"영어"},{"y":2,"s":2,"g":8,"u":4,"n":"수학II","c":"수학"},{"y":1,"s":2,"g":null,"u":3,"n":"미술","c":"예술","a":"A"},{"y":2,"s":1,"g":9,"u":2,"n":"확률과통계","c":"수학"},{"y":2,"s":2,"g":7,"u":2,"n":"확률과통계","c":"수학"},{"y":1,"s":1,"g":null,"u":3,"n":"음악","c":"예술","a":"C"},{"y":2,"s":1,"g":9,"u":4,"n":"영어I","c":"영어"},{"y":1,"s":1,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"B"},{"y":1,"s":2,"g":null,"u":2,"n":"운동과건강","c":"체육","a":"A"},{"y":2,"s":2,"g":8,"u":4,"n":"영어II","c":"영어"},{"y":1,"s":1,"g":8,"u":3,"n":"한국사","c":"한국사"},{"y":1,"s":2,"g":7,"u":3,"n":"한국사","c":"한국사"},{"y":2,"s":1,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":2,"g":null,"u":2,"n":"음악연주","c":"예술","a":"B"},{"y":2,"s":1,"g":null,"u":2,"n":"체육","c":"체육","a":"A"},{"y":2,"s":2,"g":null,"u":2,"n":"체육","c":"체육","a":"A"}],"records":[{"y":1,"t":"세부능력및특기사항","b":"'딸에게 들려주는 인종차별 이야기'를 읽고 자신의 관심 분야를 깊게 탐구하는 시간을 가짐. 이 과정에서 인종차별의 심각성을 인식하고, 차별 관련 교육은 어릴 때부터 시작하는 것이 중요하다는 점을 깨달아 이를 바탕으로 즉문즉답 활동을 함. '동영상 플랫폼에서 한번쯤 뜨는 인종차별 영상을 보고 웃었던 적이 있으신가요?'를 질문해 친구들이 깊은 사고를 할","c":"국어"},{"y":1,"t":"세부능력및특기사항","b":"주어진 과제 해결을 위해 성실하게 노력하는 자세를 보여주며 탁구 실기 활동에서 안정된 자세를 바탕으로 다양한 스트로크 기술의 전환을 빠르고 자연스럽게 연결할 수 있음. 티볼의 타격 자세가 안정적이며 자신이 원하는 방향으로 공을 보내","c":"수 있도록운동과 건강"},{"y":2,"t":"세부능력및특기사항","b":"분석적 독서 활동에서 '하이퍼리얼리즘의 미학'과 관련된 글을 읽고 핵심 내용을 분석한 후, 자신의 생각을 기술함. 현실에 자연스럽게 녹아 있는 미술품이 주는 미적 가치에 대해 새롭게 알게 되어 예술품을 감상하는 심미안을 갖추게 되었다고 밝힘. 하이퍼리얼리즘이 작가와 감상자의 소통 방식을 중요하게 여긴다는 사실을 오늘날 디지털 문화와 관련지어 보며, 오늘날 디지털 문화 속에서 제대로 예술을 감상하는 방법에 대해 고민해 본 것을 기술함. 확장적 독서 활동에서 '아비투스(도리스 메르틴)'를 발췌독한 후, 사회 문제에 대한 필자의 생각을 바탕으로 자신의 생각을 확장하는 활동을 진행함. 언어가 개인의 사회적 지위를 반영한다는 필자의 견해에 대해 과거의 상황과 달라진 오늘날의 상황을 언급하며 비판적 견해를 드러냄. 언어 사용 양상으로 개인을 판단하는 것에 우려를 표명하며 사회적 지위보다는 개인의 필요에 의해 선택되는 언어 사용의 예시를 제시함.","c":"독서"},{"y":2,"t":"세부능력및특기사항","b":"문학 작품 분석적 읽기 활동에서 소설 '관내분실(김초엽)'을 읽고 비평 활동을 진행함. 작품의 갈등 양상이 엄마와 주인공의 외적 갈등으로 시작되어 주인공의 내적 갈등으로 이어진다고 설명하며, 주인공의 내적 갈등이 해소되는 과정을 통해 주제를 강조하고 있다고 기술함. 작품 속 기억 데이터인 '마인드'를 자아라고 볼 수 있을 것인가에 대해 모둠 책 대화에서 토의를 진행하였으며, 이 과정에서 기억을 저장하는 것이 기록하는 것과 다름이 없기 때문에 자아라고 볼 수 없다는 결론을 도출하여 독서 일지에 정리하고 이를 토대로 서평을 작성함. 심미적 문학 체험 활동에서 학업 성적이 잘 나오지 않아 힘들어하는 동료 학습자의 고민편지를 읽고 시 처방전을 작성함. 시 '태풍이 지나고(이해인)'에서 태풍이 휩쓸고 간 어지러운 곳을 정리하는 시적 화자의 모습을 소개하며, 자신이 원하는 만큼의 결과를 얻지 못한 고민 대상자 역시 힘든 이 시기를 태풍으로 생각하며 언젠가는 지날 것을 기다리라는 내용을 기술함. 시적 상황과 고민 대상자의 상황을 연관지어 고민 대상자가 가져야 할 삶의 태도를 제시한 점에서 문학 작품을 창의적으로 해석하는 모습이 확인됨. \n\n수학Ⅰ: 카드뉴스를 통한 수학 개념 탐구 활동에서 지수함수의 기본 개념을 중심으로 증가 및 감소, y절편, 실생활 적용 사례를 간단하게 정리함. 카드뉴스에서는 금리, 인구 변화, 바이러스 확산 등 일상적인 주제를 활용하여 지수함수가 실생활과 밀접하게 연결된다는 점의 전달을 시도함. 시각적 구성과 간단한 문장을 통해 지수함수를 어렵지 않게 소개하려는 태도가 나타나는 결과물을 완성함. 지수 단원에서는 지수법칙을 활용한 계산 문제에 반복적으로 도전하며 계산과정에서 실수를 줄이기 위한 노력을 기울임. 특히 거듭제곱근의 의미와 계산법에 대해 다각도로 접근하려는 태도와 피드백을 수용하고 수정하는 자세를 통해 꾸준히 향상하고자 노력하는 모습을 보임. 로그의 기본 정의와 성질을 이해하고 이를 적용하여 로그 방정식을 해결할 수 있으며, 개념을 정확히 이해하려는 노력을 보임. 삼각함수 그래프 실습활동에서 사인, 코사인, 탄젠트 함수의 그래프를 단위원","c":"문학"},{"y":2,"t":"세부능력및특기사항","b":"연주 활동에서 친구들의 연주에 맞춰 노래를 부르는 등 합주 분위기를 즐겁게 조성한 학생임. 우쿨렐레 연주 활동에서 다양한 코드와 여러 가지 리듬, 타브 악보 독보법과 심화 기법을 익혀 연주에 참여함. 어려웠던 점으로 코드를 숙지하고 빠르게 변환하는 것을 꼽고, 이를 개선하기 위해 악곡에서 많이 사용되는 코드를 먼저 익히고 어려운 코드는 친구들에게 운지법을 질문하며 익혔다는 성찰문을 작성함. 드럼 연주 활동에서 악기의 구조와 8비트 리듬, 필인 연주법 등을 학습함. 악보 읽는 법을 익히기 위해 노력하고 손과 발의 협응, 킥 연주법을 숙지하기 위해 연습함. 필인 창작 활동에 흥미를 갖고 참여하였으며, 스네어와 탐을 이용하여 음악에 어울리는 필인을 만들고 정확한 박자로 깔끔한 연주를 선보임. 수업 이후 음악 감상 시 드럼의 소리가 더욱 잘 들리게 되었다는 소감을 밝히며, 악기를 다룰 땐 악보와 악기 각 구성 요소의 명칭을 숙지하는 것이 중요함을 느꼈다는 성찰 태도를 보임.","c":"의 회전을 바음악 연주"},{"y":2,"t":"세부능력및특기사항","b":"스포츠 기술 도핑 이해를 위한 주제 탐구 활동에서 전신수영복의 경우 근육을 압박함으로써 선수의 몸을 유선형으로 만들어 물의 저항을 감소시키고 부력을 높여주는 효과를 가진 사례를 제시함. 과학 기술 도입은 선수 안전을 보장해주는 역할과 경기에 집중할 기회를 제공할 수도 있기에 혁신으로 인정해야 한다는 의견을 활동지에 작성함. 플라잉 디스크 얼티미트 경기 상황에 따른 포지션별 역할에 대해 분석하여 팀원 간의 활발한 의사소통과 남녀학생들의 참여도가 열정적이라는 강점이 있지만, 전체적으로 공격과 수비의 전환이 다소 느리다는 점을 인지하여 전술 대형을 미리 배열함으로써 팀 조직력이 향상됨. 승리하기 위한 전략을 구상할 때 디스크 이동 경로를 미리 파악하여 이동함으로써 체력을 안배할 수 있는 자신만의 필승 전략을 세움. 넓은 시야를 통해 동료와의 협력 수비에 집중하고, 더 많이 뛰어 팀의 필승 전략을 실천하도록 노력하여 좋은 결과를 가져옴. 빅발리볼 경기에서 공에 대한 집중력이 우수하여 상대 팀의 어려운 공의 캐치가 가능하고 경기의 흐름을 잘 파악하여 전략적인 경기 운영이 가능함. 팀원이 실수하면 격려와 배려를 실천하며 이끎이 역할을 훌륭히 수행함.","c":"체육"},{"y":3,"t":"세부능력및특기사항","b":"스포츠로 사고하기 보고서 활동에서 영화 ‘에어’를 시청하고 경영학 진로와 연계하여 기업의 마케팅 전략과 브랜드 이미지가 소비자 행동에 미치는 파급력을 탐구함. 제품의 기능이나 가격 같은 물리적 요소를 넘어 광고, 브랜드 스토리, 시각적 이미지 전략이 소비자의 심리적 기저를 자극하고 고유한 브랜드 가치를 형성하는 메커니즘을 분석함. 이러한 전략적 접근이 차별화된 시장 정체성을 구축하여 기업의 핵심 경쟁력을 제고하는 결정적 요인임을 규명함. 결과적으로 현대 비즈니스 환경에서 시장을 선도하기 위해서는 정교한 마케팅 설계와 소비자 행동 분석이 필수적임을 깨달았다는 견해를 밝힘.","c":"체육 탐구"},{"y":1,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동동아리활동진로활동진로활동진로활동진로활동"},{"y":2,"t":"창의적체험활동상황","b":"자율활동자율활동동아리활동진로활동진로활동진로활동진로활동"},{"y":3,"t":"창의적체험활동상황","b":"자율활동동아리활동진로활동진로활동"}],"opinions":[{"y":1,"b":"친구들의 장난도 웃으며 잘 받아주는 등 친화력이 좋으며 상대방의 미묘한 감정 변화를 세심하게 알아차림. 여기서 그치지 않고 한 단계 더 나아가 상대방의 처지와 감정을 고려하며 사람을 대하기에 교우 관계가 원만함. 겉으로는 무심한 척하지만 재치 있는 입담으로 학업에 지친 학급 친구들에게 활력을 불어 넣어주는 등 알고 보면 마음이 따뜻하고 순수한 모습이 있는 학생임. 여유로워 보이는 태도 속에서도 맡은 역할이나 과제는 끝까지 책임지고 완수하기 위해 노력하고, 몸이 아프거나 하는 부득이한 경우를 제외하고는 지각한 적이 없을 정도로 지켜야 할 것은 책임감 있게 지키는 모습이 인상적임. 다만 흥미가 적은 과목이나 일에는 평소만큼의 열정이 발휘되지 않는 모습이 보이기도 하므로 이러한 교과에 대해서도 인내심을 기르고 진로에 대한 뚜렷한 목표 의식을 갖게 된다면 앞으로 더욱 큰 성취를 이룰 것으로 기대됨."},{"y":2,"b":"밝고 명랑한 성격을 바탕으로 학급 분위기를 활기 있게 만드는 학생으로, 또래 학생들과 자연스럽게 어울리며 원만한 교우 관계를 형성함. 장난기 있는 모습으로 친구들에게 친근하게 다가가는 붙임성을 지니고 있으며, 개방적인 태도를 바탕으로 일상적인 학교생활 속에서 긍정적인 대인 관계를 유지함. 솔직하고 당당한 태도로 자신의 의견을 분명하게 표현하며, 학급 활동이나 소규모 모둠 활동에서도 의견을 적극적으로 제시하여 또래 간 원활한 의사소통을 이끄는 역할을 함. 노래 실력이 뛰어나 학급을 위해 종종 노래를 선보이며 구성원들에게 활력을 전하는 등 지친 상황에서 학급 분위기 조성에 다방면으로 기여하는 모습을 보였으며, 이러한 점에서 공동체 역량을 확인함. 또한 방과후 자기 주도 학습에 자율적으로 참여하여 성실하게 공부하며 자신의 학습 역량 향상을 위해 노력하는 모습을 보여주고, 교육과정 선택을 위해 자신의 진로 및 학업 계획을 구체적으로 작성하여 교사와 공유하고 상담하는 등 신중한 태도를 보인 점에서 자기주도성과 진로 탐색 역량을 확인함."}]},{"name":"정준희","seat":28,"subjects":[{"y":1,"s":1,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":1,"s":2,"g":null,"u":1,"n":"과학탐구실험","c":"과학","a":"A"},{"y":2,"s":1,"g":8,"u":3,"n":"물리학I","c":"과학"},{"y":2,"s":2,"g":6,"u":3,"n":"물리학I","c":"과학"},{"y":3,"s":1,"g":4,"u":4,"n":"언어와매체","c":"국어"},{"y":1,"s":1,"g":6,"u":3,"n":"통합과학","c":"과학"},{"y":1,"s":2,"g":7,"u":3,"n":"통합과학","c":"과학"},{"y":2,"s":1,"g":6,"u":3,"n":"지구과학I","c":"과학"},{"y":2,"s":2,"g":4,"u":3,"n":"지구과학I","c":"과학"},{"y":3,"s":1,"g":4,"u":3,"n":"진로영어","c":
